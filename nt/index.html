<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DevCoderZ - NT Portal</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        /* Mobile horizontal scroll support */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="bg-slate-900 text-white min-h-screen font-sans">

    <nav class="p-4 bg-slate-800 border-b border-slate-700 shadow-md">
        <div class="container mx-auto flex justify-between items-center">
            <h1 class="text-xl font-bold tracking-wider text-teal-400">DevCoderZ <span class="text-xs text-white bg-teal-600 px-2 py-0.5 rounded ml-1">NT</span></h1>
            <button class="bg-teal-500 hover:bg-teal-600 px-4 py-1.5 rounded-md text-sm font-semibold transition">Portal Login</button>
        </div>
    </nav>

    <main class="container mx-auto px-4 py-8">
        
        <section id="banner-section" class="mb-10 hidden">
            <h2 class="text-lg font-semibold mb-3 text-slate-400">🎯 Latest Announcements</h2>
            <div id="banner-container" class="w-full rounded-2xl overflow-hidden shadow-lg border border-slate-700">
                </div>
        </section>

        <section class="mb-12">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-xl font-bold border-l-4 border-teal-500 pl-3">Explore Batches / Products</h2>
                <span class="text-xs bg-slate-800 text-slate-400 px-3 py-1 rounded-full">Live Synchronized</span>
            </div>
            
            <div id="courses-grid" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6">
                <div class="text-slate-500 animate-pulse col-span-full text-center py-10">Fetching live content pipelines...</div>
            </div>
        </section>

    </main>

    <script src="app.js"></script>
</body>
</html>
