<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>NEXT TOPPER - Course View</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        * { user-select: auto !important; -webkit-user-select: auto !important; }
        .line-clamp-2 { display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
    </style>
</head>
<body class="bg-[#050507] text-white min-h-screen flex flex-col antialiased">

    <!-- Navbar -->
    <nav class="sticky top-0 z-40 bg-black/70 backdrop-blur-2xl border-b border-white/5">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-4 flex justify-between items-center">
            <a class="text-xl font-black text-white tracking-widest" href="index.html">NEXT TOPPER</a>
            <button id="backBtn" onclick="handleBack()" class="bg-white/5 border border-white/10 text-sm font-bold px-4 py-2 rounded-xl hover:bg-white/10 transition-all flex items-center gap-2">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg> Back
            </button>
        </div>
    </nav>

    <!-- Header Banner -->
    <header class="relative w-full h-[25vh] min-h-[200px] overflow-hidden flex items-end justify-start bg-neutral-900">
        <div class="absolute inset-0 bg-gradient-to-t from-[#050507] via-[#050507]/40 to-transparent z-10"></div>
        <img id="courseBanner" src="https://dylnd2lqy6eys.cloudfront.net/1770981347/admin_v2/uploads/courses/thumbnail/4628574_125_aarambh%20banner%20app%202026%202.jpg" class="absolute inset-0 w-full h-full object-cover opacity-30">
        <div class="relative z-20 max-w-7xl mx-auto w-full px-4 sm:px-6 lg:px-8 pb-6">
            <h1 id="courseTitle" class="text-2xl sm:text-4xl font-black text-white tracking-tight">Loading Content...</h1>
            <p id="breadCrumb" class="text-xs text-neutral-400 mt-2 font-mono tracking-wide">Root /</p>
        </div>
    </header>

    <!-- Main Section -->
    <main class="flex-grow max-w-7xl mx-auto w-full px-4 sm:px-6 lg:px-8 py-8">
        <div class="bg-[#0c0c0f] border border-white/5 rounded-3xl overflow-hidden shadow-2xl">
            <div class="p-5 border-b border-white/5 bg-white/5 flex items-center justify-between">
                <h2 id="sectionTitle" class="text-md font-bold text-neutral-300 uppercase tracking-wider">Subjects / Folders</h2>
                <span id="itemCount" class="text-xs bg-white/10 text-white px-2.5 py-1 rounded-full font-bold">0 Items</span>
            </div>

            <!-- Loader -->
            <div id="contentLoading" class="text-center py-20 text-neutral-500 font-medium">Fetching contents from server...</div>

            <!-- Dynamic List View -->
            <div id="contentList" class="divide-y divide-white/5 p-2 md:p-4 hidden"></div>
        </div>
    </main>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const courseId = urlParams.get('course_id');
        
        let currentData = null; // Pure course ka response state maintain karne ke liye
        let folderStack = [];   // Spidy back navigation track karne ke liye tracking history

        if (!courseId) {
            window.location.href = 'index.html';
        }

        async function loadCourse() {
            const apiURL = `https://nt-api.eg-a-nm-a-e-sala-zar.workers.dev/api/full-course?course_id=${courseId}`;
            try {
                const response = await fetch(apiURL);
                currentData = await response.json();

                // Setup Page Title and Banner
                document.getElementById('courseTitle').innerText = currentData.title || currentData.name || "Batch Material";
                if(currentData.banner || currentData.image) {
                    document.getElementById('courseBanner').src = currentData.banner || currentData.image;
                }

                // Render Top Level Folders (Root)
                const items = currentData.materials || currentData.contents || currentData.data || [];
                renderItems(items, "Subjects / Folders");

            } catch (error) {
                console.error("Error loading course details:", error);
                document.getElementById('contentLoading').innerText = "Error loading batch data.";
            }
        }

        function renderItems(items, sectionName) {
            const listContainer = document.getElementById('contentList');
            document.getElementById('contentLoading').classList.add('hidden');
            listContainer.classList.remove('hidden');
            listContainer.innerHTML = '';

            document.getElementById('sectionTitle').innerText = sectionName;
            document.getElementById('itemCount').innerText = `${items.length} Items`;

            if(items.length === 0) {
                listContainer.innerHTML = `<div class="p-12 text-center text-neutral-600 font-medium">This folder is empty.</div>`;
                return;
            }

            items.forEach(item => {
                const title = item.title || item.name || "Untitled";
                
                // Spidy validation: Agar item ke andar content array hai ya type folder hai, to folder render hoga
                const isFolder = item.type === 'folder' || item.materials || item.contents || (!item.stream_url && !item.video_id);
                const itemId = item.id || item.folder_id || Math.random().toString();

                const row = document.createElement('div');
                row.className = "w-full";

                if (isFolder) {
                    // FOLDER VIEW BUTTON
                    row.innerHTML = `
                        <button onclick="enterFolder('${itemId}', '${title.replace(/'/g, "\\'")}')" class="w-full flex items-center justify-between p-4 rounded-2xl hover:bg-white/5 transition-all text-left group">
                            <div class="flex items-center gap-4 flex-1 min-w-0">
                                <div class="w-12 h-12 rounded-xl bg-blue-500/10 border border-blue-500/20 flex items-center justify-center shrink-0">
                                    <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#3b82f6" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 20a2 2 0 0 0 2-2V8a2 2 0 0 0-2-2h-7.9a2 2 0 0 1-1.69-.9L9.6 3.9A2 2 0 0 0 7.93 3H4a2 2 0 0 0-2 2v13a2 2 0 0 0 2 2Z"/></svg>
                                </div>
                                <div class="truncate">
                                    <h3 class="font-bold text-white text-base tracking-wide truncate group-hover:text-blue-400 transition-colors">${title}</h3>
                                    <span class="text-xs text-neutral-500 block mt-0.5">Folder / Click to view contents</span>
                                </div>
                            </div>
                            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" class="text-neutral-500 group-hover:text-white transition-colors"><path d="m9 18 6-6-6-6"/></svg>
                        </button>
                    `;
                } else {
                    // LECTURE/VIDEO PLAY LINK
                    const videoId = item.id || item.video_id || '';
                    row.innerHTML = `
                        <a href="player.html?video_id=${videoId}&course_id=${courseId}" class="w-full flex items-center justify-between p-4 rounded-2xl hover:bg-white/5 transition-all text-left group">
                            <div class="flex items-center gap-4 flex-1 min-w-0">
                                <div class="w-12 h-12 rounded-xl bg-purple-500/10 border border-purple-500/20 flex items-center justify-center shrink-0">
                                    <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#a855f7" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polygon points="10 8 16 12 10 16 10 8"/></svg>
                                </div>
                                <div class="truncate">
                                    <h3 class="font-bold text-white text-base tracking-wide line-clamp-2 group-hover:text-purple-400 transition-colors">${title}</h3>
                                    <span class="text-xs text-purple-400/80 font-semibold block mt-0.5">Video Lecture</span>
                                </div>
                            </div>
                        </a>
                    `;
                }
                listContainer.appendChild(row);
            });
        }

        // Spidy Engine: Page refresh kiye bina child nesting render karne ke liye loop logic
        function enterFolder(folderId, folderName) {
            // Find current active items depending on hierarchy
            let targetItems = [];
            const rootItems = currentData.materials || currentData.contents || currentData.data || [];

            // Simple traversal check inside full-course JSON trees
            let foundFolder = findFolderById(rootItems, folderId);
            
            if (foundFolder) {
                // Save current state context inside history navigation stack
                folderStack.push({
                    name: folderName,
                    items: getCurrentRenderedItemsList()
                });

                targetItems = foundFolder.materials || foundFolder.contents || foundFolder.data || [];
                updateBreadcrumb();
                renderItems(targetItems, folderName);
            }
        }

        function findFolderById(items, id) {
            for (let item of items) {
                if ((item.id == id || item.folder_id == id)) return item;
                const subItems = item.materials || item.contents || item.data || [];
                if (subItems.length > 0) {
                    let deepSearch = findFolderById(subItems, id);
                    if (deepSearch) return deepSearch;
                }
            }
            return null;
        }

        function getCurrentRenderedItemsList() {
            // Helper function to extract current view item array
            return currentData._lastRendered || currentData.materials || currentData.contents || currentData.data || [];
        }

        function updateBreadcrumb() {
            let path = "Root / ";
            folderStack.forEach(f => { path += `${f.name} / `; });
            document.getElementById('breadCrumb').innerText = path;
        }

        function handleBack() {
            if (folderStack.length > 0) {
                // Stack me se pichla folder nikalna
                const previousState = folderStack.pop();
                updateBreadcrumb();
                
                // Puraane folder ka contents render karna bina page refresh kiya
                let sectionTitle = folderStack.length === 0 ? "Subjects / Folders" : folderStack[folderStack.length - 1].name;
                
                // Re-calculating objects reference hierarchy tree
                if(folderStack.length === 0) {
                     renderItems(currentData.materials || currentData.contents || currentData.data || [], sectionTitle);
                } else {
                     let rootItems = currentData.materials || currentData.contents || currentData.data || [];
                     let activeFolder = findFolderById(rootItems, previousState.id);
                     renderItems(previousState.items, sectionTitle);
                }
            } else {
                // Agar stack empty hai, matlab hum root subjects par hain -> seedhe index page bhej do
                window.location.href = 'index.html';
            }
        }

        loadCourse();
    </script>
</body>
</html>
