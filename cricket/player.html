<!DOCTYPE html>
<html lang="en">
<head>
  <title>DevCoderZ X Cricket</title>
  <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
  <meta name="referrer" content="no-referrer">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/plyr@3.7.8/dist/plyr.css">
  <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
  <script src="https://cdn.jsdelivr.net/npm/plyr@3.7.8/dist/plyr.polyfilled.js"></script>
  <style>
    body { background-color: #000; margin: 0; padding: 0; overflow: hidden; height: 100%; width: 100%; }
    .video-container { position: relative; width: 100%; height: 100%; background: #000; }
    
    /* Shaka Player Like UI Fix */
    :root {
      --plyr-color-main: #ff0000; /* Shaka/YouTube Red Style */
    }

    .dev-credits {
      position: absolute;
      top: 15px;
      right: 15px;
      background: rgba(0, 0, 0, 0.5);
      color: #ffffff;
      padding: 4px 12px;
      font-family: 'Segoe UI', sans-serif;
      font-size: 11px;
      font-weight: bold;
      border-radius: 2px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      z-index: 2147483647;
      pointer-events: none;
      text-transform: uppercase;
      letter-spacing: 1px;
      backdrop-filter: blur(5px);
    }

    /* Fullscreen Permanent Display Fix */
    .plyr--fullscreen-enabled .dev-credits {
      display: block !important;
      visibility: visible !important;
      opacity: 1 !important;
    }
  </style>
</head>
<body>

  <div class="video-container" id="wrapper">
    <div class="dev-credits" id="p-tag">Developer : Devansh Sharma</div>
    <video autoplay playsinline muted id="player"></video>
  </div>

  <script>
    document.addEventListener("DOMContentLoaded", function () {
      const video = document.getElementById("player");
      const credits = document.getElementById("p-tag");
      const source = "https://dillzy-stream.sayanwork-studioo.workers.dev/live/abc123.m3u8";

      const options = {
        autoplay: true,
        controls: ['play-large', 'play', 'progress', 'current-time', 'mute', 'volume', 'settings', 'fullscreen'],
        settings: ['quality', 'speed']
      };

      function setupPlayer(hls, qualities = []) {
        const player = new Plyr(video, {
          ...options,
          quality: qualities.length ? {
            default: qualities[0],
            options: qualities,
            forced: true,
            onChange: q => {
              hls.levels.forEach((level, index) => {
                if (level.height === q) hls.currentLevel = index;
              });
            }
          } : {}
        });

        // Credits Injection for Fullscreen
        player.on('ready', () => {
          const container = video.closest('.plyr');
          container.appendChild(credits);
        });

        setInterval(() => {
          if (video.paused && video.readyState > 2) video.play().catch(()=>{});
        }, 3000);

        const unmute = () => {
          video.muted = false;
          video.volume = 1;
          window.removeEventListener("click", unmute);
        };
        window.addEventListener("click", unmute);
      }

      if (Hls.isSupported()) {
        const hls = new Hls({ autoStartLoad: true });
        hls.loadSource(source);
        hls.attachMedia(video);
        hls.on(Hls.Events.MANIFEST_PARSED, (_, data) => {
          const availableQualities = data.levels.map(l => l.height).sort((a,b) => b - a);
          setupPlayer(hls, availableQualities);
        });
        hls.on(Hls.Events.ERROR, (_, data) => { if (data.fatal) hls.startLoad(); });
      }
    });
  </script>
</body>
</html>
