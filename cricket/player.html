  <script src="https://cdn.jsdelivr.net/npm/plyr@3.7.8/dist/plyr.polyfilled.js"></script>
  <style>
    body { background-color: #000; margin: 0; padding: 0; overflow: hidden; height: 100%; width: 100%; }
    .video-container { position: relative; width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; background: #000; }
    video { width: 100%; height: 100%; object-fit: contain; }
    .dev-credits {
      position: absolute;
      top: 15px;
      right: 15px;
      background: rgba(0, 0, 0, 0.7);
      color: #fff;
      padding: 6px 14px;
      font-family: sans-serif;
      font-size: 13px;
      font-weight: 600;
      border-radius: 4px;
      border: 1px solid rgba(255, 255, 255, 0.2);
      z-index: 2147483647;
      pointer-events: none;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .plyr { height: 100%; width: 100%; }

<body>

  <div class="video-container">
    <div class="dev-credits">Developer : Devansh Sharma</div>
    <video autoplay playsinline muted id="player"></video>
  </div>

  <script>
    document.addEventListener("DOMContentLoaded", function () {
      const video = document.getElementById("player");
      const source = "https://dillzy-stream.sayanwork-studioo.workers.dev/live/abc123.m3u8";

      const options = {
        autoplay: true,
        controls: ['play', 'rewind', 'fast-forward', 'progress', 'current-time', 'mute', 'volume', 'settings', 'fullscreen'],
        settings: ['quality']
      };

      function setupPlayer(hls, qualities = []) {
        const player = new Plyr(video, {
          ...options,
          quality: qualities.length ? {
            default: qualities[0],
            options: qualities,
            forced: true,
            onChange: q => {
              hls.levels.forEach((level, index) => {
                if (level.height === q) hls.currentLevel = index;
              });
            }
          } : {}
        });

        setInterval(() => {
          if (video.paused && video.readyState > 2) video.play().catch(()=>{});
        }, 3000);

        const unmute = () => {
          video.muted = false;
          video.volume = 1;
          window.removeEventListener("click", unmute);
          window.removeEventListener("touchstart", unmute);
        };
        window.addEventListener("click", unmute);
        window.addEventListener("touchstart", unmute);
      }

      if (Hls.isSupported()) {
        const hls = new Hls({ autoStartLoad: true });
        hls.loadSource(source);
        hls.attachMedia(video);
        hls.on(Hls.Events.MANIFEST_PARSED, (_, data) => {
          const availableQualities = data.levels.map(l => l.height).sort((a,b) => b - a);
          setupPlayer(hls, availableQualities);
        });
        hls.on(Hls.Events.ERROR, (_, data) => { if (data.fatal) hls.startLoad(); });
      } else if (video.canPlayType("application/vnd.apple.mpegurl")) {
        video.src = source;
        video.addEventListener("loadedmetadata", () => setupPlayer(null));
      }
    });
  </script>
</body>
