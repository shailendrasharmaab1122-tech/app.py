<!DOCTYPE html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Live Streaming Player</title><meta name="referrer" content="no-referrer"><script src="https://cdn.jsdelivr.net/npm/shaka-player@4.16.2/dist/shaka-player.ui.min.js"></script><style type="text/css">* {user-select: auto !important; -webkit-user-select: auto !important;}</style><link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/shaka-player@4.16.2/dist/controls.css"><script async src="https://www.googletagmanager.com/gtag/js?id=G-FMP9REY96D"></script><script>window.dataLayer=window.dataLayer||[];function gtag(){dataLayer.push(arguments);}gtag('js',new Date());gtag('config','G-FMP9REY96D');</script><style>*{margin:0;padding:0;box-sizing:border-box}html,body{width:100%;height:100%;background:#000;overflow:hidden;font-family:'Segoe UI',Roboto,Helvetica,Arial,sans-serif}#player-wrapper{position:relative;width:100%;height:100%;background:#000;display:flex;align-items:center;justify-content:center}.shaka-video-container{position:absolute;top:0;left:0;width:100% !important;height:100% !important;background:#000;display:flex !important;align-items:center !important;justify-content:center !important}video{width:100% !important;height:100% !important;object-fit:contain !important;background:#000}.shaka-player-elements{width:100% !important;height:100% !important}.dev-credits{position:absolute;top:15px;left:15px;z-index:99999;font-size:12px;font-weight:500;color:rgba(255,255,255,0.35);pointer-events:none;font-family:sans-serif;letter-spacing:0.5px}.block-overlay{position:fixed;inset:0;z-index:999999;display:flex;align-items:center;justify-content:center;background:radial-gradient(circle at center,#1a1a1a 0%,#000 100%);text-align:center}.block-box{padding:40px;max-width:500px;width:90%;background:rgba(20,20,20,.95);border-radius:16px;border:1px solid rgba(255,255,255,.1);box-shadow:0 20px 50px rgba(0,0,0,.5)}.block-title{font-size:32px;font-weight:800;color:#fff;text-transform:uppercase;margin-bottom:20px}.block-sub{font-size:14px;font-weight:500;color:rgba(255,255,255,.6);line-height:1.6}@media(max-width:700px){.block-title{font-size:28px}.block-box{padding:25px}.block-sub{font-size:12px}}</style></head><body><div id="player-wrapper"><div class="dev-credits">Developed by Devansh Sharma</div><div class="shaka-video-container shaka-mobile no-cursor" id="player-container" data-shaka-player-container shaka-controls="true"><video id="video" autoplay muted playsinline preload="metadata" class="shaka-video"></video></div></div><script>
(function(){
  function isSandboxedEnv(){
    try {
      if (window.self === window.top) return false;
      if (window.frameElement && window.frameElement.hasAttribute("sandbox")) return true;
      try { document.domain = document.domain; if (window.frameElement && !window.frameElement.getAttribute("sandbox")) return false; } catch (e) { return true; }
      return false;
    } catch(e) { return true; }
  }
  function triggerBlockScreen(title, message){
    const container = document.getElementById("player-container");
    const video = document.getElementById("video");
    try { video.pause(); video.removeAttribute('src'); video.load(); } catch(e){}
    const overlay = document.createElement("div");
    overlay.className = "block-overlay";
    overlay.innerHTML = `<div class="block-box"><div class="block-title">${title}</div><div class="block-sub">${message}</div></div>`;
    document.body.appendChild(overlay);
    container.style.display = 'none';
  }
  if(isSandboxedEnv()){
    triggerBlockScreen('Disable Sandbox', 'Opening Chrome Browser Only & Disable Ad blocker');
    return;
  }

  const CONFIG={
    streamUrl:"https://jiotvpllive.cdn.jio.com/bpk-tv/Star_Sports_HD1_BTS/WDVLive/index.mpd",
    keyId:"965dc2ddb1d85138ad787999a7f30ca5",
    key:"859695076e67fe961836b564db6d689c",
    cookieUrl:""
  };

  document.addEventListener("DOMContentLoaded",async()=>{
    shaka.polyfill.installAll();
    if(!shaka.Player.isBrowserSupported()) return;
    const video=document.getElementById("video");
    const container=document.getElementById("player-container");
    video.muted=true;
    const player=new shaka.Player();
    await player.attach(video);
    const ui=new shaka.ui.Overlay(player,container,video);
    ui.configure({
      addBigPlayButton: true,
      controlPanelElements: ["mute", "play_pause", "time_and_duration", "spacer", "quality", "picture_in_picture", "fullscreen"],
      seekBarColors: { base: "white", buffered: "red", played: "green" }
    });
    player.configure({
      drm:{clearKeys:{[CONFIG.keyId]:CONFIG.key}},
      manifest:{defaultPresentationDelay:5},
      streaming:{lowLatencyMode:true, bufferingGoal:10, rebufferingGoal:2, safeSeekOffset:5}
    });

    let cookieValue="__hdnea__=st=1779886604~exp=1779908204~acl=/bpk-tv/Star_Sports_HD1_BTS/WDVLive/*~hmac=4a09d57cb7c3cb83e0965418e462bc9cd8ddd93f9e6c82f2492e5c8cf095bf7f";
    try{
      const response=await fetch(CONFIG.cookieUrl,{cache:"no-store"});
      const data=await response.json();
      cookieValue=data.cookie||"";
    }catch(e){}

    if(cookieValue){
      player.getNetworkingEngine().registerRequestFilter((type,request)=>{
        let urlCookie=cookieValue.startsWith("__hdnea__=")?cookieValue.substring(10):cookieValue;
        if((type===shaka.net.NetworkingEngine.RequestType.MANIFEST||type===shaka.net.NetworkingEngine.RequestType.SEGMENT)&&!request.uris[0].includes("__hdnea__")){
          const sep=request.uris[0].includes("?")?"&":"?";
          request.uris[0]+=sep+"__hdnea__="+urlCookie;
        }
      });
    }

    try{
      await player.load(CONFIG.streamUrl);
      video.play().catch(()=>{});
    }catch(e){}
    video.addEventListener("play",()=>{video.muted=false;});
  });

  if (confirm("Join Our Telegram Channel Official @DevanshSharma") == true) {
    let targetUrl = "https://t.me/+8tZSJ5FyTXVjM2M1";
    let win = window.open(targetUrl, '_blank');
    if (!win || win.closed || typeof win.closed == 'undefined') {
      window.location.href = targetUrl;
    }
  }
})();
</script></body></html>
