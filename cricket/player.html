<!DOCTYPE html>
<html lang="en">
<head>
  <title>DevCoderZ X Cricket</title>
  <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
  <meta name="referrer" content="no-referrer">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/plyr@3.7.8/dist/plyr.css">
  <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
  <script src="https://cdn.jsdelivr.net/npm/plyr@3.7.8/dist/plyr.polyfilled.js"></script>
  <style>
    body { background-color: #000; margin: 0; padding: 0; overflow: hidden; height: 100%; width: 100%; }
    .video-container { position: relative; width: 100%; height: 100%; background: #000; }

    :root {
      --plyr-color-main: #00bfff; /* Shaka Blue */
      --plyr-control-spacing: 8px;
    }

    /* Shaka Style Controls */
    .plyr--video .plyr__controls {
      background: linear-gradient(rgba(0,0,0,0), rgba(0,0,0,0.7)) !important;
      padding-bottom: 20px !important;
      transition: opacity 0.3s ease-in-out;
    }

    /* Hide Controls Automatically */
    .plyr--hide-controls .plyr__controls {
      opacity: 0;
      pointer-events: none;
    }

    /* Text-Only Permanent Credits */
    .dev-credits-clean {
      position: absolute;
      top: 15px;
      right: 15px;
      color: rgba(255, 255, 255, 0.8);
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      font-size: 10px;
      font-weight: 600;
      z-index: 2147483647;
      pointer-events: none;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      text-shadow: 1px 1px 2px rgba(0,0,0,0.8);
    }

    .plyr { height: 100%; width: 100%; }
  </style>
</head>
<body>

  <div class="video-container">
    <div class="dev-credits-clean" id="dev-tag">Developer : Devansh Sharma</div>
    <video autoplay playsinline muted id="player"></video>
  </div>

  <script>
    document.addEventListener("DOMContentLoaded", function () {
      const video = document.getElementById("player");
      const devTag = document.getElementById("dev-tag");
      const source = "https://dillzy-stream.sayanwork-studioo.workers.dev/live/abc123.m3u8";

      const player = new Plyr(video, {
        autoplay: true,
        hideControls: true, // Automatically hide controls
        controls: ['play-large', 'play', 'progress', 'current-time', 'mute', 'volume', 'settings', 'fullscreen'],
        settings: ['quality'],
        tooltips: { controls: false, seek: true }
      });

      // Inject Credits & Fix Fullscreen Rotation
      player.on('ready', () => {
        const container = video.closest('.plyr');
        container.appendChild(devTag);
      });

      player.on('enterfullscreen', () => {
        if (screen.orientation && screen.orientation.lock) {
          screen.orientation.lock('landscape').catch(() => {});
        }
      });

      player.on('exitfullscreen', () => {
        if (screen.orientation && screen.orientation.unlock) {
          screen.orientation.unlock();
        }
      });

      // HLS Setup
      if (Hls.isSupported()) {
        const hls = new Hls();
        hls.loadSource(source);
        hls.attachMedia(video);
        hls.on(Hls.Events.MANIFEST_PARSED, (_, data) => {
          const qualities = data.levels.map(l => l.height).sort((a,b) => b - a);
          player.config.quality = {
            default: qualities[0],
            options: qualities,
            forced: true,
            onChange: (q) => {
              hls.levels.forEach((level, index) => {
                if (level.height === q) hls.currentLevel = index;
              });
            }
          };
        });
      }

      // Auto-Unmute logic
      const unmute = () => { video.muted = false; window.removeEventListener("click", unmute); };
      window.addEventListener("click", unmute);
    });
  </script>
</body>
</html>
