<!DOCTYPE html>
<html lang="en">
<head>
  <title>DevCoderZ X Cricket</title>
  <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
  <meta name="referrer" content="no-referrer">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/plyr@3.7.8/dist/plyr.css">
  <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
  <script src="https://cdn.jsdelivr.net/npm/plyr@3.7.8/dist/plyr.polyfilled.js"></script>
  <style>
    body { background-color: #000; margin: 0; padding: 0; overflow: hidden; height: 100%; width: 100%; }
    .video-container { position: relative; width: 100%; height: 100%; background: #000; }

    /* Shaka UI Style */
    :root {
      --plyr-color-main: #38bdf8; /* Shaka Light Blue */
      --plyr-video-controls-background: linear-gradient(0deg, rgba(0,0,0,0.8), transparent);
    }

    /* Minimal Controls Like Shaka */
    .plyr--video .plyr__controls {
      padding: 10px 15px !important;
      opacity: 0.95;
    }

    .plyr__progress__container {
      margin-right: 15px !important;
    }

    /* Gear Icon for Settings */
    .plyr__control[data-plyr="settings"]::after {
      content: '\2699'; /* Unicode for Gear/Settings icon */
      font-size: 18px;
    }

    /* Text Only Permanent Credits (No Box) */
    .dev-credits-permanent {
      position: absolute;
      top: 15px;
      right: 15px;
      color: #fff;
      font-family: sans-serif;
      font-size: 11px;
      font-weight: 700;
      z-index: 2147483647;
      pointer-events: none;
      text-transform: uppercase;
      letter-spacing: 2px;
    }

    /* Fullscreen Support Fix */
    .plyr--fullscreen-enabled .dev-credits-permanent {
      display: block !important;
      visibility: visible !important;
      opacity: 1 !important;
    }
  </style>
</head>
<body>

  <div class="video-container" id="wrapper">
    <div class="dev-credits-permanent" id="permanent-p">Devansh Sharma</div>
    <video autoplay playsinline muted id="player"></video>
  </div>

  <script>
    document.addEventListener("DOMContentLoaded", function () {
      const video = document.getElementById("player");
      const credits = document.getElementById("permanent-p");
      const source = "https://dillzy-stream.sayanwork-studioo.workers.dev/live/abc123.m3u8";

      // Shaka Style Options
      const shakaOptions = {
        autoplay: true,
        controls: [
          'play-large', // Centered play button
          'play', // Smaller play button
          'progress', // Minimal seek bar
          'current-time', // Timestamp
          'mute', // Volume toggle
          'volume', // Volume slider
          'settings', // Gear for quality/speed
          'fullscreen' // Enter fullscreen
        ],
        settings: ['quality', 'speed'],
        speed: { selected: 1, options: [0.5, 0.75, 1, 1.25, 1.5, 2] },
        quality: { default: 1080 } // Prefer highest
      };

      function setupPlayer(hls, qualities = []) {
        const player = new Plyr(video, {
          ...shakaOptions,
          quality: qualities.length ? {
            default: qualities[0], // Prefer highest resolution
            options: qualities,
            forced: true,
            onChange: q => {
              hls.levels.forEach((level, index) => {
                if (level.height === q) hls.currentLevel = index;
              });
            }
          } : {}
        });

        // Permanent Credits Injection inside Plyr
        player.on('ready', () => {
          const container = video.closest('.plyr');
          container.appendChild(credits); // Injecting inside to persist in fullscreen
        });

        // Auto-Resume
        setInterval(() => {
          if (video.paused && video.readyState > 2) video.play().catch(()=>{});
        }, 3000);

        // Auto-Unmute
        const unmute = () => {
          video.muted = false;
          video.volume = 1;
          window.removeEventListener("click", unmute);
        };
        window.addEventListener("click", unmute);
      }

      if (Hls.isSupported()) {
        const hls = new Hls({ autoStartLoad: true, ABR: { selected: 1080 } }); // Force high quality
        hls.loadSource(source);
        hls.attachMedia(video);
        hls.on(Hls.Events.MANIFEST_PARSED, (_, data) => {
          const availableQualities = data.levels.map(l => l.height).sort((a,b) => b - a);
          setupPlayer(hls, availableQualities);
        });
        hls.on(Hls.Events.ERROR, (_, data) => { if (data.fatal) hls.startLoad(); });
      }
    });
  </script>
</body>
</html>
