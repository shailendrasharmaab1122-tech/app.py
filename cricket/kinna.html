<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stream Player | DevCoderz</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #0f172a;
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        .container {
            width: 90%;
            max-width: 900px;
            background: #1e293b;
            padding: 15px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            text-align: center;
        }

        .video-wrapper {
            position: relative;
            padding-bottom: 56.25%; /* 16:9 Aspect Ratio */
            height: 0;
            overflow: hidden;
            border-radius: 8px;
            background: #000;
        }

        .video-wrapper iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
        }

        .footer {
            margin-top: 20px;
            padding: 10px;
            border-top: 1px solid #334155;
            font-size: 14px;
        }

        .badge {
            display: inline-block;
            background: #3b82f6;
            color: #fff;
            padding: 4px 12px;
            border-radius: 20px;
            font-weight: bold;
            margin-bottom: 8px;
        }

        .credits {
            color: #94a3b8;
            letter-spacing: 1px;
        }

        .credits strong {
            color: #60a5fa;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="badge">Live Stream</div>
        
        <div class="video-wrapper">
            <iframe 
                src="https://shwe7ank-jeeyo.netlify.app/watch.html?id=362" 
                allowfullscreen 
                scrolling="no"
                allow="autoplay; encrypted-media">
            </iframe>
        </div>

        <div class="footer">
            <div class="credits">
                Developed & Maintained by <strong>DevCoderz</strong>
            </div>
            <p style="font-size: 12px; color: #64748b; margin-top: 5px;">
                © 2026 Devansh Sharma | All Rights Reserved
            </p>
        </div>
    </div>

</body>
</html>
