<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STR SPORTS | LIVE STREAM</title>
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Rajdhani', sans-serif; }
        body { background-color: #050810; color: #fff; padding: 20px 10px; background-image: radial-gradient(circle at 50% -20%, #1e2631 0%, #050810 80%); min-height: 100vh; }
        header { text-align: center; margin-bottom: 30px; }
        header h1 { font-size: 2.2rem; text-transform: uppercase; letter-spacing: 3px; color: #00d2ff; text-shadow: 0 0 15px rgba(0, 210, 255, 0.5); }
        .container { max-width: 800px; margin: 0 auto; display: flex; flex-direction: column; gap: 12px; }
        .channel-bar { background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 12px; padding: 12px 20px; display: flex; align-items: center; justify-content: space-between; transition: 0.3s; backdrop-filter: blur(10px); }
        .channel-bar:hover { background: rgba(255, 255, 255, 0.07); border-color: #00d2ff; transform: scale(1.01); }
        .channel-name { font-size: 1.1rem; font-weight: 700; color: #e0e0e0; text-transform: uppercase; }
        .btn-group { display: flex; gap: 10px; }
        .btn { text-decoration: none; padding: 8px 18px; border-radius: 8px; font-size: 0.85rem; font-weight: 700; text-transform: uppercase; transition: all 0.3s ease; }
        .s1 { background: transparent; border: 1.5px solid #00d2ff; color: gold; }
        .s1:hover { background: #00d2ff; color: #000; box-shadow: 0 0 15px rgba(0, 210, 255, 0.6); }
        .s0 { background: transparent; border: 1.5px solid green; color: #00ff00; }
        .s0:hover { background: green; color: #fff; box-shadow: 0 0 15px rgba(0, 255, 0, 0.4); }
        @media (max-width: 600px) { .channel-name { font-size: 0.9rem; } .btn { padding: 6px 10px; font-size: 0.7rem; } }
    </style>
</head>
<body>
<header><h1>STR SPORTS LIVE</h1></header>
<div class="container" id="list"></div>
<script>
    const channels = [
        { name: "STR Sports 1 HD", id: "4470" },
        { name: "STR Sports 1", id: "1142" },
        { name: "STR Sports 1 Hindi HD", id: "174" },
        { name: "STR Sports 1 Hindi", id: "148" },
        { name: "STR Sports 2 HD", id: "4456" },
        { name: "STR Sports 2", id: "1141" },
        { name: "STR Sports 2 Hindi HD", id: "1984" },
        { name: "STR Sports 2 Hindi", id: "1985" },
        { name: "STR Sports 3", id: "147" },
        { name: "STR Sports 1 Tamil HD", id: "4468" },
        { name: "STR Sports 1 Tamil", id: "1124" },
        { name: "STR Sports 1 Telugu HD", id: "4471" },
        { name: "STR Sports 1 Telugu", id: "1651" },
        { name: "STR Sports 1 Kannada", id: "1650" },
        { name: "STR Sports 2 Kannada", id: "4472" },
        { name: "STR Sports 2 Tamil HD", id: "4473" },
        { name: "STR Sports 2 Tamil", id: "2853" },
        { name: "STR Sports 2 Telugu HD", id: "4474" },
        { name: "STR Sports 2 Telugu", id: "2852" },
        { name: "STR Sports Khel", id: "1998" },
        { name: "STR Sports Select 1 HD", id: "300" },
        { name: "STR Sports Select 1", id: "1123" },
        { name: "STR Sports Select 2 HD", id: "301" },
        { name: "STR Sports Select 2", id: "1114" }
    ];
    const listContainer = document.getElementById('list');
    channels.forEach(ch => {
        listContainer.innerHTML += `
            <div class="channel-bar">
                <div class="channel-name">${ch.name}</div>
                <div class="btn-group">
                    <a href="player.html?id=${ch.id}&s=1" class="btn s1">Play 1</a>
                    <a href="player.html?id=${ch.id}&s=2" class="btn s0">Play 2</a>
                </div>
            </div>`;
    });
</script>
</body>
</html>
