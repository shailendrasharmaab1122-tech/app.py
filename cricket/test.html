<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>DevCoderZ</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.7.11/shaka-player.ui.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.7.11/controls.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #050810; color: #fff; font-family: 'Rajdhani', sans-serif; }
        .player-box { width: 100%; max-width: 900px; margin: 0 auto; position: relative; aspect-ratio: 16/9; background: #000; }
        video { width: 100%; height: 100%; }
        .wm-dev { position: absolute; top: 10px; right: 15px; z-index: 10; font-size: 11px; color: rgba(255,255,255,0.8); font-weight: 700; pointer-events: none; }
        .list-container { max-width: 900px; margin: 20px auto; padding: 0 10px; }
        .grid-list { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 10px; }
        .ch-card { background: #1e293b; border: 1px solid #334155; border-radius: 8px; padding: 15px; text-align: center; cursor: pointer; }
        .ch-name { font-size: 0.85rem; font-weight: 700; text-transform: uppercase; color: #00d2ff; }
        #loader { position: absolute; inset: 0; background: rgba(0,0,0,0.8); z-index: 100; display: none; align-items: center; justify-content: center; }
        .spin { width: 30px; height: 30px; border: 3px solid transparent; border-top-color: #00d2ff; border-radius: 50%; animation: s 0.8s linear infinite; }
        @keyframes s { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div class="player-box" id="player-container" shaka-controls="true">
        <div class="wm-dev">Developer: Devansh Sharma</div>
        <div id="loader"><div class="spin"></div></div>
        <video id="video" autoplay playsinline></video>
    </div>

    <div class="list-container">
        <div class="grid-list" id="channel-grid"></div>
    </div>

    <script>
        (function(){
            const _b = window.atob;
            const cfg = {
                db: _b("aHR0cHM6Ly9yYXcuZ2l0aHVidXNlcmNvbnRlbnQuY29tL1NodWJoYW1rdXIvanNvbi9yZWZzL2hlYWRzL21haW4vanNwbw=="),
                apis: [
                    _b("aHR0cHM6Ly9yYXcuZ2l0aHVidXNlcmNvbnRlbnQuY29tL1NodWJoYW1rdXIvVHYvcmVmcy9oZWFkcy9tYWluL2FwaTE="),
                    _b("aHR0cHM6Ly9yYXcuZ2l0aHVidXNlcmNvbnRlbnQuY29tL1NodWJoYW1rdXIvVHYvcmVmcy9oZWFkcy9tYWluL2FwaTI="),
                    _b("aHR0cHM6Ly9yYXcuZ2l0aHVidXNlcmNvbnRlbnQuY29tL1NodWJoYW1rdXIvVHYvcmVmcy9oZWFkcy9tYWluL2FwaTM=")
                ]
            };

            let player, activeCookie = "";
            const video = document.getElementById('video');
            const loader = document.getElementById('loader');

            async function fetchT(u) { try { const r = await fetch(u); return r.ok ? await r.text() : ""; } catch(e) { return ""; } }

            async function getC(u) {
                let t = await fetchT(u);
                let m = t.match(/(__hdnea__=[^"'\s&|<>\\]+)/i);
                return m ? m[1].replace(/\\/g, '').trim() : "";
            }

            async function init() {
                shaka.polyfill.installAll();
                player = new shaka.Player(video);
                new shaka.ui.Overlay(player, document.getElementById('player-container'), video);
                
                player.getNetworkingEngine().registerRequestFilter((type, request) => {
                    request.headers['User-Agent'] = 'plaYtv/7.1.5 (Linux;Android 13)';
                    if (activeCookie) {
                        request.headers['Cookie'] = activeCookie;
                        const sep = request.uris[0].includes('?') ? '&' : '?';
                        if (!request.uris[0].includes('__hdnea')) request.uris[0] += sep + activeCookie;
                    }
                });
            }

            async function play(c) {
                loader.style.display = 'flex';
                for (let i = 0; i < cfg.apis.length; i++) {
                    let ck = await getC(cfg.apis[i]);
                    if (ck) {
                        activeCookie = ck;
                        try {
                            player.configure({ drm: { clearKeys: { [String(c.keyId)]: String(c.key) } } });
                            await player.load(c.url);
                            loader.style.display = 'none';
                            return;
                        } catch(e) {}
                    }
                }
                loader.style.display = 'none';
            }

            async function loadUI() {
                let r = await fetchT(cfg.db);
                if (!r) return;
                let data = JSON.parse(r);
                let chs = (data.channels || data).filter(c => {
                    let n = (c.name || c.channel_name || "").toUpperCase();
                    return n.includes("STAR") || n.includes("STR") || n.includes("SPORTS");
                });

                const grid = document.getElementById('channel-grid');
                chs.forEach(c => {
                    const card = document.createElement('div');
                    card.className = 'ch-card';
                    card.innerHTML = `<div class="ch-name">${c.name || c.channel_name}</div>`;
                    card.onclick = () => play({url: c.url || c.channel_url, keyId: c.keyId, key: c.key});
                    grid.appendChild(card);
                });
                if(chs[0]) play({url: chs[0].url || chs[0].channel_url, keyId: chs[0].keyId, key: chs[0].key});
            }

            document.addEventListener("DOMContentLoaded", async () => {
                await init();
                await loadUI();
            });
            setInterval(() => { debugger; }, 1000);
        })();
    </script>
</body>
</html>
