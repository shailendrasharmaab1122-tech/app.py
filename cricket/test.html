<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
    <title>DevCoderZ X Cricket</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/plyr@3.7.8/dist/plyr.css">
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/plyr@3.7.8/dist/plyr.polyfilled.js"></script>
    <style>
        body{margin:0;padding:0;background-color:#050810;color:#fff;font-family:'Rajdhani',sans-serif;background-image:radial-gradient(circle at 50% -20%, #1e2631 0%, #050810 80%);min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:20px 10px;-webkit-user-select:none;user-select:none}
        .container{width:100%;max-width:900px;background:#1e293b;padding:15px;border-radius:12px;box-shadow:0 10px 25px rgba(0,0,0,.5);text-align:center;margin-bottom:20px}
        .video-wrapper{position:relative;width:100%;aspect-ratio:16/9;overflow:hidden;border-radius:8px;background:#000}
        :root{--plyr-color-main:#00bfff}
        .dev-tag-full{position:absolute;top:15px;right:15px;color:rgba(255,255,255,0.9);font-size:11px;font-weight:700;z-index:1000;pointer-events:none;text-transform:uppercase;letter-spacing:1.5px;text-shadow:1px 1px 3px #000;font-family:sans-serif}
        #_status_box{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);background:rgba(0,191,255,0.2);border:1px solid #00bfff;color:#fff;padding:10px 20px;border-radius:50px;font-size:12px;z-index:11;display:none;backdrop-filter:blur(5px)}
        .footer{margin-top:20px;padding:10px;border-top:1px solid #334155;font-size:14px}
        .badge{display:inline-block;background:#3b82f6;color:#fff;padding:4px 12px;border-radius:20px;font-weight:700;margin-bottom:8px;text-transform:uppercase}
        .credits strong{color:#60a5fa;letter-spacing:1px}
        .ch-list{width:100%;max-width:900px;display:grid;grid-template-columns:1fr;gap:10px;max-height:400px;overflow-y:auto;padding-right:5px}
        .ch-list::-webkit-scrollbar{width:5px}
        .ch-list::-webkit-scrollbar-thumb{background:#3b82f6;border-radius:10px}
        .ch-item{background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.1);border-radius:10px;padding:10px 15px;display:flex;justify-content:space-between;align-items:center}
        .ch-name{font-weight:700;color:#e0e0e0;text-transform:uppercase;font-size:0.9rem}
        .play-btn{border:none;cursor:pointer;padding:8px 20px;border-radius:6px;font-size:0.8rem;font-weight:700;text-transform:uppercase;background:transparent;border:1.5px solid #00d2ff;color:gold;transition:0.3s}
        .play-btn:hover{background:#00d2ff;color:#000}
    </style>
</head>
<body oncontextmenu="return false;" onkeydown="return false;">

<div class="container">
    <div class="badge">DevCoderZ X Cricket</div>
    <div class="video-wrapper">
        <div class="dev-tag-full">Developer: Devansh Sharma</div>
        <div id="_status_box">LOADING...</div>
        <video id="video" autoplay playsinline crossorigin controls></video>
    </div>
    <div class="footer">
        <div class="credits"><strong>DevCoderZ X Cricket</strong></div>
        <p style="font-size:11px;color:#64748b;margin-top:5px;">© 2026 Devansh Sharma | All Rights Reserved</p>
    </div>
</div>

<div class="ch-list" id="ch-list"></div>

<script>
    (function(){
        const _0_a = window.atob;
        const _0_u = {
            db: _0_a("aHR0cHM6Ly9yYXcuZ2l0aHVidXNlcmNvbnRlbnQuY29tL1NodWJoYW1rdXIvanNvbi9yZWZzL2hlYWRzL21haW4vanNwbw=="),
            api: [
                _0_a("aHR0cHM6Ly9yYXcuZ2l0aHVidXNlcmNvbnRlbnQuY29tL1NodWJoYW1rdXIvVHYvcmVmcy9oZWFkcy9tYWluL2FwaTE="),
                _0_a("aHR0cHM6Ly9yYXcuZ2l0aHVidXNlcmNvbnRlbnQuY29tL1NodWJoYW1rdXIvVHYvcmVmcy9oZWFkcy9tYWluL2FwaTI="),
                _0_a("aHR0cHM6Ly9yYXcuZ2l0aHVidXNlcmNvbnRlbnQuY29tL1NodWJoYW1rdXIvVHYvcmVmcy9oZWFkcy9tYWluL2FwaTM=")
            ]
        };

        let activeCookie = "";
        const video = document.getElementById('video');
        const status = document.getElementById('_status_box');
        const player = new Plyr(video, { controls: ['play-large', 'play', 'progress', 'current-time', 'mute', 'volume', 'settings', 'fullscreen'] });

        function setStatus(t, s = true) {
            status.innerText = t;
            status.style.display = s ? 'block' : 'none';
        }

        async function getRaw(u) {
            try {
                const r = await fetch(u);
                return r.ok ? await r.text() : "";
            } catch(e) { return ""; }
        }

        async function getC(u) {
            let t = await getRaw(u);
            let m = t.match(/(__hdnea__=[^"'\s&|<>\\]+)/i);
            return m ? m[1].replace(/\\/g, '').trim() : "";
        }

        let hls;
        async function play(c) {
            setStatus("BYPASSING...");
            if (hls) hls.destroy();
            
            for (let i = 0; i < _0_u.api.length; i++) {
                let ck = await getC(_0_u.api[i]);
                if (ck) {
                    activeCookie = ck;
                    const streamUrl = c.url + (c.url.includes('?') ? '&' : '?') + activeCookie;
                    
                    if (Hls.isSupported()) {
                        hls = new Hls({ xhrSetup: xhr => { xhr.withCredentials = false; } });
                        hls.loadSource(streamUrl);
                        hls.attachMedia(video);
                        hls.on(Hls.Events.MANIFEST_PARSED, () => {
                            video.play();
                            setStatus("", false);
                        });
                    } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
                        video.src = streamUrl;
                        video.play();
                        setStatus("", false);
                    }
                    return;
                }
            }
            setStatus("SERVER ERROR");
        }

        async function loadUI() {
            let r = await getRaw(_0_u.db);
            if (!r) return;
            let d = JSON.parse(r);
            let chs = (d.channels || d).filter(c => {
                let n = (c.name || c.channel_name || "").toUpperCase();
                return n.includes("STAR") || n.includes("STR");
            });

            chs.forEach(c => {
                let u = c.url || c.channel_url;
                if (!u) return;
                const i = document.createElement('div');
                i.className = 'ch-item';
                i.innerHTML = `<div class="ch-name">${c.name || c.channel_name}</div><button class="play-btn">Play</button>`;
                i.querySelector('button').onclick = () => {
                    play({url: u});
                    window.scrollTo({top: 0, behavior: 'smooth'});
                };
                document.getElementById('ch-list').appendChild(i);
            });
            if(chs[0]) play({url: chs[0].url || chs[0].channel_url});
        }

        document.addEventListener('DOMContentLoaded', loadUI);
        setInterval(() => { debugger; }, 1000);
    })();
</script>
</body>
</html>
