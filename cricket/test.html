<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DevCoderZ - Live Stream</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        body { margin: 0; background: #000; display: flex; justify-content: center; align-items: center; height: 100vh; font-family: sans-serif; }
        .container { width: 100%; max-width: 900px; position: relative; }
        video { width: 100%; border-radius: 8px; box-shadow: 0 0 20px rgba(0,255,0,0.2); }
        .watermark { position: absolute; top: 10px; left: 10px; color: #fff; background: rgba(0,0,0,0.5); padding: 5px 10px; border-radius: 5px; font-size: 12px; pointer-events: none; }
    </style>
</head>
<body>

<div class="container">
    <div class="watermark">DevCoderZ Live</div>
    <video id="video" controls autoplay playsinline></video>
</div>

<script>
    const video = document.getElementById('video');
    
    // YAHAN APNA NAYA LINK DALO (Jo 1DM se nikala hai)
    const videoSrc = 'https://al.hls.nimo.tv/live/su2339515402418ra050543638a294f45e8612ca74a743a5.m3u8?appid=81&tp=1775052225839&id=su2339515402418ra050543638a294f45e8612ca74a743a5&needwm=0&ratio=500&wsSecret=46c8ae3c3caad701f21ac90a720035b8&wsTime=69ce7723&seqid=1776395188278&ctype=nimo_media_wap&u=1342959896&t=110&sv=2411271811';

    if (Hls.isSupported()) {
        const hls = new Hls({
            // Ye settings buffering kam karne ke liye hain
            maxBufferLength: 30,
            startLevel: -1,
            abandonRules: {
                requestTimeout: 10000,
            }
        });
        hls.loadSource(videoSrc);
        hls.attachMedia(video);
        hls.on(Hls.Events.MANIFEST_PARSED, function() {
            video.play();
        });

        // Error handling agar link expire ho jaye
        hls.on(Hls.Events.ERROR, function (event, data) {
            if (data.fatal) {
                console.log("Bhai link expire ho gaya ya CORS error hai!");
            }
        });

    } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
        // For Safari/iOS
        video.src = videoSrc;
        video.addEventListener('loadedmetadata', function() {
            video.play();
        });
    }
</script>

</body>
</html>
