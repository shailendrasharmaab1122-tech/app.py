<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
    <title>Stream Player | DevCoderz</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/plyr@3.7.8/dist/plyr.css">
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/plyr@3.7.8/dist/plyr.polyfilled.js"></script>
    <style>
        body{margin:0;padding:0;background-color:#0f172a;color:#fff;font-family:sans-serif;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh}
        .container{width:95%;max-width:900px;background:#1e293b;padding:15px;border-radius:12px;box-shadow:0 10px 25px rgba(0,0,0,.5);text-align:center}
        .video-wrapper{position:relative;width:100%;aspect-ratio:16/9;overflow:hidden;border-radius:8px;background:#000}
        :root{--plyr-color-main:#00bfff}
        .plyr--video .plyr__controls{background:linear-gradient(rgba(0,0,0,0),rgba(0,0,0,0.7))!important;padding-bottom:15px!important}
        .dev-tag-clean{position:absolute;top:15px;right:15px;color:rgba(255,255,255,0.6);font-size:10px;font-weight:700;z-index:10;pointer-events:none;text-transform:uppercase;letter-spacing:1.8px;text-shadow:1px 1px 2px #000}
        #_0x_u_btn{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);background:rgba(0,191,255,0.9);color:#fff;padding:12px 24px;border-radius:50px;font-size:13px;font-weight:800;cursor:pointer;z-index:11;border:none;text-transform:uppercase;animation:p_scale 1.2s infinite ease-in-out;white-space:nowrap}
        @keyframes p_scale{0%,100%{transform:translate(-50%,-50%) scale(1)}50%{transform:translate(-50%,-50%) scale(1.05)}}
        .footer{margin-top:20px;padding:10px;border-top:1px solid #334155;font-size:14px}
        .badge{display:inline-block;background:#3b82f6;color:#fff;padding:4px 12px;border-radius:20px;font-weight:700;margin-bottom:8px}
        .credits{color:#94a3b8;letter-spacing:1px}.credits strong{color:#60a5fa}
    </style>
</head>
<body>
    <div class="container">
        <div class="badge" id="_0x_b1">LIVE STREAM</div>
        <div class="video-wrapper" id="player-ui">
            <div class="dev-tag-clean" id="_0x_dev"></div>
            <button id="_0x_u_btn">🔊 Tap to Unmute</button>
            <video autoplay playsinline muted id="_0x_vid"></video>
        </div>
        <div class="footer" id="_0x_f1"></div>
    </div>

    <script>
        (function(){
            const _0x_z = window.atob;
            // Obfuscated APIs and Strings
            const _0x_conf = {
                s1: _0x_z("aHR0cHM6Ly9hcGlvay5wYWdlcy5kZXYvP2lkPQ=="), // apiok
                s2: _0x_z("aHR0cHM6Ly90djR3YXBvay5wYWdlcy5kZXYvP2lkPQ=="), // tv4wapok
                dev: _0x_z("RGV2ZWxvcGVyIDogRGV2YW5zaCBTaGFybWE="),
                crd: _0x_z("RGV2ZWxvcGVkICYgTWFpbnRhaW5lZCBieSA="),
                brand: _0x_z("RGV2Q29kZXJ6"),
                copy: _0x_z("wqkgMjAyNiBEZXZhbnNoIFNoYXJtYSB8IEFsbCBSaWdodHMgUmVzZXJ2ZWQ=")
            };

            const urlParams = new URLSearchParams(window.location.search);
            const cid = urlParams.get('id');
            const server = urlParams.get('s') || '1';

            if(!cid) {
                document.getElementById('player-ui').innerHTML = "<div style='padding:50px'>No Channel ID Found</div>";
                return;
            }

            // Construct Source URL
            const finalUrl = (server === '2' ? _0x_conf.s2 : _0x_conf.s1) + cid;

            const video = document.getElementById('_0x_vid');
            const muteBtn = document.getElementById('_0x_u_btn');
            document.getElementById('_0x_dev').innerText = _0x_conf.dev;
            document.getElementById('_0x_f1').innerHTML = `<div class="credits">${_0x_conf.crd}<strong>${_0x_conf.brand}</strong></div><p style="font-size:11px;color:#64748b;margin-top:5px;">${_0x_conf.copy}</p>`;

            // Initialize Plyr
            const player = new Plyr(video, {
                autoplay: true,
                controls: ['play-large', 'play', 'progress', 'current-time', 'mute', 'volume', 'settings', 'fullscreen']
            });

            const unmute = () => {
                video.muted = false;
                video.volume = 1;
                muteBtn.style.display = 'none';
                window.removeEventListener('click', unmute);
            };
            muteBtn.addEventListener('click', unmute);

            if (Hls.isSupported()) {
                const hls = new Hls();
                hls.loadSource(finalUrl);
                hls.attachMedia(video);
                hls.on(Hls.Events.MANIFEST_PARSED, (e, data) => {
                    const qualities = data.levels.map(l => l.height).sort((a, b) => b - a);
                    player.config.quality = { 
                        default: qualities[0], 
                        options: qualities, 
                        forced: true, 
                        onChange: (v) => {
                            hls.levels.forEach((l, i) => { if (l.height === v) hls.currentLevel = i; });
                        }
                    };
                });
            } else {
                video.src = finalUrl;
            }

            // Keep playing fix
            setInterval(() => { if(video.paused && video.readyState > 2) video.play(); }, 3000);
        })();
    </script>
</body>
</html>
