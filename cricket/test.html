<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DevCoderz Unlocked</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.3.5/shaka-player.ui.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.3.5/controls.min.css">
    <style>
        body { margin: 0; background: #000; overflow: hidden; }
        #video-container { width: 100vw; height: 100vh; }
        video { width: 100%; height: 100%; }
    </style>
</head>
<body>
    <div data-shaka-player-container id="video-container">
        <video data-shaka-player id="video" autoplay></video>
    </div>
    <script>
        const MPD_URL = 'YOUR_MPD_URL'; 
        const LICENSE_URL = 'https://wv-license.livetv7.xyz/license'; 

        async function init() {
            const video = document.getElementById('video');
            const uiContainer = document.getElementById('video-container');
            const player = new shaka.Player(video);
            const ui = new shaka.ui.Overlay(player, uiContainer, video);

            player.configure({
                drm: {
                    servers: { 'com.widevine.alpha': LICENSE_URL },
                    advanced: {
                        'com.widevine.alpha': {
                            'videoRobustness': 'SW_SECURE_DECODE',
                            'audioRobustness': 'SW_SECURE_DECODE'
                        }
                    }
                }
            });

            player.getNetworkingEngine().registerRequestFilter((type, request) => {
                // Bina Worker ke ye headers sirf tabhi chalenge agar server CORS-free ho
                request.headers['Origin'] = 'https://livetv7.xyz';
                request.headers['Referer'] = 'https://livetv7.xyz/';

                if (type == shaka.net.NetworkingEngine.RequestType.LICENSE) {
                    // License request ke liye extra headers
                    request.allowCrossSiteCredentials = true;
                }
            });

            try {
                await player.load(MPD_URL);
            } catch (e) {
                console.error("Error Code:", e.code);
                if(e.code == 6007 || e.code == 1001) {
                    alert("CORS Blocked: Bhai, bina Worker ke ye server block kar raha hai.");
                }
            }
        }
        document.addEventListener('shaka-ui-loaded', init);
    </script>
</body>
</html>
