    const PROXIES = [

      "https://api.codetabs.com/v1/proxy?quest=",
      "https://l.ratanliton2.workers.dev/?url="

    let shakaPlayer = null;

    let channelConfig = { links: {}, keyId: "", key: "" };
    const video = document.getElementById('video');
    const aiOverlay = document.getElementById('ai-overlay');
    const aiMessage = document.getElementById('ai-message');

    
    function showStatus(type, apiIndex = 0) {
      if (type === 'hide') {
        aiOverlay.style.display = 'none';
        return;
      }
      
      aiOverlay.style.display = 'flex';
      
      if (type === 'wait') {
        aiMessage.innerText = "Please wait...";
        aiMessage.style.color = "#fff";
      } else if (type === 'success') {
        aiMessage.innerText = `Success API ${apiIndex + 1}`;
        aiMessage.style.color = "#0f0"; // Green
      } else if (type === 'fail') {
        aiMessage.innerText = `Fail API ${apiIndex + 1}`;
        aiMessage.style.color = "#ff4444"; // Red
      }
    }

    async function fetchRaw(url) {
      for (let p of PROXIES) {
        try {
          const res = await fetch(p + url, { signal: AbortSignal.timeout(6000) });
          if (res.ok) {
            const text = await res.text();
            if (!text.includes('Just a moment')) return text; 
          }
        } catch (e) {}
      }
      return "";
    }

    async function smartDeepHunter(rawDataOrUrl) {
        let cookieMatch = rawDataOrUrl.match(/(__hdnea__=[^"'\s&|<>\\]+)/i);
        if (cookieMatch) return cookieMatch[1].replace(/\\/g, '').trim();
        
        let urlMatch = rawDataOrUrl.match(/(https?:\/\/[^\s"']+\.(?:json|m3u|txt)|https?:\/\/raw\.githubusercontent\.com[^\s"']+)/i);
        if (urlMatch) {
            try {
                let nextText = await fetchRaw(urlMatch[0]);
                return await smartDeepHunter(nextText);
            } catch(e) { return ""; }
        }
        
        try {
            let parsed = JSON.parse(rawDataOrUrl);
            let target = Array.isArray(parsed) ? parsed[0] : (parsed.cookie || Object.values(parsed)[0]);
            if (typeof target === "string") {
              if (target.startsWith("http")) {
                let deeperText = await fetchRaw(target);
                return await smartDeepHunter(deeperText);
              }
              return await smartDeepHunter(target);
            }
        } catch(e) {}
        
        return "";
    }

    async function loadChannel() {
      const urlParams = new URLSearchParams(window.location.search);
      const targetId = urlParams.get('id') || '174'; 

      showStatus('wait');
      let rawJson = await fetchRaw(CHANNELS_DB_URL);
      
      if (!rawJson) return false;

      try {
        let data = JSON.parse(rawJson);
        let channels = Array.isArray(data) ? data : (data.channels || Object.values(data)[0]);
        let found = channels.find(c => String(c.id) === String(targetId) || String(c.channel_id) === String(targetId));
        
        if (found) {
          let allLinks = [found.url, found.url1, found.url2, found.url3, found.url4, found.channel_url].filter(Boolean);
          let plLiveLink = allLinks.find(link => link.includes('jiotvpllive'));

          if (plLiveLink) {
             channelConfig.links = { "PL-Live": plLiveLink };
             channelConfig.keyId = found.keyId || "";
             channelConfig.key = found.key || "";
             return true;
          }
        }
      } catch(e) {}
      
      return false;
    }

    async function initPlayer() {
      shaka.polyfill.installAll();
      shakaPlayer = new shaka.Player(video);
      new shaka.ui.Overlay(shakaPlayer, document.getElementById('player-container'), video);
      
      let drmConfig = {
        clearKeys: { [channelConfig.keyId]: channelConfig.key },
        advanced: {
          'org.w3.clearkey': {
            videoRobustness: 'SW_SECURE_DECODE',
            audioRobustness: 'SW_SECURE_DECODE'
          }
        }
      };

      shakaPlayer.configure({
        drm: drmConfig,
        streaming: {
          lowLatencyMode: true,
          bufferingGoal: 15, 
          rebufferingGoal: 2, 
          bufferBehind: 15,
          retryParameters: { timeout: 10000, maxAttempts: 5, baseDelay: 300, backoffFactor: 1.2 },
          segmentRequestTimeout: 8000,
          useNativeHlsOnSafari: true
        }
      });

      
      shakaPlayer.getNetworkingEngine().clearAllRequestFilters();
      shakaPlayer.getNetworkingEngine().registerRequestFilter((type, request) => {
        request.headers['Referer'] = 'https://www.jiotv.com/';
        request.headers['User-Agent'] = 'plaYtv/7.1.5 (Linux;Android 13) ExoPlayerLib/2.11.6';
        
        let myCookie = activeCookie; 

        if (myCookie) {
            request.headers['Cookie'] = myCookie;
            let urlCookieString = myCookie.includes('__hdnea__=') ? myCookie : '__hdnea__=' + myCookie;
            
            let isVideoRequest = (type === shaka.net.NetworkingEngine.RequestType.MANIFEST || 
                                  type === shaka.net.NetworkingEngine.RequestType.SEGMENT);

            if (isVideoRequest && request.uris && request.uris.length > 0 && !request.uris[0].includes('__hdnea')) {
                const separator = request.uris[0].includes('?') ? '&' : '?';
                request.uris[0] += separator + urlCookieString;
            }
        }
      });
    }

    function attemptPlay(streamUrl, apiIndex) {
      return new Promise((resolve) => {
        let resolved = false;

        const errorHandler = (event) => {
          let err = event.detail;
          if (err && err.code === 1002 && err.data && err.data[1] === 403) {
             if (!resolved) {
               resolved = true;
               shakaPlayer.removeEventListener('error', errorHandler);
               resolve(false); 
             }
          }
        };

        shakaPlayer.addEventListener('error', errorHandler);

        shakaPlayer.load(streamUrl).then(() => {
          video.muted = true; 
          return video.play();
        }).then(() => {
          video.muted = false; 
          
          
          showStatus('success', apiIndex);
          setTimeout(() => {
             if (aiMessage.innerText.includes('Success')) {
                 showStatus('hide');
             }
          }, 1500); // 1.5 seconds baad gayab
          
        }).catch((e) => {
          if (!resolved) {
            resolved = true;
            shakaPlayer.removeEventListener('error', errorHandler);
            resolve(false); 
          }
        });
      });
    }

    async function startAutoHealingCycle() {
      while (true) {
        for (let i = 0; i < API_SOURCES.length; i++) {
          
          showStatus('wait');
          
          let rawData = await fetchRaw(API_SOURCES[i]);
          let cookie = await smartDeepHunter(rawData);
          
          if (cookie) {
            activeCookie = cookie;
            
            for (let [label, streamUrl] of Object.entries(channelConfig.links)) {
              if (!streamUrl) continue;
              
              // Script waits here while video is playing smoothly
              await attemptPlay(streamUrl, i);

              // If it reaches here, the stream failed (403 Forbidden)
              showStatus('fail', i);
              await new Promise(r => setTimeout(r, 2000)); // Show fail msg for 2s
            }
          } else {
             // Cookie nahi mili is API mein
             showStatus('fail', i);
             await new Promise(r => setTimeout(r, 2000));
          }
        }
        
        showStatus('wait');
        await new Promise(r => setTimeout(r, 4000));
      }
    }

    document.addEventListener("DOMContentLoaded", async () => {
      let isLoaded = await loadChannel();
      if (!isLoaded) {
        aiMessage.innerText = "Error: Channel Not Found";
        aiMessage.style.color = "#ff4444";
        return; 
      }
      
      await initPlayer();
      startAutoHealingCycle();
    });
