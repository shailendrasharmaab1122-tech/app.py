<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>DevCoderZ | Cric Hype Style</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.7.11/shaka-player.ui.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.7.11/controls.min.css">
    <style>
        body { margin: 0; background: #000; font-family: sans-serif; overflow: hidden; height: 100vh; }
        #p-con { height: 100vh; width: 100vw; background: #000; }
        video { width: 100%; height: 100%; object-fit: contain; }
        /* Custom Loader */
        #loader { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; 
                  background: #000; z-index: 99; color: #00FF00; font-weight: bold; }
    </style>
</head>
<body>

    <div id="p-con" data-shaka-player-container shaka-controls="true">
        <div id="loader">DEVCODERZ PROXY LOADING...</div>
        <video id="video" autoplay playsinline poster="https://i.postimg.cc/76cbBjty/P.jpg"></video>
    </div>

    <script>
        // 1. TERA WORKER LINK
        const PROXY = "https://proxy.shailendrasharmaab1122.workers.dev/?url=";
        
        // 2. FRESH TOKEN (Har 24 ghante mein update karna)
        const TK = "st=1743344160~exp=1743430560~acl=/*~hmac=5c6a1d87e02..."; 

        const CHANNEL = {
            url: "https://jiotvmblive.cdn.jio.com/bpk-tv/Star_Sports_HD1_Hindi_BTS/output/index.mpd",
            ki: "400131994b445d8c8817202248760fda",
            k: "2d56cb6f07a75b9aff165d534ae2bfc4"
        };

        async function initApp() {
            shaka.polyfill.installAll();
            const video = document.getElementById('video');
            const player = new shaka.Player(video);
            const ui = new shaka.ui.Overlay(player, document.getElementById('p-con'), video);

            player.configure({
                drm: { clearKeys: { [CHANNEL.ki]: CHANNEL.k } },
                streaming: { lowLatencyMode: true, stallEnabled: false, bufferingGoal: 30 }
            });

            // "Cric Hype" Secret Request Logic
            player.getNetworkingEngine().registerRequestFilter((type, request) => {
                let url = request.uris[0];
                
                // Sabhi requests ko tere worker se bypass karna
                if (!url.startsWith(PROXY)) {
                    const sep = url.includes('?') ? '&' : '?';
                    if (!url.includes('__hdnea__')) {
                        url += sep + "__hdnea__=" + TK;
                    }
                    request.uris[0] = PROXY + encodeURIComponent(url);
                }
            });

            try {
                await player.load(PROXY + encodeURIComponent(CHANNEL.url + "?__hdnea__=" + TK));
                document.getElementById('loader').style.display = 'none';
                console.log("Stream Started!");
            } catch (e) {
                document.getElementById('loader').innerText = "ERROR: TOKEN EXPIRED OR PROXY DOWN";
                document.getElementById('loader').style.color = "red";
            }
        }
        document.addEventListener('shaka-ui-loaded', initApp);
    </script>
</body>
</html>
