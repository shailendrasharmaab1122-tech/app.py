<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
    <title>DevCoderZ X Player</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/plyr@3.7.8/dist/plyr.css">
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/plyr@3.7.8/dist/plyr.polyfilled.js"></script>
    <style>
        body{background-color:#000;margin:0;padding:0;overflow:hidden;height:100vh;width:100vw;display:flex;align-items:center;justify-content:center;font-family:sans-serif}
        .container{width:100%;height:100%;position:relative;background:#000}
        :root{--plyr-color-main:#00bfff}
        .plyr--video .plyr__controls{background:linear-gradient(rgba(0,0,0,0),rgba(0,0,0,0.8))!important;padding-bottom:10px!important}
        .dev-tag-clean{position:absolute;top:15px;right:15px;color:rgba(255,255,255,0.6);font-size:10px;font-weight:700;z-index:100;pointer-events:none;text-transform:uppercase;letter-spacing:1.8px;text-shadow:1px 1px 2px #000}
        #_0x_u_btn{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);background:rgba(0,191,255,0.9);color:#fff;padding:15px 30px;border-radius:50px;font-size:14px;font-weight:800;cursor:pointer;z-index:101;border:none;text-transform:uppercase;animation:p_scale 1.2s infinite ease-in-out;box-shadow:0 0 20px rgba(0,191,255,0.5)}
        @keyframes p_scale{0%,100%{transform:translate(-50%,-50%) scale(1)}50%{transform:translate(-50%,-50%) scale(1.05)}}
        .plyr{height:100%}.plyr__video-wrapper{height:100%}
    </style>
</head>
<body>
    <div class="container">
        <div class="dev-tag-clean" id="_0x_d"></div>
        <button id="_0x_u_btn">🔊 Tap to Unmute</button>
        <video autoplay playsinline muted id="_0x_v"></video>
    </div>
    <script>
        (function(){
            const _0x_z = window.atob;
            const _0x_c = {
                s1: _0x_z("aHR0cHM6Ly9hcGlvay5wYWdlcy5kZXYvP2lkPQ=="),
                s2: _0x_z("aHR0cHM6Ly90djR3YXBvay5wYWdlcy5kZXYvP2lkPQ=="),
                dev: _0x_z("RGV2ZWxvcGVyIDogRGV2YW5zaCBTaGFybWE="),
            };
            const p = new URLSearchParams(window.location.search);
            const id = p.get('id');
            const s = p.get('s');
            if(!id) return;
            const src = (s === '2' ? _0x_c.s2 : _0x_c.s1) + id;
            const v = document.getElementById('_0x_v');
            document.getElementById('_0x_d').innerText = _0x_c.dev;
            const player = new Plyr(v, { controls: ['play-large','play','progress','current-time','mute','volume','settings','fullscreen'] });
            const unmute = () => { v.muted = false; v.volume = 1; document.getElementById('_0x_u_btn').style.display='none'; };
            document.getElementById('_0x_u_btn').onclick = unmute;
            if (Hls.isSupported()) {
                const hls = new Hls();
                hls.loadSource(src);
                hls.attachMedia(v);
                hls.on(Hls.Events.MANIFEST_PARSED, (e, d) => {
                    const q = d.levels.map(l => l.height).sort((a,b)=>b-a);
                    player.config.quality = { default: q[0], options: q, forced: true, onChange: (val) => {
                        hls.levels.forEach((l, i) => { if (l.height === val) hls.currentLevel = i; });
                    }};
                });
            } else { v.src = src; }
            setInterval(() => { if(v.paused && v.readyState > 2) v.play(); }, 3000);
        })();
    </script>
</body>
</html>
