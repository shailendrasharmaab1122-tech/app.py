(function(){
  const CONFIG={

    keyId:"400131994b445d8c8817202248760fda",

  };

  document.addEventListener("DOMContentLoaded",async()=>{
    shaka.polyfill.installAll();
    if(!shaka.Player.isBrowserSupported()) return;
    const video=document.getElementById("video");
    const container=document.getElementById("player-container");
    video.muted=true;
    const player=new shaka.Player();
    await player.attach(video);
    const ui=new shaka.ui.Overlay(player,container,video);
    ui.configure({
      addBigPlayButton: true,

      seekBarColors: { base: "white", buffered: "red", played: "green" }

    player.configure({
      drm:{clearKeys:{[CONFIG.keyId]:CONFIG.key}},
      manifest:{defaultPresentationDelay:5},
      streaming:{lowLatencyMode:true, bufferingGoal:10, rebufferingGoal:2, safeSeekOffset:5}
    });

    let cookieValue="__hdnea__=st=1779886656~exp=1779908256~acl=/bpk-tv/Star_Sports_HD1_Hindi_BTS/WDVLive/*~hmac=efca9a959c2a935ce335e1f6e093a36c96a436b84ee21339a6f9730c9a357db6";
    try{
      const response=await fetch(CONFIG.cookieUrl,{cache:"no-store"});
      const data=await response.json();
      cookieValue=data.cookie||"";
    }catch(e){}

    if(cookieValue){
      player.getNetworkingEngine().registerRequestFilter((type,request)=>{
        let urlCookie=cookieValue.startsWith("__hdnea__=")?cookieValue.substring(10):cookieValue;

        }
      });

      await player.load(CONFIG.streamUrl);
      video.play().catch(()=>{});
    }catch(e){}

  });

  if (confirm("Join Our Telegram Channel Official @DevanshSharma") == true) {
