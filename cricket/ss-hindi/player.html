<script>
(function(){
    const CONFIG = {
        streamUrl: "https://jiotvpllive.cdn.jio.com/bpk-tv/Star_Sports_HD1_Hindi_BTS/WDVLive/index.mpd",
        keyId: "400131994b445d8c8817202248760fda",
        key: "2d56cb6f07a75b9aff165d534ae2bfc4",
        token: "st=1780225981~exp=1780247581~acl=/bpk-tv/Star_Sports_HD1_Hindi_BTS/WDVLive/*~hmac=2453d5e2b62c7b5e4dcde6c4137426190ba426060003797d97e90eb3b8a9e3a0"
    };

    async function initPlayer() {
        const video = document.getElementById('video');
        const player = new shaka.Player(video);
        const ui = new shaka.ui.Overlay(player, document.getElementById('player-container'), video);
        
        player.configure({
            drm: { clearKeys: { [CONFIG.keyId]: CONFIG.key } },
            streaming: { lowLatencyMode: true }
        });

        player.getNetworkingEngine().registerRequestFilter((type, request) => {
            if ((type == shaka.net.NetworkingEngine.RequestType.MANIFEST || type == shaka.net.NetworkingEngine.RequestType.SEGMENT) && !request.uris[0].includes("__hdnea__")) {
                request.uris[0] += (request.uris[0].includes('?') ? '&' : '?') + "__hdnea__=" + CONFIG.token;
            }
        });

        try {
            await player.load(CONFIG.streamUrl);
        } catch (e) {
            console.error("Error loading video", e);
        }
    }

    document.addEventListener('DOMContentLoaded', initPlayer);
})();
</script>
