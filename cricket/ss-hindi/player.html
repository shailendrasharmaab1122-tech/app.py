<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>Live Streaming | Devansh Sharma</title>
    <script src="https://cdn.jsdelivr.net/npm/shaka-player@4.16.2/dist/shaka-player.ui.min.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/shaka-player@4.16.2/dist/controls.css">
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; overflow: hidden; }
        #player-container { width: 100%; height: 100%; position: relative; }
        
        /* Developer Watermark */
        .dev-watermark {
            position: absolute; top: 20px; left: 20px; z-index: 10;
            color: rgba(255,255,255,0.6); font-family: sans-serif; font-size: 14px;
            pointer-events: none; text-shadow: 1px 1px 2px #000;
        }

        /* Popup Styles */
        .popup-overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.85);
            display: flex; align-items: center; justify-content: center; z-index: 100;
        }
        .popup-box {
            background: #1a1a1a; padding: 30px; border-radius: 15px;
            text-align: center; border: 1px solid #333; max-width: 400px; width: 90%;
        }
        .popup-box h2 { color: #fff; margin-bottom: 20px; }
        .btn-group { display: flex; gap: 10px; justify-content: center; margin-top: 20px; }
        .btn { padding: 10px 20px; border-radius: 5px; cursor: pointer; border: none; font-weight: bold; }
        .btn-join { background: #0088cc; color: white; }
        .btn-skip { background: #444; color: white; }
    </style>
</head>
<body>

<div id="player-container" data-shaka-player-container>
    <div class="dev-watermark">Developer: Devansh Sharma</div>
    <video id="video" autoplay playsinline></video>
</div>

<!-- Popup -->
<div class="popup-overlay" id="tg-popup">
    <div class="popup-box">
        <h2>Join Official Channel</h2>
        <p style="color: #ccc;">Get latest updates and links on our Telegram channel.</p>
        <div class="btn-group">
            <button class="btn btn-join" onclick="window.open('https://t.me/+8tZSJ5FyTXVjM2M1', '_blank')">Join Now</button>
            <button class="btn btn-skip" onclick="document.getElementById('tg-popup').style.display='none'">Skip</button>
        </div>
    </div>
</div>

<script>
(function(){
    const CONFIG = {
        streamUrl: "https://jiotvpllive.cdn.jio.com/bpk-tv/Star_Sports_HD1_Hindi_BTS/WDVLive/index.mpd",
        keyId: "400131994b445d8c8817202248760fda",
        key: "2d56cb6f07a75b9aff165d534ae2bfc4",
        token: "st=1780225981~exp=1780247581~acl=/bpk-tv/Star_Sports_HD1_Hindi_BTS/WDVLive/*~hmac=2453d5e2b62c7b5e4dcde6c4137426190ba426060003797d97e90eb3b8a9e3a0"
    };

    async function initPlayer() {
        const video = document.getElementById('video');
        const player = new shaka.Player(video);
        const ui = new shaka.ui.Overlay(player, document.getElementById('player-container'), video);
        
        player.configure({
            drm: { clearKeys: { [CONFIG.keyId]: CONFIG.key } },
            streaming: { lowLatencyMode: true }
        });

        player.getNetworkingEngine().registerRequestFilter((type, request) => {
            if ((type == shaka.net.NetworkingEngine.RequestType.MANIFEST || type == shaka.net.NetworkingEngine.RequestType.SEGMENT) && !request.uris[0].includes("__hdnea__")) {
                request.uris[0] += (request.uris[0].includes('?') ? '&' : '?') + "__hdnea__=" + CONFIG.token;
            }
        });

        try {
            await player.load(CONFIG.streamUrl);
        } catch (e) { console.error("Error", e); }
    }

    document.addEventListener('DOMContentLoaded', initPlayer);
})();
</script>
</body>
</html>
