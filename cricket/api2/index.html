    html, body { width: 100%; height: 100%; background: #000; overflow: hidden; font-family: 'Courier New', Courier, monospace; }

    video { width: 100%; height: 100%; object-fit: contain; background: #000; outline: none; }

    .wm-secure {

    #ai-overlay {
      position: absolute;
      inset: 0;
      z-index: 999;
      background: rgba(0, 0, 0, 0.85);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      color: #0f0;

    .ai-title { font-size: 8px; font-weight: bold; margin-bottom: 10px; letter-spacing: 2px; animation: pulse 1.5s infinite; }
    .ai-desc { font-size: 13px; color: #aaa; max-width: 80%; line-height: 1.5; }
    .ai-action { font-size: 11px; color: #ffeb3b; margin-top: 15px; }
    .ai-error { color: #ff4444 !important; }

    @keyframes pulse {
      0% { opacity: 1; }
      50% { opacity: 0.5; }
      100% { opacity: 1; }
    }

    #fatal-error { display: none; position: fixed; inset: 0; background: #000; z-index: 99999; color: red; align-items: center; justify-content: center; flex-direction: column; text-align: center; font-family: sans-serif; }

  <div id="ai-overlay" style="display: none;">
    <div class="ai-action" id="ai-action" style="color: rgb(0, 255, 0);"></div>
    <div class="ai-title"></div>
    <div class="ai-desc" id="ai-message">working</div>
  </div>

  <script>
    
    const _0xData = [
      "aHR0cHM6Ly9yYXcuZ2l0aHVidXNlcmNvbnRlbnQuY29tL1NodWJoYW1rdXIvanNvbi9yZWZzL2hlYWRzL21haW4vanNwbw==", // JSPO DB
      "aHR0cHM6Ly9yYXcuZ2l0aHVidXNlcmNvbnRlbnQuY29tL1NodWJoYW1rdXIvVHYvcmVmcy9oZWFkcy9tYWluL2FwaTE=",     // API 1
      "aHR0cHM6Ly9yYXcuZ2l0aHVidXNlcmNvbnRlbnQuY29tL1NodWJoYW1rdXIvVHYvcmVmcy9oZWFkcy9tYWluL2FwaTI=",     // API 2
      "aHR0cHM6Ly9yYXcuZ2l0aHVidXNlcmNvbnRlbnQuY29tL1NodWJoYW1rdXIvVHYvcmVmcy9oZWFkcy9tYWluL2FwaTM=",     // API 3
      "dC5tZS90djR3YXA=" // Watermark (t.me/tv4wap)
    ];

    // Decode and Extract
    const CHANNELS_DB_URL = atob(_0xData[0]);
    const API_SOURCES = [atob(_0xData[1]), atob(_0xData[2]), atob(_0xData[3])];
    const SECURE_WM = atob(_0xData[4]);

    // Apply Watermark initially
    document.getElementById('wm-element').innerText = SECURE_WM;


    setInterval(() => {
        const wmNode = document.getElementById('wm-element');
        if (!wmNode || wmNode.innerText !== SECURE_WM || window.getComputedStyle(wmNode).display === 'none') {
            document.getElementById('player-container').innerHTML = '';
            document.getElementById('ai-overlay').style.display = 'none';
            document.getElementById('fatal-error').style.display = 'flex';
        }
    }, 2000);

    const PROXIES = [
      "", 
      "https://oriby-streaming-proxy.sultanarabi161.workers.dev/",
      "https://api.codetabs.com/v1/proxy?quest=",
      "https://l.ratanliton2.workers.dev/?url="
    ];

    let shakaPlayer = null;
    let activeCookie = "";
    let channelConfig = { links: {}, keyId: "", key: "" };
    const video = document.getElementById('video');
    const aiOverlay = document.getElementById('ai-overlay');
    const aiMessage = document.getElementById('ai-message');
    const aiAction = document.getElementById('ai-action');

    // UI Controller
    function setAIStatus(msg, isError = false) {
      if (!msg) {
        aiOverlay.style.display = 'none'; // Hide when playing
      } else {
        aiOverlay.style.display = 'flex';
        aiMessage.innerText = msg;
        if (isError) {
          document.querySelector('.ai-title').innerHTML = "⚠️  ERROR";
          document.querySelector('.ai-title').classList.add('ai-error');
          aiAction.innerText = ".";
          aiAction.style.color = "#ffeb3b";
        } else {
          document.querySelector('.ai-title').innerHTML = "";
          document.querySelector('.ai-title').classList.remove('ai-error');
          aiAction.innerText = "";
          aiAction.style.color = "#0f0";
        }
      }
    }

    async function fetchRaw(url) {
      for (let p of PROXIES) {
        try {
          const res = await fetch(p + url, { signal: AbortSignal.timeout(6000) });
          if (res.ok) {
            const text = await res.text();
            if (!text.includes('Just a moment')) return text; 
          }
        } catch (e) {}
      }
      return "";
    }

    async function smartDeepHunter(rawDataOrUrl) {
        let cookieMatch = rawDataOrUrl.match(/(__hdnea__=[^"'\s&|<>\\]+)/i);
        if (cookieMatch) return cookieMatch[1].replace(/\\/g, '').trim();
        
        let urlMatch = rawDataOrUrl.match(/(https?:\/\/[^\s"']+\.(?:json|m3u|txt)|https?:\/\/raw\.githubusercontent\.com[^\s"']+)/i);
        if (urlMatch) {
            try {
                let nextText = await fetchRaw(urlMatch[0]);
                return await smartDeepHunter(nextText);
            } catch(e) { return ""; }
        }
        
        try {
            let parsed = JSON.parse(rawDataOrUrl);
            let target = Array.isArray(parsed) ? parsed[0] : (parsed.cookie || Object.values(parsed)[0]);
            if (typeof target === "string") {
              if (target.startsWith("http")) {
                let deeperText = await fetchRaw(target);
                return await smartDeepHunter(deeperText);
              }
              return await smartDeepHunter(target);
            }
        } catch(e) {}
        
        return "";
    }

    async function loadChannel() {
      const urlParams = new URLSearchParams(window.location.search);
      const targetId = urlParams.get('id') || '174'; 

      setAIStatus(`Extracting database for Channel ID [${targetId}]...`);
      let rawJson = await fetchRaw(CHANNELS_DB_URL);
      
      if (!rawJson) return false;

      try {
        let data = JSON.parse(rawJson);
        let channels = Array.isArray(data) ? data : (data.channels || Object.values(data)[0]);
        let found = channels.find(c => String(c.id) === String(targetId) || String(c.channel_id) === String(targetId));
        
        if (found) {
          let allLinks = [found.url, found.url1, found.url2, found.url3, found.url4, found.channel_url].filter(Boolean);
          let plLiveLink = allLinks.find(link => link.includes('jiotvpllive'));

          if (plLiveLink) {
             channelConfig.links = { "PL-Live": plLiveLink };
             channelConfig.keyId = found.keyId || "";
             channelConfig.key = found.key || "";
             return true;
          }
        }
      } catch(e) {}
      
      return false;
    }

    async function initPlayer() {
      shaka.polyfill.installAll();
      shakaPlayer = new shaka.Player(video);
      new shaka.ui.Overlay(shakaPlayer, document.getElementById('player-container'), video);
      
      let drmConfig = {
        clearKeys: { [channelConfig.keyId]: channelConfig.key },
        advanced: {
          'org.w3.clearkey': {
            videoRobustness: 'SW_SECURE_DECODE',
            audioRobustness: 'SW_SECURE_DECODE'
          }
        }
      };

      shakaPlayer.configure({
        drm: drmConfig,
        streaming: {
          lowLatencyMode: true,
          bufferingGoal: 15, 
          rebufferingGoal: 2, 
          bufferBehind: 15,
          retryParameters: { timeout: 10000, maxAttempts: 5, baseDelay: 300, backoffFactor: 1.2 },
          segmentRequestTimeout: 8000,
          useNativeHlsOnSafari: true
        }
      });

      shakaPlayer.getNetworkingEngine().clearAllRequestFilters();
      shakaPlayer.getNetworkingEngine().registerRequestFilter((type, request) => {
        request.headers['Referer'] = 'https://www.jiotv.com/';
        request.headers['User-Agent'] = "plaYtv/7.1.5 (Linux;Android 13) ExoPlayerLib/2.11.6";
        
        if (activeCookie) {
          request.headers['Cookie'] = activeCookie;
          if ((type === shaka.net.NetworkingEngine.RequestType.MANIFEST || 
               type === shaka.net.NetworkingEngine.RequestType.SEGMENT) && 
              !request.uris[0].includes('__hdnea__=')) {
            const separator = request.uris[0].includes('?') ? '&' : '?';
            request.uris[0] += separator + activeCookie; 
          }
        }
      });
    }

    function attemptPlay(streamUrl) {
      return new Promise((resolve) => {
        let resolved = false;

        const errorHandler = (event) => {
          let err = event.detail;
          if (err && err.code === 1002 && err.data && err.data[1] === 403) {
             if (!resolved) {
               resolved = true;
               shakaPlayer.removeEventListener('error', errorHandler);
               resolve(false); 
             }
          }
        };

        shakaPlayer.addEventListener('error', errorHandler);

        shakaPlayer.load(streamUrl).then(() => {
          video.muted = true; 
          return video.play();
        }).then(() => {
          video.muted = false; 
          // Stream is playing fine. Hide AI status!
          setAIStatus(""); 
        }).catch((e) => {
          if (!resolved) {
            resolved = true;
            shakaPlayer.removeEventListener('error', errorHandler);
            resolve(false); 
          }
        });
      });
    }

    async function startAutoHealingCycle() {
      while (true) {
        for (let i = 0; i < API_SOURCES.length; i++) {
          
          setAIStatus(`Hunting secure tokens from Database Node [${i+1}]...`);
          
          let rawData = await fetchRaw(API_SOURCES[i]);
          let cookie = await smartDeepHunter(rawData);
          
          if (cookie) {
            activeCookie = cookie;
            
            for (let [label, streamUrl] of Object.entries(channelConfig.links)) {
              if (!streamUrl) continue;
              
              setAIStatus(`working`);
              
              // Script waits here while video is playing smoothly
              await attemptPlay(streamUrl);

              // If it reaches here, the stream failed (403 Forbidden)
              setAIStatus("Connection dropped by host server.", true);
              await new Promise(r => setTimeout(r, 2000));
            }
          }
        }
        
        setAIStatus("All current nodes exhausted. Restarting extraction sequence...", true);
        await new Promise(r => setTimeout(r, 4000));
      }
    }

    document.addEventListener("DOMContentLoaded", async () => {
      let isLoaded = await loadChannel();
      if (!isLoaded) {
        setAIStatus("CRITICAL: Target stream coordinates not found in DB.", true);
        return; 
      }
      
      await initPlayer();
      startAutoHealingCycle();
    });
  </script>
