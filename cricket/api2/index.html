<!DOCTYPE html><html lang="en"><head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta name="referrer" content="no-referrer">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.7.11/shaka-player.ui.min.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.7.11/controls.min.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; background: #000; overflow: hidden; font-family: 'Courier New', Courier, monospace; }
    .shaka-video-container { position: absolute; inset: 0; width: 100%; height: 100%; background: #000; display: flex; align-items: center; justify-content: center; }
    video { width: 100%; height: 100%; object-fit: contain; background: #000; outline: none; }
    .wm-secure { 
      position: absolute; 
      z-index: 40; 
      pointer-events: none; 
      font-size: 8px; 
      color: rgba(255, 255, 255, 0.4); 
      letter-spacing: 1px; 
      top: 55%; 
      left: 35%; 
      transform: translate(-50%, -50%);
    }
    #ai-overlay {
      position: absolute;
      inset: 0;
      z-index: 999;
      background: rgba(0, 0, 0, 0.85);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      color: #0f0;
    }
    .ai-title { font-size: 8px; font-weight: bold; margin-bottom: 10px; letter-spacing: 2px; animation: pulse 1.5s infinite; }
    .ai-desc { font-size: 13px; color: #aaa; max-width: 80%; line-height: 1.5; }
    .ai-action { font-size: 11px; color: #ffeb3b; margin-top: 15px; }
    .ai-error { color: #ff4444 !important; }
    @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
    #fatal-error { display: none; position: fixed; inset: 0; background: #000; z-index: 99999; color: red; align-items: center; justify-content: center; flex-direction: column; text-align: center; font-family: sans-serif; }
  </style>
</head>
<body>

  <div id="fatal-error"><h1>SYSTEM FAILED</h1></div>

  <div class="shaka-video-container shaka-mobile" id="player-container" data-shaka-player-container="" shaka-controls="true">
    <div id="wm-element" class="wm-secure"></div>
    <video id="video" autoplay playsinline preload="metadata" class="shaka-video"></video>
  </div>

  <div id="ai-overlay" style="display: none;">
    <div class="ai-action" id="ai-action"></div>
    <div class="ai-title"></div>
    <div class="ai-desc" id="ai-message">working</div>
  </div>

  <script>
    const _0xData = [
      "aHR0cHM6Ly9yYXcuZ2l0aHVidXNlcmNvbnRlbnQuY29tL1NodWJoYW1rdXIvanNvbi9yZWZzL2hlYWRzL21haW4vanNwbw==",
      "aHR0cHM6Ly9yYXcuZ2l0aHVidXNlcmNvbnRlbnQuY29tL1NodWJoYW1rdXIvVHYvcmVmcy9oZWFkcy9tYWluL2FwaTE=",
      "aHR0cHM6Ly9yYXcuZ2l0aHVidXNlcmNvbnRlbnQuY29tL1NodWJoYW1rdXIvVHYvcmVmcy9oZWFkcy9tYWluL2FwaTI=",
      "aHR0cHM6Ly9yYXcuZ2l0aHVidXNlcmNvbnRlbnQuY29tL1NodWJoYW1rdXIvVHYvcmVmcy9oZWFkcy9tYWluL2FwaTM=",
      "UG93ZXJlZCBieSBEZXZDb2Rlclo="
    ];

    const CHANNELS_DB_URL = atob(_0xData[0]);
    const API_SOURCES = [atob(_0xData[1]), atob(_0xData[2]), atob(_0xData[3])];
    const SECURE_WM = atob(_0xData[4]);

    document.getElementById('wm-element').innerText = SECURE_WM;

    setInterval(() => {
        const wmNode = document.getElementById('wm-element');
        if (!wmNode || wmNode.innerText !== SECURE_WM || window.getComputedStyle(wmNode).display === 'none') {
            document.getElementById('player-container').innerHTML = '';
            document.getElementById('ai-overlay').style.display = 'none';
            document.getElementById('fatal-error').style.display = 'flex';
        }
    }, 2000);

    const PROXIES = ["", "https://oriby-streaming-proxy.sultanarabi161.workers.dev/", "https://api.codetabs.com/v1/proxy?quest=", "https://l.ratanliton2.workers.dev/?url="];
    let shakaPlayer = null, activeCookie = "", channelConfig = { links: {}, keyId: "", key: "" };
    const video = document.getElementById('video'), aiOverlay = document.getElementById('ai-overlay'), aiMessage = document.getElementById('ai-message'), aiAction = document.getElementById('ai-action');

    function setAIStatus(msg, isError = false) {
      if (!msg) { aiOverlay.style.display = 'none'; } 
      else {
        aiOverlay.style.display = 'flex';
        aiMessage.innerText = msg;
        const title = document.querySelector('.ai-title');
        if (isError) { title.innerHTML = "⚠️ ERROR"; title.classList.add('ai-error'); aiAction.innerText = "."; } 
        else { title.innerHTML = ""; title.classList.remove('ai-error'); aiAction.innerText = ""; }
      }
    }

    async function fetchRaw(url) {
      for (let p of PROXIES) {
        try {
          const res = await fetch(p + url, { signal: AbortSignal.timeout(6000) });
          if (res.ok) {
            const text = await res.text();
            if (!text.includes('Just a moment')) return text; 
          }
        } catch (e) {}
      }
      return "";
    }

    async function smartDeepHunter(rawDataOrUrl) {
        let cookieMatch = rawDataOrUrl.match(/(__hdnea__=[^"'\s&|<>\\]+)/i);
        if (cookieMatch) return cookieMatch[1].replace(/\\/g, '').trim();
        let urlMatch = rawDataOrUrl.match(/(https?:\/\/[^\s"']+\.(?:json|m3u|txt)|https?:\/\/raw\.githubusercontent\.com[^\s"']+)/i);
        if (urlMatch) {
            try { let nextText = await fetchRaw(urlMatch[0]); return await smartDeepHunter(nextText); } catch(e) { return ""; }
        }
        try {
            let parsed = JSON.parse(rawDataOrUrl);
            let target = Array.isArray(parsed) ? parsed[0] : (parsed.cookie || Object.values(parsed)[0]);
            if (typeof target === "string") {
              if (target.startsWith("http")) { return await smartDeepHunter(await fetchRaw(target)); }
              return await smartDeepHunter(target);
            }
        } catch(e) {}
        return "";
    }

    async function loadChannel() {
      const urlParams = new URLSearchParams(window.location.search);
      const targetId = urlParams.get('id') || '174'; 
      let rawJson = await fetchRaw(CHANNELS_DB_URL);
      if (!rawJson) return false;
      try {
        let data = JSON.parse(rawJson);
        let channels = Array.isArray(data) ? data : (data.channels || Object.values(data)[0]);
        let found = channels.find(c => String(c.id) === String(targetId) || String(c.channel_id) === String(targetId));
        if (found) {
          let allLinks = [found.url, found.url1, found.url2, found.url3, found.url4, found.channel_url].filter(Boolean);
          let plLiveLink = allLinks.find(link => link.includes('jiotvpllive'));
          if (plLiveLink) {
             channelConfig.links = { "PL-Live": plLiveLink };
             channelConfig.keyId = found.keyId || "";
             channelConfig.key = found.key || "";
             return true;
          }
        }
      } catch(e) {}
      return false;
    }

    async function initPlayer() {
      shaka.polyfill.installAll();
      shakaPlayer = new shaka.Player(video);
      new shaka.ui.Overlay(shakaPlayer, document.getElementById('player-container'), video);
      shakaPlayer.configure({
        drm: { clearKeys: { [channelConfig.keyId]: channelConfig.key } },
        streaming: { lowLatencyMode: true, bufferingGoal: 15, retryParameters: { timeout: 10000, maxAttempts: 5 } }
      });
      shakaPlayer.getNetworkingEngine().registerRequestFilter((type, request) => {
        request.headers['Referer'] = 'https://www.jiotv.com/';
        request.headers['User-Agent'] = "plaYtv/7.1.5 (Linux;Android 13) ExoPlayerLib/2.11.6";
        if (activeCookie) {
          request.headers['Cookie'] = activeCookie;
          if ((type === shaka.net.NetworkingEngine.RequestType.MANIFEST || type === shaka.net.NetworkingEngine.RequestType.SEGMENT) && !request.uris[0].includes('__hdnea__=')) {
            request.uris[0] += (request.uris[0].includes('?') ? '&' : '?') + activeCookie; 
          }
        }
      });
    }

    function attemptPlay(streamUrl) {
      return new Promise((resolve) => {
        let resolved = false;
        const errorHandler = (event) => {
          let err = event.detail;
          if (err && err.code === 1002 && err.data && err.data[1] === 403) {
             if (!resolved) { resolved = true; shakaPlayer.removeEventListener('error', errorHandler); resolve(false); }
          }
        };
        shakaPlayer.addEventListener('error', errorHandler);
        shakaPlayer.load(streamUrl).then(() => { video.muted = true; return video.play(); }).then(() => { video.muted = false; setAIStatus(""); }).catch(() => {
          if (!resolved) { resolved = true; shakaPlayer.removeEventListener('error', errorHandler); resolve(false); }
        });
      });
    }

    async function startAutoHealingCycle() {
      while (true) {
        for (let i = 0; i < API_SOURCES.length; i++) {
          let rawData = await fetchRaw(API_SOURCES[i]);
          let cookie = await smartDeepHunter(rawData);
          if (cookie) {
            activeCookie = cookie;
            for (let [label, streamUrl] of Object.entries(channelConfig.links)) {
              if (!streamUrl) continue;
              setAIStatus("working");
              await attemptPlay(streamUrl);
              setAIStatus("Connection error.", true);
              await new Promise(r => setTimeout(r, 2000));
            }
          }
        }
        await new Promise(r => setTimeout(r, 4000));
      }
    }

    document.addEventListener("DOMContentLoaded", async () => {
      if (await loadChannel()) { await initPlayer(); startAutoHealingCycle(); }
    });
  </script>
</body></html>
