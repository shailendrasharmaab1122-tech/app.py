<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>DevCoderZ | IPL LIVE FIXED</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@600;800&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #05080f; --accent: #2563eb; }
        body { background: var(--bg); color: #fff; margin: 0; height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; overflow: hidden; }
        
        /* The Player Container */
        #playerWrapper {
            width: 95%; max-width: 800px; aspect-ratio: 16/9;
            background: #000; border-radius: 15px; overflow: hidden;
            position: relative; border: 1px solid rgba(255,255,255,0.1);
            transition: all 0.3s ease;
        }

        /* Developer Tag - Hamesha Top par rahega */
        .dev-tag {
            position: absolute; top: 12px; left: 12px;
            background: rgba(0,0,0,0.8); border: 1px solid var(--accent);
            padding: 5px 12px; border-radius: 50px; font-size: 10px;
            z-index: 9999; color: #fff; text-transform: uppercase;
        }
        .dev-tag span { color: var(--accent); font-weight: 800; }

        iframe { width: 100%; height: 100%; border: none; pointer-events: auto; }

        /* FAKE FULLSCREEN (90 DEGREE ROTATE) */
        .force-landscape {
            position: fixed !important; top: 50% !important; left: 50% !important;
            width: 100vh !important; height: 100vw !important;
            transform: translate(-50%, -50%) rotate(90deg) !important;
            z-index: 99999 !important; border-radius: 0 !important;
        }

        .controls { margin-top: 15px; display: flex; gap: 10px; z-index: 10; }
        .btn { padding: 12px 20px; border-radius: 10px; border: none; background: var(--accent); color: #fff; font-weight: 800; cursor: pointer; font-size: 12px; }
    </style>
</head>
<body>

    <div id="playerWrapper">
        <div class="dev-tag">Developer: <span>Devansh Sharma</span></div>
        <iframe 
            id="liveStream"
            src="https://shwe7ank-jeeyo.netlify.app/watch.html?id=362" 
            sandbox="allow-scripts allow-same-origin allow-forms"
            allowfullscreen="true">
        </iframe>
    </div>

    <div class="controls" id="ui-btn">
        <button class="btn" onclick="toggleRotate()">Rotate Fullscreen</button>
        <button class="btn" style="background: #222;" onclick="location.reload()">Refresh</button>
    </div>

    <script>
        function toggleRotate() {
            const p = document.getElementById('playerWrapper');
            const b = document.getElementById('ui-btn');
            
            if (!p.classList.contains('force-landscape')) {
                p.classList.add('force-landscape');
                b.style.display = "none"; // Hide buttons in FS
                // Add a small close button for FS
                const closeBtn = document.createElement('div');
                closeBtn.id = "closeFS";
                closeBtn.innerHTML = "EXIT";
                closeBtn.style = "position:fixed; top:10px; right:10px; z-index:100000; background:red; padding:5px 10px; font-size:10px; font-weight:800; border-radius:5px; transform: rotate(90deg); cursor:pointer;";
                closeBtn.onclick = toggleRotate;
                document.body.appendChild(closeBtn);
            } else {
                p.classList.remove('force-landscape');
                b.style.display = "flex";
                const cb = document.getElementById('closeFS');
                if(cb) cb.remove();
            }
        }

        // Anti-CORS Alert
        window.addEventListener('message', function(e) {
            if(e.data === 'error') {
                alert("Bhai, stream block ho gayi hai. Naya link check kar raha hoon...");
            }
        });
    </script>
</body>
</html>
