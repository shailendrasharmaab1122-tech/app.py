<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>DevCoderZ | Fullscreen_Rotate_Locked</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #05080f; --accent: #2563eb; --glass: rgba(255, 255, 255, 0.03); --border: rgba(255, 255, 255, 0.08); }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Outfit', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: #fff; min-height: 100vh; padding: 12px; display: flex; flex-direction: column; align-items: center; overflow-x: hidden; }
        .main-wrapper { width: 100%; max-width: 850px; transition: 0.3s; }

        /* Modern Header */
        .brand-header { display: flex; justify-content: space-between; align-items: center; padding: 15px 20px; background: var(--glass); backdrop-filter: blur(15px); border: 1px solid var(--border); border-radius: 18px; margin-bottom: 15px; }

        /* THE PLAYER SHELL */
        .player-shell { 
            width: 100%; 
            aspect-ratio: 16/9; 
            background: #000; 
            border-radius: 20px; 
            overflow: hidden; 
            border: 1px solid var(--border); 
            position: relative; 
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5); 
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* 🔄 FAKE FULLSCREEN (FORCE 90 DEGREE) */
        .force-landscape {
            position: fixed !important;
            top: 50% !important;
            left: 50% !important;
            width: 100vh !important;
            height: 100vw !important;
            transform: translate(-50%, -50%) rotate(90deg) !important;
            z-index: 99999 !important;
            border-radius: 0 !important;
        }

        /* BRANDING TAG - LOCKED INSIDE CONTAINER */
        .dev-tag { 
            position: absolute; top: 15px; left: 15px; 
            background: rgba(0, 0, 0, 0.7); backdrop-filter: blur(8px);
            border: 1px solid rgba(37, 99, 235, 0.5); 
            padding: 6px 14px; border-radius: 50px; font-size: 11px; 
            z-index: 100; color: #eee; text-transform: uppercase;
            pointer-events: none; display: flex; gap: 4px; align-items: center;
        }
        .dev-tag .dot { height: 6px; width: 6px; background: #2563eb; border-radius: 50%; }
        .dev-tag span { color: var(--accent); font-weight: 800; }

        iframe { width: 100%; height: 100%; border: none; }

        .controls { display: flex; gap: 10px; margin-top: 15px; width: 100%; }
        .btn-action { flex: 1; padding: 14px; border-radius: 14px; border: 1px solid var(--border); background: var(--glass); color: #fff; cursor: pointer; font-weight: 700; text-transform: uppercase; font-size: 12px; }

        .tg-btn { display: block; width: 100%; padding: 16px; background: linear-gradient(135deg, #2563eb, #1d4ed8); color: #fff; text-decoration: none; border-radius: 18px; font-weight: 800; margin-top: 15px; text-align: center; }
        
        /* Close button for Fake Fullscreen */
        #closeFS {
            display: none; position: fixed; top: 20px; right: 20px; z-index: 100000;
            background: #ff4757; color: white; padding: 8px 15px; border-radius: 8px;
            font-weight: 800; font-size: 12px; transform: rotate(90deg); cursor: pointer;
        }
    </style>
</head>
<body oncontextmenu="return false;">

    <div class="main-wrapper" id="content">
        <header class="brand-header">
            <div style="font-weight:800;">DevCoderZ <span style="color:var(--accent);">X</span> Assault</div>
            <div style="color: #ff4757; font-weight: 900; font-size: 13px;">● LIVE</div>
        </header>

        <div class="player-shell" id="fsContainer">
            <div class="dev-tag"><div class="dot"></div>Developer: <span>Devansh Sharma</span></div>
            <iframe src="https://shwe7ank-jeeyo.netlify.app/watch.html?id=362" allowfullscreen="true"></iframe>
        </div>

        <div class="controls">
            <button class="btn-action" onclick="toggleRotate()">Rotate Fullscreen</button>
            <button class="btn-action" onclick="location.reload()">Refresh</button>
        </div>

        <a href="https://t.me/Cric_decoders" target="_blank" class="tg-btn">Join Telegram Channel</a>
    </div>

    <div id="closeFS" onclick="toggleRotate()">EXIT</div>

    <script>
        function toggleRotate() {
            const el = document.getElementById('fsContainer');
            const close = document.getElementById('closeFS');
            const content = document.getElementById('content');

            if (!el.classList.contains('force-landscape')) {
                el.classList.add('force-landscape');
                close.style.display = 'block';
                content.style.opacity = '0'; // Hide background UI
            } else {
                el.classList.remove('force-landscape');
                close.style.display = 'none';
                content.style.opacity = '1';
            }
        }
    </script>
</body>
</html>
