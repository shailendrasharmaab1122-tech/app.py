<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>DevCoderZ | Live</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.7.11/shaka-player.ui.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.7.11/controls.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <style>
        :root { --neon: #00FF00; --bg: #050505; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: var(--bg); color: white; font-family: sans-serif; overflow: hidden; height: 100vh; }
        .ambient-bg { position: fixed; inset: 0; background: radial-gradient(circle at 50% 50%, rgba(0, 255, 0, 0.05), transparent); z-index: -1; }
        header { padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; background: rgba(255,255,255,0.03); backdrop-filter: blur(10px); border-bottom: 1px solid rgba(255,255,255,0.05); }
        .brand { font-weight: 900; font-size: 20px; letter-spacing: 1px; }
        .brand span { color: var(--neon); }
        .live-pill { background: #ff0000; padding: 3px 12px; border-radius: 20px; font-size: 11px; font-weight: bold; display: flex; align-items: center; gap: 6px; }
        .dot { width: 6px; height: 6px; background: white; border-radius: 50%; animation: pulse 1s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }
        .player-wrapper { margin: 15px; height: calc(100vh - 100px); background: #000; border-radius: 12px; overflow: hidden; border: 1px solid rgba(255,255,255,0.1); box-shadow: 0 20px 50px rgba(0,0,0,0.8); position: relative; }
        #video { width: 100%; height: 100%; }
        #status { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: var(--neon); font-weight: bold; z-index: 10; text-transform: uppercase; letter-spacing: 2px; }
        .shaka-video-container { width: 100% !important; height: 100% !important; }
    </style>
</head>
<body>
    <div class="ambient-bg"></div>
    <header>
        <div class="brand">DEV<span>CODERZ</span></div>
        <div class="live-pill"><div class="dot"></div> LIVE</div>
    </header>

    <div class="player-wrapper" id="p-con" data-shaka-player-container shaka-controls="true">
        <div id="status">Bypassing...</div>
        <video id="video" autoplay playsinline poster="https://img.media.jio.com/tvpimages/13/81/302112_1749665154709_l_medium.jpg"></video>
    </div>

    <script>
        const CHANNELS = {
            "302": {
                name: "Star Sports 1 Hindi",
                url: "https://jiotvmblive.cdn.jio.com/bpk-tv/Star_Sports_1_Hindi_BTS/output/index.mpd",
                keyId: "6017d0514d425fa38f6e80ba6dcc852f",
                key: "0018944b00adf2078f62386f30c68b74"
            }
        };

        const id = new URLSearchParams(window.location.search).get('id') || "302";
        const ch = CHANNELS[id];
        const tk = "st=1774767416~exp=1774853816~acl=/*~hmac=19006e250bcb4a3431a332754f08ebb0032a9c209e0febd59a1dcdec2c87511c";

        async function init() {
            if(!ch) return document.getElementById('status').innerText = "INVALID ID";
            shaka.polyfill.installAll();
            const video = document.getElementById('video');
            const player = new shaka.Player(video);
            const ui = new shaka.ui.Overlay(player, document.getElementById('p-con'), video);

            player.configure({
                drm: { clearKeys: { [ch.keyId]: ch.key } },
                streaming: { lowLatencyMode: true, stallEnabled: false }
            });

            player.getNetworkingEngine().registerRequestFilter((type, request) => {
                request.headers['Referer'] = 'https://www.jiotv.com/';
                request.headers['User-Agent'] = 'plaYtv/7.1.5 (Linux;Android 13) ExoPlayerLib/2.11.6';
                const sep = request.uris[0].includes('?') ? '&' : '?';
                if(!request.uris[0].includes("__hdnea__")) request.uris[0] += sep + "__hdnea__=" + tk;
            });

            try {
                const res = await fetch(ch.url + "?__hdnea__=" + tk);
                const text = await res.text();
                const blob = new Blob([text], { type: 'application/dash+xml' });
                const blobUrl = URL.createObjectURL(blob);
                await player.load(blobUrl);
                document.getElementById('status').style.display = 'none';
            } catch (e) {
                document.getElementById('status').innerText = "CORS ERROR: TURN ON EXTENSION";
                document.getElementById('status').style.color = "red";
            }
        }
        document.addEventListener('shaka-ui-loaded', init);
    </script>
</body>
</html>
