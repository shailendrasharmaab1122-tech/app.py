<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>DevCoderZ | Live Sports</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.7.11/shaka-player.ui.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.7.11/controls.min.css">
    <style>
        :root { --neon: #00FF00; --bg: #050505; }
        body { background: var(--bg); color: white; font-family: sans-serif; margin: 0; overflow: hidden; }
        header { padding: 15px; background: rgba(255,255,255,0.05); display: flex; justify-content: space-between; border-bottom: 1px solid #222; }
        .brand { font-weight: 900; color: white; }
        .brand span { color: var(--neon); }
        .player-card { margin: 15px; height: calc(100vh - 90px); background: #000; border-radius: 12px; overflow: hidden; position: relative; border: 1px solid #333; }
        #video { width: 100%; height: 100%; }
        #loader { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; background: #000; z-index: 20; color: var(--neon); font-weight: bold; font-size: 13px; letter-spacing: 2px; }
    </style>
</head>
<body>
    <header><div class="brand">DEV<span>CODERZ</span></div></header>

    <div class="player-card" id="player-con" data-shaka-player-container shaka-controls="true">
        <div id="loader">CONNECTING TO JIO...</div>
        <video id="video" autoplay playsinline poster="https://img.media.jio.com/tvpimages/13/81/302112_1749665154709_l_medium.jpg"></video>
    </div>

    <script>
        const API = {
            "302": {
                u: "https://jiotvmblive.cdn.jio.com/bpk-tv/Star_Sports_1_Hindi_BTS/output/index.mpd",
                ki: "6017d0514d425fa38f6e80ba6dcc852f",
                k: "0018944b00adf2078f62386f30c68b74"
            }
        };

        const params = new URLSearchParams(window.location.search);
        const ch = API[params.get('id') || "302"];
        const tk = "st=1774767416~exp=1774853816~acl=/*~hmac=19006e250bcb4a3431a332754f08ebb0032a9c209e0febd59a1dcdec2c87511c";

        async function init() {
            shaka.polyfill.installAll();
            const video = document.getElementById('video');
            const player = new shaka.Player(video);
            new shaka.ui.Overlay(player, document.getElementById('player-con'), video);

            player.configure({
                drm: { clearKeys: { [ch.ki]: ch.k } },
                streaming: { lowLatencyMode: true }
            });

            // YAHAN HAI ASLI MAGIC: Headers ko force karna
            player.getNetworkingEngine().registerRequestFilter((type, request) => {
                request.headers['Origin'] = 'https://www.jiotv.com';
                request.headers['Referer'] = 'https://www.jiotv.com/';
                
                // Token append logic
                if (!request.uris[0].includes('__hdnea__')) {
                    const sep = request.uris[0].includes('?') ? '&' : '?';
                    request.uris[0] += sep + "__hdnea__=" + tk;
                }
            });

            try {
                // Seedha load karo, Proxy ki zarurat nahi agar Extension ON hai
                await player.load(ch.u);
                document.getElementById('loader').style.display = 'none';
            } catch (e) {
                document.getElementById('loader').innerText = "CORS BLOCK: CHECK EXTENSION & TOKEN";
            }
        }
        document.addEventListener('shaka-ui-loaded', init);
    </script>
</body>
</html>
