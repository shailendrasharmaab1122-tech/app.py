<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>DevCoderZ | Dynamic Player</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.7.11/shaka-player.ui.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.7.11/controls.min.css">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{background:#000;height:100vh;width:100vw;overflow:hidden;font-family:sans-serif}
        .shaka-video-container{position:absolute;inset:0;width:100%;height:100%}
        video{width:100%;height:100%;object-fit:contain}
        #ch-info{position:absolute;top:10px;left:10px;color:#fff;z-index:10;background:rgba(0,0,0,0.5);padding:5px 10px;border-radius:5px}
        #loading{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);color:#00FF00;z-index:100;font-weight:bold}
        .shaka-spinner-container{display:none !important}
    </style>
</head>
<body>
    <div id="ch-info">Channel: <span id="ch-name">Loading...</span></div>
    <div id="loading">DevCoderZ API Syncing...</div>
    
    <div class="shaka-video-container" id="player-container" data-shaka-player-container shaka-controls="true">
        <video id="video" autoplay playsinline></video>
    </div>

    <script>
        // --- TERA PRIVATE API DATA (Shwetank Style) ---
        const CHANNELS_API = {
            "302": {
                name: "Star Sports 1 Hindi",
                url: "https://jiotvmblive.cdn.jio.com/bpk-tv/Star_Sports_1_Hindi_BTS/output/index.mpd",
                keyId: "6017d0514d425fa38f6e80ba6dcc852f",
                key: "0018944b00adf2078f62386f30c68b74"
            },
            "81": {
                name: "Star Sports 1 HD",
                url: "https://jiotvmblive.cdn.jio.com/bpk-tv/Star_Sports_1_HD_BTS/output/index.mpd",
                keyId: "your_hd_key_id",
                key: "your_hd_key"
            }
        };

        // URL se ID nikalne ka logic (?id=302)
        const urlParams = new URLSearchParams(window.location.search);
        const channelId = urlParams.get('id') || "302"; // Default 302
        const currentChannel = CHANNELS_API[channelId];

        // TERA TOKEN (Network tab wala yahan paste kar)
        const TOKEN = "__hdnea__=st=1774767416~exp=1774853816~acl=/*~hmac=19006e250bcb4a3431a332754f08ebb0032a9c209e0febd59a1dcdec2c87511c";

        async function initPlayer() {
            if (!currentChannel) {
                document.getElementById('loading').innerText = "Channel ID Not Found!";
                return;
            }

            document.getElementById('ch-name').innerText = currentChannel.name;
            shaka.polyfill.installAll();
            
            const video = document.getElementById('video');
            const container = document.getElementById('player-container');
            const player = new shaka.Player(video);
            new shaka.ui.Overlay(player, container, video);

            player.configure({
                drm: { clearKeys: { [currentChannel.keyId]: currentChannel.key } },
                streaming: { lowLatencyMode: true, stallEnabled: false }
            });

            player.getNetworkingEngine().registerRequestFilter((type, request) => {
                request.headers['Referer'] = 'https://www.jiotv.com/';
                request.headers['User-Agent'] = 'plaYtv/7.1.5 (Linux;Android 13) ExoPlayerLib/2.11.6';
                
                if(TOKEN){
                    request.headers['Cookie'] = TOKEN;
                    const sep = request.uris[0].includes('?') ? '&' : '?';
                    if(!request.uris[0].includes("__hdnea__")) request.uris[0] += sep + TOKEN;
                }
            });

            try {
                // Shwetank Logic: Fetching and creating Blob
                const response = await fetch(currentChannel.url + "?" + TOKEN);
                const manifestText = await response.text();
                const blob = new Blob([manifestText], { type: 'application/dash+xml' });
                const blobUrl = URL.createObjectURL(blob);

                await player.load(blobUrl);
                document.getElementById('loading').style.display = 'none';
                video.play();
            } catch (e) {
                document.getElementById('loading').innerText = "FAILED: CHECK CORS/TOKEN";
                document.getElementById('loading').style.color = "red";
            }
        }

        document.addEventListener('shaka-ui-loaded', initPlayer);
    </script>
</body>
</html>
