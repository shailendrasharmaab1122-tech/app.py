<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>DevCoderZ | Live Sports</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.7.11/shaka-player.ui.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.7.11/controls.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <style>
        :root { --neon: #00FF00; --bg: #050505; --glass: rgba(255, 255, 255, 0.05); }
        * { margin: 0; padding: 0; box-sizing: border-box; outline: none; }
        body { background: var(--bg); color: white; font-family: 'Inter', sans-serif; overflow: hidden; height: 100vh; }
        .ambient-bg { position: fixed; inset: 0; background: radial-gradient(circle at 20% 30%, rgba(0, 255, 0, 0.08), transparent), radial-gradient(circle at 80% 70%, rgba(0, 255, 0, 0.04), transparent); z-index: -1; }
        header { padding: 15px 25px; display: flex; justify-content: space-between; align-items: center; background: var(--glass); backdrop-filter: blur(15px); border-bottom: 1px solid rgba(255,255,255,0.1); box-shadow: 0 4px 30px rgba(0,0,0,0.5); }
        .brand { font-weight: 900; font-size: 22px; letter-spacing: 1.5px; text-transform: uppercase; }
        .brand span { color: var(--neon); text-shadow: 0 0 10px var(--neon); }
        .live-pill { background: #ff0000; padding: 4px 14px; border-radius: 30px; font-size: 10px; font-weight: 800; display: flex; align-items: center; gap: 8px; box-shadow: 0 0 15px rgba(255,0,0,0.4); }
        .dot { width: 7px; height: 7px; background: white; border-radius: 50%; animation: pulse 1.2s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; transform: scale(1); } 50% { opacity: 0.4; transform: scale(0.8); } }
        .player-card { margin: 20px; height: calc(100vh - 110px); background: #000; border-radius: 18px; overflow: hidden; border: 1px solid rgba(255,255,255,0.08); box-shadow: 0 25px 50px -12px rgba(0,0,0,0.9); position: relative; }
        #video { width: 100%; height: 100%; object-fit: contain; }
        #loader { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; background: #000; z-index: 20; transition: 0.5s; }
        .spinner { width: 40px; height: 40px; border: 4px solid rgba(0,255,0,0.1); border-top: 4px solid var(--neon); border-radius: 50%; animation: spin 0.8s linear infinite; margin-bottom: 15px; }
        @keyframes spin { 100% { transform: rotate(360deg); } }
        #status-txt { color: var(--neon); font-size: 12px; font-weight: bold; letter-spacing: 2px; }
        .shaka-video-container { width: 100% !important; height: 100% !important; }
        .shaka-controls-container { background: linear-gradient(transparent, rgba(0,0,0,0.8)) !important; }
    </style>
</head>
<body>
    <div class="ambient-bg"></div>
    <header>
        <div class="brand">DEV<span>CODERZ</span></div>
        <div class="live-pill"><div class="dot"></div> STREAMING LIVE</div>
    </header>

    <div class="player-card" id="player-con" data-shaka-player-container shaka-controls="true">
        <div id="loader">
            <div class="spinner"></div>
            <div id="status-txt">BYPASSING CORS...</div>
        </div>
        <video id="video" autoplay playsinline poster="https://i.postimg.cc/76cbBjty/P.jpg"></video>
    </div>

    <script>
        const API = {
            "302": {
                n: "Star Sports 1 Hindi",
                u: "https://jiotvmblive.cdn.jio.com/bpk-tv/Star_Sports_1_Hindi_BTS/output/index.mpd",
                ki: "6017d0514d425fa38f6e80ba6dcc852f",
                k: "0018944b00adf2078f62386f30c68b74"
            },
            "81": {
                n: "Star Sports 1 HD",
                u: "https://jiotvmblive.cdn.jio.com/bpk-tv/Star_Sports_1_HD_BTS/output/index.mpd",
                ki: "6017d0514d425fa38f6e80ba6dcc852f",
                k: "0018944b00adf2078f62386f30c68b74"
            }
        };

        const params = new URLSearchParams(window.location.search);
        const cid = params.get('id') || "302";
        const ch = API[cid];
        const token = "st=1774767416~exp=1774853816~acl=/*~hmac=19006e250bcb4a3431a332754f08ebb0032a9c209e0febd59a1dcdec2c87511c";

        async function initDevCoderZ() {
            if(!ch) { document.getElementById('status-txt').innerText = "CHANNEL NOT FOUND"; return; }
            
            shaka.polyfill.installAll();
            const video = document.getElementById('video');
            const player = new shaka.Player(video);
            const ui = new shaka.ui.Overlay(player, document.getElementById('player-con'), video);

            player.configure({
                drm: { clearKeys: { [ch.ki]: ch.k } },
                streaming: { lowLatencyMode: true, stallEnabled: false }
            });

            player.getNetworkingEngine().registerRequestFilter((type, request) => {
                request.headers['Referer'] = 'https://www.jiotv.com/';
                request.headers['User-Agent'] = 'plaYtv/7.1.5 (Linux;Android 13) ExoPlayerLib/2.11.6';
                const sep = request.uris[0].includes('?') ? '&' : '?';
                if(!request.uris[0].includes("__hdnea__")) request.uris[0] += sep + "__hdnea__=" + token;
            });

            try {
                // Cric Hype style Blob logic with Proxy
                const proxy = "https://api.allorigins.win/raw?url=";
                const fetchUrl = proxy + encodeURIComponent(ch.u + "?__hdnea__=" + token);
                
                const response = await fetch(fetchUrl);
                const manifestText = await response.text();
                
                const blob = new Blob([manifestText], { type: 'application/dash+xml' });
                const blobUrl = URL.createObjectURL(blob);
                
                await player.load(blobUrl);
                document.getElementById('loader').style.opacity = '0';
                setTimeout(() => document.getElementById('loader').remove(), 500);
            } catch (e) {
                console.error(e);
                document.getElementById('status-txt').innerText = "CORS FAILED: RELOAD OR USE VPN";
                document.getElementById('status-txt').style.color = "red";
            }
        }

        document.addEventListener('shaka-ui-loaded', initDevCoderZ);
    </script>
</body>
</html>
