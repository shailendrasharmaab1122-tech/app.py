<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DevCoderZ | Force_Rotate_Fixed</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@600;800&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #05080f; --accent: #2563eb; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Outfit', sans-serif; }
        body { background: var(--bg); color: #fff; height: 100vh; overflow: hidden; display: flex; flex-direction: column; align-items: center; justify-content: center; }

        /* Container Jo Normal Rahega */
        .main-wrapper { width: 95%; max-width: 800px; text-align: center; transition: 0.3s; }

        /* PLAYER SHELL (The Magic Happens Here) */
        #playerShell {
            width: 100%;
            aspect-ratio: 16/9;
            background: #000;
            border-radius: 15px;
            overflow: hidden;
            position: relative;
            border: 1px solid rgba(255,255,255,0.1);
            z-index: 1000;
        }

        /* BRANDING TAG - LOCKED */
        .dev-tag {
            position: absolute; top: 12px; left: 12px;
            background: rgba(0, 0, 0, 0.8); border: 1px solid var(--accent);
            padding: 5px 12px; border-radius: 50px; font-size: 10px;
            z-index: 9999; color: #fff; text-transform: uppercase;
            pointer-events: none;
        }
        .dev-tag span { color: var(--accent); font-weight: 800; }

        iframe { width: 100%; height: 100%; border: none; }

        /* 🔄 THE FORCE ROTATE CLASS (90 Degree) */
        .rotated-mode {
            position: fixed !important;
            top: 0 !important; left: 0 !important;
            width: 100vh !important;  /* Browser Height becomes Width */
            height: 100vw !important; /* Browser Width becomes Height */
            transform: rotate(90deg) translateY(-100%) !important;
            transform-origin: top left !important;
            border-radius: 0 !important;
            z-index: 100000 !important;
        }

        .controls { margin-top: 20px; display: flex; gap: 10px; }
        .btn { padding: 12px 20px; border-radius: 10px; border: none; background: var(--accent); color: #fff; font-weight: 800; cursor: pointer; font-size: 12px; }

        /* Close Button for Rotate Mode */
        #exitBtn {
            display: none; position: fixed; bottom: 20px; right: 20px;
            z-index: 100001; background: red; color: white; padding: 10px;
            border-radius: 5px; font-weight: 800; transform: rotate(90deg);
        }
    </style>
</head>
<body>

    <div class="main-wrapper" id="ui">
        <h2 style="margin-bottom:15px;">DevCoderZ <span style="color:var(--accent);">Live</span></h2>
        
        <div id="playerShell">
            <div class="dev-tag">Developer: <span>Devansh Sharma</span></div>
            <iframe src="https://shwe7ank-jeeyo.netlify.app/watch.html?id=362" allowfullscreen="true"></iframe>
        </div>

        <div class="controls">
            <button class="btn" onclick="goRotate()">90° Fullscreen</button>
            <button class="btn" style="background:#222;" onclick="location.reload()">Refresh</button>
        </div>
    </div>

    <div id="exitBtn" onclick="exitRotate()">EXIT</div>

    <script>
        function goRotate() {
            const shell = document.getElementById('playerShell');
            const ui = document.getElementById('ui');
            const exit = document.getElementById('exitBtn');

            shell.classList.add('rotated-mode');
            ui.style.opacity = "0";
            exit.style.display = "block";
        }

        function exitRotate() {
            const shell = document.getElementById('playerShell');
            const ui = document.getElementById('ui');
            const exit = document.getElementById('exitBtn');

            shell.classList.remove('rotated-mode');
            ui.style.opacity = "1";
            exit.style.display = "none";
        }
    </script>
</body>
</html>
