<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>DevCoderZ | Force_Rotate_IPL</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@600;800&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #05080f; --accent: #2563eb; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Outfit', sans-serif; }
        body { background: var(--bg); color: #fff; overflow-x: hidden; height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; }

        /* Main Player Shell */
        #playerWrapper {
            width: 100%;
            max-width: 850px;
            aspect-ratio: 16/9;
            background: #000;
            position: relative;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 1000;
        }

        /* THE BRANDING TAG - LOCKED */
        .dev-tag {
            position: absolute;
            top: 15px;
            left: 15px;
            background: rgba(0, 0, 0, 0.7);
            border: 1px solid var(--accent);
            padding: 6px 14px;
            border-radius: 50px;
            font-size: 11px;
            z-index: 2000;
            color: #eee;
            text-transform: uppercase;
            pointer-events: none;
        }
        .dev-tag span { color: var(--accent); font-weight: 800; }

        iframe { width: 100%; height: 100%; border: none; }

        /* FAKE FULLSCREEN / FORCE ROTATE CLASS */
        .force-landscape {
            position: fixed !important;
            top: 50% !important;
            left: 50% !important;
            width: 100vh !important;   /* Height becomes Width */
            height: 100vw !important;  /* Width becomes Height */
            transform: translate(-50%, -50%) rotate(90deg) !important;
            max-width: none !important;
            aspect-ratio: auto !important;
            border-radius: 0 !important;
        }

        .controls { margin-top: 20px; display: flex; gap: 10px; width: 90%; max-width: 400px; }
        .btn { flex: 1; padding: 15px; border-radius: 12px; border: none; background: var(--accent); color: #fff; font-weight: 800; cursor: pointer; text-transform: uppercase; font-size: 12px; }
        
        /* Hide UI when in Fake Fullscreen */
        .hide-ui { display: none !important; }
    </style>
</head>
<body oncontextmenu="return false;">

    <div id="ui-header" style="margin-bottom: 20px; text-align: center;">
        <h2 style="font-size: 18px;">DevCoderZ <span style="color:var(--accent);">Live</span></h2>
    </div>

    <div id="playerWrapper">
        <div class="dev-tag">Developer: <span>Devansh Sharma</span></div>
        <iframe 
            src="https://shwe7ank-jeeyo.netlify.app/watch.html?id=362" 
            allowfullscreen="true">
        </iframe>
    </div>

    <div class="controls" id="controls">
        <button class="btn" onclick="toggleRotate()">Rotate Fullscreen</button>
        <button class="btn" style="background: #333;" onclick="location.reload()">Refresh</button>
    </div>

    <script>
        function toggleRotate() {
            const player = document.getElementById('playerWrapper');
            const header = document.getElementById('ui-header');
            const controls = document.getElementById('controls');

            if (!player.classList.contains('force-landscape')) {
                // Enter Fake Fullscreen
                player.classList.add('force-landscape');
                header.classList.add('hide-ui');
                // Auto-hide controls after rotate
                controls.style.position = "fixed";
                controls.style.bottom = "10px";
                controls.style.zIndex = "3000";
                controls.style.opacity = "0.3"; 
            } else {
                // Exit Fake Fullscreen
                player.classList.remove('force-landscape');
                header.classList.remove('hide-ui');
                controls.style.position = "relative";
                controls.style.opacity = "1";
            }
        }

        // Close rotate if user presses Back button
        window.addEventListener('popstate', function() {
            const player = document.getElementById('playerWrapper');
            if (player.classList.contains('force-landscape')) {
                toggleRotate();
            }
        });
    </script>
</body>
</html>
