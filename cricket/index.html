<div id="loading" class="loading" style="display: none;">Loading Channel...</div>
<div id="error" class="error" style="display:none"></div>

<script>

const API="https://pkll.xojiv79335.workers.dev/";

function getId(){
 return new URLSearchParams(location.search).get("id");
}

async function fetchChannel(){

 const id=getId();
 if(!id){
  showError("Channel ID missing");
  return null;
 }

 const res=await fetch(API);
 const data=await res.json();

 return data.find(c=>c.channel_id==id);
}

function showError(msg){
 document.getElementById("loading").style.display="none";
 const err=document.getElementById("error");
 err.innerText=msg;
 err.style.display="block";
}

async function startPlayer(channel){

 shaka.polyfill.installAll();

 if(!shaka.Player.isBrowserSupported()){
  showError("Browser not supported");
  return;
 }

 const video=document.querySelector("video");

 const player=new shaka.Player(video);

 const container=document.querySelector(".shaka-video-container");

 new shaka.ui.Overlay(player,container,video);

 /* DRM */

 player.configure({
  drm: {
    clearKeys: {
      [channel.keyId]: channel.key
    }
  },

  streaming: {
    lowLatencyMode: true,

    bufferingGoal: 30,          // increase buffer to stop fake buffering
    rebufferingGoal: 2,
    bufferBehind: 30,

    inaccurateManifestTolerance: 2,

    retryParameters: {
      timeout: 12000,
      maxAttempts: 5,
      baseDelay: 300,
      backoffFactor: 1.2
    },

    segmentRequestTimeout: 10000,
    segmentPrefetchLimit: 3,

    stallEnabled: false,        // P THIS removes fake buffering spinner
    useNativeHlsOnSafari: true
  },

  manifest: {
    retryParameters: {
      timeout: 8000,
      maxAttempts: 3
    }
  }
});

 /* NETWORK FILTER */

 const cookie=channel.cookie;

 player.getNetworkingEngine().registerRequestFilter((type,request)=>{

  request.headers["Referer"]="https://www.jiotv.com/";
  request.headers["User-Agent"]="plaYtv/7.1.5 (Linux;Android 13) ExoPlayerLib/2.11.6";

  if(cookie){
   request.headers["Cookie"]=cookie;
  }

  /* append cookie token to segments */

  if(
   cookie &&
   (type===shaka.net.NetworkingEngine.RequestType.SEGMENT ||
    type===shaka.net.NetworkingEngine.RequestType.MANIFEST)
  ){

   if(!request.uris[0].includes("__hdnea__")){

    const sep=request.uris[0].includes("?") ? "&" : "?";
    request.uris[0]+=sep+cookie;

   }

  }

 });

 try{

  await player.load(channel.channel_url);

  document.getElementById("loading").style.display="none";

  video.play();

 }catch(e){

  console.error(e);
  showError("Stream failed to start");

 }

}

async function init(){

 const channel=await fetchChannel();

 if(!channel){
  showError("Channel not found");
  return;
 }

 document.getElementById("channelLogo").src=channel.channel_logo;
 document.getElementById("channelName").innerText=channel.channel_name;

 startPlayer(channel);

}

init();

</script>
