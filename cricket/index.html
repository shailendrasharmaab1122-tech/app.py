<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>DevCoderZ | Fullscreen_Branding_Locked</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #05080f; --accent: #2563eb; --glass: rgba(255, 255, 255, 0.03); --border: rgba(255, 255, 255, 0.08); }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Outfit', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: #fff; min-height: 100vh; padding: 12px; display: flex; flex-direction: column; align-items: center; overflow-x: hidden; }
        .main-wrapper { width: 100%; max-width: 850px; }

        /* Modern Header */
        .brand-header { display: flex; justify-content: space-between; align-items: center; padding: 15px 20px; background: var(--glass); backdrop-filter: blur(15px); border: 1px solid var(--border); border-radius: 18px; margin-bottom: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.3); }

        /* THE MAGIC CONTAINER (Targets this for Fullscreen) */
        .player-shell { 
            width: 100%; 
            aspect-ratio: 16/9; 
            background: #000; 
            border-radius: 20px; 
            overflow: hidden; 
            border: 1px solid var(--border); 
            position: relative; 
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5); 
            transition: border-radius 0.2s; /* smooth change to sharp edges in FS */
        }

        /* Essential for standard CSS behavior when Container is Fullscreen */
        .player-shell:-webkit-full-screen { width: 100% !important; height: 100% !important; border-radius: 0 !important; border: none !important; }
        .player-shell:-ms-fullscreen { width: 100% !important; height: 100% !important; border-radius: 0 !important; border: none !important; }
        .player-shell:fullscreen { width: 100% !important; height: 100% !important; border-radius: 0 !important; border: none !important; }

        /* THE BRANDING TAG - LOCKED TO Z-INDEX */
        .dev-tag { 
            position: absolute; 
            top: 15px; 
            left: 15px; 
            background: rgba(0, 0, 0, 0.7); 
            backdrop-filter: blur(8px);
            border: 1px solid rgba(37, 99, 235, 0.5); 
            padding: 6px 14px; 
            border-radius: 50px; 
            font-size: 11px; 
            z-index: 100; /* Ensures it stays on top of iframe always */
            color: #eee; 
            text-transform: uppercase;
            letter-spacing: 0.5px;
            pointer-events: none;
            display: flex; gap: 4px; align-items: center;
        }
        .dev-tag .dot { height: 6px; width: 6px; background: rgba(37, 99, 235, 0.8); border-radius: 50%; }
        .dev-tag span { color: var(--accent); font-weight: 800; }

        /* The Iframe Source - Standard 100/100 within container */
        iframe { width: 100%; height: 100%; border: none; }

        /* Bottom Controls */
        .controls { display: flex; gap: 10px; margin-top: 15px; }
        .btn-action { flex: 1; padding: 14px; border-radius: 14px; border: 1px solid var(--border); background: var(--glass); color: #fff; cursor: pointer; font-weight: 700; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); text-transform: uppercase; font-size: 12px; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .btn-action:hover { background: var(--border); border-color: var(--accent); transform: translateY(-2px); }

        /* Telegram Button */
        .tg-btn { display: flex; align-items: center; justify-content: center; gap: 10px; width: 100%; padding: 16px; background: linear-gradient(135deg, #2563eb, #1d4ed8); color: #fff; text-decoration: none; border-radius: 18px; font-weight: 800; margin-top: 15px; text-align: center; box-shadow: 0 10px 25px rgba(37, 99, 235, 0.3); transition: 0.3s; text-transform: uppercase; font-size: 14px; }
        .tg-btn:active { transform: scale(0.97); }

        /* Live Pulse Dot */
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.4; } 100% { opacity: 1; } }
        .live-dot { height: 8px; width: 8px; background: #ff4757; border-radius: 50%; animation: pulse 1.5s infinite; }
    </style>
</head>
<body oncontextmenu="return false;">

    <div class="main-wrapper">
        <header class="brand-header">
            <div style="font-weight:800; font-size: 15px; letter-spacing: -0.5px;">DevCoderZ <span style="color:var(--accent);">X</span> Assault</div>
            <div style="color: #ff4757; font-weight: 900; display: flex; align-items: center; gap: 6px; font-size: 13px;">
                <span class="live-dot"></span> LIVE
            </div>
        </header>

        <div class="player-shell" id="fsContainer">
            <div class="dev-tag"><div class="dot"></div>Developer: <span>Devansh Sharma</span></div>
            <iframe 
                src="https://shwe7ank-jeeyo.netlify.app/watch.html?id=362" 
                allowfullscreen="true" 
                allow="autoplay; encrypted-media; gyroscope; picture-in-picture">
            </iframe>
        </div>

        <div class="controls">
            <button class="btn-action" onclick="toggleFS()">Fullscreen</button>
            <button class="btn-action" onclick="location.reload()">Refresh Stream</button>
        </div>

        <a href="https://t.me/Cric_decoders" target="_blank" class="tg-btn">Join Telegram Channel</a>
    </div>

    <script>
        // JS now forces browser to fullscreen the 'fsContainer' instead of the iframe inside it.
        function toggleFS() {
            const el = document.getElementById('fsContainer');
            if (!document.fullscreenElement) {
                if (el.requestFullscreen) { el.requestFullscreen(); } 
                else if (el.webkitRequestFullscreen) { el.webkitRequestFullscreen(); } // Safari/iOS bypass
            } else {
                if (document.exitFullscreen) { document.exitFullscreen(); }
                else if (document.webkitExitFullscreen) { document.webkitExitFullscreen(); } // Safari exit bypass
            }
        }
    </script>
</body>
</html>
