<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>DevCoderZ | Pro Player</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.7.11/shaka-player.ui.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.7.11/controls.min.css">
    <style>
        :root { --neon: #00FF00; --bg: #000; }
        body { background: var(--bg); color: #fff; font-family: sans-serif; margin: 0; overflow: hidden; }
        .player-wrapper { height: 100vh; width: 100vw; position: relative; }
        #video { width: 100%; height: 100%; }
        #status { position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); color: var(--neon); z-index: 99; font-weight: bold; letter-spacing: 1px; }
        header { position: absolute; top: 0; width: 100%; padding: 15px; background: linear-gradient(rgba(0,0,0,0.8), transparent); z-index: 10; display: flex; justify-content: space-between; }
        .brand { font-weight: 900; } .brand span { color: var(--neon); }
    </style>
</head>
<body>
    <header><div class="brand">DEV<span>CODERZ</span></div></header>
    <div class="player-wrapper" id="p-con" data-shaka-player-container shaka-controls="true">
        <div id="status">BYPASSING SECURITY...</div>
        <video id="video" autoplay playsinline poster="https://i.postimg.cc/76cbBjty/P.jpg"></video>
    </div>

    <script>
        const API = {
            "302": {
                u: "https://jiotvmblive.cdn.jio.com/bpk-tv/Star_Sports_1_Hindi_BTS/output/index.mpd",
                ki: "6017d0514d425fa38f6e80ba6dcc852f",
                k: "0018944b00adf2078f62386f30c68b74"
            }
        };

        const id = new URLSearchParams(window.location.search).get('id') || "302";
        const ch = API[id];
        // DHAYAN DE: Ye Token naya hona chahiye (Network Tab se le lo)
        const tk = "st=1774767416~exp=1774853816~acl=/*~hmac=19006e250bcb4a3431a332754f08ebb0032a9c209e0febd59a1dcdec2c87511c";

        async function init() {
            shaka.polyfill.installAll();
            const video = document.getElementById('video');
            const player = new shaka.Player(video);
            new shaka.ui.Overlay(player, document.getElementById('p-con'), video);

            player.configure({
                drm: { clearKeys: { [ch.ki]: ch.k } },
                streaming: { lowLatencyMode: true }
            });

            player.getNetworkingEngine().registerRequestFilter((type, request) => {
                // Inka asli bypass: Request ko Proxy ke through bhejna
                const originalUrl = request.uris[0];
                const sep = originalUrl.includes('?') ? '&' : '?';
                const finalUrlWithToken = originalUrl + (originalUrl.includes('__hdnea__') ? '' : sep + "__hdnea__=" + tk);
                
                // YE HAI SHWETANK KA ASLI LOGIC: Public Proxy Bypass
                request.uris[0] = "https://api.allorigins.win/raw?url=" + encodeURIComponent(finalUrlWithToken);
                
                request.headers['Referer'] = 'https://www.jiotv.com/';
                request.headers['User-Agent'] = 'plaYtv/7.1.5 (Linux;Android 13) ExoPlayerLib/2.11.6';
            });

            try {
                // Pehle Manifest fetch karke Blob banate hain (Cric Hype Style)
                const res = await fetch("https://api.allorigins.win/raw?url=" + encodeURIComponent(ch.u + "?__hdnea__=" + tk));
                const text = await res.text();
                const blob = new Blob([text], { type: 'application/dash+xml' });
                const blobUrl = URL.createObjectURL(blob);

                await player.load(blobUrl);
                document.getElementById('status').style.display = 'none';
            } catch (e) {
                // Agar block hua toh error code dikhayega
                document.getElementById('status').innerText = "TOKEN EXPIRED OR IP BLOCKED";
            }
        }
        document.addEventListener('shaka-ui-loaded', init);
    </script>
</body>
</html>
