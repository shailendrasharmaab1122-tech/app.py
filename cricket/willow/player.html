<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Streaming | Devansh Sharma</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.7.1/shaka-player.ui.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.7.1/controls.min.css">
    <style>
        body { background-color: #000; margin: 0; font-family: sans-serif; overflow: hidden; }
        .video-container { position: relative; width: 100vw; height: 100vh; background-color: black; }
        
        /* Developer Watermark */
        .dev-watermark {
            position: absolute; top: 20px; left: 20px; z-index: 10;
            color: rgba(255,255,255,0.6); font-size: 14px;
            pointer-events: none; text-shadow: 1px 1px 2px #000;
        }

        /* Popup Styles */
        .popup-overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.85);
            display: flex; align-items: center; justify-content: center; z-index: 100;
        }
        .popup-box {
            background: #1a1a1a; padding: 30px; border-radius: 15px;
            text-align: center; border: 1px solid #333; max-width: 400px; width: 90%;
        }
        .popup-box h2 { color: #fff; margin-bottom: 20px; }
        .btn-group { display: flex; gap: 10px; justify-content: center; margin-top: 20px; }
        .btn { padding: 10px 20px; border-radius: 5px; cursor: pointer; border: none; font-weight: bold; }
        .btn-join { background: #0088cc; color: white; }
        .btn-skip { background: #444; color: white; }
    </style>
</head>

<body>

    <div class="video-container" id="player-container">
        <div class="dev-watermark">Developer: Devansh Sharma</div>
        <video id="video" autoplay playsinline style="width:100%; height:100%;"></video>
    </div>

    <!-- Popup -->
    <div class="popup-overlay" id="tg-popup">
        <div class="popup-box">
            <h2>Join Official Channel</h2>
            <p style="color: #ccc;">Get latest updates and links on our Telegram channel.</p>
            <div class="btn-group">
                <button class="btn btn-join" onclick="window.open('https://t.me/+8tZSJ5FyTXVjM2M1', '_blank')">Join Now</button>
                <button class="btn btn-skip" onclick="document.getElementById('tg-popup').style.display='none'">Skip</button>
            </div>
        </div>
    </div>

    <script>
    async function init() {
        const video = document.getElementById("video");
        const player = new shaka.Player(video);
        const ui = new shaka.ui.Overlay(player, document.getElementById("player-container"), video);

        player.configure({
            drm: {
                clearKeys: {
                    '01c9bbf8137e58378a5ead514998a7b4': "fb01e61809e80e5e93a889cd31daab22"
                }
            }
        });

        try {
            await player.load("https://dck1-fs-live.dtcdn.dazn.com/out/v1/814bffb9b389f652/d65feac5647949e6b45b2674d4715398/index.mpd");
        } catch (error) {
            console.error("Error loading video", error);
        }
    }

    document.addEventListener("DOMContentLoaded", init);
    </script>

</body>
</html>
