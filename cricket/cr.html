<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DevCoderZ Sports Portal</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.7.11/shaka-player.ui.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.7.11/controls.min.css">
    <style>
        body { background: #0b0b0b; color: white; font-family: sans-serif; margin: 0; }
        .container { display: flex; flex-direction: column; height: 100vh; }
        
        /* Video Section */
        #video-wrapper { width: 100%; background: #000; aspect-ratio: 16/9; }
        video { width: 100%; height: 100%; }

        /* Channel List Section */
        .channel-list {
            padding: 15px;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
            gap: 15px;
            overflow-y: auto;
        }
        .channel-card {
            background: #1a1a1a;
            border-radius: 8px;
            padding: 10px;
            text-align: center;
            cursor: pointer;
            transition: 0.3s;
            border: 1px solid #333;
        }
        .channel-card:hover { border-color: #00bfff; transform: translateY(-3px); }
        .channel-card img { width: 60px; height: 60px; object-fit: contain; margin-bottom: 8px; }
        .channel-card p { font-size: 12px; margin: 0; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <div id="video-wrapper" data-shaka-player-container>
        <video id="video" autoplay playsinline></video>
    </div>

    <div class="channel-list" id="list">
        </div>
</div>

<script>
    // Paste your JSON data here
    const channels = [
        {
            "name": "DD Sports",
            "url": "https://jiotvbpkmob.cdn.jio.com/bpk-tv/DD_Sports_BTS/output/index.mpd",
            "keyId": "0c1b139b9a955134a1efae8e44b63aac",
            "key": "00897bffd6997049787270797b8c3a17",
            "logo": "https://jiotv.catchup.cdn.jio.com/dare_images/images/DD_Sports.png"
        },
        {
            "name": "Eurosport HD",
            "url": "https://jiotvbpkmob.cdn.jio.com/bpk-tv/Dsports_HD_BTS/output/index.mpd",
            "keyId": "14fc31f9d832509c9f7cdd77e622e30b",
            "key": "a884515f4e1dd77f07aa100ccec13388",
            "logo": "https://jiotv.catchup.cdn.jio.com/dare_images/images/Dsports_HD.png"
        },
        {
            "name": "Star Sports Select 1 HD",
            "url": "https://jiotvbpkmob.cdn.jio.com/bpk-tv/Star_Sports_Select_HD_1_BTS/output/index.mpd",
            "keyId": "c2c048e439d65316beeda6ef64d5d0f8",
            "key": "e2fdc132cbdee65501b845ce414fce39",
            "logo": "https://img.media.jio.com/tvpimages/96/65/302113_1749664252703_l_medium.jpg"
        }
        // ... Add all other channels here
    ];

    let player;
    const video = document.getElementById('video');
    const container = document.getElementById('video-wrapper');

    async function initPlayer() {
        shaka.polyfill.installAll();
        player = new shaka.Player(video);
        
        // Custom Header logic (Mobile spoofing)
        player.getNetworkingEngine().registerRequestFilter((type, request) => {
            request.headers['User-Agent'] = 'plaYtv/7.1.5 (Linux;Android 13) ExoPlayerLib/2.11.6';
        });

        const ui = new shaka.ui.Overlay(player, container, video);
        
        // Initial load (First channel)
        playChannel(channels[0]);
    }

    async function playChannel(ch) {
        try {
            // Configure DRM
            player.configure({
                drm: {
                    clearKeys: {
                        [ch.keyId]: ch.key
                    }
                }
            });
            await player.load(ch.url);
            console.log("Playing:", ch.name);
        } catch (e) {
            console.error("Error loading channel:", e);
        }
    }

    // Load channel list into UI
    const listDiv = document.getElementById('list');
    channels.forEach(ch => {
        const card = document.createElement('div');
        card.className = 'channel-card';
        card.innerHTML = `
            <img src="${ch.logo}" alt="${ch.name}">
            <p>${ch.name}</p>
        `;
        card.onclick = () => playChannel(ch);
        listDiv.appendChild(card);
    });

    document.addEventListener('shaka-ui-loaded', initPlayer);
</script>
</body>
</html>
