<!DOCTYPE html><html lang="en"><head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>DevCoderZ X Cricket</title>
  <meta name="referrer" content="no-referrer">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.7.11/shaka-player.ui.min.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.7.11/controls.min.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; background: #000; overflow: hidden; font-family: 'Courier New', Courier, monospace; }
    
    .shaka-video-container { position: absolute; inset: 0; width: 100%; height: 100%; background: #000; display: flex; align-items: center; justify-content: center; }
    video { width: 100%; height: 100%; object-fit: contain; background: #000; outline: none; }

    .wm-secure { 
      position: absolute; 
      z-index: 40; 
      pointer-events: none; 
      font-size: 8px; 
      color: rgba(255, 255, 255, 0.4); 
      letter-spacing: 1px; 
      top: 55%; 
      left: 35%; 
      transform: translate(-50%, -50%);
    }

    #ai-overlay {
      position: absolute;
      inset: 0;
      z-index: 999;
      background: rgba(0, 0, 0, 0.85);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      color: #0f0;
    }
    
    .ai-title { font-size: 8px; font-weight: bold; margin-bottom: 10px; letter-spacing: 2px; animation: pulse 1.5s infinite; }
    .ai-desc { font-size: 13px; color: #aaa; max-width: 80%; line-height: 1.5; }
    .ai-action { font-size: 11px; color: #ffeb3b; margin-top: 15px; }
    .ai-error { color: #ff4444 !important; }

    @keyframes pulse {
      0% { opacity: 1; }
      50% { opacity: 0.5; }
      100% { opacity: 1; }
    }

    #fatal-error { display: none; position: fixed; inset: 0; background: #000; z-index: 99999; color: red; align-items: center; justify-content: center; flex-direction: column; text-align: center; font-family: sans-serif; }
  </style>
</head>
<body>

  <div id="fatal-error"><h1>SYSTEM FAILED</h1></div>

  <div class="shaka-video-container shaka-mobile" id="player-container" data-shaka-player-container="" shaka-controls="true">
    <div id="wm-element" class="wm-secure"></div>
    <video id="video" autoplay playsinline preload="metadata" class="shaka-video"></video>
  </div>

  <div id="ai-overlay">
    <div class="ai-action" id="ai-action">Initializing...</div>
    <div class="ai-title">SYSTEM START</div>
    <div class="ai-desc" id="ai-message">Warming up engines</div>
  </div>

  <script>
    const _0xData = [
      "aHR0cHM6Ly9yYXcuZ2l0aHVidXNlcmNvbnRlbnQuY29tL1NodWJoYW1rdXIvanNvbi9yZWZzL2hlYWRzL21haW4vanNwbw==", 
      "aHR0cHM6Ly9yYXcuZ2l0aHVidXNlcmNvbnRlbnQuY29tL1NodWJoYW1rdXIvVHYvcmVmcy9oZWFkcy9tYWluL2FwaTE=",     
      "aHR0cHM6Ly9yYXcuZ2l0aHVidXNlcmNvbnRlbnQuY29tL1NodWJoYW1rdXIvVHYvcmVmcy9oZWFkcy9tYWluL2FwaTI=",     
      "aHR0cHM6Ly9yYXcuZ2l0aHVidXNlcmNvbnRlbnQuY29tL1NodWJoYW1rdXIvVHYvcmVmcy9oZWFkcy9tYWluL2FwaTM=",     
      "UG93ZXJlZCBieSBEZXZDb2Rlclo=" 
    ];

    const CHANNELS_DB_URL = atob(_0xData[0]);
    const API_SOURCES = [atob(_0xData[1]), atob(_0xData[2]), atob(_0xData[3])];
    const SECURE_WM = atob(_0xData[4]);
    document.getElementById('wm-element').innerText = SECURE_WM;

    setInterval(() => {
        const wmNode = document.getElementById('wm-element');
        if (!wmNode || wmNode.innerText !== SECURE_WM) {
            document.getElementById('player-container').innerHTML = '';
            document.getElementById('fatal-error').style.display = 'flex';
        }
    }, 2000);

    const PROXIES = ["https://corsproxy.io/?", "https://api.allorigins.win/raw?url=", ""];
    let shakaPlayer = null, activeCookie = "", channelConfig = { links: {}, keyId: "", key: "" };
    const video = document.getElementById('video'), aiOverlay = document.getElementById('ai-overlay'), aiMessage = document.getElementById('ai-message'), aiAction = document.getElementById('ai-action');

    function setAIStatus(msg, isError = false, action = "") {
      if (!msg) { aiOverlay.style.display = 'none'; return; }
      aiOverlay.style.display = 'flex';
      aiMessage.innerText = msg;
      aiAction.innerText = action || (isError ? "HALTED" : "PROCESSING");
      if (isError) {
        document.querySelector('.ai-title').innerHTML = "⚠️ ERROR";
        document.querySelector('.ai-title').classList.add('ai-error');
      } else {
        document.querySelector('.ai-title').innerHTML = "SYSTEM ACTIVE";
        document.querySelector('.ai-title').classList.remove('ai-error');
      }
    }

    async function fetchRaw(url) {
      for (let p of PROXIES) {
        try {
          const res = await fetch(p + encodeURIComponent(url));
          if (res.ok) return await res.text();
        } catch (e) {}
      }
      return "";
    }

    async function loadChannel() {
      const urlParams = new URLSearchParams(window.location.search);
      const targetId = urlParams.get('id') || '174'; 
      setAIStatus(`Scanning Database for ID: ${targetId}...`);
      
      let rawJson = await fetchRaw(CHANNELS_DB_URL);
      if (!rawJson) return false;

      try {
        let data = JSON.parse(rawJson);
        let channels = Array.isArray(data) ? data : (data.channels || data.result || []);
        let found = channels.find(c => String(c.id) === targetId || String(c.channel_id) === targetId);

        if (found) {
          channelConfig.url = found.url || found.url1 || found.channel_url;
          channelConfig.keyId = found.keyId || found.keyid || "";
          channelConfig.key = found.key || found.keyid_key || "";
          return true;
        }
      } catch(e) {}
      return false;
    }

    async function startAutoHealingCycle() {
      shaka.polyfill.installAll();
      shakaPlayer = new shaka.Player(video);
      new shaka.ui.Overlay(shakaPlayer, document.getElementById('player-container'), video);
      
      shakaPlayer.configure({
        drm: { clearKeys: { [channelConfig.keyId]: channelConfig.key } },
        streaming: { lowLatencyMode: true }
      });

      shakaPlayer.getNetworkingEngine().registerRequestFilter((type, request) => {
        request.headers['Referer'] = 'https://www.jiotv.com/';
        request.headers['User-Agent'] = 'plaYtv/7.1.5 (Linux;Android 13)';
        if (activeCookie) {
          request.headers['Cookie'] = activeCookie;
          let cStr = activeCookie.includes('=') ? activeCookie : '__hdnea__=' + activeCookie;
          if (!request.uris[0].includes('__hdnea')) {
            request.uris[0] += (request.uris[0].includes('?') ? '&' : '?') + cStr;
          }
        }
      });

      while (true) {
        for (let i = 0; i < API_SOURCES.length; i++) {
          setAIStatus(`Hunting tokens from Node [${i+1}]...`, false, "EXTRACTING");
          let rawData = await fetchRaw(API_SOURCES[i]);
          let match = rawData.match(/(__hdnea__=[^"'\s&|<>\\]+)/i);
          
          if (match) {
            activeCookie = match[1].replace(/\\/g, '').trim();
            try {
              setAIStatus("Syncing stream with secure headers...", false, "WORKING");
              await shakaPlayer.load(channelConfig.url);
              setAIStatus(""); 
              return; 
            } catch (e) { setAIStatus(`Node [${i+1}] Handshake Failed`, true); }
          }
        }
        setAIStatus("All Nodes Exhausted. Retrying Cycle...", true, "REBOOTING");
        await new Promise(r => setTimeout(r, 4000));
      }
    }

    document.addEventListener("DOMContentLoaded", async () => {
      if (await loadChannel()) { await startAutoHealingCycle(); }
      else { setAIStatus("Channel coordinates not found in DB.", true, "FATAL ERROR"); }
    });
  </script>
</body></html>
