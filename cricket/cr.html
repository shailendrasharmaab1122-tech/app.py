<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>DevCoderZ | All-In-One Sports</title>
  <meta name="referrer" content="no-referrer">
  
  <script src="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.7.11/shaka-player.ui.min.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.7.11/controls.min.css">
  
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{background:#000;color:#fff;font-family:sans-serif;overflow:hidden;height:100vh;}
    .main-container { display: flex; flex-direction: column; height: 100%; }
    #player-container { width: 100%; aspect-ratio: 16/9; background: #000; position: relative; border-bottom: 2px solid #222; }
    video { width: 100%; height: 100%; }
    .channel-grid { flex: 1; display: grid; grid-template-columns: repeat(auto-fill, minmax(110px, 1fr)); gap: 12px; padding: 15px; overflow-y: auto; background: #0a0a0a; }
    .ch-card { background: #151515; border-radius: 10px; padding: 10px; text-align: center; cursor: pointer; border: 1px solid #222; transition: 0.2s; }
    .ch-card:hover { border-color: #00bfff; transform: scale(1.03); background: #1a1a1a; }
    .ch-card img { width: 45px; height: 45px; object-fit: contain; margin-bottom: 8px; border-radius: 4px; }
    .ch-card p { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; }
    #status-bar { position: absolute; top: 10px; left: 10px; z-index: 100; background: rgba(0,0,0,0.8); padding: 5px 12px; font-size: 11px; border-radius: 20px; color: #00FF00; font-family: monospace; border: 1px solid #333; pointer-events: none; }
  </style>
</head>
<body>

<div class="main-container">
  <div id="player-container" data-shaka-player-container>
    <div id="status-bar">SYSTEM READY</div>
    <video id="video" autoplay playsinline></video>
  </div>
  <div class="channel-grid" id="channel-list"></div>
</div>

<script>
    // API Sources (Base64 Encoded for Basic Security)
    const API_LIST = [
        "aHR0cHM6Ly9yYXcuZ2l0aHVidXNlcmNvbnRlbnQuY29tL1NodWJoYW1rdXIvVHYvcmVmcy9oZWFkcy9tYWluL2FwaTE=",
        "aHR0cHM6Ly9yYXcuZ2l0aHVidXNlcmNvbnRlbnQuY29tL1NodWJoYW1rdXIvVHYvcmVmcy9oZWFkcy9tYWluL2FwaTI=",
        "aHR0cHM6Ly9yYXcuZ2l0aHVidXNlcmNvbnRlbnQuY29tL1NodWJoYW1rdXIvVHYvcmVmcy9oZWFkcy9tYWluL2FwaTM="
    ];

    // Your Channel Data
    const myChannels = [
      { "name": "DD Sports", "url": "https://jiotvbpkmob.cdn.jio.com/bpk-tv/DD_Sports_BTS/output/index.mpd", "keyId": "0c1b139b9a955134a1efae8e44b63aac", "key": "00897bffd6997049787270797b8c3a17", "logo": "https://jiotv.catchup.cdn.jio.com/dare_images/images/DD_Sports.png" },
      { "name": "Eurosport HD", "url": "https://jiotvbpkmob.cdn.jio.com/bpk-tv/Dsports_HD_BTS/output/index.mpd", "keyId": "14fc31f9d832509c9f7cdd77e622e30b", "key": "a884515f4e1dd77f07aa100ccec13388", "logo": "https://jiotv.catchup.cdn.jio.com/dare_images/images/Dsports_HD.png" },
      { "name": "Star Sports Select 1", "url": "https://jiotvbpkmob.cdn.jio.com/bpk-tv/Star_Sports_Select_HD_1_BTS/output/index.mpd", "keyId": "c2c048e439d65316beeda6ef64d5d0f8", "key": "e2fdc132cbdee65501b845ce414fce39", "logo": "https://img.media.jio.com/tvpimages/96/65/302113_1749664252703_l_medium.jpg" },
      { "name": "Brave TV", "url": "https://jiotvbpkmob.cdn.jio.com/bpk-tv/Brave_TV_BTS/output/index.mpd", "keyId": "25cf2421cd9c57298e17d0d7b8084e8c", "key": "520507b4b9f496970f88c57f5aa59778", "logo": "https://jiotv.catchup.cdn.jio.com/dare_images/images/Brave_TV.png" }
    ];

    let player, ui, currentToken = "";
    const status = document.getElementById('status-bar');

    async function fetchToken() {
        status.innerText = "REFRESHING TOKEN...";
        for (let b64 of API_LIST) {
            try {
                const res = await fetch(atob(b64));
                const data = await res.text();
                const match = data.match(/(__hdnea__=[^"'\s&|<>\\]+)/i);
                if (match) return match[1];
            } catch(e) { console.warn("API Node Failed"); }
        }
        return "";
    }

    async function init() {
        shaka.polyfill.installAll();
        const video = document.getElementById('video');
        const container = document.getElementById('player-container');
        
        player = new shaka.Player(video);
        ui = new shaka.ui.Overlay(player, container, video);

        // Header Masking logic
        player.getNetworkingEngine().registerRequestFilter((type, request) => {
            request.headers['User-Agent'] = 'plaYtv/7.1.5 (Linux;Android 13) ExoPlayerLib/2.11.6';
            if (currentToken) {
                let sep = request.uris[0].includes('?') ? '&' : '?';
                request.uris[0] += sep + currentToken;
            }
        });

        renderGrid();
        playChannel(myChannels[0]);
    }

    async function playChannel(ch) {
        try {
            if (!currentToken) currentToken = await fetchToken();
            status.innerText = "LOADING: " + ch.name;

            player.configure({
                drm: { clearKeys: { [ch.keyId]: ch.key } },
                manifest: { dash: { ignoreMinBufferTime: true } }
            });

            await player.load(ch.url);
            status.innerText = "● LIVE | " + ch.name;
        } catch (e) {
            console.error(e);
            if (e.code === 4003 || e.code === 1002) { // Auth error codes
                currentToken = await fetchToken();
                if(currentToken) playChannel(ch);
            } else {
                status.innerText = "ERROR: " + e.code;
            }
        }
    }

    function renderGrid() {
        const list = document.getElementById('channel-list');
        myChannels.forEach(ch => {
            const card = document.createElement('div');
            card.className = 'ch-card';
            card.innerHTML = `<img src="${ch.logo}"><p>${ch.name}</p>`;
            card.onclick = () => playChannel(ch);
            list.appendChild(card);
        });
    }

    document.addEventListener('shaka-ui-loaded', init);
</script>
</body>
</html>
