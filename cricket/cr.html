<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DevCoderZ Arena | Premium Stream</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.3.5/shaka-player.compiled.debug.js"></script>

    <style>
        body { background-color: #020617; color: #e2e8f0; }
        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
        .active-card {
            background: rgba(249, 115, 22, 0.1);
            border-color: rgba(249, 115, 22, 0.5);
            box-shadow: 0 0 20px rgba(249, 115, 22, 0.1);
        }
        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: #020617; }
        ::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 10px; }
    </style>
</head>
<body class="font-sans antialiased selection:bg-orange-500/30">

    <div class="max-w-6xl mx-auto px-4 py-6 md:py-10">
        
        <header class="flex flex-col md:flex-row justify-between items-start md:items-center mb-8 gap-4">
            <div class="flex items-center gap-4">
                <div class="h-12 w-12 bg-gradient-to-br from-orange-500 to-orange-700 rounded-2xl flex items-center justify-center shadow-lg shadow-orange-900/20 ring-1 ring-orange-400/30">
                    <span class="text-xl font-black italic text-white">D</span>
                </div>
                <div>
                    <h1 class="text-2xl font-black uppercase tracking-tighter italic">DevCoderZ Arena</h1>
                    <p class="text-[10px] text-slate-500 font-bold uppercase tracking-[0.4em]">Premium Ad-Free Experience</p>
                </div>
            </div>
            <div class="glass-card px-4 py-2 rounded-2xl flex items-center gap-3">
                <span class="w-2 h-2 bg-green-500 rounded-full animate-pulse"></span>
                <span id="status-text" class="text-[10px] font-black text-slate-400 uppercase tracking-widest">System Online</span>
            </div>
        </header>

        <div class="relative w-full aspect-video bg-black rounded-3xl overflow-hidden shadow-2xl border border-white/10 mb-10 group">
            <video id="video-player" class="w-full h-full object-contain" autoplay playsinline></video>
            
            <div class="absolute top-4 left-4 flex gap-2 pointer-events-none">
                <div class="bg-orange-600 px-2 py-1 rounded text-[10px] font-black uppercase tracking-tighter shadow-lg text-white">LIVE HD</div>
                <div id="current-channel-name" class="bg-black/60 backdrop-blur-md px-2 py-1 rounded text-[10px] font-bold text-white/70 border border-white/10 uppercase tracking-tighter">
                    Select a Channel
                </div>
            </div>
        </div>

        <section>
            <div class="flex items-center justify-between mb-6 border-b border-white/5 pb-4">
                <h2 class="text-xs font-black uppercase tracking-widest text-slate-500 italic">Premium Channels</h2>
                <p class="text-[10px] font-bold text-orange-500 uppercase tracking-tighter">720P Optimized</p>
            </div>

            <div id="channel-grid" class="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-4 gap-4 md:gap-6">
                </div>
        </section>

        <footer class="mt-20 pt-8 border-t border-white/5 text-center">
            <p class="text-[9px] text-slate-700 font-bold uppercase tracking-[0.8em]">Handcrafted by DevCoderZ Infrastructure</p>
        </footer>
    </div>

    <script>
        // --- CHANNEL DATA ---
        // Yahan apne working links daal dena
        const CHANNELS = [
            { 
                id: 1, 
                name: "Star Sports 1 Hindi", 
                url: "https://your-m3u8-link.m3u8", 
                logo: "https://img.media.jio.com/tvpimages/13/81/302112_l_medium.jpg" 
            },
            { 
                id: 2, 
                name: "Star Sports Select 1", 
                url: "https://your-m3u8-link-2.m3u8", 
                logo: "https://img.media.jio.com/tvpimages/13/82/301994_l_medium.jpg" 
            },
            { 
                id: 3, 
                name: "Sports 18 HD", 
                url: "https://your-m3u8-link-3.m3u8", 
                logo: "https://img.media.jio.com/tvpimages/10/10/sports18_l_medium.jpg" 
            },
            { 
                id: 4, 
                name: "Star Sports 2 Hindi", 
                url: "https://your-m3u8-link-4.m3u8", 
                logo: "https://img.media.jio.com/tvpimages/57/17/302124_l_medium.jpg" 
            }
        ];

        let player;
        const videoElement = document.getElementById('video-player');
        const channelNameDisplay = document.getElementById('current-channel-name');

        // --- SHAKA PLAYER INIT ---
        async function initPlayer() {
            shaka.polyfill.installAll();
            if (shaka.Player.isBrowserSupported()) {
                player = new shaka.Player(videoElement);
                player.addEventListener('error', onErrorEvent);
                
                // Load First Channel by default
                loadChannel(CHANNELS[0]);
                renderChannels();
            } else {
                alert('Browser not supported!');
            }
        }

        async function loadChannel(channel) {
            try {
                await player.load(channel.url);
                channelNameDisplay.innerText = channel.name;
                // Highlight active card
                renderChannels(channel.id);
            } catch (e) {
                console.error('Error loading stream', e);
            }
        }

        function onErrorEvent(event) {
            console.error('Error code', event.detail.code, 'object', event.detail);
        }

        // --- RENDER GRID ---
        function renderChannels(activeId = 1) {
            const grid = document.getElementById('channel-grid');
            grid.innerHTML = '';

            CHANNELS.forEach(ch => {
                const isActive = ch.id === activeId;
                const button = document.createElement('button');
                button.className = `p-4 rounded-[2rem] border text-left transition-all duration-300 group ${isActive ? 'active-card' : 'glass-card hover:bg-white/5'}`;
                
                button.innerHTML = `
                    <div class="aspect-video rounded-2xl overflow-hidden bg-black/40 mb-4 flex items-center justify-center p-4 relative">
                        <img src="${ch.logo}" alt="${ch.name}" class="w-full h-full object-contain transition-transform group-hover:scale-110">
                        ${isActive ? `
                            <div class="absolute inset-0 bg-orange-600/10 backdrop-blur-[1px] flex items-center justify-center">
                                <div class="flex gap-1 h-3 items-end">
                                    <div class="w-1 bg-orange-500 animate-bounce h-2"></div>
                                    <div class="w-1 bg-orange-500 animate-bounce h-3" style="animation-delay: 0.1s"></div>
                                    <div class="w-1 bg-orange-500 animate-bounce h-2" style="animation-delay: 0.2s"></div>
                                </div>
                            </div>
                        ` : ''}
                    </div>
                    <h3 class="text-[11px] font-bold truncate ${isActive ? 'text-orange-500' : 'text-slate-400'}">${ch.name}</h3>
                    <p class="text-[8px] text-slate-600 font-black mt-1 uppercase tracking-tighter italic">Auto-Bitrate • HD</p>
                `;

                button.onclick = () => loadChannel(ch);
                grid.appendChild(button);
            });
        }

        document.addEventListener('DOMContentLoaded', initPlayer);
    </script>
</body>
</html>
