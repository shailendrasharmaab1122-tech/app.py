<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Batches & Live Classes</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-color: #0b0f19;
            --card-bg: #151c2c;
            --text-color: #f3f4f6;
            --text-secondary: #9ca3af;
            --live-color: #ff3b30;
            --primary-blue: #2563eb;
            --border-color: #1e293b;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            padding: 20px;
            min-height: 100vh;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            margin-bottom: 30px;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 15px;
        }

        header h1 {
            font-size: 24px;
            font-weight: 700;
        }

        header p {
            color: var(--text-secondary);
            font-size: 14px;
            margin-top: 5px;
        }

        /* Grid Layout for Batch/Subject Cards */
        .batches-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
        }

        .batch-card {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 20px;
            position: relative;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            transition: transform 0.2s ease, border-color 0.2s ease;
        }

        .batch-card:hover {
            transform: translateY(-2px);
            border-color: #334155;
        }

        /* Container specifically reserved above teacher's name */
        .live-status-container {
            min-height: 26px; /* Prevents layout shifting when live badge shows up */
            margin-bottom: 8px;
            display: flex;
            align-items: center;
        }

        /* ================= LIVE BADGE STYLE ================= */
        .live-badge {
            background: rgba(255, 59, 48, 0.15);
            color: var(--live-color);
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 0.5px;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            border: 1px solid rgba(255, 59, 48, 0.25);
        }

        .pulse-dot {
            width: 7px;
            height: 7px;
            background-color: var(--live-color);
            border-radius: 50%;
            animation: livePulse 1.2s infinite ease-in-out;
        }

        @keyframes livePulse {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.4); opacity: 0.4; }
            100% { transform: scale(1); opacity: 1; }
        }

        /* Static/Recorded Class State placeholder */
        .recorded-badge {
            color: var(--text-secondary);
            font-size: 12px;
            font-weight: 500;
        }

        /* Details */
        .teacher-name {
            font-size: 16px;
            font-weight: 600;
            color: #ffffff;
            margin-bottom: 4px;
        }

        .topic-title {
            font-size: 14px;
            color: var(--text-secondary);
            margin-bottom: 15px;
            line-height: 1.4;
        }

        /* Watch / Join Button */
        .action-btn {
            width: 100%;
            padding: 10px;
            background: var(--primary-blue);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            text-align: center;
            text-decoration: none;
            display: block;
            transition: background 0.2s ease;
        }

        .action-btn:hover {
            background: #1d4ed8;
        }

        /* Live state design for the button */
        .action-btn.live-btn {
            background: var(--live-color);
        }
        .action-btn.live-btn:hover {
            background: #e02e24;
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>My Dashboard</h1>
        <p>Select a lecture to start studying</p>
    </header>

    <div class="batches-grid" id="batchesContainer">
        </div>
</div>

<script>
    // 1. DATA: Aapka dynamic backend data ya API response yahan aayega
    // Jis class me isLive: true hoga, wahan automatically Teachers ke upar Badge show ho jayega.
    const lecturesData = [
        {
            id: "class_01",
            teacherName: "Alakh Pandey Sir",
            topic: "Physics: Kinematics - Lecture 04",
            isLive: true, 
            playerUrl: "player.html?id=6a0a03fe0c69de2d061ed0c6" // Aapka main player page
        },
        {
            id: "class_02",
            teacherName: "Dear Sir",
            topic: "Mathematics: Matrices & Determinants",
            isLive: false,
            playerUrl: "player.html?id=recorded_math_02"
        },
        {
            id: "class_03",
            teacherName: "MSM Sir",
            topic: "Chemistry: Chemical Bonding L-02",
            isLive: true,
            playerUrl: "player.html?id=6a0a03fe0c69de2d061ed0c6"
        }
    ];

    // 2. RENDER LOGIC: JavaScript se components dynamically generate ho rhe hain
    function renderBatches() {
        const container = document.getElementById('batchesContainer');
        container.innerHTML = ''; // purana content clear karne ke liye

        lecturesData.forEach(lecture => {
            // Card Structure Element
            const card = document.createElement('div');
            card.className = 'batch-card';

            // Top Status Area (Teachers Name Ke Theek Upar)
            let liveStatusHtml = '';
            let buttonClass = 'action-btn';
            let buttonText = 'Watch Recorded';

            if (lecture.isLive) {
                // Agar class live h, toh live badge append karo
                liveStatusHtml = `
                    <div class="live-badge">
                        <span class="pulse-dot"></span> LIVE CLASS
                    </div>
                `;
                buttonClass = 'action-btn live-btn';
                buttonText = 'Join Live Class';
            } else {
                // Optional placeholder jab live na ho
                liveStatusHtml = `<span class="recorded-badge">Recorded Class</span>`;
            }

            // Poora Card Data Framework
            card.innerHTML = `
                <div>
                    <div class="live-status-container">
                        ${liveStatusHtml}
                    </div>
                    <div class="teacher-name">${lecture.teacherName}</div>
                    <div class="topic-title">${lecture.topic}</div>
                </div>
                <a href="${lecture.playerUrl}" class="${buttonClass}">${buttonText}</a>
            `;

            container.appendChild(card);
        });
    }

    // Initialize rendering when window loads
    window.onload = renderBatches;
</script>

</body>
</html>
