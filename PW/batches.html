<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Batches - The DevCoderZ</title>
    
    <style>
        
        .header { background: linear-gradient(135deg, #4f46e5, #6366f1); color: white; padding: 16px 20px; font-weight: 800; display: flex; justify-content: space-between; align-items: center; }
        .live-row { display: flex; gap: 12px; overflow-x: auto; padding: 10px 0; scroll-behavior: smooth; }
        .live-card { min-width: 260px; max-width: 260px; background: #fff; border-radius: 14px; border: 1px solid #ececec; cursor: pointer; }
        .live-thumb { width: 100%; aspect-ratio: 16/9; background: #f3f4f6; overflow: hidden; border-radius: 14px 14px 0 0; }
        .live-thumb img { width: 100%; height: 100%; object-fit: cover; }
        .live-body { padding: 12px; }
        .live-badge { background: #22c55e; color: white; padding: 2px 8px; border-radius: 999px; font-size: 10px; position: absolute; top: 10px; right: 10px; }
    </style>
</head>
<body>

    <!-- Header Update -->
    <header class="header">
        <div>The DevCoderZ</div>
        <span>DC - PW</span>
    </header>

    <div id="root" style="padding: 20px;">
        <!-- Live Classes Section -->
        <h3>Live Classes</h3>
        <div id="liveClassesContainer" class="live-row">
  
        </div>

        <!-- Subjects Section -->
        <h3 style="margin-top: 30px;">Subjects</h3>
        <div id="subjectsContainer" class="subject_card_wrapper-P5tf9Z">
            <!-- Dynamic Data Yahan Aayega -->
        </div>
    </div>

    <script>
        const BATCH_ID = "698ad3519549b300a5e1cc6a";

        // Data Fetching Function
        async function loadData() {
            try {
                const response = await fetch(`/api/PW/all-batches-api3?batch_id=${BATCH_ID}`);
                const data = await response.json();

                // 1. Render Live Classes
                const liveContainer = document.getElementById('liveClassesContainer');
                if (data.liveClasses) {
                    liveContainer.innerHTML = data.liveClasses.map(live => `
                        <div class="live-card">
                            <div class="live-thumb">
                                <img src="${live.previewImageUrl || 'https://via.placeholder.com/285x160'}" alt="Class">
                                <div class="live-badge">LIVE</div>
                            </div>
                            <div class="live-body">
                                <div style="font-size:12px; color:#4f46e5;">${live.subjectId?.name || 'Class'}</div>
                                <div style="font-size:14px; font-weight:600;">${live.topic}</div>
                            </div>
                        </div>
                    `).join('');
                }

                // 2. Render Subjects
                const subContainer = document.getElementById('subjectsContainer');
                if (data.subjects) {
                    subContainer.innerHTML = data.subjects.map(sub => `
                        <div class="subject_card-WgK2V0" onclick="location.href='/pwch/?batch_id=${BATCH_ID}&subject_id=${sub._id}&subject=${sub.name}'">
                            <div class="_class-title_mu3oc_14">${sub.name}</div>
                        </div>
                    `).join('');
                }
            } catch (err) {
                console.error("Error loading data:", err);
            }
        }

        loadData();
    </script>
</body>
</html>
