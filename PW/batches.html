<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Subjects - DevCoderZ</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
      body { background: #f8fafc; color: #0f172a; }
      .glow-text { text-shadow: 0 0 8px rgba(239,68,68,0.3); }
    </style>
</head>
<body class="min-h-screen flex flex-col pb-16">

    <nav class="h-16 bg-[#4f46e5] flex items-center justify-between px-6 shadow-md sticky top-0 z-50">
        <button onclick="history.back()" class="bg-white/20 hover:bg-white/30 text-white text-xs font-bold py-2 px-4 rounded-lg transition-all flex items-center gap-1">
            ← Back
        </button>
        <div class="text-xs text-white/90 bg-white/10 px-3 py-1.5 rounded-full border border-white/20 font-medium">
            Subject Channel
        </div>
    </nav>

    <main class="flex-1 max-w-7xl w-full mx-auto p-4 md:p-6">
        <div class="mb-6">
            <h2 class="text-xl font-extrabold text-slate-800 tracking-tight">Select Subject</h2>
        </div>

        <div id="subjectsContainer" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6">
            <div class="bg-white p-5 border border-slate-200 rounded-2xl animate-pulse flex flex-col gap-3 shadow-sm h-32">
                <div class="h-5 bg-slate-200 rounded w-2/3"></div>
                <div class="h-3 bg-slate-200 rounded w-1/2 mt-auto"></div>
            </div>
        </div>
    </main>

    <footer class="h-12 border-t border-slate-200 bg-white text-center text-xs text-slate-400 flex items-center justify-center gap-1 fixed bottom-0 inset-x-0 z-50 shadow-inner">
        <span>© 2026 The DevCoderz. All Rights Reserved.</span>
        <span>•</span>
        <span>Developed by <span class="text-red-500 font-bold tracking-wide glow-text">Devansh Sharma</span></span>
    </footer>

    <script>
        const params = new URLSearchParams(window.location.search);
        const batchId = params.get('batch_id');

        async function loadSubjects() {
            const container = document.getElementById('subjectsContainer');
            if(!batchId) {
                container.innerHTML = `<div class="col-span-full text-center text-red-500 py-12 text-sm">❌ Error: Missing Batch ID configuration.</div>`;
                return;
            }

            try {
                const res = await fetch(`https://eduvibe-pw-api.wasmer.app/batches.php?batch_id=${batchId}`);
                const data = await res.json();
                
                const subjects = data.subjects || data.data || [];

                if(subjects.length === 0) {
                    container.innerHTML = `<div class="col-span-full text-center text-slate-400 py-12 text-sm">⚠️ No premium subjects assigned to this batch.</div>`;
                    return;
                }

                container.innerHTML = subjects.map(sub => `
                    <div class="bg-white border border-slate-200 rounded-2xl p-5 shadow-sm hover:shadow-md border-t-4 border-t-[#4f46e5] transition-all cursor-pointer flex flex-col justify-between h-36 group" onclick="openSubject('${sub._id}')">
                        <h3 class="text-sm font-bold text-slate-800 tracking-tight leading-snug group-hover:text-[#4f46e5] transition-colors line-clamp-2">${sub.name}</h3>
                        <div class="flex items-center justify-between text-[11px] font-medium text-slate-400 mt-4">
                            <span>Type: ${sub.type || 'Core'}</span>
                            <span class="text-[#4f46e5] font-bold group-hover:underline">Open View →</span>
                        </div>
                    </div>
                `).join('');
            } catch (e) {
                container.innerHTML = `<div class="col-span-full text-center text-red-500 py-12 text-sm">❌ Failed to fetch parameters. Core server down.</div>`;
            }
        }

        function openSubject(subId) {
            window.location.href = `./chapters.html?batch_id=${batchId}&subject_id=${subId}`;
        }

        loadSubjects();
    </script>
</body>
</html>
