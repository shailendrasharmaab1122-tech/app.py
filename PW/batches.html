<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The DevCoderZ - Batches</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #f5f6f8; font-family: sans-serif; padding-bottom: 90px; }
        .tab-btn { flex: 1; padding: 10px; font-weight: 700; cursor: pointer; border-bottom: 2px solid transparent; font-size: 13px; text-align: center; }
        .active-tab { border-bottom: 2px solid #4f46e5; color: #4f46e5; }
        .subject_card { background: #fff; border-radius: 12px; padding: 12px; display: flex; align-items: center; gap: 12px; cursor: pointer; box-shadow: 0 2px 5px rgba(0,0,0,0.05); border: 1px solid #eaeaea; }
        .subject-title { font-size: 14px; font-weight: 700; color: #111; }
        .header-brand { background: linear-gradient(135deg, #4f46e5, #6366f1); color: white; padding: 16px; text-align: center; font-size: 20px; font-weight: 800; margin-bottom: 20px; display: flex; align-items: center; justify-content: center; position: relative; }
        .footer { position: fixed; bottom: 0; width: 100%; background: #4f46e5; color: white; text-align: center; padding: 10px; font-size: 12px; font-weight: 600; }
        .back-btn { position: absolute; left: 16px; cursor: pointer; font-size: 24px; }
    </style>
</head>
<body>

    <div class="header-brand">
        <span class="back-btn" onclick="history.back()">←</span>
        The DevCoderZ
    </div>

    <div class="max-w-md mx-auto p-4">
        <h1 id="batchTitle" class="text-2xl font-extrabold text-indigo-600 mb-4">Loading...</h1>

        <div class="flex border-b border-gray-200 mb-6">
            <div id="tab1" class="tab-btn active-tab" onclick="switchTab('subjects')">Subjects</div>
            <div id="tab2" class="tab-btn" onclick="switchTab('schedule')">Live Classes</div>
            <div id="tab3" class="tab-btn" onclick="switchTab('announcements')">Announcements</div>
        </div>

        <div id="subjectsView"><div id="subjectsContainer" class="flex flex-col gap-3"></div></div>
        <div id="scheduleView" class="hidden"><div id="liveClassesContainer" class="flex flex-col gap-3"></div></div>
        <div id="announcementsView" class="hidden flex flex-col gap-4"></div>
    </div>

    <div id="timerModal" class="fixed inset-0 bg-black bg-opacity-70 hidden z-50 flex items-center justify-center p-4">
        <div class="bg-white p-6 rounded-xl w-80 text-center">
            <h2 class="text-lg font-bold text-red-600 mb-2">Upcoming Class</h2>
            <p class="text-sm text-gray-600 mb-4" id="timerText"></p>
            <button onclick="document.getElementById('timerModal').classList.add('hidden')" class="w-full bg-gray-200 py-2 rounded-lg font-bold">Close</button>
        </div>
    </div>

    <div id="telegramModal" class="fixed inset-0 bg-black bg-opacity-80 hidden z-[100] flex items-center justify-center p-4">
        <div class="bg-white p-6 rounded-2xl w-full max-w-sm text-center">
            <h2 class="text-2xl font-black text-indigo-600 mb-2">The DevCoderZ</h2>
            <p class="text-sm text-gray-600 mb-6">Join our official Telegram community for exclusive updates, study materials, and direct support!</p>
            <a href="https://t.me/+8tZSJ5FyTXVjM2M1" target="_blank" class="block w-full bg-indigo-600 text-white py-3 rounded-xl font-bold mb-3">Join Telegram</a>
            <button onclick="document.getElementById('telegramModal').classList.add('hidden')" class="text-gray-400 text-sm font-bold">Maybe later</button>
        </div>
    </div>

    <div class="footer">Developed by Devansh Sharma</div>

    <script>
        window.onload = () => setTimeout(() => document.getElementById('telegramModal').classList.remove('hidden'), 1000);
        const urlParams = new URLSearchParams(window.location.search);
        const batchId = urlParams.get("batch_id");

        function switchTab(tab) {
            document.getElementById('subjectsView').classList.toggle('hidden', tab !== 'subjects');
            document.getElementById('scheduleView').classList.toggle('hidden', tab !== 'schedule');
            document.getElementById('announcementsView').classList.toggle('hidden', tab !== 'announcements');
            document.getElementById('tab1').classList.toggle('active-tab', tab === 'subjects');
            document.getElementById('tab2').classList.toggle('active-tab', tab === 'schedule');
            document.getElementById('tab3').classList.toggle('active-tab', tab === 'announcements');
        }

        if (batchId) {
            fetch(`https://learnbyakp.onrender.com/api/penpencil/v1/batches/${batchId}/todays-schedule`)
                .then(res => res.json())
                .then(data => renderClasses(data.data || []));

            fetch(`https://devcoderz-player.vercel.app/api/all-batches-api2?batch_id=${encodeURIComponent(batchId)}`)
                .then(res => res.json())
                .then(data => {
                    const res = data.data || data;
                    document.getElementById("batchTitle").innerText = res.name || "Batch Details";
                    renderSubjects(res.subjects || []);
                });

            fetch(`https://learnbyakp.onrender.com/api/penpencil/v1/batches/${batchId}/announcement`)
                .then(res => res.json())
                .then(data => renderAnnouncements(data.data || []));
        }

        function playItem(item) {
            if (item.homeworkIds && item.homeworkIds.length > 0) {
                const note = item.homeworkIds[0];
                if (note.attachmentIds && note.attachmentIds.length > 0) {
                    window.location.href = `https://thedevcoderz-pw.pages.dev/player2?video_id=${note.attachmentIds[0].key}&title=${encodeURIComponent(note.topic)}&type=pdf`;
                    return;
                }
            }
            const now = new Date();
            const start = new Date(item.startTime);
            const end = new Date(item.endTime);
            if (now > end) {
                window.location.href = `https://thedevcoderz-pw.pages.dev/player2?video_id=${item._id}&title=${encodeURIComponent(item.topic)}`;
            } else if (now < start) {
                const diff = Math.floor((start - now) / 1000);
                const hrs = Math.floor(diff / 3600);
                const mins = Math.floor((diff % 3600) / 60);
                document.getElementById('timerText').innerText = `Class starts in ${hrs}h ${mins}m`;
                document.getElementById('timerModal').classList.remove('hidden');
            } else {
                window.location.href = `https://thedevcoderz-pw.pages.dev/player3?video_id=${item._id}&video_type=live`;
            }
        }

        function renderAnnouncements(announcements) {
            const container = document.getElementById("announcementsView");
            container.innerHTML = announcements.map(item => {
                let imgHtml = '';
                if (item.attachment && item.attachment.baseUrl && item.attachment.key) {
                    imgHtml = `<img src="${item.attachment.baseUrl}${item.attachment.key}" class="rounded-lg mb-3 w-full object-cover">`;
                }
                return `
                <div class="bg-white p-4 rounded-xl shadow-sm border border-indigo-100">
                    ${imgHtml}
                    <h3 class="font-bold text-indigo-600 text-sm mb-1">${item.heading || 'Announcement'}</h3>
                    <p class="text-xs text-gray-600 leading-relaxed">${item.announcement.replace(/(https?:\/\/[^\s]+)/g, '<a href="$1" target="_blank" class="text-blue-500 underline">$1</a>')}</p>
                </div>`;
            }).join('');
        }

        function renderClasses(classes) {
            const container = document.getElementById("liveClassesContainer");
            container.innerHTML = classes.length ? classes.map(item => {
                const now = new Date();
                const start = new Date(item.startTime);
                const end = new Date(item.endTime);
                const img = item.videoDetails ? item.videoDetails.image : '';
                let status = now > end ? "Ended" : (now >= start ? "LIVE NOW" : "Upcoming");
                let color = now > end ? "text-red-500" : (now >= start ? "text-green-500 animate-pulse" : "text-blue-500");

                return `
                <div class="bg-white p-3 rounded-xl shadow-sm border border-indigo-100 flex gap-4 cursor-pointer" onclick='playItem(${JSON.stringify(item).replace(/'/g, "&#39;")})'>
                    ${img ? `<img src="${img}" class="w-28 h-20 rounded-lg object-cover">` : ''}
                    <div class="flex flex-col justify-center">
                        <div class="text-sm font-bold text-slate-800">${item.topic}</div>
                        <div class="text-[10px] font-bold ${color}">${status}</div>
                        <div class="text-[10px] text-slate-400 mt-1">${start.toLocaleTimeString()}</div>
                    </div>
                </div>`;
            }).join('') : '<p class="text-slate-400 text-sm p-4">No classes today.</p>';
        }

        function renderSubjects(subjects) {
            document.getElementById("subjectsContainer").innerHTML = subjects.map(sub => {
                const img = sub.image || (sub.imageId?.baseUrl ? sub.imageId.baseUrl + sub.imageId.key : 'https://static.pw.live/react-batches/assets/svg/subjects/defaultSubject.svg');
                return `
                    <div class="subject_card" onclick='location.href="chapters.html?batch_id=${batchId}&subject_id=${sub._id}"'>
                        <img src="${img}" class="w-10 h-10 object-contain" onerror="this.src='https://static.pw.live/react-batches/assets/svg/subjects/defaultSubject.svg'">
                        <div class="subject-title">${sub.subject || sub.name}</div>
                    </div>`;
            }).join('');
        }
    </script>
</body>
</html>
