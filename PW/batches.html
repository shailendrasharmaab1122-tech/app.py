<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Subjects - DevCoderZ</title>
    <style>
        :root { --primary: #4f46e5; }
        body { font-family: sans-serif; background: #f1f5f9; padding: 20px; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 15px; }
        .card { background: white; padding: 20px; border-radius: 15px; cursor: pointer; box-shadow: 0 2px 5px rgba(0,0,0,0.1); display: flex; align-items: center; gap: 15px; }
        .card img { width: 50px; height: 50px; border-radius: 10px; }
        .card h3 { font-size: 16px; margin: 0; color: #333; }
    </style>
</head>
<body>

    <div class="header">
        <button onclick="location.href='./index.html'">← Back</button>
        <h2 style="color:var(--primary)">DevCoderZ Subjects</h2>
    </div>

    <div id="subjectGrid" class="grid">Loading...</div>

    <script>
        const params = new URLSearchParams(window.location.search);
        const batchId = params.get('batch_id');

        async function getSubjects() {
            try {
                const res = await fetch(`https://eduvibe-pw-api.wasmer.app/batch.php?batch_id=${batchId}`);
                const data = await res.json();
                
                const grid = document.getElementById('subjectGrid');
                grid.innerHTML = data.subjects.map(s => `
                    <div class="card" onclick="openLectures('${s._id}')">
                        <img src="${s.imageId?.baseUrl + s.imageId?.key || 'https://via.placeholder.com/50'}">
                        <div>
                            <h3>${s.subject}</h3>
                            <small>${s.lectureCount} Lectures</small>
                        </div>
                    </div>
                `).join('');
            } catch(e) {
                document.getElementById('subjectGrid').innerText = "Error loading subjects.";
            }
        }

        function openLectures(subjectId) {
            // FIXED: Using ./ to stay in the /PW/ folder
            window.location.href = `./lectures.html?batch_id=${batchId}&subject_id=${subjectId}`;
        }

        if(batchId) getSubjects();
    </script>
</body>
</html>
