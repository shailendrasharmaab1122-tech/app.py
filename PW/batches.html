<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Subjects - DevCoderZ</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
      body { background: #f8fafc; color: #0f172a; }
      .glow-text { text-shadow: 0 0 8px rgba(239,68,68,0.3); }
      
      /* Animation for the live pulse dot */
      @keyframes livePulse {
          0% { transform: scale(1); opacity: 1; }
          50% { transform: scale(1.4); opacity: 0.4; }
          100% { transform: scale(1); opacity: 1; }
      }
      .animate-pulse-dot {
          animation: livePulse 1.2s infinite ease-in-out;
      }
    </style>
</head>
<body class="min-h-screen flex flex-col pb-16">

    <nav class="h-16 bg-[#4f46e5] flex items-center justify-between px-6 shadow-md sticky top-0 z-50">
        <button onclick="window.location.href='./index.html'" class="bg-white/20 hover:bg-white/30 text-white text-xs font-bold py-2 px-4 rounded-lg transition-all flex items-center gap-1">
            ← Home
        </button>
        <div class="text-xs text-white/90 bg-white/10 px-3 py-1.5 rounded-full border border-white/20 font-medium">
            Subject Channels
        </div>
    </nav>

    <main class="flex-1 max-w-6xl w-full mx-auto p-4 md:p-6">
        <div class="mb-6">
            <h2 class="text-xl font-extrabold text-slate-800 tracking-tight">Select Subject Channel</h2>
            <p id="statusText" class="text-xs text-slate-400">Access video archives by selecting a content branch stream.</p>
        </div>

        <div id="subjectsContainer" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4">
            <div class="bg-white p-5 border border-slate-200 rounded-2xl animate-pulse h-28 shadow-sm"></div>
            <div class="bg-white p-5 border border-slate-200 rounded-2xl animate-pulse h-28 shadow-sm hidden sm:block"></div>
            <div class="bg-white p-5 border border-slate-200 rounded-2xl animate-pulse h-28 shadow-sm hidden lg:block"></div>
        </div>
    </main>

    <footer class="h-12 border-t border-slate-200 bg-white text-center text-xs text-slate-400 flex items-center justify-center gap-1 fixed bottom-0 inset-x-0 z-50 shadow-inner">
        <span>© 2026 The DevCoderz. All Rights Reserved.</span>
        <span>•</span>
        <span>Developed by <span class="text-red-500 font-bold tracking-wide glow-text">Devansh Sharma</span></span>
    </footer>

    <script>
        const params = new URLSearchParams(window.location.search);
        const bId = params.get('batch_id');

        if (!bId) {
            window.location.href = "./index.html";
        }

        async function loadSubjects() {
            const container = document.getElementById('subjectsContainer');
            const statusText = document.getElementById('statusText');

            const targetApi = `https://devcoderz.vercel.app/api/PW/all-batches-api2.js?batch_id=${bId}`;

            try {
                statusText.innerText = "Synchronizing stream tokens...";
                const res = await fetch(targetApi);
                if (!res.ok) throw new Error("API handshake failed");

                const resData = await res.json();

                let subjects = [];
                if (Array.isArray(resData)) {
                    subjects = resData;
                } else if (resData.subjects) {
                    subjects = resData.subjects;
                } else if (resData.data && Array.isArray(resData.data)) {
                    subjects = resData.data;
                } else if (resData.data?.subjects) {
                    subjects = resData.data.subjects;
                }

                if (subjects.length === 0) {
                    container.innerHTML = `<div class="col-span-full text-center text-slate-400 py-12 text-sm">⚠️ No premium streaming feeds listed inside this channel matrix.</div>`;
                    statusText.innerText = "Vault is empty.";
                    return;
                }

                statusText.innerText = "Premium Vault Decrypted Successfully.";
                container.innerHTML = subjects.map(s => {

                    const subjectName = s.subject || s.subjectName || s.subject_name || s.name || "Premium Subject Channel";

                    let facultyName = "Expert Mentor";
                    if (s.teacherIds && Array.isArray(s.teacherIds) && s.teacherIds.length > 0) {
                        facultyName = s.teacherIds.map(t => {
                            const first = t.firstName || '';
                            const last = t.lastName || '';
                            return `${first} ${last}`.trim();
                        }).filter(Boolean).join(', ');
                    } else if (s.teacherName || s.teacher_name || s.teacher) {
                        facultyName = s.teacherName || s.teacher_name || s.teacher;
                    }

                    const targetId = s._id || s.id || s.subjectId || s.subject_id;
                    const totalLectures = s.lectureCount !== undefined ? s.lectureCount : 0;

                    // ================= LIVE DATA EXTRACTION LOGIC =================
                    // API response me live check karne ke alag-alag patterns handle kiye hain
                    const isLiveClass = s.isLive || s.live || (s.live_class && s.live_class === true) || false;
                    
                    // Live video ID extraction (Agar koi live link ya token direct aa raha ho)
                    const liveVideoId = s.liveVideoId || s.videoId || s.live_id || "6a0a03fe0c69de2d061ed0c6"; 

                    // Live badge template (Jo Teacher ke name ke upar render hoga)
                    let liveOptionHtml = "";
                    let clickAction = `openChapters('${targetId}')`;
                    let cardBorder = "border-l-[#4f46e5]";
                    let enterText = "Enter Vault →";

                    if (isLiveClass) {
                        liveOptionHtml = `
                            <div class="inline-flex items-center gap-1.5 bg-red-50 text-red-600 border border-red-200 text-[10px] font-extrabold px-2 py-0.5 rounded-full uppercase tracking-wider mb-1 w-max">
                                <span class="w-1.5 h-1.5 bg-red-600 rounded-full animate-pulse-dot"></span>
                                Live Class
                            </div>
                        `;
                        // Jab live class active ho, toh chapters page ke bajaye direct aapke player par bypass karega
                        clickAction = `openLivePlayer('${liveVideoId}')`;
                        cardBorder = "border-l-red-500 ring-2 ring-red-500/10";
                        enterText = "Join Live 🔴";
                    }

                    return `
                    <div class="bg-white border border-slate-200 rounded-2xl p-5 shadow-sm hover:shadow-md transition-all duration-150 cursor-pointer border-l-4 ${cardBorder} flex flex-col justify-between h-36 group" onclick="${clickAction}">
                        <div>
                            <h3 class="text-sm font-bold text-slate-800 tracking-tight leading-snug group-hover:text-[#4f46e5] transition-colors truncate" title="${subjectName}">${subjectName}</h3>
                            
                            <div class="mt-1 flex flex-col">
                                ${liveOptionHtml}
                                <p class="text-[11px] text-slate-400 font-medium truncate">Teacher: ${facultyName}</p>
                            </div>
                        </div>
                        <div class="flex items-center justify-between border-t border-slate-50 pt-2 mt-2 text-[11px] font-bold text-[#4f46e5] group-hover:text-red-500 transition-colors">
                            <span class="text-slate-400 font-medium">Lectures: ${totalLectures}</span>
                            <span>${enterText}</span>
                        </div>
                    </div>
                    `;
                }).join('');

            } catch (e) {
                console.error("Layout crash log:", e);
                container.innerHTML = `<div class="col-span-full text-center py-12 text-sm text-red-500">❌ Failed to build subject nodes.</div>`;
            }
        }

        function openChapters(subjectId) {
            if(!subjectId || subjectId === 'undefined') {
                alert("Error: Subject Stream Mapping ID is empty.");
                return;
            }
            window.location.href = "./chapters.html?batch_id=" + bId + "&subject_id=" + subjectId;
        }

        // Live player bypass route 
        function openLivePlayer(videoId) {
            window.location.href = "./player.html?id=" + videoId;
        }

        if(bId) loadSubjects();
    </script>
</body>
</html>
