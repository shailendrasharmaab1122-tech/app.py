<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Subjects - DevCoderZ</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
      body { background: #f8fafc; color: #0f172a; }
      .glow-text { text-shadow: 0 0 8px rgba(239,68,68,0.3); }
    </style>
</head>
<body class="min-h-screen flex flex-col pb-16">

    <nav class="h-16 bg-[#4f46e5] flex items-center justify-between px-6 shadow-md sticky top-0 z-50">
        <button onclick="window.location.href='./index.html'" class="bg-white/20 hover:bg-white/30 text-white text-xs font-bold py-2 px-4 rounded-lg transition-all flex items-center gap-1">
            ← Home
        </button>
        <div class="text-xs text-white/90 bg-white/10 px-3 py-1.5 rounded-full border border-white/20 font-medium">
            Batch Channels
        </div>
    </nav>

    <main class="max-w-6xl w-full mx-auto p-4 md:p-6 flex-1">
        <div class="mb-6 flex flex-col sm:flex-row sm:items-center justify-between gap-2">
            <div>
                <h2 class="text-xl font-extrabold text-slate-800 tracking-tight">Select Subject Channel</h2>
                <p id="statusText" class="text-xs text-slate-400">Loading your streaming dashboard vault...</p>
            </div>
        </div>

        <div id="subjectsContainer">
            <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4">
                <div class="bg-white p-5 border border-slate-200 rounded-2xl animate-pulse h-28 shadow-sm"></div>
                <div class="bg-white p-5 border border-slate-200 rounded-2xl animate-pulse h-28 shadow-sm hidden sm:block"></div>
                <div class="bg-white p-5 border border-slate-200 rounded-2xl animate-pulse h-28 shadow-sm hidden lg:block"></div>
            </div>
        </div>
    </main>

    <footer class="h-12 border-t border-slate-200 bg-white text-center text-xs text-slate-400 flex items-center justify-center gap-1 fixed bottom-0 inset-x-0 z-50 shadow-inner">
        <span>© 2026 The DevCoderz. All Rights Reserved.</span>
        <span>•</span>
        <span>Developed by <span class="text-red-500 font-bold tracking-wide glow-text">Devansh Sharma</span></span>
    </footer>

    <script>
        const params = new URLSearchParams(window.location.search);
        const bId = params.get('batch_id');

        if (!bId) {
            window.location.href = "./index.html";
        }

        // Tumhara correct backend endpoint query parameter ke sath
        const targetApi = `https://devcoderz.vercel.app/api/PW/all-batches-api2.js?batch_id=${bId}`;

        const proxies = [
            { name: "Direct Cloud Engine", url: targetApi, type: "direct" },
            { name: "Proxy Layer Alpha", url: `https://api.allorigins.win/get?url=${encodeURIComponent(targetApi)}`, type: "allorigins" },
            { name: "Backup CDN Cluster", url: `https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(targetApi)}`, type: "codetabs" }
        ];

        async function loadHTMLSubjects(index = 0) {
            const container = document.getElementById('subjectsContainer');
            const statusText = document.getElementById('statusText');

            if (index >= proxies.length) {
                container.innerHTML = `
                    <div class="text-center py-12 max-w-md mx-auto space-y-4">
                        <div class="bg-white border border-slate-200 rounded-2xl p-6 shadow-sm">
                            <div class="w-12 h-12 bg-amber-50 text-amber-500 rounded-full flex items-center justify-center mx-auto font-bold text-lg mb-3">⚠️</div>
                            <h3 class="text-sm font-bold text-slate-800">Core Network Connection Drop</h3>
                            <p class="text-xs text-slate-400 mt-1 leading-relaxed">All proxy clusters failed to sync with the database HTML repository node.</p>
                            <button onclick="window.location.reload()" class="mt-4 bg-[#4f46e5] hover:bg-[#4338ca] text-white text-xs font-bold py-2 px-6 rounded-xl transition-all shadow-sm">
                                Retry Connection 🔄
                            </button>
                        </div>
                    </div>`;
                return;
            }

            const currentProxy = proxies[index];
            statusText.innerText = `Fetching vault via ${currentProxy.name}...`;

            try {
                const response = await fetch(currentProxy.url);
                if (!response.ok) throw new Error("Status bad response");

                let htmlContent = "";
                
                // Agar data allorigins proxy se aa raha hai toh usme se .contents nikalna hoga string form mein
                if (currentProxy.type === "allorigins") {
                    const proxyJson = await response.json();
                    htmlContent = proxyJson.contents; 
                } else {
                    // Direct ya Codetabs ke liye direct response ko text() mein badlenge
                    htmlContent = await response.text();
                }

                if (!htmlContent || htmlContent.trim() === "" || htmlContent.includes('"error"')) {
                    throw new Error("Empty or error response html");
                }

                // Boom! Raw HTML ko sidhe box me daal diya
                container.innerHTML = htmlContent;
                statusText.innerText = "Premium Vault Rendered Successfully.";

            } catch (e) {
                console.warn(`Node ${currentProxy.name} failed. Shifting to next stack...`, e);
                loadHTMLSubjects(index + 1);
            }
        }

        // Global functions injection agar embedded links me 'openChapters' ya click event setup ho
        function openChapters(subjectId) {
            if(!subjectId || subjectId === 'undefined') {
                alert("Error: Subject Stream Mapping ID is empty.");
                return;
            }
            window.location.href = "./chapters.html?batch_id=" + bId + "&subject_id=" + subjectId;
        }

        if(bId) loadHTMLSubjects();
    </script>
</body>
</html>
