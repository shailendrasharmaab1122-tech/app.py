<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Batches - Live Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-color: #0b0f19;
            --card-bg: #151c2c;
            --text-color: #f3f4f6;
            --text-secondary: #9ca3af;
            --live-color: #ff3b30;
            --primary-blue: #2563eb;
            --border-color: #1e293b;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            margin-bottom: 30px;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 15px;
        }

        header h1 {
            font-size: 22px;
            font-weight: 700;
        }

        .batches-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
        }

        .batch-card {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            transition: transform 0.2s ease;
        }

        .batch-card:hover {
            transform: translateY(-2px);
        }

        /* Teacher ke name ke upar ka live option container */
        .live-status-container {
            min-height: 26px; 
            margin-bottom: 6px;
            display: flex;
            align-items: center;
        }

        /* 🔴 LIVE BADGE STYLE */
        .live-badge {
            background: rgba(255, 59, 48, 0.15);
            color: var(--live-color);
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 0.5px;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            border: 1px solid rgba(255, 59, 48, 0.25);
        }

        .pulse-dot {
            width: 7px;
            height: 7px;
            background-color: var(--live-color);
            border-radius: 50%;
            animation: livePulse 1.2s infinite ease-in-out;
        }

        @keyframes livePulse {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.4); opacity: 0.4; }
            100% { transform: scale(1); opacity: 1; }
        }

        .teacher-name {
            font-size: 16px;
            font-weight: 600;
            color: #ffffff;
            margin-bottom: 4px;
        }

        .topic-title {
            font-size: 14px;
            color: var(--text-secondary);
            margin-bottom: 15px;
        }

        .action-btn {
            width: 100%;
            padding: 10px;
            background: var(--primary-blue);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            text-align: center;
            text-decoration: none;
            display: block;
        }

        .action-btn.live-btn {
            background: var(--live-color);
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>My Batches</h1>
    </header>

    <div class="batches-grid" id="batchesContainer">
        </div>
</div>

<script>
    // Eduvibe ya apne backend API ka URL yahan dalein
    const API_URL = "YOUR_API_ENDPOINT_HERE"; 

    async function loadBatches() {
        try {
            // Real API se data fetch karne ke liye (Abhi ke liye fallback lagaya h)
            // const response = await fetch(API_URL);
            // const lectures = await response.json();
            
            // Jaisa aapka response data structure hota h:
            const lectures = [
                {
                    teacher: "Your Teacher Name",
                    topic: "Subject & Topic Details",
                    isLive: true, // Agar true hoga toh upar option aayega
                    videoId: "6a0a03fe0c69de2d061ed0c6"
                }
            ];

            const container = document.getElementById('batchesContainer');
            container.innerHTML = ''; 

            lectures.forEach(lecture => {
                const card = document.createElement('div');
                card.className = 'batch-card';

                // Check condition: Agar live h toh badge add karo, varna empty chodo
                let liveBadgeHtml = '';
                let btnText = 'Watch Recorded';
                let btnClass = 'action-btn';

                if (lecture.isLive) {
                    liveBadgeHtml = `
                        <div class="live-badge">
                            <span class="pulse-dot"></span> LIVE CLASS
                        </div>
                    `;
                    btnText = 'Join Live Class';
                    btnClass = 'action-btn live-btn';
                }

                card.innerHTML = `
                    <div>
                        <div class="live-status-container">
                            ${liveBadgeHtml}
                        </div>
                        <div class="teacher-name">${lecture.teacher}</div>
                        <div class="topic-title">${lecture.topic}</div>
                    </div>
                    <a href="player.html?id=${lecture.videoId}" class="${btnClass}">${btnText}</a>
                `;

                container.appendChild(card);
            });

        } catch (error) {
            console.error("Error loading batches:", error);
        }
    }

    // Page load hote hi data fetch karega
    window.onload = loadBatches;
</script>

</body>
</html>
