<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Subjects - DevCoderZ</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
      body { background: #f8fafc; color: #0f172a; }
    </style>
</head>
<body class="min-h-screen flex flex-col justify-center items-center bg-slate-50">

    <div id="loader" class="text-center space-y-4">
        <div class="w-12 h-12 border-4 border-[#4f46e5] border-t-transparent rounded-full animate-spin mx-auto"></div>
        <p class="text-xs text-slate-500 font-medium tracking-wide">Bypassing restrictions & decrypting subject vault...</p>
    </div>

    <form id="gatewayForm" method="GET" action="https://devcoderz.vercel.app/api/PW/all-batches-api2.js" class="hidden">
        <input type="hidden" name="batch_id" id="formBatchId">
    </form>

    <script>
        const params = new URLSearchParams(window.location.search);
        const bId = params.get('batch_id');

        if (!bId) {
            window.location.href = "./index.html";
        } else {
            // Step 1: Form ke andar batch_id inject karo
            document.getElementById('formBatchId').value = bId;

            // Step 2: Form ko auto-submit karo direct endpoint par redirection bypass ke liye
            // Agar API server HTML bhej raha hai, toh browser khud use bina kisi CORS error ke render karega
            setTimeout(() => {
                document.getElementById('gatewayForm').submit();
            }, 300);
        }
    </script>
</body>
</html>
