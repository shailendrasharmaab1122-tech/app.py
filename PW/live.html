<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connecting to Live Lecture...</title>
    <style>
        body { background-color: #0b0f19; color: #f3f4f6; font-family: 'Inter', sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .loader-container { text-align: center; }
        .spinner { width: 50px; height: 50px; border: 5px solid rgba(255, 255, 255, 0.1); border-top: 5px solid #ef4444; border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto 20px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        h2 { font-size: 18px; font-weight: 600; margin-bottom: 8px; }
        p { color: #9ca3af; font-size: 14px; }
    </style>
</head>
<body>

    <div class="loader-container">
        <div class="spinner"></div>
        <h2>Opening Live Classroom Node...</h2>
        <p>Connecting secure database node, please wait.</p>
    </div>

    <script>
        // URL se parameters extract karna
        const urlParams = new URLSearchParams(window.location.search);
        const batchId = urlParams.get('batch_id');
        const subjectId = urlParams.get('subject_id');
        const videoId = urlParams.get('video_id');
        const startTime = urlParams.get('start');

        if (batchId && videoId) {
            // EduVibe Live PHP Portal Targeting Link Construction
            let targetRedirectUrl = `https://eduvibe-pw.page.gd/live.php?batch_id=${encodeURIComponent(batchId)}&video_id=${encodeURIComponent(videoId)}`;
            
            if (subjectId) targetRedirectUrl += `&subject_id=${encodeURIComponent(subjectId)}`;
            if (startTime) targetRedirectUrl += `&start=${encodeURIComponent(startTime)}`;

            // Direct Routing Execution
            setTimeout(() => {
                window.location.href = targetRedirectUrl;
            }, 600); 
        } else {
            document.querySelector('h2').innerText = "Routing Parameters Missing";
            document.querySelector('p').innerText = "Redirecting back to dashboard...";
            setTimeout(() => { window.location.href = "/"; }, 2000);
        }
    </script>
</body>
</html>
