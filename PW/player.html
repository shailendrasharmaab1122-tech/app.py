<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video Player - The DevCoderZ</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { margin: 0; padding: 0; background: #000; overflow: hidden; }
        .iframe-container { width: 100%; height: 100vh; }
        iframe { width: 100%; height: 100%; border: none; }
    </style>
</head>
<body>

    <div class="iframe-container">
        <iframe id="videoIframe" src="" allowfullscreen allow="encrypted-media; autoplay; picture-in-picture"></iframe>
    </div>

    <script>
        const params = new URLSearchParams(window.location.search);

        // Paramters jo aapke naye player ke liye chahiye
        const vId = params.get("video_id");
        const bId = params.get("batch_id");
        const sId = params.get("subject_id");
        const sSlug = params.get("subject_slug");
        const tSlug = params.get("topic_slug");

        // DeltaStudy Player URL structure
        const playerUrl = `https://deltastudy.site/pw/drm/play?video_id=${vId}&subject_slug=${sSlug}&batch_id=${bId}&schedule_id=${vId}&subject_id=${sId}&topicSlug=${tSlug}`;

        // Iframe mein URL set karna
        if (vId) {
            document.getElementById("videoIframe").src = playerUrl;
        } else {
            document.body.innerHTML = "<div class='text-white p-10'>Error: Video ID missing!</div>";
        }
    </script>
</body>
</html>
