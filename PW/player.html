<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redirecting to Player...</title>
</head>
<body>
    <p>Redirecting to video player...</p>

    <script>
        const params = new URLSearchParams(window.location.search);

        const videoId = params.get("video_id");
        const bId = params.get("batch_id");
        const sId = params.get("subject_id");
        const tId = params.get("topic_id");
        const name = params.get("name") || "Lecture";

        // Redirect URL
        const redirectUrl = `https://edunova-pw.site/videoplayerr.php?video_id=${videoId}&batch_id=${bId}&subject_id=${sId}&topic_id=${tId}&name=${encodeURIComponent(name)}`;

        // Redirect logic
        window.location.replace(redirectUrl);
    </script>
</body>
</html>
