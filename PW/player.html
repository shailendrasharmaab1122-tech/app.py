<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DevCoderZ Premium Player</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.3.5/shaka-player.compiled.js"></script>
    
    <link rel="stylesheet" href="https://cdn.plyr.io/3.7.8/plyr.css" />
    <script src="https://cdn.plyr.io/3.7.8/plyr.polyfilled.js"></script>

    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: sans-serif;
            overflow: hidden;
        }
        .video-container {
            width: 100%;
            max-width: 960px;
            background: #000;
            box-shadow: 0 12px 40px rgba(0,0,0,0.7);
        }
        video {
            width: 100%;
            display: block;
        }
    </style>
</head>
<body>

<div class="video-container">
    <video id="video" crossorigin playsinline></video>
</div>
<script>
    // 1. Get video_id from URL parameters
    const urlParams = new URLSearchParams(window.location.search);
    const videoId = urlParams.get('video_id');

    if (!videoId) {
        alert("Error: video_id parameters missing in URL!");
    } else {
        initPlayer();
    }

    async function initPlayer() {
        const video = document.getElementById('video');
        
        // 2. Setup Premium UI Overlays (Plyr Controls)
        const plyrPlayer = new Plyr(video, { 
            controls: [
                'play-large', 'rewind', 'play', 'fast-forward', 'progress', 
                'current-time', 'duration', 'mute', 'volume', 'settings', 'fullscreen'
            ],
            settings: ['quality', 'speed'],
            speed: { selected: 1, options: [0.5, 0.75, 1, 1.25, 1.5, 1.75, 2, 2.5, 3] }
        });

        // 3. Initialize Media Engine (Shaka Player)
        shaka.polyfill.installAll();
        if (!shaka.Player.isBrowserSupported()) {
            console.error('Browser built-in engine unsupported.');
            return;
        }

        const shakaPlayer = new shaka.Player(video);

        shakaPlayer.addEventListener('error', (event) => {
            console.error('Playback Stream Engine Error:', event.detail);
        });

        try {
            // 4. Fetch manifest link and authentication metadata from local backend API
            const response = await fetch(`/api/getStream?video_id=${videoId}`);
            const data = await response.json();

            if (!data.manifestUrl) {
                throw new Error("Unable to read valid streaming path from API gateway response.");
            }

            // 5. Apply dynamic clear keys if returned in authentication package
            if (data.keyId && data.keyValue) {
                shakaPlayer.configure({
                    drm: {
                        clearKeys: {
                            [data.keyId]: data.keyValue
                        }
                    }
                });
            }

            // 6. Connect source manifest data to core viewport instance
            await shakaPlayer.load(data.manifestUrl);
            console.log('Stream source initialization successful!');

        } catch (error) {
            console.error('Core Pipeline Breakdown:', error);
        }
    }
</script>

</body>
</html>
