<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Study Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .lecture-card:hover { transform: scale(1.02); transition: 0.2s; }
        .active-tab { border-bottom: 3px solid #6366f1; color: #6366f1; }
    </style>
</head>
<body class="bg-gray-950 text-gray-100">

    <div class="max-w-7xl mx-auto p-4">
        <header class="mb-8 text-center">
            <h1 id="topicName" class="text-3xl font-extrabold text-indigo-500 mb-2">Loading...</h1>
            <p class="text-gray-400">Select a lecture to start studying</p>
        </header>

        <div id="lectureGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6"></div>
    </div>

    <script>
        const params = new URLSearchParams(window.location.search);
        const batchId = params.get("batch_id");
        const subjectId = params.get("subject_id");
        const topicId = params.get("topic_id");

        if (!batchId || !subjectId || !topicId) {
            document.body.innerHTML = "<div class='text-center mt-20 text-red-500 text-xl font-bold'>Error: Missing Parameters (batch_id, subject_id, topic_id)</div>";
        }

        const apiUrl = `https://eduvibe-pw-api.wasmer.app/get-lectures.php?batch_id=${batchId}&subject_id=${subjectId}&topic_id=${topicId}&tab=videos`;

        async function loadContent() {
            try {
                const response = await fetch(apiUrl);
                const data = await response.json();
                
                document.getElementById("topicName").innerText = data.topic_name || "Lectures";
                render(data.lectures || []);
            } catch (err) {
                document.getElementById("topicName").innerText = "Failed to load lectures";
            }
        }

        function render(lectures) {
            const container = document.getElementById("lectureGrid");
            container.innerHTML = lectures.map(item => `
                <div class="lecture-card bg-gray-900 border border-gray-800 rounded-2xl overflow-hidden cursor-pointer shadow-2xl" 
                     onclick="play('${item._id}')">
                    <div class="relative">
                        <img src="${item.videoDetails?.image}" class="w-full aspect-video object-cover opacity-80">
                        <div class="absolute bottom-2 right-2 bg-black/70 px-2 py-1 rounded text-xs">
                            ${item.videoDetails?.duration}
                        </div>
                        <div class="absolute inset-0 flex items-center justify-center opacity-0 hover:opacity-100 transition-opacity bg-black/40">
                             <svg class="w-12 h-12 text-white" fill="currentColor" viewBox="0 0 20 20"><path d="M10 18a8 8 0 100-16 8 8 0 000 16zM9.555 7.168A1 1 0 008 8v4a1 1 0 001.555.832l3-2a1 1 0 000-1.664l-3-2z"/></svg>
                        </div>
                    </div>
                    <div class="p-4">
                        <h3 class="text-sm font-medium leading-snug line-clamp-2">${item.topic}</h3>
                    </div>
                </div>
            `).join('');
        }

        function play(id) {
            window.location.href = `player.html?video_id=${id}&batch_id=${batchId}`;
        }

        loadContent();
    </script>
</body>
</html>
