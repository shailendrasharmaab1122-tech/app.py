<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Redirecting...</title>
<style>
body{
    margin:0;
    background:black;
    color:white;
    font-family:sans-serif;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}
</style>
</head>
<body>
<div>Loading Player...</div>
<script>
(() => {
    const urlParams = new URLSearchParams(window.location.search);
    const videoId = urlParams.get("video_id") || urlParams.get("id") || urlParams.get("topic_id");

    if (!videoId) {
        alert("Video ID Missing!");
        return;
    }

    const eduvibePlayerUrl = `https://eduvibe-pw.page.gd/player.php?id=${encodeURIComponent(videoId)}`;
    window.location.href = eduvibePlayerUrl;
})();
</script>
</body>
</html>
