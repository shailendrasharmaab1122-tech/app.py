<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>DevCoderz Ultra Smooth Player</title>
<style>
*{
 margin:0;
 padding:0;
 box-sizing:border-box;
 font-family:sans-serif;
 -webkit-user-select: none;
 user-select: none;
}
html,body{width:100%;height:100%;background:#0f172a;overflow:hidden;display:flex;align-items:center;justify-content:center;}
.overlay{position:fixed;inset:0;background:rgba(15, 23, 42, 0.95);display:flex;align-items:center;justify-content:center;z-index:100;}
.box{width:340px;padding:30px;border-radius:24px;text-align:center;background:linear-gradient(135deg,#1e3c72,#2a5298);color:#fff;box-shadow:0 10px 25px rgba(0,0,0,0.3);border:1px solid rgba(255,255,255,0.1);}
h2 {font-size:20px;margin-bottom:8px;font-weight:700;}
p {font-size:12px;color:rgba(255,255,255,0.8);margin-bottom:20px;line-height:1.5;}
.tg-btn{display:block;margin-top:12px;padding:14px;border-radius:28px;font-weight:700;font-size:14px;width:100%;cursor:pointer;text-align:center;text-decoration:none;transition:all 0.2s;}
.tg-btn:active {transform:scale(0.98);}
.join{background:#fff;color:#1e3c72;box-shadow:0 4px 12px rgba(255,255,255,0.2);}
.continue{background:#ff9800;color:#fff;box-shadow:0 4px 12px rgba(255,152,0,0.3);margin-top:20px;}
.dev-credit {font-size:11px;color:rgba(255,255,255,0.5);margin-top:20px;font-weight:500;}
</style>
</head>
<body>

<div class="overlay" id="tgPopup">
 <div class="box">
  <h2>🚩 Jai Shree Ram 🚩</h2>
  <p>Premium stream sync lane ke liye Telegram join karein aur 'Watch Video' par click karein.</p>
  
  <a class="tg-btn join" href="https://t.me/+JXdxtVzQf-NhM2Jl" target="_blank">Join Telegram Channel</a>
  
  <div class="tg-btn continue" id="continueBtn">▶ Watch Video Now</div>
  
  <div class="dev-credit">Developed by - Devansh Sharma</div>
 </div>
</div>

<script>
const continueBtn=document.getElementById("continueBtn");

const urlParams=new URLSearchParams(window.location.search);
const videoId = urlParams.get("video_id");
const batchId = urlParams.get("batch_id");
const subjectId = urlParams.get("subject_id");
const topicId = urlParams.get("topic_id");

continueBtn.onclick=e=>{
    e.preventDefault();
    
    if (videoId && batchId) {
        // Direct safe handshake routing to bypass frame blocking restrictions completely
        const targetBypassUrl = `https://eduvibe-pw.page.gd/videoplayerr.php?video_id=${videoId}&batch_id=${batchId}&subject_id=${subjectId}&topic_id=${topicId}`;
        window.location.href = targetBypassUrl;
    } else {
        alert("Error: Stream parameters mismatch or empty tokens.");
    }
};
</script>
</body>
</html>
