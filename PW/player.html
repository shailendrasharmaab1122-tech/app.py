<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loading Recorded Lecture...</title>
    <style>
        body { background-color: #0b0f19; color: #f3f4f6; font-family: 'Inter', sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .loader-container { text-align: center; }
        .spinner { width: 50px; height: 50px; border: 5px solid rgba(255, 255, 255, 0.1); border-top: 5px solid #22c55e; border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto 20px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: scale(1); rotate: 360deg; } }
        h2 { font-size: 18px; font-weight: 600; margin-bottom: 8px; }
        p { color: #9ca3af; font-size: 14px; }
    </style>
</head>
<body>

    <div class="loader-container">
        <div class="spinner"></div>
        <h2>Loading Recorded Video Cloud...</h2>
        <p>Streaming authorization handshake initialized.</p>
    </div>

    <script>
        // URL se parameters extract karna
        const urlParams = new URLSearchParams(window.location.search);
        const videoId = urlParams.get('video_id');
        const batchId = urlParams.get('batch_id');
        const subjectId = urlParams.get('subject_id');
        const topicId = urlParams.get('topic_id');

        if (videoId && batchId) {
            // EduVibe Recorded Player PHP Portal Targeting Link Construction
            let targetRedirectUrl = `https://eduvibe-pw.page.gd/videoplayerr.php?video_id=${encodeURIComponent(videoId)}&batch_id=${encodeURIComponent(batchId)}`;
            
            if (subjectId) targetRedirectUrl += `&subject_id=${encodeURIComponent(subjectId)}`;
            if (topicId) targetRedirectUrl += `&topic_id=${encodeURIComponent(topicId)}`;

            // Direct Routing Execution
            setTimeout(() => {
                window.location.href = targetRedirectUrl;
            }, 600); 
        } else {
            document.querySelector('h2').innerText = "Playback Parameters Missing";
            document.querySelector('p').innerText = "Redirecting back to dashboard...";
            setTimeout(() => { window.location.href = "/"; }, 2000);
        }
    </script>
</body>
</html>
