<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Secure Premium Player - DevCoderz</title>

<link rel="stylesheet" href="https://gray-madelina-19.tiiny.site/ogx.css">
<link rel="stylesheet" href="https://gray-madelina-19.tiiny.site/plyrx55.css">

<style>
  body { margin:0; background:#000; overflow: hidden; font-family: sans-serif; }
  .video-container { width:100%; height:100vh; position:relative; background:#000; }
  video { width:100%; height:100vh; object-fit: contain; }
  
  .top-brand {
    position: absolute; top: 15px; left: 15px; z-index: 999; pointer-events: none;
    background: rgba(0, 0, 0, 0.6); padding: 6px 12px; border-radius: 8px; border: 1px solid rgba(255, 152, 0, 0.3);
  }
  .top-brand .jsr { color: #ff9800; font-weight: 700; font-size: 11px; margin-right: 6px; }
  .top-brand .dev { font-size: 11px; font-weight: 600; color: #00e5ff; }

  .overlay { position: fixed; inset: 0; background: rgba(15, 23, 42, 0.98); display: flex; align-items: center; justify-content: center; z-index: 200000 !important; }
  .box { width: 320px; padding: 26px; border-radius: 22px; text-align: center; background: linear-gradient(135deg, #1e3c72, #2a5298); color: #fff; box-shadow: 0 10px 25px rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.1); }
  .tg-btn { display: block; margin-top: 14px; padding: 14px; border-radius: 28px; font-weight: 700; width: 100%; cursor: pointer; text-align: center; text-decoration: none; color: #fff; font-size: 14px; border: none;}
  .join { background: #fff; color: #1e3c72; }
  .continue { background: #ff9800; color: #fff; margin-top: 15px; }
  .loading-text { font-size: 14px; color: #ff9800; margin-top: 10px; display: none; font-weight: bold;}
</style>
</head>
<body>

<div class="overlay" id="tgPopup">
 <div class="box">
  <h2>🚩 Jai Shree Ram 🚩</h2>
  <p style="font-size:12px; color:rgba(255,255,255,0.8); line-height: 1.4;">Lectures ko bina kisi cookie error ke dekhne ke liye join karke Continue karein.</p>
  <a class="tg-btn join" href="https://t.me/+JXdxtVzQf-NhM2Jl" target="_blank">Join Telegram</a>
  <button class="tg-btn continue" id="startBtn">Continue to Video</button>
  <div class="loading-text" id="loader">Fetching Secure Stream... Please wait...</div>
 </div>
</div>

<div class="video-container">
  <div class="top-brand"><span class="jsr">🚩 Jai Shree Ram</span><span class="dev">| Devansh Sharma</span></div>
  <video id="lecture-player" playsinline autoplay></video>
</div>

<script src="https://cdn.jsdelivr.net/npm/shaka-player@4.7.11/dist/shaka-player.compiled.js"></script>
<script src="https://cdn.plyr.io/3.7.8/plyr.js"></script>

<script>
const startBtn = document.getElementById("startBtn");
const loader = document.getElementById("loader");

startBtn.onclick = async () => {
  startBtn.style.display = "none";
  loader.style.display = "block";

  const urlParams = new URLSearchParams(window.location.search);
  const videoId = urlParams.get("video_id");
  const batchId = urlParams.get("batch_id");
  const subjectId = urlParams.get("subject_id");
  const topicId = urlParams.get("topic_id");

  try {
    const targetUrl = `https://eduvibe-pw.page.gd/videoplayerr.php?video_id=${videoId}&batch_id=${batchId}&subject_id=${subjectId}&topic_id=${topicId}`;
    
    const response = await fetch(targetUrl);
    const htmlContent = await response.text();

    const manifestUrl = htmlContent.match(/manifestUrl\s*=\s*["']([^"']+)["']/)?.[1];
    const keyId = htmlContent.match(/keyId\s*=\s*["']([^"']+)["']/)?.[1];
    const keyValue = htmlContent.match(/keyValue\s*=\s*["']([^"']+)["']/)?.[1];

    if (!manifestUrl || !keyId || !keyValue) {
      alert("Stream Error: Source format changed or blocked by CORS.");
      startBtn.style.display = "block";
      loader.style.display = "none";
      return;
    }

    document.getElementById("tgPopup").style.setProperty('display','none','important');
    initializePlayer(manifestUrl, keyId, keyValue);

  } catch (err) {
    alert("CORS Blocked or Network Error! Target domain restricted direct access.");
    startBtn.style.display = "block";
    loader.style.display = "none";
  }
};

async function initializePlayer(manifestUrl, keyId, keyValue) {
  const videoEl = document.getElementById('lecture-player');
  const videoContainer = videoEl.parentElement;

  const shakaPlayer = new shaka.Player(videoEl);
  shakaPlayer.configure({ drm: { clearKeys: { [keyId]: keyValue } } });

  const manifestObj = new URL(manifestUrl);
  shakaPlayer.getNetworkingEngine().registerRequestFilter((type, request) => {
    if (type !== shaka.net.NetworkingEngine.RequestType.SEGMENT) return;
    manifestObj.searchParams.forEach((v, k) => {
      const segUrl = new URL(request.uris[0]);
      segUrl.searchParams.set(k, v);
      request.uris[0] = segUrl.toString();
    });
  });

  let tracks = [];
  await shakaPlayer.load(manifestUrl);
  tracks = shakaPlayer.getVariantTracks();
  const resolutions = [...new Map(tracks.filter(t => t.height).map(t => [t.height, t])).values()].sort((a,b)=>b.height - a.height).map(t => t.height);

  const player = new Plyr(videoEl, {
    controls: ['play-large','rewind','play','fast-forward','progress','current-time','duration','mute','volume','settings','fullscreen'],
    settings: ['quality','speed'],
    quality: {
      default: 'Auto', options: ['Auto', ...resolutions], forced: true,
      onChange: (q) => {
        if (q === 'Auto') { shakaPlayer.configure({ abr: { enabled: true } }); return; }
        const track = tracks.find(t => t.height == q);
        if (track) { shakaPlayer.configure({ abr: { enabled: false } }); shakaPlayer.selectVariantTrack(track, true); }
      }
    },
    speed: { selected:1, options:[0.5,0.75,1,1.25,1.5,1.75,2,2.5,3] },
    autoplay: true
  });

  videoContainer.addEventListener("dblclick", e=>{ e.stopPropagation(); e.preventDefault(); }, true);
  ['touchstart','touchmove','touchend','click'].forEach(ev=>{ videoEl.addEventListener(ev, e=>e.stopImmediatePropagation(), true); });
}
</script>
</body>
</html>
