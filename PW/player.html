<!DOCTYPE html><html lang="en"><head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Secure Lecture Player</title>
<link rel="stylesheet" href="https://gray-madelina-19.tiiny.site/ogx.css">
<link rel="stylesheet" href="https://gray-madelina-19.tiiny.site/plyrx55.css">
<style>
body { margin:0; background:#000; }
.video-container { width:100%; height:auto; position:relative; }
video { width:100%; height:auto }
#statusOverlay { position: absolute; top: 10px; left: 10px; color: #34d399; font-family: monospace; font-size: 12px; z-index: 10; background: rgba(0,0,0,0.6); padding: 4px 8px; border-radius: 4px; pointer-events: none; }
</style>
<style type="text/css">* {user-select: auto !important; -webkit-user-select: auto !important;}</style>
</head>
<body>

<div class="video-container">
  <div id="statusOverlay">Connecting matrix...</div>
  <div class="plyr plyr--full-ui plyr--video plyr--html5 plyr--fullscreen-enabled plyr--is-touch plyr--captions-enabled plyr--playing plyr--loading">
    <div class="plyr__video-wrapper">
        <video id="lecture-player" playsinline autoplay></video>
        <div class="plyr__poster"></div>
    </div>
    <div class="plyr__captions" dir="auto"></div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/shaka-player@4.7.11/dist/shaka-player.compiled.js"></script>
<script src="https://cdn.plyr.io/3.7.8/plyr.js"></script>

<script>
(async function() {
  shaka.polyfill.installAll();

  const videoEl = document.getElementById('lecture-player');
  const videoContainer = videoEl.parentElement;
  const statusEl = document.getElementById('statusOverlay');

  const params = new URLSearchParams(window.location.search);
  const videoId = params.get('video_id');
  const batchId = params.get('batch_id');

  if (!videoId) {
    statusEl.innerText = "❌ Missing Video ID";
    return;
  }

  // Tumhari backend API se live tokenized details fetch karna
  const keyFetcherUrl = `/api/stream.js?video_id=${videoId}&batch_id=${batchId || ''}`;
  let manifestUrl, keyId, keyValue;

  try {
    statusEl.innerText = "Decoding live token...";
    const response = await fetch(keyFetcherUrl);
    const apiData = await response.json();

    if (!apiData.success || !apiData.manifestUrl) throw new Error();

    manifestUrl = apiData.manifestUrl;
    keyId = apiData.keyId;
    keyValue = apiData.keyValue;
  } catch (err) {
    statusEl.innerText = "🚨 Token Fetch Failed! Checking API...";
    return;
  }

  /* ================= SHAKA INIT ================= */
  const shakaPlayer = new shaka.Player(videoEl);

  if (keyId && keyValue) {
    shakaPlayer.configure({
      drm: { clearKeys: { [keyId]: keyValue } }
    });
  }

  /* ================= SIGNED URL FIX ================= */
  try {
    const manifestObj = new URL(manifestUrl);
    shakaPlayer.getNetworkingEngine().registerRequestFilter((type, request) => {
      if (type !== shaka.net.NetworkingEngine.RequestType.SEGMENT) return;
      manifestObj.searchParams.forEach((v, k) => {
        const segUrl = new URL(request.uris[0]);
        segUrl.searchParams.set(k, v);
        request.uris[0] = segUrl.toString();
      });
    });
  } catch(e){}

  let tracks = [];
  try {
    await shakaPlayer.load(manifestUrl);
    statusEl.style.display = "none"; // Chalne ke baad overlay hide ho jayega
    tracks = shakaPlayer.getVariantTracks();
  } catch (err) {
    statusEl.innerText = `❌ Decryption Blocked (Error ${err.code})`;
    return;
  }

  /* ================= EXTRACT QUALITY ================= */
  const resolutions = [...new Map(
    tracks.filter(t => t.height)
      .map(t => [t.height, t])
  ).values()]
  .sort((a,b)=>b.height - a.height)
  .map(t => t.height);

  /* ================= NOW CREATE PLYR ================= */
  const player = new Plyr(videoEl, {
    controls: [
      'play-large','rewind','play','fast-forward',
      'progress','current-time','duration',
      'mute','volume','settings','fullscreen'
    ],
    settings: ['quality','speed'],
    quality: {
      default: 'Auto',
      options: ['Auto', ...resolutions],
      forced: true,
      onChange: (q) => {
        if (q === 'Auto') {
          shakaPlayer.configure({ abr: { enabled: true } });
          return;
        }
        const track = tracks.find(t => t.height == q);
        if (track) {
          shakaPlayer.configure({ abr: { enabled: false } });
          shakaPlayer.selectVariantTrack(track, true);
        }
      }
    },
    speed: { selected:1, options:[0.5,0.75,1,1.25,1.5,1.75,2,2.5,3] },
    autoplay: true
  });

  // Block default gestures
  videoContainer.addEventListener("dblclick", e=>{ e.stopPropagation(); e.preventDefault(); }, true);
  ['touchstart','touchmove','touchend','click'].forEach(ev=>{
      videoEl.addEventListener(ev, e=>e.stopImmediatePropagation(), true);
  });

  /* ================= GESTURES ================= */
  const isMobile = /iPhone|iPad|iPod|Android/i.test(navigator.userAgent);
  let holdTimeout=null, speedHeld=false, lastTap=0;

  videoEl.addEventListener("touchstart", ()=>{
    if(!isMobile) return;
    holdTimeout = setTimeout(()=>{
      if(!speedHeld){ speedHeld=true; player.speed=2; }
    },1000);
  });

  videoEl.addEventListener("touchend", ()=>{
    if(!isMobile) return;
    clearTimeout(holdTimeout);
    if(speedHeld){ player.speed=1; speedHeld=false; }
  });

  videoContainer.addEventListener("touchend",(e)=>{
    if(!isMobile) return;
    const now = Date.now();
    const gap = now-lastTap;
    lastTap = now;
    const {clientX} = e.changedTouches[0];
    const {left,width} = videoContainer.getBoundingClientRect();
    const x = clientX-left;

    if(gap<300){
      if(x<width/3) player.currentTime-=10;
      else if(x>2*width/3) player.currentTime+=10;
      else player.togglePlay();
    }
  });

  // PC Hotkeys
  document.addEventListener("keydown", (e) => {
    const tag = document.activeElement.tagName.toLowerCase();
    if (tag === "input" || tag === "textarea") return;
    switch (e.key.toLowerCase()) {
      case " ":
      case "k": e.preventDefault(); player.togglePlay(); break;
      case "arrowright": player.currentTime += 10; break;
      case "arrowleft": player.currentTime -= 10; break;
      case "arrowup": e.preventDefault(); player.volume = Math.min(1, player.volume + 0.1); break;
      case "arrowdown": e.preventDefault(); player.volume = Math.max(0, player.volume - 0.1); break;
      case "m": player.muted = !player.muted; break;
      case "f": player.fullscreen.toggle(); break;
      case "c": player.speed = player.speed === 1 ? 2 : 1; break;
    }
  });

})();
</script>
</body></html>
