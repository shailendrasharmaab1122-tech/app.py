<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Player - The DevCoderz</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { margin: 0; padding: 0; background: #000; }
        .iframe-container { position: relative; width: 100%; height: 100vh; overflow: hidden; }
        iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; }
    </style>
</head>
<body>

    <div class="iframe-container">
        <iframe id="videoIframe" src="" allowfullscreen allow="encrypted-media; autoplay; picture-in-picture"></iframe>
    </div>

    <script>
        
        const params = new URLSearchParams(window.location.search);
        
        
        const videoId = params.get("video_id");
        const bId = params.get("batch_id");
        const sId = params.get("subject_id");
        const tId = params.get("topic_id");
        const name = params.get("name") || "Lecture";

        
        const eduvibePlayerUrl = `https://edunova-pw.site/videoplayerr.php?video_id=${videoId}&batch_id=${bId}&subject_id=${sId}&topic_id=${tId}&name=${encodeURIComponent(name)}`;

        
        document.getElementById("videoIframe").src = eduvibePlayerUrl;
    </script>
</body>
</html>
