<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Redirecting...</title>
<style>
body{
    margin:0;
    background:black;
    color:white;
    font-family:sans-serif;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}
</style>
</head>
<body>
<div>Loading Player...</div>
<script>
(() => {
    const urlParams = new URLSearchParams(window.location.search);
    const videoId = urlParams.get("video_id") || urlParams.get("id");
    const batchId = urlParams.get("batch_id");
    const subjectId = urlParams.get("subject_id");
    const topicId = urlParams.get("topic_id");

    if (!videoId) {
        alert("Video ID Missing!");
        return;
    }

    let eduvibeUrl = `https://eduvibe-pw-temp.page.gd/videoplayerr.php?video_id=${encodeURIComponent(videoId)}`;

    if (batchId) eduvibeUrl += `&batch_id=${encodeURIComponent(batchId)}`;
    if (subjectId) eduvibeUrl += `&subject_id=${encodeURIComponent(subjectId)}`;
    if (topicId) eduvibeUrl += `&topic_id=${encodeURIComponent(topicId)}`;

    window.location.href = eduvibeUrl;
})();
</script>
</body>
</html>
