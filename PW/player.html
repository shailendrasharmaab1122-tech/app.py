<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>DevCoderz Ultra Smooth Player</title>
<style>
*{
 margin:0;
 padding:0;
 box-sizing:border-box;
 font-family:sans-serif;
 -webkit-user-select: none;
 user-select: none;
}
html,body{width:100%;height:100%;background:#000;overflow:hidden;}
.player{position:fixed;inset:0;background:#000;z-index:10;}
iframe{width:100%;height:100%;border:none;background:#000;}

/* Branding ko ekdum top corner me set kiya h taaki middle ya bottom ke controls par koi rukawat na aaye */
.top-brand{
 position:absolute;
 top:12px;
 left:15px;
 z-index:9999;
 pointer-events:none; /* Isse aap controls ko touch kar paoge, branding beech me nahi aayegi */
 background: rgba(0, 0, 0, 0.6);
 padding: 4px 10px;
 border-radius: 8px;
 border: 1px solid rgba(255,152,0,0.3);
}
.top-brand .jsr{color:#ff9800;font-weight:700;font-size:11px;letter-spacing: 0.5px; display: inline-block; margin-right: 6px;}
.top-brand .dev{font-size:11px;font-weight:600;color:#00e5ff;display: inline-block;}

.overlay{position:fixed;inset:0;background:rgba(0,0,0,.85);display:flex;align-items:center;justify-content:center;z-index:10000;}
.box{width:320px;padding:26px;border-radius:22px;text-align:center;background:linear-gradient(135deg,#1e3c72,#2a5298);color:#fff;box-shadow: 0 10px 25px rgba(0,0,0,0.4);}
.tg-btn{display:block;margin-top:14px;padding:14px;border-radius:28px;font-weight:700;width:100%;cursor:pointer;text-align:center;text-decoration:none;color:#fff;transition: 0.2s;}
.join{background:#fff;color:#1e3c72;}
.continue{background:rgba(0,0,0,0.3);border:1px solid #fff;margin-top:10px;}
.tg-btn:active {transform: scale(0.98);}
</style>
</head>
<body>

<div class="overlay" id="tgPopup">
 <div class="box">
  <h2>Join our Telegram</h2>
  <p style="font-size:12px; color:rgba(255,255,255,0.8); margin-top:5px;">Lectures ko bina rukawat dekhne ke liye channel join karein.</p>
  <a class="tg-btn join" href="https://t.me/+JXdxtVzQf-NhM2Jl" target="_blank">Join Telegram</a>
  <div class="tg-btn continue" id="continueBtn">Continue to Video</div>
 </div>
</div>

<div class="player" id="player">
 <iframe id="bypassFrame" allow="autoplay; fullscreen" allowfullscreen></iframe>
 
 <div class="top-brand">
  <span class="jsr">🚩 Jai Shree Ram</span>
  <span class="dev">| Devansh Sharma</span>
 </div>
</div>

<script>
const tgPopup=document.getElementById("tgPopup"),continueBtn=document.getElementById("continueBtn"),iframe=document.getElementById("bypassFrame");

const urlParams=new URLSearchParams(window.location.search);
const videoId = urlParams.get("video_id");
const batchId = urlParams.get("batch_id");
const subjectId = urlParams.get("subject_id");
const topicId = urlParams.get("topic_id");

if(videoId && batchId) {
    iframe.src = `https://eduvibe-pw.page.gd/videoplayerr.php?video_id=${videoId}&batch_id=${batchId}&subject_id=${subjectId}&topic_id=${topicId}`;
} else {
    iframe.src = "about:blank";
}

continueBtn.onclick=e=>{
    e.preventDefault();
    tgPopup.style.display="none";
};
</script>
</body>
</html>
