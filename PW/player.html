<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stream Player - DevCoderZ</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.3.5/shaka-player.ui.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.3.5/controls.min.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #0f172a; color: #f8fafc; font-family: 'Inter', sans-serif; }
        .shaka-video-container { max-width: 100%; border-radius: 1rem; overflow: hidden; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5); border: 1px solid #1e293b; }
        .shaka-controls-container { background: linear-gradient(to top, rgba(0,0,0,0.8), transparent); }
    </style>
</head>
<body class="min-h-screen flex flex-col justify-between">

    <nav class="h-16 border-b border-slate-800 bg-slate-900/50 backdrop-blur flex items-center px-6 justify-between">
        <button onclick="history.back()" class="bg-slate-800 hover:bg-slate-700 text-slate-200 text-xs font-bold py-2 px-4 rounded-lg transition-all">
            ← Back to Room
        </button>
        <span class="text-xs text-indigo-400 bg-indigo-500/10 border border-indigo-500/20 px-3 py-1 rounded-full font-bold">
            Secure DRM Stream
        </span>
    </nav>

    <main class="flex-1 flex items-center justify-center p-4">
        <div class="w-full max-w-4xl mx-auto">
            
            <div data-shaka-player-container class="shaka-video-container w-full aspect-video bg-black">
                <video data-shaka-player id="video" class="w-full h-full" autoplay playsinline></video>
            </div>

            <div class="mt-4 p-4 bg-slate-900 border border-slate-800 rounded-2xl">
                <h2 class="text-sm font-bold text-slate-200">Playing Encrypted Lecture Channel</h2>
                <p class="text-[11px] text-slate-500 mt-1">If streaming gets stuck, make sure encryption variables or keys from root node aren't expired.</p>
            </div>

        </div>
    </main>

    <footer class="h-12 border-t border-slate-800 bg-slate-900/30 text-center text-[11px] text-slate-600 flex items-center justify-center">
        <span>© 2026 The DevCoderz • Engine Secure Terminal Configured</span>
    </footer>

    <script>
        const params = new URLSearchParams(window.location.search);
        const manifestUrl = params.get('url');
        const keyId = params.get('keyId');
        const keyVal = params.get('key');

        async function initPlayer() {
            const video = document.getElementById('video');
            const container = video.parentElement;
            
            const player = new shaka.Player(video);
            const ui = new shaka.ui.Overlay(player, container, video);

            if (keyId && keyVal) {
                player.configure({
                    drm: {
                        clearKeys: {
                            [keyId]: keyVal
                        }
                    }
                });
            }

            player.addEventListener('error', (e) => {
                console.error('Shaka Engine Core Failure:', e.detail);
            });

            try {
                await player.load(manifestUrl);
                console.log('DRM Stream Loaded Successfully via DevCoderZ Core.');
            } catch (err) {
                console.error('Streaming Load Interrupted:', err);
            }
        }

        document.addEventListener('shaka-ui-loaded-failed', () => console.error("UI bundle failure"));
        document.addEventListener('DOMContentLoaded', () => {
            shaka.polyfil.installAll();
            if (shaka.Player.isBrowserSupported()) {
                initPlayer();
            } else {
                alert("Browser architecture does not support premium DRM streaming setups.");
            }
        });
    </script>
</body>
</html>
