<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>The DevCoderZ - PW Video Player</title>
<style>
    body, html {
        margin: 0;
        padding: 0;
        background: black;
        color: white;
        font-family: sans-serif;
        height: 100vh;
        width: 100vw;
        overflow: hidden;
    }

    #loading {
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        font-size: 1.2rem;
        position: absolute;
        width: 100%;
        z-index: 1;
    }


    iframe {
        width: 100%;
        height: 100vh;
        border: none;
        display: none; 
        position: absolute;
        top: 0;
        left: 0;
        z-index: 2;
    }
</style>
</head>
<body>

<div id="loading">Loading Player...</div>
<iframe id="videoPlayer" allowfullscreen></iframe>

<script>
(() => {
    const urlParams = new URLSearchParams(window.location.search);
    const videoId = urlParams.get("video_id") || urlParams.get("id");
    const batchId = urlParams.get("batch_id");
    const subjectId = urlParams.get("subject_id");
    const topicId = urlParams.get("topic_id");

    const loadingDiv = document.getElementById("loading");
    const iframe = document.getElementById("videoPlayer");

    if (!videoId) {
        alert("Video ID Missing!");
        loadingDiv.innerText = "Error: Video ID Missing!";
        return;
    }

    let edunovaUrl = `https://edunova-pw.site/videoplayerr.php?video_id=${encodeURIComponent(videoId)}`;

    if (batchId) edunovaUrl += `&batch_id=${encodeURIComponent(batchId)}`;
    if (subjectId) edunovaUrl += `&subject_id=${encodeURIComponent(subjectId)}`;
    if (topicId) edunovaUrl += `&topic_id=${encodeURIComponent(topicId)}`;


    iframe.src = edunovaUrl;
    iframe.style.display = "block";

    // Loading text ko hide kar diya
    loadingDiv.style.display = "none";
})();
</script>
</body>
</html>
