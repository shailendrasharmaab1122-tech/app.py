<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Player - DevCoderZ</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.3.5/shaka-player.compiled.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 min-h-screen flex flex-col text-white">

    <nav class="h-16 bg-[#4f46e5] flex items-center px-6 shadow-md">
        <button onclick="history.back()" class="bg-white/20 hover:bg-white/30 text-white text-xs font-bold py-2 px-4 rounded-lg transition-all">
            ← Back to Lectures
        </button>
    </nav>

    <main class="flex-1 max-w-4xl w-full mx-auto p-4 flex flex-col justify-center items-center">
        <div class="w-full aspect-video bg-black rounded-2xl overflow-hidden shadow-2xl border border-slate-800 relative">
            <video id="videoPlayer" class="w-full h-full" controls autoplay></video>
        </div>
        
        <div class="mt-4 w-full bg-slate-800/50 p-4 rounded-xl border border-slate-700/50 text-xs">
            <p class="font-bold text-emerald-400">// Stream Matrix Diagnostics:</p>
            <div id="playerLog" class="font-mono mt-1 text-slate-300">Initializing Core Engine...</div>
        </div>
    </main>

    <script>
        const log = document.getElementById('playerLog');
        
        // Grab URL and tokens saved from lectures page
        let streamUrl = localStorage.getItem('current_stream_url');
        let keyId = localStorage.getItem('current_key_id');
        let keyVal = localStorage.getItem('current_key_val');

        const params = new URLSearchParams(window.location.search);
        const vId = params.get('video_id');

        async function initPlayer() {
            // Check if URL is blank. If yes, we try to guess their lecture-details API node
            if (!streamUrl && vId) {
                log.innerHTML = `⚠️ Main URL blank. Attempting to resolve token endpoint for ID: ${vId}...`;
                
                try {
                    // Trying to hit their video details resolver via proxy
                    const rawResolver = `https://eduvibe-pw-api.wasmer.app/get-video-details.php?video_id=${vId}`;
                    const proxyUrl = `https://api.allorigins.win/get?url=${encodeURIComponent(rawResolver)}`;
                    
                    const res = await fetch(proxyUrl);
                    const wrapper = await res.json();
                    const details = JSON.parse(wrapper.contents);
                    
                    // Fallback to extract tokens dynamically if api match works
                    streamUrl = details.url || details.videoUrl || details.videoDetails?.videoUrl;
                    keyId = details.keyId || details.videoDetails?.findKey;
                    
                    log.innerHTML += `<br><span class="text-emerald-400">✅ Resolution Handshake Success.</span>`;
                } catch(e) {
                    log.innerHTML += `<br><span class="text-red-400">❌ Failed to automatically resolve stream url. Need videoplayerr.php source.</span>`;
                }
            }

            if (!streamUrl) {
                log.innerHTML += `<br><span class="text-red-500 font-bold">Critical: No stream target found.</span>`;
                return;
            }

            log.innerHTML += `<br>Loading manifest: ${streamUrl}`;

            const video = document.getElementById('videoPlayer');
            const player = new shaka.Player(video);

            // If DRM Keys exist, configure clearKey licensing channel
            if (keyId && keyVal) {
                log.innerHTML += `<br>🔐 Injecting ClearKey Decryption Pair...`;
                player.configure({
                    drm: {
                        clearKeys: {
                            [keyId]: keyVal
                        }
                    }
                });
            }

            try {
                await player.load(streamUrl);
                log.innerHTML += `<br><span class="text-emerald-400 font-bold">🚀 Shaka Engine active. Pipeline playing smoothly.</span>`;
            } catch (error) {
                console.error('Shaka error:', error);
                log.innerHTML += `<br><span class="text-amber-400">Engine Exception: ${error.code} - Check DRM keys structure.</span>`;
            }
        }

        document.addEventListener('DOMContentLoaded', initPlayer);
    </script>
</body>
</html>
