<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Eduvibe Premium Plyr</title>

<link rel="stylesheet" href="https://gray-madelina-19.tiiny.site/ogx.css">

<style>
body{
    margin:0;
    background:black;
    overflow:hidden;
}
.video-container{
    position:fixed;
    inset:0;
    width:100%;
    height:100%;
}
video{
    width:100%;
    height:100%;
    object-fit:contain;
    background:black;
}
.plyr{
    height:100%;
    position:relative !important;
}
.live-pill{
    display:flex !important;
    align-items:center;
    gap:6px;
    margin-left:10px;
    font-size:12px;
    font-weight:700;
    border-radius:999px !important;
    padding:4px 10px !important;
    transition:.2s ease;
}
.live-pill:hover{
    transform:scale(1.03);
}
.live-dot{
    width:8px;
    height:8px;
    border-radius:50%;
}
.live-now{
    color:#ff3b30 !important;
}
.live-now .live-dot{
    background:#ff3b30;
    animation: livePulse 1.2s infinite;
}
.live-behind{
    color:#9ca3af !important;
}
.live-behind .live-dot{
    background:#9ca3af;
}
@keyframes livePulse{
    0%{ transform:scale(1); opacity:1; }
    50%{ transform:scale(1.45); opacity:.5; }
    100%{ transform:scale(1); opacity:1; }
}
</style>

<script src="https://cdn.jsdelivr.net/npm/shaka-player@5.0.10/dist/shaka-player.compiled.js"></script>

<div class="video-container" id="container">
    <video id="video" autoplay playsinline crossorigin></video>
    <div id="viewerBadge" style="position: absolute; top: 15px; right: 15px; background: rgba(0, 0, 0, 0.35); color: rgb(255, 255, 255); padding: 4px 8px; border-radius: 4px; font-size: 12px; z-index: 9999; pointer-events: none;">🔴 0 watching</div>
</div>

<script>
(async () => {
    const urlParams = new URLSearchParams(window.location.search);
    const videoId = urlParams.get("video_id") || urlParams.get("id") || urlParams.get("topic_id");

    if (!videoId) {
        alert("Eduvibe Video Param (video_id or id) Missing!");
        return;
    }

    const video = document.getElementById('video');
    const container = document.getElementById('container');

    shaka.polyfill.installAll();
    if (!shaka.Player.isBrowserSupported()) {
        alert("Decoder Engine mismatch!");
        return;
    }

    const shakaPlayer = new shaka.Player(video);
    window.player = shakaPlayer;
    let plyr;
    let tracks = [];

    try {
        let source = `https://eduvibe-pw-api.wasmer.app/api/getStream?video_id=${encodeURIComponent(videoId)}`;

        shakaPlayer.configure({
            streaming: {
                bufferingGoal: 10,
                rebufferingGoal: 2,
                bufferBehind: 15,
                lowLatencyMode: true
            },
            abr: {
                enabled: true,
                defaultBandwidthEstimate: 500000
            }
        });

        shakaPlayer.getNetworkingEngine().registerRequestFilter((type, request) => {
            if(source.includes('?')) {
                const manifestUrl = new URL(source);
                const signedParams = manifestUrl.searchParams;
                const url = new URL(request.uris[0]);
                signedParams.forEach((v, k) => {
                    url.searchParams.set(k, v);
                });
                request.uris[0] = url.toString();
            }
        });

        await shakaPlayer.load(source);
        console.log("✅ Eduvibe Live Node Feed Connected");

        tracks = shakaPlayer.getVariantTracks().filter(t => t.height);
        const resolutions = [...new Set(tracks.map(t => t.height))].sort((a,b)=>b-a);

        plyr = new Plyr(video, {
            autoplay: true,
            keyboard: false,
            controls: [
                'play-large', 'rewind', 'play', 'fast-forward', 'progress', 
                'current-time', 'duration', 'mute', 'volume', 'settings', 'pip', 'fullscreen'
            ],
            settings: ['quality', 'speed'],
            quality: {
                default: 'Auto',
                options: ['Auto', ...resolutions],
                forced: true,
                onChange: (q) => {
                    if(q === 'Auto'){
                        shakaPlayer.configure({ abr: { enabled: true } });
                        return;
                    }
                    const track = tracks.find(t => t.height == q);
                    if(track){
                        shakaPlayer.configure({ abr: { enabled: false } });
                        shakaPlayer.selectVariantTrack(track, true);
                    }
                }
            },
            speed: {
                selected: 1,
                options: [0.5, 0.75, 1, 1.25, 1.5, 1.75, 2, 2.5, 3]
            }
        });

        container.addEventListener("dblclick", e=>{ e.stopPropagation(); e.preventDefault(); }, true);
        ['touchstart','touchmove','touchend','click'].forEach(ev=>{
            video.addEventListener(ev, e=>e.stopImmediatePropagation(), true);
        });

        const controls = container.querySelector('.plyr__controls');
        const timeDisplay = controls?.querySelector('.plyr__time--current');
        let liveBtn;

        if (controls && timeDisplay) {
            liveBtn = document.createElement('button');
            liveBtn.className = 'plyr__control live-pill live-behind';
            liveBtn.type = 'button';
            liveBtn.innerHTML = `<span class="live-dot"></span>LIVE`;

            liveBtn.addEventListener('click', () => {
                const seekRange = shakaPlayer.seekRange();
                plyr.currentTime = seekRange.end;
            });
            timeDisplay.insertAdjacentElement('afterend', liveBtn);
        }

        const LIVE_THRESHOLD = 5;
        function updateLiveState() {
            if (!liveBtn) return;
            const seekRange = shakaPlayer.seekRange();
            const distance = seekRange.end - video.currentTime;
            
            if (distance > 8 && !video.paused) { 
                video.currentTime = seekRange.end - 1; 
            }

            const isLive = distance <= LIVE_THRESHOLD;
            liveBtn.classList.toggle('live-now', isLive);
            liveBtn.classList.toggle('live-behind', !isLive);
        }

        setInterval(updateLiveState, 1000);
        video.addEventListener('timeupdate', updateLiveState);

    } catch(err){
        console.error("❌ Eduvibe Engine Link Refused or Expired:", err);
    }

    function loadScriptOnce(id, src) {
        return new Promise((resolve, reject) => {
            if (document.getElementById(id)) return resolve();
            const s = document.createElement("script");
            s.id = id; s.src = src;
            s.onload = resolve; s.onerror = reject;
            document.head.appendChild(s);
        });
    }

    let socket;
    if (videoId) {
        await loadScriptOnce("_socket", "https://cdn.socket.io/4.7.5/socket.io.min.js");
        socket = io("https://absolute-lynelle-bots-tg12345-47d47cb0.koyeb.app");

        socket.on("connect", () => {
            socket.emit("joinVideo", videoId);
        });

        socket.on(`viewerCount-${videoId}`, (count) => {
            const badge = document.getElementById("viewerBadge");
            if (badge) {
                badge.innerHTML = `🔴 ${count} watching`;
            }
        });

        function attachViewerBadge() {
            document.getElementById("viewerBadge")?.remove();
            const target = container.querySelector(".plyr") || container;

            const overlayEl = document.createElement("div");
            overlayEl.id = "viewerBadge";
            Object.assign(overlayEl.style, {
                position: "absolute", top: "15px", right: "15px",
                background: "rgba(0,0,0,0.35)", color: "#fff",
                padding: "4px 8px", borderRadius: "4px", fontSize: "12px",
                zIndex: 9999, pointerEvents: "none"
            });
            overlayEl.innerHTML = "🔴 0 watching";
            target.appendChild(overlayEl);
        }
        setTimeout(attachViewerBadge, 300);
    }

    const lockLandscape = async () => {
        const o = screen.orientation;
        if(o?.lock){ try{ await o.lock("landscape"); }catch{} }
    };
    const unlockOrientation = () => {
        const o = screen.orientation;
        if(o?.unlock) o.unlock();
    };
    document.addEventListener("fullscreenchange", () => {
        if(document.fullscreenElement){ lockLandscape(); } else { unlockOrientation(); }
    });

    const isMobile = /iPhone|iPad|iPod|Android/i.test(navigator.userAgent);
    let holdTimeout = null; let speedHeld = false; let lastTap = 0;

    video.addEventListener("touchstart", () => {
        if(!isMobile) return;
        holdTimeout = setTimeout(() => {
            if(!speedHeld){ speedHeld = true; plyr.speed = 2; }
        }, 1000);
    });

    video.addEventListener("touchend", () => {
        if(!isMobile) return;
        clearTimeout(holdTimeout);
        if(speedHeld){ plyr.speed = 1; speedHeld = false; }
    });

    container.addEventListener("touchend", (e) => {
        if(!isMobile) return;
        const now = Date.now(); const tapGap = now - lastTap; lastTap = now;
        const { clientX } = e.changedTouches[0];
        const { left, width } = container.getBoundingClientRect();
        const tapX = clientX - left;

        if(tapGap < 300){
            if(tapX < width/3){
                plyr.currentTime = Math.max(0, plyr.currentTime - 10);
            } else if (tapX > (2*width)/3){
                plyr.currentTime += 10;
            } else {
                plyr.togglePlay();
            }
        }
    });

    document.addEventListener("keydown", (e) => {
        const focused = document.activeElement;
        if (focused && (focused.classList?.contains('plyr__control') || focused.closest?.('.plyr'))) {
            focused.blur();
        }
        const active = document.activeElement;
        const tag = active?.tagName?.toLowerCase();
        if (tag === "input" || tag === "textarea") return;

        switch (e.key.toLowerCase()) {
            case " ":
            case "k": e.preventDefault(); if (video.paused) { video.play(); } else { video.pause(); } break;
            case "arrowright": plyr.currentTime += 10; break;
            case "arrowleft": plyr.currentTime -= 10; break;
            case "arrowup": e.preventDefault(); plyr.volume = Math.min(1, plyr.volume + 0.1); break;
            case "arrowdown": e.preventDefault(); plyr.volume = Math.max(0, plyr.volume - 0.1); break;
            case "m": plyr.muted = !plyr.muted; break;
            case "f": plyr.fullscreen.toggle(); break;
            case "c": plyr.speed = plyr.speed === 1 ? 2 : 1; break;
        }
    });

    window.addEventListener("beforeunload", () => {
        socket?.disconnect();
        shakaPlayer.destroy();
    });
})();
</script>
</body>
</html>
