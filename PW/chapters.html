<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chapters - DevCoderZ</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
      body { background: #f8fafc; color: #0f172a; }
      .glow-text { text-shadow: 0 0 8px rgba(239,68,68,0.3); }
    </style>
</head>
<body class="min-h-screen flex flex-col pb-16">

    <nav class="h-16 bg-[#4f46e5] flex items-center justify-between px-6 shadow-md sticky top-0 z-50">
        <button id="backBtn" class="bg-white/20 hover:bg-white/30 text-white text-xs font-bold py-2 px-4 rounded-lg transition-all">
            ← Back to Subjects
        </button>
        <div class="text-xs text-white/90 bg-white/10 px-3 py-1.5 rounded-full border border-white/20 font-medium">
            Chapter Vault Active
        </div>
    </nav>

    <main class="flex-1 max-w-5xl w-full mx-auto p-4 md:p-6">
        <div class="mb-6">
            <h2 id="pageTitle" class="text-xl font-extrabold text-slate-800 tracking-tight">Select Chapter Node</h2>
            <p id="statusText" class="text-xs text-slate-400">Loading listed chapters for this stream branch...</p>
        </div>

        <div id="chaptersContainer" class="space-y-3">
            <div class="bg-white p-5 border border-slate-200 rounded-2xl animate-pulse h-16 shadow-sm"></div>
            <div class="bg-white p-5 border border-slate-200 rounded-2xl animate-pulse h-16 shadow-sm"></div>
        </div>
    </main>

    <footer class="h-12 border-t border-slate-200 bg-white text-center text-xs text-slate-400 flex items-center justify-center gap-1 fixed bottom-0 inset-x-0 z-50 shadow-inner">
        <span>© 2026 The DevCoderz. All Rights Reserved.</span>
        <span>•</span>
        <span>Developed by <span class="text-red-500 font-bold tracking-wide glow-text">Devansh Sharma</span></span>
    </footer>

    <script>
        const params = new URLSearchParams(window.location.search);
        const bId = params.get('batch_id');
        const sId = params.get('subject_id');

        if (!bId || !sId) {
            window.location.href = "./index.html";
        }

        document.getElementById('backBtn').onclick = () => {
            window.location.href = `./batches.html?batch_id=${bId}`;
        };

        async function fetchChaptersFallback() {
            const container = document.getElementById('chaptersContainer');
            const statusText = document.getElementById('statusText');
            const pageTitle = document.getElementById('pageTitle');

            // Strategy A: Phle target dynamic chapters script hit karte hain
            let targetApi = `https://eduvibe-pw-api.wasmer.app/chapters.php?batch_id=${bId}&subject_id=${sId}`;
            
            try {
                statusText.innerText = "Connecting master branch stream...";
                let res = await fetch(targetApi);
                let resData = await res.json();

                // Wasmer target response mapping array for 'topics' or 'chapters'
                let chapters = resData.topics || resData.chapters || resData.data?.topics || resData.data || [];

                if (resData.subject_name) {
                    pageTitle.innerText = resData.subject_name;
                }

                // Strategy B: Agar Strategy A blank screen (empty list) deti hai, toh batch endpoints se filter lagayenge
                if (chapters.length === 0) {
                    statusText.innerText = "Route A empty. Activating Matrix Filter Fallback...";
                    
                    const batchBackupApi = `https://devcoderz.vercel.app/api/PW/all-batches-api2.js?batch_id=${bId}`;
                    const backupRes = await fetch(batchBackupApi);
                    const backupData = await backupRes.json();

                    let subjectsPool = backupData.subjects || backupData.data?.subjects || backupData || [];
                    
                    // Match current subject node out of the root batch configuration pool
                    let currentSubject = subjectsPool.find(sub => (sub.subjectId || sub._id || sub.id || sub.subject_id) === sId);
                    
                    if (currentSubject) {
                        chapters = currentSubject.chapters || currentSubject.topics || currentSubject.data || [];
                        if (currentSubject.subject) pageTitle.innerText = currentSubject.subject;
                    }
                }

                if (chapters.length === 0) {
                    container.innerHTML = `<div class="text-center text-slate-400 py-12 text-sm">⚠️ No chapters listed under this subject repository node.</div>`;
                    statusText.innerText = "Folder payload empty.";
                    return;
                }

                statusText.innerText = "Chapters Decrypted Successfully.";
                container.innerHTML = chapters.map(c => {
                    // Mapping for both 'topicName' and 'chapterName' structures
                    const chapterName = c.topicName || c.chapterName || c.chapter_name || c.name || c.title || "Premium Chapter Node";
                    const chapterId = c.topicId || c.chapterId || c.chapter_id || c._id || c.id;
                    const lecturesCount = c.lectureCount || c.lectures || c.lessons || 0;

                    return `
                    <div class="bg-white border border-slate-200 rounded-2xl p-4 shadow-sm hover:shadow-md transition-all duration-150 cursor-pointer flex items-center justify-between group" onclick="openLectures('${chapterId}')">
                        <div class="flex items-center gap-3 truncate">
                            <div class="w-8 h-8 rounded-xl bg-indigo-50 text-[#4f46e5] flex items-center justify-center font-bold text-xs group-hover:bg-[#4f46e5] group-hover:text-white transition-all shrink-0">📁</div>
                            <span class="text-sm font-bold text-slate-700 truncate group-hover:text-[#4f46e5] transition-colors">${chapterName}</span>
                        </div>
                        <div class="flex items-center gap-2 text-xs font-medium text-slate-400 shrink-0">
                            <span>${lecturesCount} Videos</span>
                            <span class="text-indigo-500 font-bold group-hover:translate-x-1 transition-transform">→</span>
                        </div>
                    </div>
                    `;
                }).join('');

            } catch (e) {
                console.error("System structural block error:", e);
                container.innerHTML = `
                    <div class="text-center py-12 max-w-md mx-auto space-y-4">
                        <div class="bg-white border border-slate-200 rounded-2xl p-6 shadow-sm">
                            <div class="w-12 h-12 bg-red-50 text-red-500 rounded-full flex items-center justify-center mx-auto font-bold text-lg mb-3">❌</div>
                            <h3 class="text-sm font-bold text-slate-800">Decryption Error</h3>
                            <p class="text-xs text-slate-400 mt-1 leading-relaxed">Failed to establish sync with the network cluster node.</p>
                            <button onclick="window.location.reload()" class="mt-4 bg-[#4f46e5] text-white text-xs font-bold py-2 px-6 rounded-xl">Retry 🔄</button>
                        </div>
                    </div>`;
            }
        }

        function openLectures(chapterId) {
            window.location.href = "./lectures.html?batch_id=" + bId + "&subject_id=" + sId + "&chapter_id=" + chapterId;
        }

        if (bId && sId) fetchChaptersFallback();
    </script>
</body>
</html>
