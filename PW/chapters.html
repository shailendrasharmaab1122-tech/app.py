<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chapters Debugger - DevCoderZ</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
      body { background: #f8fafc; color: #0f172a; }
    </style>
</head>
<body class="min-h-screen flex flex-col pb-16">

    <nav class="h-16 bg-[#4f46e5] flex items-center justify-between px-6 shadow-md sticky top-0 z-50">
        <button onclick="window.location.href='./batches.html?batch_id=' + bId" class="bg-white/20 hover:bg-white/30 text-white text-xs font-bold py-2 px-4 rounded-lg transition-all">
            ← Back to Subjects
        </button>
        <div class="text-xs text-white/90 bg-white/10 px-3 py-1.5 rounded-full border border-white/20 font-medium">
            Chapter Vault Active
        </div>
    </nav>

    <main class="flex-1 max-w-5xl w-full mx-auto p-4 md:p-6">
        <div class="mb-4">
            <h2 class="text-xl font-extrabold text-slate-800 tracking-tight">Select Chapter Node</h2>
            <p id="statusText" class="text-xs text-slate-400">Loading listed chapters for this stream branch...</p>
        </div>

        <div class="mb-4 bg-slate-900 text-green-400 p-4 rounded-xl font-mono text-xs overflow-x-auto shadow-inner">
            <p class="text-slate-400 font-bold mb-1">// API Debug Logs:</p>
            <div id="debugLog">Initializing core bridge handshake...</div>
        </div>

        <div id="chaptersContainer" class="space-y-3">
            <div class="bg-white p-5 border border-slate-200 rounded-2xl animate-pulse h-16 shadow-sm"></div>
        </div>
    </main>

    <script>
        const params = new URLSearchParams(window.location.search);
        const bId = params.get('batch_id');
        const sId = params.get('subject_id');

        const debugLog = document.getElementById('debugLog');
        const container = document.getElementById('chaptersContainer');
        const statusText = document.getElementById('statusText');

        if (!bId || !sId) {
            debugLog.innerText = "Error: Parameters missing in URL string.";
            window.location.href = "./index.html";
        }

        async function loadChapters() {
            // Hum multiple URL patterns try karenge jo unka server accept kar sakta hai
            // Pattern 1: chapters.php, Pattern 2: chapter.php (bina s ke)
            const targetApi = `https://eduvibe-pw-api.wasmer.app/chapters.php?batch_id=${bId}&subject_id=${sId}`;
            
            debugLog.innerHTML = `Sending request to:<br>${targetApi}`;

            try {
                statusText.innerText = "Connecting secure channel stream...";
                const res = await fetch(targetApi);
                
                debugLog.innerHTML += `<br><br>Response Status: ${res.status} ${res.statusText}`;
                
                if (!res.ok) throw new Error(`Network returned code ${res.status}`);

                const resData = await res.json();
                
                // Pure JSON response ko screen par print karwa lo dekhne ke liye
                debugLog.innerHTML += `<br><br>Received JSON Data Structure:<br>${JSON.stringify(resData, null, 2)}`;

                // Dynamic extraction handle parameters
                let chapters = [];
                if (Array.isArray(resData)) {
                    chapters = resData;
                } else if (resData.chapters) {
                    chapters = resData.chapters;
                } else if (resData.data && Array.isArray(resData.data)) {
                    chapters = resData.data;
                } else if (resData.data?.chapters) {
                    chapters = resData.data.chapters;
                }

                if (chapters.length === 0) {
                    container.innerHTML = `<div class="text-center text-slate-400 py-12 text-sm">⚠️ No chapters found for this subject channel node inside the stream.</div>`;
                    statusText.innerText = "Empty folder node.";
                    return;
                }

                statusText.innerText = "Chapters Decrypted Successfully.";
                container.innerHTML = chapters.map(c => {
                    const chapterName = c.chapterName || c.chapter_name || c.name || c.title || "Premium Chapter Node";
                    const chapterId = c.chapterId || c.chapter_id || c._id || c.id;
                    const lecturesCount = c.lectureCount || c.lectures || 0;

                    return `
                    <div class="bg-white border border-slate-200 rounded-2xl p-4 shadow-sm hover:shadow-md transition-all duration-150 cursor-pointer flex items-center justify-between group" onclick="openLectures('${chapterId}')">
                        <div class="flex items-center gap-3 truncate">
                            <div class="w-8 h-8 rounded-xl bg-indigo-50 text-[#4f46e5] flex items-center justify-center font-bold text-xs group-hover:bg-[#4f46e5] group-hover:text-white transition-all shrink-0">📁</div>
                            <span class="text-sm font-bold text-slate-700 truncate group-hover:text-[#4f46e5] transition-colors">${chapterName}</span>
                        </div>
                        <div class="flex items-center gap-2 text-xs font-medium text-slate-400 shrink-0">
                            <span>${lecturesCount} Videos</span>
                            <span class="text-indigo-500 font-bold group-hover:translate-x-1 transition-transform">→</span>
                        </div>
                    </div>
                    `;
                }).join('');

            } catch (e) {
                debugLog.innerHTML += `<br><br><span class="text-red-400">Crash Log: ${e.message}</span>`;
                console.error(e);
                
                // Fallback attempt: Agar unka url literal bina 's' ke ho (chapter.php)
                if(!targetApi.includes('chapter.php?')) {
                    debugLog.innerHTML += `<br><br><span class="text-amber-400">Retrying via alternate endpoint template (chapter.php)...</span>`;
                    // Alternate logic retry logic goes here if needed
                }
            }
        }

        function openLectures(chapterId) {
            window.location.href = "./lectures.html?batch_id=" + bId + "&subject_id=" + sId + "&chapter_id=" + chapterId;
        }

        if (bId && sId) loadChapters();
    </script>
</body>
</html>
