<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lectures - The DevCoderz</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .loader { border: 4px solid #f3f3f3; border-top: 4px solid #4f46e5; border-radius: 50%; width: 30px; height: 30px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="bg-slate-50 min-h-screen">

    <div id="status" class="flex flex-col items-center justify-center h-screen">
        <div class="loader mb-4"></div>
        <p id="msg" class="text-gray-600">Connecting to EduVibe Vault...</p>
    </div>

    <div id="mainContent" class="hidden max-w-2xl mx-auto p-4">
        <button onclick="history.back()" class="mb-4 text-sm font-bold text-indigo-600">← Back</button>
        <h1 id="title" class="text-xl font-bold mb-4">Lectures</h1>
        <div id="list" class="space-y-3"></div>
    </div>

    <script>
        const params = new URLSearchParams(window.location.search);
        const bId = params.get("batch_id");
        const sId = params.get("subject_id");
        // EduVibe ke liye chapter_id aur topic_id dono check kar rahe hain
        const tId = params.get("topic_id") || params.get("chapter_id");
        const tab = params.get("tab") || "videos";

        // EduVibe API Endpoint
        const targetApi = `https://eduvibe-pw-api.wasmer.app/get-lectures.php?batch_id=${bId}&subject_id=${sId}&topic_id=${tId}&tab=${tab}`;
        
        // Proxy URL calling your Stream.js (Next.js API route)
        const proxyUrl = `/api/stream?url=${encodeURIComponent(targetApi)}`;

        fetch(proxyUrl)
            .then(res => res.json())
            .then(data => {
                document.getElementById('status').classList.add('hidden');
                document.getElementById('mainContent').classList.remove('hidden');
                
                document.getElementById('title').innerText = data.topic_name || "Lectures";
                const list = document.getElementById('list');
                
                // Wasmer API response structure: data.lectures
                if (data.lectures && data.lectures.length > 0) {
                    list.innerHTML = data.lectures.map(i => `
                        <div class="bg-white p-4 rounded-xl shadow border border-gray-100 flex items-center gap-4 cursor-pointer hover:bg-slate-50" 
                             onclick="window.location.href='./player.html?video_id=${i.id || i.video_id}&batch_id=${bId}&subject_id=${sId}&topic_id=${tId}'">
                            <img src="${i.image || 'https://static.pw.live/react-batches/assets/study/blue-play-icon.svg'}" class="w-20 h-14 object-cover rounded">
                            <div>
                                <h3 class="font-bold text-sm text-slate-800">${i.name || "Lecture"}</h3>
                                <p class="text-xs text-gray-500">Duration: ${i.duration || '00:00'}</p>
                            </div>
                        </div>
                    `).join('');
                } else {
                    list.innerHTML = "<p class='text-center text-gray-500'>No lectures available in this folder.</p>";
                }
            })
            .catch(err => {
                document.getElementById('msg').innerText = "Proxy Connection Failed!";
                console.error("EduVibe Proxy Error:", err);
            });
    </script>
</body>
</html>
