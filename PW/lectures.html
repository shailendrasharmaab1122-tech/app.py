<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lectures - The DevCoderz</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .loader { border: 4px solid #f3f3f3; border-top: 4px solid #4f46e5; border-radius: 50%; width: 30px; height: 30px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="bg-gray-50 min-h-screen">

    <div id="status" class="flex flex-col items-center justify-center h-screen">
        <div class="loader mb-4"></div>
        <p id="msg" class="text-gray-600">Loading lectures...</p>
    </div>

    <div id="mainContent" class="hidden max-w-2xl mx-auto p-4">
        <button onclick="history.back()" class="mb-4 text-sm font-bold text-indigo-600">← Back</button>
        <h1 id="title" class="text-xl font-bold mb-4">Lectures</h1>
        <div id="list" class="space-y-3"></div>
    </div>

    <script>
        const params = new URLSearchParams(window.location.search);
        const bId = params.get("batch_id");
        const sId = params.get("subject_id");
        // Yahan null check hai
        const tId = params.get("topic_id") || params.get("chapter_id"); 
        const tab = params.get("tab") || "videos";

        const statusDiv = document.getElementById('status');
        const msg = document.getElementById('msg');
        const mainContent = document.getElementById('mainContent');

        if (!tId || tId === "null") {
            msg.innerText = "Error: Topic ID nahi mili! (URL check karein)";
            statusDiv.innerHTML = `<div class="text-red-500 font-bold">${msg.innerText}</div>`;
        } else {
            const url = `https://edunova-pw.site/api/get-lectures.php?batch_id=${bId}&subject_id=${sId}&topic_id=${tId}&tab=${tab}`;

            fetch(url)
                .then(res => res.json())
                .then(data => {
                    statusDiv.classList.add('hidden');
                    mainContent.classList.remove('hidden');
                    
                    document.getElementById('title').innerText = data.topic_name || "Lectures";
                    const list = document.getElementById('list');
                    
                    if (data.lectures && data.lectures.length > 0) {
                        list.innerHTML = data.lectures.map(i => `
                            <div class="bg-white p-4 rounded-xl shadow border border-gray-100 flex items-center gap-4">
                                <img src="${i.image || 'https://via.placeholder.com/80'}" class="w-20 h-14 object-cover rounded">
                                <div>
                                    <h3 class="font-bold text-sm">${i.name}</h3>
                                    <p class="text-xs text-gray-500">Duration: ${i.duration || 'N/A'}</p>
                                </div>
                            </div>
                        `).join('');
                    } else {
                        list.innerHTML = "<p class='text-center text-gray-500'>No lectures found for this topic.</p>";
                    }
                })
                .catch(err => {
                    msg.innerText = "API Error: " + err.message;
                    console.error(err);
                });
        }
    </script>
</body>
</html>
