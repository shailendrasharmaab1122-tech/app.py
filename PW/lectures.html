<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lectures - DevCoderZ</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
      body { background: #f8fafc; color: #0f172a; }
      .glow-text { text-shadow: 0 0 8px rgba(239,68,68,0.3); }
    </style>
</head>
<body class="min-h-screen flex flex-col pb-16">

    <nav class="h-16 bg-[#4f46e5] flex items-center justify-between px-6 shadow-md sticky top-0 z-50">
        <button onclick="history.back()" class="bg-white/20 hover:bg-white/30 text-white text-xs font-bold py-2 px-4 rounded-lg transition-all flex items-center gap-1">
            ← Back
        </button>
        <div class="text-xs text-white/90 bg-white/10 px-3 py-1.5 rounded-full border border-white/20 font-medium">
            Lectures Room
        </div>
    </nav>

    <main class="flex-1 max-w-5xl w-full mx-auto p-4 md:p-6">
        <div id="loader" class="text-center py-20 flex flex-col items-center gap-3">
            <div id="spinner" class="w-10 h-10 border-4 border-t-4 border-gray-200 border-t-[#4f46e5] rounded-full animate-spin"></div>
            <p id="loaderText" class="text-xs text-slate-400 font-medium">Waking up master instance container stream...</p>
        </div>

        <div id="lecContainer" class="space-y-4 hidden"></div>
    </main>

    <footer class="h-12 border-t border-slate-200 bg-white text-center text-xs text-slate-400 flex items-center justify-center gap-1 fixed bottom-0 inset-x-0 z-50 shadow-inner">
        <span>© 2026 The DevCoderz. All Rights Reserved.</span>
        <span>•</span>
        <span>Developed by <span class="text-red-500 font-bold tracking-wide glow-text">Devansh Sharma</span></span>
    </footer>

    <script>
        const params = new URLSearchParams(window.location.search);
        const bId = params.get('batch_id');
        const sId = params.get('subject_id');
        const tId = params.get('topic_id');

        if (!tId || !bId) {
            window.location.href = "./index.html";
        }

        const targetApi = `https://eduvibe-pw-api.wasmer.app/get-lectures.php?batch_id=${bId}&subject_id=${sId}&topic_id=${tId}&tab=videos`;
        
        const proxies = [
            { name: "Global Proxy Bridge", url: `https://api.allorigins.win/get?url=${encodeURIComponent(targetApi)}`, type: "allorigins" },
            { name: "Direct Fallback CDN", url: `https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(targetApi)}`, type: "direct" }
        ];

        async function fetchWithFallback(index = 0) {
            const container = document.getElementById('lecContainer');
            const loader = document.getElementById('loader');
            const loaderText = document.getElementById('loaderText');
            const spinner = document.getElementById('spinner');

            if (index >= proxies.length) {
                spinner.classList.add('hidden');
                loader.innerHTML = `
                    <div class="bg-white border border-slate-200 rounded-2xl p-6 max-w-md mx-auto text-center space-y-4 shadow-sm">
                        <div class="w-12 h-12 bg-amber-50 text-amber-500 rounded-full flex items-center justify-center mx-auto font-bold text-lg">⚠️</div>
                        <div class="space-y-1">
                            <h3 class="text-sm font-bold text-slate-800">Wasmer App Server Sleeping</h3>
                            <p class="text-xs text-slate-400 leading-relaxed">The target microservice instance is down or waking up from a cold start. Your frontend code is 100% fine.</p>
                        </div>
                        <div class="pt-2 flex gap-2">
                            <button onclick="window.open('${targetApi}', '_blank')" class="flex-1 bg-slate-100 hover:bg-slate-200 text-slate-700 text-xs font-bold py-2.5 rounded-xl transition-all">
                                Force Wake Server 🌐
                            </button>
                            <button onclick="window.location.reload()" class="flex-1 bg-[#4f46e5] hover:bg-[#4338ca] text-white text-xs font-bold py-2.5 rounded-xl transition-all shadow-sm">
                                Retry Connection 🔄
                            </button>
                        </div>
                    </div>`;
                return;
            }

            const currentProxy = proxies[index];
            loaderText.innerText = `Routing through ${currentProxy.name}...`;

            try {
                const controller = new AbortController();
                const timeoutId = setTimeout(() => controller.abort(), 6000); 

                const response = await fetch(currentProxy.url, { signal: controller.signal });
                clearTimeout(timeoutId);

                if (!response.ok) throw new Error("Status bad");

                const resData = await response.json();
                let data;

                if (currentProxy.type === "allorigins") {
                    data = JSON.parse(resData.contents);
                } else {
                    data = resData;
                }

                let lectures = [];
                if (data.lectures) lectures = data.lectures;
                else if (data.data && data.data.lectures) lectures = data.data.lectures;
                else if (data.data) lectures = Array.isArray(data.data) ? data.data : [data.data];
                else lectures = Array.isArray(data) ? data : [];

                if (lectures.length === 0) {
                    loader.innerHTML = `<div class="text-center text-slate-400 py-12 text-sm">⚠️ No premium video streams found under this filter tab.</div>`;
                    return;
                }

                loader.classList.add('hidden');
                container.classList.remove('hidden');

                container.innerHTML = lectures.map(l => {
                    const streamTitle = l.topic || l.name || l.title || "Untitled Premium Lecture Stream";
                    const displayDate = l.date || l.createdAt?.split('T')[0] || 'Dynamic Archive';

                    const streamUrl = l.url || l.videoUrl || l.streamUrl || (l.videoDetails && l.videoDetails.url) || '';
                    const keyId = l.keyId || l.key_id || (l.videoDetails && l.videoDetails.keyId) || '';
                    const keyVal = l.key || l.key_value || (l.videoDetails && l.videoDetails.key) || '';

                    return `
                    <div class="bg-white border border-slate-200 rounded-2xl p-5 shadow-sm hover:shadow-md border-l-4 border-l-[#4f46e5] flex flex-col sm:flex-row sm:items-center justify-between gap-4 transition-all">
                        <div class="space-y-1">
                            <h3 class="text-sm font-bold text-slate-800 leading-snug">${streamTitle}</h3>
                            <div class="text-[11px] font-medium text-slate-400">📅 Sync: ${displayDate}</div>
                        </div>
                        <a href="./player.html?url=${encodeURIComponent(streamUrl)}&keyId=${keyId}&key=${keyVal}" class="bg-[#4f46e5] hover:bg-[#4338ca] text-white text-xs font-bold px-5 py-2.5 rounded-xl transition-all text-center whitespace-nowrap shadow-sm">
                            ▶ Watch Now
                        </a>
                    </div>`;
                }).join('');

            } catch (err) {
                console.warn(`${currentProxy.name} failed, switching layer...`);
                fetchWithFallback(index + 1);
            }
        }

        if(tId && bId) fetchWithFallback();
    </script>
</body>
</html>
