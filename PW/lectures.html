<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lectures - DevCoderZ</title>
    <style>
        :root { --primary: #4f46e5; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: #f8fafc; padding: 20px; }
        .header { background: white; padding: 15px; border-radius: 12px; margin-bottom: 20px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); display: flex; align-items: center; justify-content: space-between; }
        .back-btn { text-decoration: none; color: var(--primary); font-weight: bold; }
        .lecture-card { background: white; margin-bottom: 15px; padding: 15px; border-radius: 15px; border-left: 5px solid var(--primary); display: flex; flex-direction: column; gap: 10px; }
        .lecture-title { font-weight: 700; color: #1e293b; }
        .play-btn { background: var(--primary); color: white; border: none; padding: 10px; border-radius: 8px; cursor: pointer; font-weight: bold; text-align: center; text-decoration: none; }
        #loader { text-align: center; padding: 50px; color: var(--primary); font-weight: bold; }
    </style>
</head>
<body>

    <div class="header">
        <a href="javascript:history.back()" class="back-btn">← Back</a>
        <div style="font-weight: 800; color: var(--primary);">DevCoderZ Player</div>
    </div>

    <div id="loader">Loading Lectures...</div>
    <div id="lectureList"></div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const batchId = urlParams.get('batch_id');
        const subjectId = urlParams.get('subject_id');

        async function fetchLectures() {
            try {
                const response = await fetch(`https://eduvibe-pw-api.wasmer.app/lectures.php?batch_id=${batchId}&subject_id=${subjectId}`);
                const data = await response.json();

                document.getElementById('loader').style.display = 'none';
                const list = document.getElementById('lectureList');

                list.innerHTML = data.lectures.map(l => `
                    <div class="lecture-card">
                        <div class="lecture-title">${l.topic}</div>
                        <div style="font-size: 12px; color: #64748b;">Date: ${l.date || 'N/A'}</div>
                        <a href="player.html?video_url=${btoa(l.url)}" class="play-btn">Watch Lecture</a>
                    </div>
                `).join('');
            } catch (e) {
                document.getElementById('loader').innerHTML = "Failed to load lectures.";
            }
        }
        fetchLectures();
    </script>
</body>
</html>
