<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lectures - DevCoderZ</title>
    <!-- Styles -->
    <style>
        body { font-family: sans-serif; margin: 0; padding: 20px; background: #f9fafb; }
        #loadingScreen { position: fixed; inset: 0; background: #fff; display: flex; align-items: center; justify-content: center; flex-direction: column; z-index: 99999; }
        .spinner { width: 40px; height: 40px; border: 4px solid #ddd; border-top: 4px solid #22c55e; border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { 100% { transform: rotate(360deg); } }
        .lecture-card { background: #fff; padding: 15px; margin-bottom: 10px; border-radius: 12px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); cursor: pointer; display: flex; align-items: center; }
        .play-icon { width: 40px; margin-right: 15px; }
        .lecture-name { font-size: 14px; font-weight: 600; color: #374151; }
    </style>
</head>
<body>

    <div id="loadingScreen">
        <div class="spinner"></div>
        <p>Loading lectures...</p>
    </div>

    <div id="root">
        <h3 id="topicName">Lectures</h3>
        <div id="contentContainer">
            <!-- Data yahan dynamic load hoga -->
        </div>
    </div>

    <script>
        const params = new URLSearchParams(window.location.search);
        const bId = params.get("batch_id");
        const sId = params.get("subject_id");
        const tId = params.get("topic_id") || params.get("chapter_id");
        const tab = params.get("tab") || "videos";

        async function loadLectures() {
            const container = document.getElementById("contentContainer");
            const loader = document.getElementById("loadingScreen");
            
            try {
                // API Call
                const res = await fetch(`/api/PW/all-batches-api4?batch_id=${bId}&subject_id=${sId}&topic_id=${tId}&tab=${tab}`);
                const data = await res.json();

                loader.style.display = "none";
                
                if (data.lectures && data.lectures.length > 0) {
                    container.innerHTML = data.lectures.map(l => `
                        <div class="lecture-card" onclick="window.location.href='player.html?url=${encodeURIComponent(l.url)}'">
                            <img src="https://static.pw.live/react-batches/assets/study/blue-play-icon.svg" class="play-icon">
                            <p class="lecture-name">${l.name}</p>
                        </div>
                    `).join('');
                } else {
                    container.innerHTML = "<p>No lectures found.</p>";
                }
            } catch (err) {
                console.error(err);
                loader.innerHTML = "<p style='color:red;'>Error loading data. Check API/Network.</p>";
            }
        }

        loadLectures();
    </script>
</body>
</html>
