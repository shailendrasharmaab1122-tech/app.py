<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="pageTitle">The DevCoderz</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #f8fafc; font-family: sans-serif; margin: 0; padding: 0; }
        .custom-tabs-container { display: flex; gap: 8px; overflow-x: auto; padding: 12px; margin-bottom: 16px; scrollbar-width: none; }
        .tab-btn { background: #ffffff; color: #475569; border: 1px solid #e2e8f0; padding: 10px 18px; font-size: 13px; font-weight: 600; border-radius: 30px; white-space: nowrap; cursor: pointer; }
        .tab-btn.active-tab { background: #4f46e5; color: #ffffff; border-color: #4f46e5; }
        .main-wrapper { max-width: 600px; margin: auto; padding: 10px; }
        .card { background: white; border-radius: 16px; padding: 16px; margin-bottom: 14px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); border: 1px solid #f1f5f9; display: flex; align-items: center; gap: 16px; cursor: pointer; transition: transform 0.2s; }
        .card:active { transform: scale(0.98); }
        .img-box { width: 80px; height: 60px; border-radius: 8px; overflow: hidden; flex-shrink: 0; background: #eef2ff; display: flex; align-items: center; justify-content: center; }
        .img-box img { width: 100%; height: 100%; object-fit: cover; }
        .text-box { flex-grow: 1; }
        .title-text { font-size: 14px; font-weight: 700; color: #1e293b; margin-bottom: 4px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        .meta-text { font-size: 12px; color: #64748b; }
        #loadingScreen { position: fixed; inset: 0; background: #fff; display: flex; align-items: center; justify-content: center; z-index: 99999; font-size: 14px; }
    </style>
</head>
<body class="pb-20">
    <div id="loadingScreen">Loading...</div>

    <nav class="h-16 bg-[#4f46e5] flex items-center px-6 text-white font-bold shadow-lg">
        <button onclick="history.back()" class="mr-4">← Back</button>
        The DevCoderz
    </nav>

    <div class="main-wrapper">
        <h3 class="text-lg font-bold text-slate-800 ml-2 mb-4" id="topicName">Loading...</h3>
        <div class="custom-tabs-container" id="tabsContainer"></div>
        <div id="contentContainer"></div>
    </div>

    <script>
      const params = new URLSearchParams(window.location.search);
      const batchId = params.get("batch_id");
      const subjectId = params.get("subject_id");
      const topicId = params.get("chapter_id") || params.get("topic_id");
      const activeTab = params.get("tab") || "videos";

      const cleanApiUrl = `https://edunova-pw.site/api/get-lectures.php?batch_id=${encodeURIComponent(batchId)}&subject_id=${encodeURIComponent(subjectId)}&topic_id=${encodeURIComponent(topicId)}&tab=${encodeURIComponent(activeTab)}`;

      fetch(cleanApiUrl)
        .then(res => {
          if (!res.ok) throw new Error("Network error");
          return res.json();
        })
        .then(data => {
          document.getElementById("loadingScreen").style.display = "none";
          document.getElementById("topicName").innerText = data.topic_name || "Topic";
          renderTabs();
          if (activeTab === "videos" || activeTab === "DppVideos") renderLectures(data.lectures || []);
          else if (activeTab === "notes" || activeTab === "DppNotes") renderNotes(data.lectures || []);
          else renderQuizzes(data.dpp_quizzes || []);
        })
        .catch(err => {
          document.getElementById("loadingScreen").innerText = "Error: Failed to load content. Check URL parameters.";
          console.error(err);
        });

      function renderTabs() {
        const tabs = [["videos", "Lectures"], ["notes", "Notes"], ["dppQuiz", "DPP Quiz"], ["DppNotes", "DPP PDF"], ["DppVideos", "DPP Solutions"]];
        let html = "";
        tabs.forEach(t => {
          html += `<button onclick="window.location.href='?batch_id=${batchId}&subject_id=${subjectId}&topic_id=${topicId}&tab=${t[0]}'" class="tab-btn ${activeTab === t[0] ? 'active-tab' : ''}">${t[1]}</button>`;
        });
        document.getElementById("tabsContainer").innerHTML = html;
      }

      function renderLectures(list) {
        let html = "";
        list.forEach(i => {
          html += `
            <div class="card" onclick="window.location.href='./player.html?video_id=${i.video_id || i.id}&batch_id=${batchId}&subject_id=${subjectId}&topic_id=${topicId}'">
                <div class="img-box"><img src="${i.image || 'https://static.pw.live/react-batches/assets/study/blue-play-icon.svg'}"></div>
                <div class="text-box">
                    <div class="title-text">${i.name || "Lecture"}</div>
                    <div class="meta-text">🕒 ${i.duration || "00:00"}</div>
                </div>
            </div>`;
        });
        document.getElementById("contentContainer").innerHTML = html || "<div class='text-center mt-10 text-slate-400'>No videos found.</div>";
      }

      function renderNotes(list) {
        let html = "";
        list.forEach(i => {
          html += `
            <div class="card" onclick="window.open('${i.download_url}', '_blank')">
                <div class="img-box" style="font-size:24px;">📄</div>
                <div class="text-box">
                    <div class="title-text">${i.title || "Study Material"}</div>
                    <div class="meta-text">PDF Document</div>
                </div>
            </div>`;
        });
        document.getElementById("contentContainer").innerHTML = html || "<div class='text-center mt-10 text-slate-400'>No notes found.</div>";
      }

      function renderQuizzes(list) {
        let html = "";
        list.forEach(i => {
          const test = i.dppQuizDetails?.test || {};
          html += `
            <div class="card" onclick="window.location.href='./dpp.html?batch_id=${batchId}&schedule_id=${i.dppQuizDetails?.scheduleId}&test_id=${test._id}'">
                <div class="img-box" style="font-size:24px;">📝</div>
                <div class="text-box">
                    <div class="title-text">${test.name || "DPP Quiz"}</div>
                    <div class="meta-text">Attempt Now</div>
                </div>
            </div>`;
        });
        document.getElementById("contentContainer").innerHTML = html || "<div class='text-center mt-10 text-slate-400'>No quizzes found.</div>";
      }
    </script>
</body>
</html>
