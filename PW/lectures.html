<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lectures - DevCoderZ</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
      body { background: #f8fafc; color: #0f172a; }
      .glow-text { text-shadow: 0 0 8px rgba(239,68,68,0.3); }
    </style>
</head>
<body class="min-h-screen flex flex-col pb-16">

    <nav class="h-16 bg-[#4f46e5] flex items-center justify-between px-6 shadow-md sticky top-0 z-50">
        <button onclick="history.back()" class="bg-white/20 hover:bg-white/30 text-white text-xs font-bold py-2 px-4 rounded-lg transition-all flex items-center gap-1">
            ← Back
        </button>
        <div class="text-xs text-white/90 bg-white/10 px-3 py-1.5 rounded-full border border-white/20 font-medium">
            Lectures Room
        </div>
    </nav>

    <main class="flex-1 max-w-5xl w-full mx-auto p-4 md:p-6">
        <div id="loader" class="text-center py-20 flex flex-col items-center gap-3">
            <div class="w-10 h-10 border-4 border-t-4 border-gray-200 border-t-[#4f46e5] rounded-full animate-spin"></div>
            <p class="text-xs text-slate-400 font-medium">Fetching Encrypted Streams (Proxy Secure Link)...</p>
        </div>

        <div id="lecContainer" class="space-y-4 hidden"></div>
    </main>

    <footer class="h-12 border-t border-slate-200 bg-white text-center text-xs text-slate-400 flex items-center justify-center gap-1 fixed bottom-0 inset-x-0 z-50 shadow-inner">
        <span>© 2026 The DevCoderz. All Rights Reserved.</span>
        <span>•</span>
        <span>Developed by <span class="text-red-500 font-bold tracking-wide glow-text">Devansh Sharma</span></span>
    </footer>

    <script>
        const params = new URLSearchParams(window.location.search);
        const bId = params.get('batch_id');
        const sId = params.get('subject_id');
        const tId = params.get('topic_id');

        async function fetchLectures() {
            const container = document.getElementById('lecContainer');
            const loader = document.getElementById('loader');

            if (!tId) {
                loader.innerHTML = `<div class="text-center text-red-500 font-medium text-sm">❌ Error: Missing Navigation Parameters.</div>`;
                return;
            }

            const targetApi = `https://eduvibe-pw-api.wasmer.app/lectures.php?batch_id=${bId}&subject_id=${sId}&topic_id=${tId}`;
            const proxyUrl = `https://api.allorigins.win/get?url=${encodeURIComponent(targetApi)}`;

            try {
                const response = await fetch(proxyUrl);
                const proxyData = await response.json();
                const data = JSON.parse(proxyData.contents);

                const lectures = data.lectures || data.data || (Array.isArray(data) ? data : []);

                if (lectures.length === 0) {
                    loader.innerHTML = `<div class="text-center text-slate-400 py-12 text-sm">⚠️ No premium streams found inside this topic channel.</div>`;
                    return;
                }

                loader.classList.add('hidden');
                container.classList.remove('hidden');

                container.innerHTML = lectures.map(l => {
                    const mUrl = l.url || "";
                    const kId = l.keyId || "";
                    const kVal = l.key || "";

                    // Pure layout ko strict design de diya hai aur video link direct player.html par point karega
                    return `
                    <div class="bg-white border border-slate-200 rounded-2xl p-5 shadow-sm hover:shadow-md border-l-4 border-l-[#4f46e5] flex flex-col sm:flex-row sm:items-center justify-between gap-4 transition-all">
                        <div class="space-y-1">
                            <h3 class="text-sm font-bold text-slate-800 leading-snug">${l.topic || l.name || "Untitled Premium Stream"}</h3>
                            <div class="text-[11px] font-medium text-slate-400">📅 Published: ${l.date || 'N/A'}</div>
                        </div>
                        <a href="./player.html?url=${encodeURIComponent(mUrl)}&keyId=${kId}&key=${kVal}" class="bg-[#4f46e5] hover:bg-[#4338ca] text-white text-xs font-bold px-5 py-2.5 rounded-xl transition-all text-center whitespace-nowrap shadow-sm">
                            ▶ Watch Now
                        </a>
                    </div>`;
                }).join('');

            } catch (err) {
                loader.innerHTML = `<div class="text-center text-red-500 font-medium text-sm">❌ Master server connection timeout. Try refreshing.</div>`;
            }
        }

        fetchLectures();
    </script>
</body>
</html>
