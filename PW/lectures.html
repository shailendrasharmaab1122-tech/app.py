<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lectures Debugger - DevCoderZ</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
      body { background: #f8fafc; color: #0f172a; }
    </style>
</head>
<body class="min-h-screen flex flex-col pb-16">

    <nav class="h-16 bg-[#4f46e5] flex items-center justify-between px-6 shadow-md sticky top-0 z-50">
        <button onclick="history.back()" class="bg-white/20 hover:bg-white/30 text-white text-xs font-bold py-2 px-4 rounded-lg transition-all flex items-center gap-1">
            ← Back
        </button>
        <div class="text-xs text-white/90 bg-white/10 px-3 py-1.5 rounded-full border border-white/20 font-medium">
            Lectures Node Diagnostics
        </div>
    </nav>

    <main class="flex-1 max-w-5xl w-full mx-auto p-4 md:p-6">
        <div class="mb-4">
            <h2 class="text-xl font-extrabold text-slate-800 tracking-tight">Lectures Content Monitor</h2>
            <p id="statusText" class="text-xs text-slate-400">Sniffing dynamic token arrays from Wasmer master storage...</p>
        </div>

        <div class="mb-4 bg-slate-900 text-green-400 p-4 rounded-xl font-mono text-xs overflow-x-auto shadow-inner">
            <p class="text-slate-400 font-bold mb-1">// Lectures API Log Trace:</p>
            <div id="debugLog">Initializing network sync handshake...</div>
        </div>

        <div id="lecContainer" class="space-y-4">
            <div class="bg-white p-5 border border-slate-200 rounded-2xl animate-pulse h-16 shadow-sm"></div>
        </div>
    </main>

    <footer class="h-12 border-t border-slate-200 bg-white text-center text-xs text-slate-400 flex items-center justify-center gap-1 fixed bottom-0 inset-x-0 z-50 shadow-inner">
        <span>© 2026 The DevCoderz. All Rights Reserved.</span>
        <span>•</span>
        <span>Developed by <span class="text-red-500 font-bold tracking-wide">Devansh Sharma</span></span>
    </footer>

    <script>
        const params = new URLSearchParams(window.location.search);
        const bId = params.get('batch_id');
        const sId = params.get('subject_id');
        const cId = params.get('chapter_id') || params.get('topic_id');

        const debugLog = document.getElementById('debugLog');
        const container = document.getElementById('lecContainer');
        const statusText = document.getElementById('statusText');

        if (!cId || !bId) {
            debugLog.innerText = "Critical Stop: URL Query items are incomplete.";
        }

        async function testLecturesStream() {
            // Hum unka standard API endpoint route define kar rhe h check krne ke liye
            let targetApi = `https://eduvibe-pw-api.wasmer.app/get-lectures.php?batch_id=${bId}&topic_id=${sId}&tab=videos`;
            
            debugLog.innerHTML = `Requesting Payload From:<br>${targetApi}`;

            try {
                const res = await fetch(targetApi);
                debugLog.innerHTML += `<br><br>Server Response Code: ${res.status} ${res.statusText}`;

                if (!res.ok) {
                    throw new Error(`HTTP Error Status: ${res.status}`);
                }

                const resData = await res.json();
                
                // Pure JSON string data structure dump
                debugLog.innerHTML += `<br><br>Dumped JSON Response Payload:<br>${JSON.stringify(resData, null, 2)}`;
                statusText.innerText = "Data successfully fetched. Inspect the keys inside trace log above.";

            } catch (e) {
                debugLog.innerHTML += `<br><br><span class="text-red-400">Network Exception Break: ${e.message}</span>`;
                debugLog.innerHTML += `<br><br><span class="text-amber-400">Suggestion: Check if lectures.php throws 404. If yes, the script name is different.</span>`;
                statusText.innerText = "Process halted due to connection error.";
            }
        }

        if (bId && cId) testLecturesStream();
    </script>
</body>
</html>
