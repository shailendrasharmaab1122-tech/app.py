<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="pageTitle">Lectures & Notes - DevCoderZ</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
      body { background: #f8fafc; color: #0f172a; }
      .glow-text { text-shadow: 0 0 8px rgba(239,68,68,0.3); }
    </style>
</head>
<body class="min-h-screen flex flex-col pb-16">

    <nav class="h-16 bg-[#4f46e5] flex items-center justify-between px-6 shadow-md sticky top-0 z-50">
        <button id="backBtn" class="bg-white/20 hover:bg-white/30 text-white text-xs font-bold py-2 px-4 rounded-lg transition-all flex items-center gap-1">
            ← Back
        </button>
        <div id="tabsContainer" class="flex bg-white/10 p-1 rounded-xl border border-white/20 gap-1"></div>
    </nav>

    <main class="flex-1 max-w-5xl w-full mx-auto p-4 md:p-6">
        <div class="mb-6">
            <h2 id="topicName" class="text-xl font-extrabold text-slate-800 tracking-tight">Syncing Module Array...</h2>
            <p id="statusText" class="text-xs text-slate-400">Pulling raw stream layers via AllOrigins backchannel...</p>
        </div>

        <div id="loader" class="text-center py-20 flex flex-col items-center gap-3">
            <div class="w-10 h-10 border-4 border-t-4 border-gray-200 border-t-[#4f46e5] rounded-full animate-spin"></div>
            <p class="text-xs text-slate-400 font-medium">Injecting token params to Wasmer engine. Fetching list...</p>
        </div>

        <div id="contentContainer" class="space-y-4 hidden"></div>
    </main>

    <footer class="h-12 border-t border-slate-200 bg-white text-center text-xs text-slate-400 flex items-center justify-center gap-1 fixed bottom-0 inset-x-0 z-50 shadow-inner">
        <span>© 2026 The DevCoderz. All Rights Reserved.</span>
        <span>•</span>
        <span>Developed by <span class="text-red-500 font-bold tracking-wide glow-text">Devansh Sharma</span></span>
    </footer>

    <script>
        const params = new URLSearchParams(window.location.search);
        const bId = params.get('batch_id');
        const sId = params.get('subject_id');
        const cId = params.get('chapter_id') || params.get('topic_id');
        const activeTab = params.get('tab') || 'videos';

        if (!bId || !sId || !cId) {
            window.location.href = "./index.html";
        }

        document.getElementById('backBtn').onclick = () => {
            window.location.href = `./chapters.html?batch_id=${bId}&subject_id=${sId}`;
        };

        function renderTabs() {
            const tabs = [
                ["videos", "Lectures"],
                ["notes", "Notes"],
                ["dppQuiz", "DPP Quiz"],
                ["DppNotes", "DPP PDF"],
                ["DppVideos", "DPP Solutions"]
            ];
            document.getElementById('tabsContainer').innerHTML = tabs.map(t => {
                const isActive = activeTab === t[0];
                return `<button onclick="changeTab('${t[0]}')" class="text-xs font-bold px-3 py-1.5 rounded-lg transition-all ${isActive ? 'bg-white text-[#4f46e5]' : 'text-white hover:bg-white/10'}">${t[1]}</button>`;
            }).join('');
        }

        window.premiumLecturesDb = {};

        function fetchContentCluster() {
            const container = document.getElementById('contentContainer');
            const loader = document.getElementById('loader');
            const topicNameText = document.getElementById('topicName');
            const pageTitle = document.getElementById('pageTitle');
            const statusText = document.getElementById('statusText');

            const rawApiUrl = `https://eduvibe-pw-api.wasmer.app/get-lectures.php?batch_id=${bId}&subject_id=${sId}&topic_id=${cId}&tab=${activeTab}`;
            
            // Kal waala exact RAW endpoint tunnel sequence
            const proxyApiUrl = `https://api.allorigins.win/raw?url=${encodeURIComponent(rawApiUrl)}`;

            fetch(proxyApiUrl)
                .then(res => {
                    if (!res.ok) throw new Error("Network pipeline error");
                    return res.json();
                })
                .then(data => {
                    loader.classList.add('hidden');
                    container.classList.remove('hidden');

                    topicNameText.innerText = data.topic_name || "Topic Repository Node";
                    pageTitle.innerText = data.topic_name || "Premium Portal";
                    statusText.innerText = `Raw JSON packet synchronized. Elements decoded successfully.`;

                    renderTabs();

                    // 1. VIDEOS OR DPP SOLUTIONS
                    if (activeTab === "videos" || activeTab === "DppVideos") {
                        let lectures = data.lectures || [];
                        if (lectures.length === 0) {
                            container.innerHTML = `<div class="text-center text-slate-400 py-12 text-sm">⚠️ No premium streaming feeds listed under this branch channel.</div>`;
                            return;
                        }

                        container.innerHTML = lectures.map(item => {
                            if (!item) return '';
                            const id = item._id || item.id || (item.videoDetails && item.videoDetails._id);
                            if (!id) return '';

                            const title = item.topic || (item.videoDetails && item.videoDetails.name) || "Premium Secure Stream";
                            const duration = (item.videoDetails && item.videoDetails.duration) || "00:00";
                            const thumbnail = (item.videoDetails && item.videoDetails.image) || "https://static.pw.live/react-batches/assets/study/blue-play-icon.svg";

                            let streamUrl = item.url || (item.videoDetails && item.videoDetails.videoUrl) || (item.videoDetails && item.videoDetails.hls_url) || '';
                            let findKey = (item.videoDetails && item.videoDetails.findKey) || '';

                            window.premiumLecturesDb[id] = { url: streamUrl, keyId: findKey };

                            return `
                            <div class="bg-white border border-slate-200 rounded-2xl p-4 shadow-sm flex flex-col sm:flex-row sm:items-center justify-between gap-4 border-l-4 border-l-[#4f46e5]">
                                <div class="flex items-center gap-4 truncate flex-1">
                                    <img src="${thumbnail}" class="w-16 h-10 object-cover rounded-lg border border-slate-100 hidden sm:block">
                                    <div class="space-y-1 truncate">
                                        <h3 class="text-sm font-bold text-slate-800 truncate" title="${title}">${title}</h3>
                                        <div class="text-[11px] font-medium text-slate-400">⏱️ Duration: ${duration}</div>
                                    </div>
                                </div>
                                <button onclick="playVideo('${id}')" class="bg-[#4f46e5] hover:bg-[#4338ca] text-white text-xs font-bold px-4 py-2 rounded-xl transition-all whitespace-nowrap shadow-sm">▶ Watch Now</button>
                            </div>`;
                        }).join('');
                    }

                    // 2. NOTES OR DPP PDF
                    else if (activeTab === "notes" || activeTab === "DppNotes") {
                        let notes = data.lectures || [];
                        if (notes.length === 0) {
                            container.innerHTML = `<div class="text-center text-slate-400 py-12 text-sm">⚠️ No reference notes or PDF documents available here.</div>`;
                            return;
                        }

                        container.innerHTML = notes.map(item => {
                            if (!item || !item.download_url) return '';
                            return `
                            <div class="bg-white border border-slate-200 rounded-2xl p-5 shadow-sm border-l-4 border-l-emerald-500 flex flex-col sm:flex-row sm:items-center justify-between gap-4">
                                <div class="space-y-1 truncate flex-1">
                                    <h3 class="text-sm font-bold text-slate-800 truncate" title="${item.title}">📄 ${item.title || "Notes Document"}</h3>
                                    <p class="text-[11px] text-slate-400">PDF Document Vault Resource</p>
                                </div>
                                <button onclick="window.open('${item.download_url}', '_blank')" class="bg-emerald-500 hover:bg-emerald-600 text-white text-xs font-bold px-4 py-2 rounded-xl transition-all shadow-sm">📄 Open PDF</button>
                            </div>`;
                        }).join('');
                    }

                    // 3. DPP INTERACTIVE QUIZZES
                    else if (activeTab === "dppQuiz") {
                        let quizzes = data.dpp_quizzes || [];
                        if (quizzes.length === 0) {
                            container.innerHTML = `<div class="text-center text-slate-400 py-12 text-sm">⚠️ No interactive quiz sets configured for this topic.</div>`;
                            return;
                        }

                        container.innerHTML = quizzes.map(quiz => {
                            const test = quiz.dppQuizDetails?.test || {};
                            const scheduleId = quiz.dppQuizDetails?.scheduleId;
                            if (!test._id || !scheduleId) return '';
                            return `
                            <div class="bg-white border border-slate-200 rounded-2xl p-5 shadow-sm border-l-4 border-l-amber-500 flex flex-col sm:flex-row sm:items-center justify-between gap-4">
                                <div class="space-y-1 truncate flex-1">
                                    <h3 class="text-sm font-bold text-slate-800 truncate" title="${test.name}">📝 ${test.name || "CBT Quiz"}</h3>
                                    <p class="text-[11px] text-slate-400">Online Computer Based Test</p>
                                </div>
                                <button onclick="openDpp('${test._id}', '${scheduleId}')" class="bg-amber-500 hover:bg-amber-600 text-white text-xs font-bold px-4 py-2 rounded-xl transition-all shadow-sm">📝 Start Quiz</button>
                            </div>`;
                        }).join('');
                    }
                })
                .catch(err => {
                    console.error(err);
                    loader.innerHTML = `
                    <div class="bg-white border border-slate-200 rounded-2xl p-6 max-w-md mx-auto text-center space-y-4 shadow-sm">
                        <div class="w-12 h-12 bg-red-50 text-red-500 rounded-full flex items-center justify-center mx-auto font-bold text-lg">❌</div>
                        <h3 class="text-sm font-bold text-slate-800">Operational Gateway Break</h3>
                        <p class="text-xs text-slate-400 leading-relaxed">Could not read response parameters or unmarshal structural array fields.</p>
                        <button onclick="window.location.reload()" class="w-full bg-[#4f46e5] text-white text-xs font-bold py-2.5 rounded-xl">Refresh & Reconnect 🔄</button>
                    </div>`;
                });
        }

        function changeTab(tab) {
            const url = new URL(window.location.href);
            url.searchParams.set("tab", tab);
            window.location.href = url.toString();
        }

        function playVideo(id) {
            const videoData = window.premiumLecturesDb[id];
            localStorage.setItem('current_stream_url', videoData ? videoData.url : '');
            localStorage.setItem('current_key_id', videoData ? videoData.keyId : '');
            window.location.href = `./player.html?video_id=${id}&batch_id=${bId}&subject_id=${sId}&topic_id=${cId}`;
        }

        function openDpp(testId, scheduleId) {
            window.location.href = `./dpp.html?batch_id=${bId}&schedule_id=${scheduleId}&test_id=${testId}`;
        }

        if (bId && cId) fetchContentCluster();
    </script>
</body>
</html>
