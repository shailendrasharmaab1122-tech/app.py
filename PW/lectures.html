<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Course Lectures - DevCoderz</title>
    <style>
        body {
            margin: 0;
            background: #0b0f19;
            color: #ffffff;
            font-family: sans-serif;
            padding: 20px;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        .header {
            border-bottom: 2px solid #10b981;
            padding-bottom: 15px;
            margin-bottom: 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .title {
            font-size: 24px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin: 0;
        }
        .section-container {
            margin-bottom: 40px;
        }
        .section-title {
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
        }
        .card {
            background: #111827;
            border: 1px solid #374151;
            border-radius: 8px;
            padding: 16px;
            cursor: pointer;
            transition: transform 0.2s, border-color 0.2s;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }
        .card:hover {
            transform: translateY(-2px);
        }
        .live-card:hover {
            border-color: #f43f5e;
        }
        .recorded-card:hover {
            border-color: #10b981;
        }
        .card-title {
            font-size: 14px;
            font-weight: 600;
            margin: 0 0 10px 0;
            line-height: 1.4;
        }
        .card-meta {
            font-size: 12px;
            color: #94a3b8;
            margin: 0;
        }
        .badge {
            font-size: 11px;
            font-weight: bold;
            padding: 3px 8px;
            border-radius: 4px;
            display: inline-block;
            margin-bottom: 10px;
            width: fit-content;
        }
        .badge-live {
            background: rgba(244, 63, 94, 0.1);
            color: #f43f5e;
            border: 1px solid rgba(244, 63, 94, 0.3);
        }
        .badge-upcoming {
            background: rgba(245, 158, 11, 0.1);
            color: #f59e0b;
            border: 1px solid rgba(245, 158, 11, 0.3);
        }
        .badge-recorded {
            background: rgba(16, 185, 129, 0.1);
            color: #10b981;
            border: 1px solid rgba(16, 185, 129, 0.3);
        }
        .live-dot {
            height: 10px;
            width: 10px;
            background: #f43f5e;
            border-radius: 50%;
            display: inline-block;
            animation: pulse 1.5s infinite;
        }
        @keyframes pulse {
            0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(244, 63, 94, 0.7); }
            70% { transform: scale(1); box-shadow: 0 0 0 8px rgba(244, 63, 94, 0); }
            100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(244, 63, 94, 0); }
        }
        .loading {
            color: #94a3b8;
            font-size: 14px;
            font-family: monospace;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1 class="title">DevCoderz Portal</h1>
        <div id="loadingStatus" class="loading">Loading interface pipelines...</div>
    </div>

    <div class="section-container" id="liveSection" style="display: none;">
        <h2 class="section-title" style="color: #f43f5e;">
            <span class="live-dot"></span>
            LIVE & UPCOMING CLASSES
        </h2>
        <div id="liveClassesGrid" class="grid"></div>
    </div>

    <div class="section-container" id="recordedSection">
        <h2 class="section-title" style="color: #10b981;">RECORDED LECTURES</h2>
        <div id="recordedClassesGrid" class="grid"></div>
    </div>
</div>

<script>
async function loadBatchContent() {
    const params = new URLSearchParams(window.location.search);
    const batchId = params.get('batch_id') || "698ad3519549b300a5e1cc6a";
    const subjectSlug = params.get('subjectSlug') || "physical-chemistry-by-vijay-kumar-tripathi-sir--vkt-sir--164171";
    const topicSlug = params.get('topicSlug') || "mole-concept-208340";

    const statusEl = document.getElementById('loadingStatus');
    const liveSection = document.getElementById('liveSection');
    const liveGrid = document.getElementById('liveClassesGrid');
    const recordedGrid = document.getElementById('recordedClassesGrid');

    liveGrid.innerHTML = '';
    recordedGrid.innerHTML = '';

    try {
        statusEl.innerText = "Syncing cluster data...";

        const recUrl = `https://apiserver.deltastudy.site/api/pw/datacontent?batchId=${batchId}&subjectSlug=${subjectSlug}&topicSlug=${topicSlug}&contentType=videos`;
        const recRes = await fetch(recUrl);
        const recData = await recRes.json();
        const recList = recData.data || recData || [];

        if (Array.isArray(recList) && recList.length > 0) {
            recList.forEach(item => {
                const card = document.createElement('div');
                card.className = 'card recorded-card';
                card.innerHTML = `
                    <div>
                        <span class="badge badge-recorded">RECORDED</span>
                        <h3 class="card-title">${item.topic || 'Untitled Lecture'}</h3>
                    </div>
                    <p class="card-meta">Faculty: ${item.teacherName || 'Expert Faculty'}</p>
                `;
                card.onclick = () => {
                    const videoId = item.videoDetails?._id || item._id;
                    window.location.href = `player.html?video_id=${videoId}&batch_id=${batchId}&subjectSlug=${subjectSlug}&topicSlug=${topicSlug}`;
                };
                recordedGrid.appendChild(card);
            });
        } else {
            recordedGrid.innerHTML = '<p class="card-meta">No recorded lectures found in this topic.</p>';
        }

        const liveUrl = `https://apiserver.deltastudy.site/api/pw/datacontent?batchId=${batchId}&subjectSlug=${subjectSlug}&topicSlug=${topicSlug}&contentType=live`;
        const liveRes = await fetch(liveUrl);
        const liveData = await liveRes.json();
        const liveList = liveData.data || liveData || [];

        if (Array.isArray(liveList) && liveList.length > 0) {
            liveSection.style.display = 'block';
            liveList.forEach(item => {
                const card = document.createElement('div');
                card.className = 'card live-card';
                
                const isLiveNow = item.isLive === true || item.videoDetails?.status === 'live';
                const badgeClass = isLiveNow ? 'badge-live' : 'badge-upcoming';
                const badgeText = isLiveNow ? '🔴 LIVE NOW' : '📅 SCHEDULED';

                card.innerHTML = `
                    <div>
                        <span class="badge ${badgeClass}">${badgeText}</span>
                        <h3 class="card-title">${item.topic || 'Live Session'}</h3>
                    </div>
                    <p class="card-meta">Date: ${item.date || 'Scheduled'}</p>
                `;
                card.onclick = () => {
                    const videoId = item.videoDetails?._id || item._id;
                    window.location.href = `player.html?video_id=${videoId}&batch_id=${batchId}&subjectSlug=${subjectSlug}&topicSlug=${topicSlug}`;
                };
                liveGrid.appendChild(card);
            });
        }

        statusEl.innerText = "Pipeline synced.";
    } catch (error) {
        statusEl.innerText = "❌ Connection Refused";
        console.error("Error loading layout components:", error);
    }
}

window.addEventListener('DOMContentLoaded', loadBatchContent);
</script>
</body>
</html>
