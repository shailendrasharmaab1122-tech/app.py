<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DevCoderZ Player</title>
    <link href="https://vjs.zencdn.net/8.10.0/video-js.css" rel="stylesheet" />
    <style>
        body { margin: 0; background: #000; display: flex; justify-content: center; align-items: center; height: 100vh; }
        .video-js { width: 100%; height: 100vh; }
    </style>
</head>
<body>

    <video id="my-video" class="video-js vjs-big-play-centered" controls preload="auto"></video>

    <script src="https://vjs.zencdn.net/8.10.0/video.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/videojs-contrib-eme/3.8.0/videojs-contrib-eme.min.js"></script>

    <script>
        const params = new URLSearchParams(window.location.search);
        const bId = params.get("batchId");
        const lId = params.get("lectureId");
        const sId = params.get("subjectId");

        fetch(`https://devcoderz-player.vercel.app/api/stream.js?batchId=${bId}&lectureId=${lId}&subjectId=${sId}`)
            .then(res => res.json())
            .then(data => {
                const match = data.url.match(/mediacdn\.pw\.live\/([a-f0-9-]+)\//);
                const streamUrl = `https://stream.pimaxer.in/${match[1]}/master.m3u8`;
                
                const player = videojs('my-video');
                player.eme();
                player.src({ src: streamUrl, type: 'application/x-mpegURL' });
                
                player.ready(() => {
                    if (data.drmKeys?.clearKeys) {
                        player.eme({ keySystems: { 'org.w3.clearkey': data.drmKeys.clearKeys } });
                    }
                    player.play();
                });
            })
            .catch(err => alert("Error loading player"));
    </script>
</body>
</html>
