<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DevCoderZ - Home</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: #f0f2f5; }
        .nav { background: #4f46e5; color: white; padding: 15px; text-align: center; font-weight: 800; font-size: 22px; position: sticky; top: 0; z-index: 10; }
        .search-box { padding: 20px; display: flex; justify-content: center; }
        #search { width: 90%; max-width: 500px; padding: 12px 20px; border-radius: 25px; border: 1px solid #ccc; outline: none; }
        .container { padding: 15px; display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; }
        .card { background: white; border-radius: 15px; overflow: hidden; box-shadow: 0 4px 10px rgba(0,0,0,0.1); cursor: pointer; transition: 0.3s; }
        .card:hover { transform: translateY(-5px); }
        .card img { width: 100%; height: 160px; object-fit: contain; background: #fafafa; }
        .p-10 { padding: 15px; }
        .title { font-weight: 700; font-size: 16px; height: 45px; overflow: hidden; margin-bottom: 10px; }
        .price { color: #4f46e5; font-weight: 800; font-size: 18px; }
        #loader { text-align: center; margin-top: 50px; font-weight: 600; color: #666; }
    </style>
</head>
<body>
    <div class="nav">DevCoderZ PW Hub</div>
    <div class="search-box"><input type="text" id="search" placeholder="Search Batch..."></div>
    <div id="loader">Loading Batches...</div>
    <div class="container" id="grid"></div>

    <script>
        let allBatches = [];
        async function fetchBatches() {
            try {
                const r = await fetch("https://eduvibe-mj.pages.dev/allbatches.json");
                const d = await r.json();
                allBatches = d.batches || d;
                document.getElementById('loader').remove();
                render(allBatches);
            } catch (e) { document.getElementById('loader').innerText = "Error Loading!"; }
        }
        function render(data) {
            document.getElementById('grid').innerHTML = data.map(b => `
                <div class="card" onclick="location.href='subjects.html?batch_id=${b._id}'">
                    <img src="${b.previewImage || 'https://via.placeholder.com/300'}" loading="lazy">
                    <div class="p-10">
                        <div class="title">${b.name}</div>
                        <div class="price">${b.feeTotal ? '₹'+b.feeTotal : 'FREE'}</div>
                    </div>
                </div>
            `).join('');
        }
        document.getElementById('search').oninput = (e) => {
            const val = e.target.value.toLowerCase();
            render(allBatches.filter(b => b.name.toLowerCase().includes(val)));
        }
        fetchBatches();
    </script>
</body>
</html>
