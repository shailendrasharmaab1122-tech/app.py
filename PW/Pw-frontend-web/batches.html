<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Subjects</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: sans-serif; }
        body { background: #f8fafc; padding: 15px; }
        .back { color: #4f46e5; text-decoration: none; font-weight: 700; display: inline-block; margin-bottom: 20px; }
        .header { font-size: 24px; font-weight: 800; margin-bottom: 20px; color: #1e293b; border-left: 5px solid #4f46e5; padding-left: 15px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 15px; }
        .sub-card { background: white; padding: 15px; border-radius: 12px; display: flex; align-items: center; gap: 15px; cursor: pointer; box-shadow: 0 2px 8px rgba(0,0,0,0.05); transition: 0.2s; }
        .sub-card:hover { background: #eef2ff; transform: scale(1.02); }
        .sub-card img { width: 55px; height: 55px; border-radius: 10px; object-fit: cover; }
        .sub-name { font-weight: 700; color: #333; }
    </style>
</head>
<body>
    <a href="index.html" class="back">← Sabhi Batches</a>
    <div id="btitle" class="header">Loading...</div>
    <div class="grid" id="sgrid"></div>

    <script>
        const bid = new URLSearchParams(window.location.search).get('batch_id');
        async function load() {
            const r = await fetch(`https://eduvibe-pw-api.wasmer.app/batch.php?batch_id=${bid}`);
            const d = await r.json();
            document.getElementById('btitle').innerText = d.batch_title || "Subjects";
            document.getElementById('sgrid').innerHTML = (d.subjects || []).map(s => `
                <div class="sub-card" onclick="location.href='lectures.html?batch_id=${bid}&subject_id=${s._id}'">
                    <img src="${s.imageId?.baseUrl + s.imageId?.key || 'https://via.placeholder.com/60'}">
                    <div class="sub-name">${s.subject}</div>
                </div>
            `).join('');
        }
        load();
    </script>
</body>
</html>
