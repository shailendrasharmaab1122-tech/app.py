<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lectures</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: sans-serif; }
        body { background: #fff; padding: 15px; }
        .lec-card { border-bottom: 1px solid #eee; padding: 15px 0; display: flex; justify-content: space-between; align-items: center; }
        .lec-title { font-weight: 600; font-size: 15px; color: #333; max-width: 70%; }
        .play-btn { background: #4f46e5; color: white; padding: 8px 15px; border-radius: 8px; text-decoration: none; font-size: 13px; font-weight: 700; }
        .header { font-size: 20px; font-weight: 800; margin-bottom: 20px; color: #4f46e5; }
    </style>
</head>
<body>
    <div class="header">Lectures</div>
    <div id="lList">Loading Lectures...</div>

    <script>
        const params = new URLSearchParams(window.location.search);
        const bid = params.get('batch_id');
        const sid = params.get('subject_id');

        async function fetchLecs() {
            // Note: EduVibe typically uses a direct call or sub-folder for lectures
            const r = await fetch(`https://eduvibe-pw-api.wasmer.app/batch.php?batch_id=${bid}&subject_id=${sid}`);
            const d = await r.json();
            
            // Checking if classes exist in response
            const classes = d.classes || [];
            if(classes.length === 0) {
                document.getElementById('lList').innerText = "No lectures found in this subject.";
                return;
            }

            document.getElementById('lList').innerHTML = classes.map(l => `
                <div class="lec-card">
                    <div class="lec-title">${l.topic}</div>
                    <a href="https://eduvibe-pw-api.wasmer.app/videoplayerr.php?batch_id=${bid}&subject_id=${sid}&video_id=${l._id}" class="play-btn">WATCH</a>
                </div>
            `).join('');
        }
        fetchLecs();
    </script>
</body>
</html>
