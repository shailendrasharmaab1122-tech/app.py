<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The DevCoderZ - Platform</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body, html { width: 100%; height: 100%; overflow: hidden; background: #f8fafc; }
        .glow-logo { text-shadow: 0 0 10px rgba(255, 255, 255, 0.8), 0 0 20px rgba(255, 255, 255, 0.4); }
        .glow-text { text-shadow: 0 0 8px rgba(239,68,68,0.3); }
        .iframe-container { height: calc(100vh - 7rem); width: 100%; }
        .loader { border-top-color: #4f46e5; animation: spinner 0.6s linear infinite; }
        @keyframes spinner { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="flex flex-col h-screen overflow-hidden">

    <nav class="h-16 bg-[#4f46e5] flex items-center justify-between px-6 shadow-md z-50 shrink-0">
        <div class="flex items-center gap-2">
            <div class="h-9 w-9 bg-white rounded-lg flex items-center justify-center font-bold text-[#4f46e5] shadow-sm">DC</div>
            <span class="text-xl font-black tracking-tight text-white glow-logo">The DevCoderZ</span>
        </div>
        <div class="text-xs text-white/90 bg-white/10 px-3 py-1.5 rounded-full border border-white/20 font-medium">
            Smart Virtual Frame
        </div>
    </nav>

    <main class="iframe-container bg-white shrink-0 relative flex items-center justify-center">
        <div id="loadingStatus" class="absolute flex flex-col items-center gap-3 z-10">
            <div class="loader ease-linear rounded-full border-4 border-t-4 border-gray-200 h-10 w-10"></div>
            <p class="text-xs text-slate-400 font-medium">Injecting Secure Tunnel...</p>
        </div>
        
        <iframe 
            id="engineFrame"
            class="w-full h-full border-none opacity-0 transition-opacity duration-300"
            allow="autoplay; encrypted-media; fullscreen"
            sandbox="allow-scripts allow-same-origin allow-forms">
        </iframe>
    </main>

    <footer class="h-12 border-t border-slate-200 bg-white text-center text-xs text-slate-400 flex items-center justify-center gap-1 shadow-inner z-50 shrink-0">
        <span>© 2026 The DevCoderz. All Rights Reserved.</span>
        <span>•</span>
        <span>Developed by <span class="text-red-500 font-bold tracking-wide glow-text">Devansh Sharma</span></span>
    </footer>

    <script>
        const targetUrl = "https://eduvibe-pw.page.gd/";
        
        // We use a clean open-source json wrap that has absolutely no domain limits
        fetch(`https://api.allorigins.win/get?url=${encodeURIComponent(targetUrl)}`)
        .then(response => {
            if (response.ok) return response.json();
            throw new Error('Network response error.');
        })
        .then(data => {
            let html = data.contents;
            
            // MAGIC INJECTION: We force a base tag so all images, scripts, and CSS load from page.gd natively!
            const baseTag = `<base href="${targetUrl}">`;
            html = html.replace("<head>", `<head>${baseTag}`);

            const frame = document.getElementById("engineFrame");
            frame.srcdoc = html;

            frame.onload = () => {
                document.getElementById("loadingStatus").classList.add("hidden");
                frame.classList.remove("opacity-0");
            };
        })
        .catch(err => {
            document.getElementById("loadingStatus").innerHTML = `
                <p class="text-sm text-red-500 font-bold">Tunnel Error</p>
                <p class="text-xs text-slate-400">Please refresh or use direct access mode.</p>
            `;
        });
    </script>
</body>
</html>
