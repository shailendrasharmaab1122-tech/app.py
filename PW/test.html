<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DevCoderZ - Batches</title>
    <style>
        :root { --primary: #4f46e5; --bg: #0f172a; }
        body { font-family: 'Poppins', sans-serif; background: var(--bg); color: white; margin: 0; }
        
        /* Batch Grid Section */
        #batch-section { padding: 20px; text-align: center; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; margin-top: 30px; }
        
        .batch-card { 
            background: #1e293b; border-radius: 15px; padding: 20px; 
            border: 1px solid #334155; transition: 0.3s;
        }
        .batch-card:hover { transform: translateY(-5px); border-color: var(--primary); }
        .batch-card img { width: 100%; border-radius: 10px; margin-bottom: 15px; }
        
        .explore-btn { 
            background: var(--primary); color: white; border: none; 
            padding: 10px 25px; border-radius: 8px; cursor: pointer; font-weight: bold; 
        }

        /* Iframe Section */
        #iframe-container { display: none; width: 100%; height: 100vh; position: fixed; top: 0; left: 0; background: black; }
        .back-btn { 
            position: absolute; top: 10px; left: 10px; z-index: 100;
            background: rgba(0,0,0,0.6); color: white; padding: 8px 15px; border-radius: 5px; border: none; cursor: pointer;
        }
        iframe { width: 100%; height: 100%; border: none; }
    </style>
</head>
<body>

    <!-- Batches Page -->
    <div id="batch-section">
        <h1>DevCoderZ Batches</h1>
        <div class="grid" id="batchGrid">
            <!-- Batch 1 -->
            <div class="batch-card">
                <img src="https://pw.live/assets/batch-placeholder.png" alt="Batch">
                <h3>Lakshya JEE 2026</h3>
                <button class="explore-btn" onclick="openBatch('67790151518b938bc630052d')">Explore Now</button>
            </div>
            
            <!-- Batch 2 -->
            <div class="batch-card">
                <img src="https://pw.live/assets/batch-placeholder.png" alt="Batch">
                <h3>Arjuna NEET 2026</h3>
                <button class="explore-btn" onclick="openBatch('BATCH_ID_HERE')">Explore Now</button>
            </div>
        </div>
    </div>

    <!-- Iframe Viewer -->
    <div id="iframe-container">
        <button class="back-btn" onclick="closeBatch()">← Back to DevCoderZ</button>
        <iframe id="eduFrame" src=""></iframe>
    </div>

    <script>
        function openBatch(batchId) {
            const baseUrl = "https://eduvibe-pw-temp.ct.ws/batch.php"; // Ya subject.php jo bhi unka link structure ho
            const finalUrl = `${baseUrl}?batch_id=${batchId}`;
            
            document.getElementById('eduFrame').src = finalUrl;
            document.getElementById('batch-section').style.display = 'none';
            document.getElementById('iframe-container').style.display = 'block';
        }

        function closeBatch() {
            document.getElementById('eduFrame').src = "about:blank";
            document.getElementById('iframe-container').style.display = 'none';
            document.getElementById('batch-section').style.display = 'block';
        }
    </script>
</body>
</html>
