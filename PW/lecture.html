<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lectures</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 pb-10">
    <div id="content" class="max-w-md mx-auto p-4 space-y-4">
        <h1 class="text-xl font-bold">Lectures</h1>
        <div id="list">Loading...</div>
    </div>

    <script>
        const params = new URLSearchParams(window.location.search);
        const url = `https://apiserver.deltastudy.site/api/pw/datacontent?batchId=${params.get("b")}&subjectSlug=${params.get("s")}&topicSlug=${params.get("t")}&contentType=videos`;

        fetch(`https://devcoderz.vercel.app/api/stream.js/get?url=${encodeURIComponent(url)}`)
            .then(res => res.json())
            .then(data => {
                const list = JSON.parse(data.contents).data;
                const container = document.getElementById('list');
                container.innerHTML = "";
                list.forEach(i => {
                    container.innerHTML += `
                        <div class="bg-white p-4 rounded-xl shadow border">
                            <p class="font-bold text-sm">${i.name}</p>
                            <button onclick="window.location.href='player.html?url=${encodeURIComponent(i.url)}'" class="mt-2 w-full bg-black text-white p-2 rounded">Watch</button>
                        </div>`;
                });
            });
    </script>
</body>
</html>
