<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DevCoderz | All-in-One Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .card:hover { transform: translateY(-5px); transition: 0.3s ease; }
        .active-tab { background: #4f46e5 !important; color: white !important; box-shadow: 0 4px 15px rgba(79, 70, 229, 0.4); }
        .skeleton { background: linear-gradient(90deg, #111827 25%, #1f2937 50%, #111827 75%); background-size: 200% 100%; animation: load 1.5s infinite; }
        @keyframes load { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
    </style>
</head>
<body class="bg-gray-950 text-white font-sans">

    <div class="max-w-7xl mx-auto p-4 md:p-8">
        <header class="text-center mb-8">
            <h1 id="title" class="text-3xl font-bold text-indigo-500 mb-4 tracking-tight">Loading...</h1>
            
            <div class="flex flex-wrap justify-center gap-2 mb-8 bg-gray-900/50 p-2 rounded-2xl border border-gray-800">
                <button onclick="tab('videos')" id="tab-videos" class="px-4 py-2 rounded-xl text-sm font-medium bg-gray-800 text-gray-400 hover:bg-gray-700 transition-all">Lectures</button>
                <button onclick="tab('notes')" id="tab-notes" class="px-4 py-2 rounded-xl text-sm font-medium bg-gray-800 text-gray-400 hover:bg-gray-700 transition-all">Notes</button>
                <button onclick="tab('DppNotes')" id="tab-DppNotes" class="px-4 py-2 rounded-xl text-sm font-medium bg-gray-800 text-gray-400 hover:bg-gray-700 transition-all">DPP PDF</button>
                <button onclick="tab('DppVideos')" id="tab-DppVideos" class="px-4 py-2 rounded-xl text-sm font-medium bg-gray-800 text-gray-400 hover:bg-gray-700 transition-all">DPP Solutions</button>
            </div>
        </header>

        <div id="contentGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6">
            <div class="h-48 skeleton rounded-2xl border border-gray-800"></div>
            <div class="h-48 skeleton rounded-2xl border border-gray-800"></div>
            <div class="h-48 skeleton rounded-2xl border border-gray-800"></div>
        </div>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const bId = urlParams.get("batch_id");
        const sId = urlParams.get("subject_id");
        const tId = urlParams.get("topic_id");
        const currentTab = urlParams.get("tab") || "videos";

        async function load() {
            if (!bId || !sId || !tId) return document.getElementById("title").innerText = "Missing Parameters";
            
            document.getElementById(`tab-${currentTab}`).classList.add("active-tab");

            try {
                const res = await fetch(`https://eduvibe-pw-api.wasmer.app/get-lectures.php?batch_id=${bId}&subject_id=${sId}&topic_id=${tId}&tab=${currentTab}`);
                const data = await res.json();
                
                document.getElementById("title").innerText = data.topic_name || "Study Room";
                
                if (currentTab === "videos" || currentTab === "DppVideos") renderVideos(data.lectures || []);
                else if (currentTab === "notes" || currentTab === "DppNotes") renderPDFs(data.lectures || []);
                
            } catch (e) {
                document.getElementById("title").innerText = "Error Fetching Data";
            }
        }

        function renderVideos(list) {
            const container = document.getElementById("contentGrid");
            container.innerHTML = list.map(v => `
                <div class="card bg-gray-900 border border-gray-800 rounded-2xl overflow-hidden cursor-pointer shadow-lg" onclick="play('${v._id}')">
                    <div class="relative">
                        <img src="${v.videoDetails?.image}" class="w-full aspect-video object-cover opacity-90">
                        <span class="absolute bottom-2 right-2 bg-black/80 px-2 py-0.5 rounded text-[10px] font-mono">${v.videoDetails?.duration}</span>
                    </div>
                    <div class="p-4"><h3 class="text-xs font-semibold line-clamp-2">${v.topic}</h3></div>
                </div>
            `).join('');
        }

        function renderPDFs(list) {
            const container = document.getElementById("contentGrid");
            container.innerHTML = list.map(p => `
                <div class="card bg-gray-900 border border-gray-800 rounded-2xl p-5 flex items-center gap-4 cursor-pointer hover:border-indigo-500/50" onclick="window.open('${p.download_url}', '_blank')">
                    <div class="w-12 h-12 bg-red-500/10 flex items-center justify-center rounded-xl text-red-500">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 10v6m0 0l-3-3m3 3l3-3m2 8H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/></svg>
                    </div>
                    <div class="flex-1 overflow-hidden">
                        <h3 class="text-sm font-medium truncate">${p.title || 'Untitled Document'}</h3>
                        <p class="text-[10px] text-gray-500 mt-1 uppercase font-bold">PDF Material</p>
                    </div>
                </div>
            `).join('');
        }

        function tab(t) {
            urlParams.set("tab", t);
            window.location.search = urlParams.toString();
        }

        function play(id) {
            window.location.href = `player.html?video_id=${id}&batch_id=${bId}`;
        }

        load();
    </script>
</body>
</html>
