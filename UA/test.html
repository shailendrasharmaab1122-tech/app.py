<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eduvibe PW Brief</title>
    <style>
        /* Body aur HTML ke default margins aur padding ko remove karne ke liye */
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden; /* Scrollbars ko hide karne ke liye */
            background-color: #f4f4f4;
        }

        /* Iframe ko full screen banane ke liye CSS */
        .iframe-container {
            width: 100%;
            height: 100vh; /* Viewport height 100% */
            border: none;
        }
    </style>
</head>
<body>

    <iframe 
        src="https://eduvibe-pw-brief.wasmer.app/" 
        class="iframe-container"
        allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" 
        allowfullscreen>
    </iframe>

</body>
</html>
