<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The DevCoderZ - Premium Batches</title>
  <style>
    :root {
      --primary: #007bff;
      --primary-hover: #0056b3;
      --bg-dark: #0f172a;
      --bg-card: #1e293b;
      --text-main: #f8fafc;
      --text-muted: #94a3b8;
    }

    * {
      margin: 0;
      padding: 0;
      box-box-sizing: border-box;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      user-select: auto !important;
      -webkit-user-select: auto !important;
    }

    body {
      background-color: var(--bg-dark);
      color: var(--text-main);
      padding-bottom: 80px;
    }

    /* Header & Branding */
    header {
      background-color: var(--bg-card);
      padding: 20px;
      text-align: center;
      border-bottom: 2px solid #334155;
    }

    header h1 {
      font-size: 24px;
      color: var(--primary);
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    header p {
      font-size: 14px;
      color: var(--text-muted);
      margin-top: 5px;
    }

    /* Category Tabs */
    .tabs {
      display: flex;
      gap: 10px;
      padding: 20px;
      overflow-x: auto;
      justify-content: center;
      background: var(--bg-dark);
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .tab {
      padding: 10px 20px;
      border-radius: 30px;
      background: var(--bg-card);
      color: var(--text-main);
      cursor: pointer;
      white-space: nowrap;
      border: 1px solid #334155;
      transition: 0.2s;
    }

    .tab.active, .tab:hover {
      background: var(--primary);
      color: #fff;
      border-color: var(--primary);
    }

    /* Batches Grid Container */
    .container {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 25px;
      padding: 20px;
      max-width: 1200px;
      margin: 0 auto;
    }

    /* Batch Cards */
    .card {
      background: var(--bg-card);
      border-radius: 16px;
      overflow: hidden;
      cursor: pointer;
      transition: transform 0.3s, box-shadow 0.3s;
      border: 1px solid #334155;
      position: relative;
    }

    .card:hover {
      transform: translateY(-5px);
      box-shadow: 0 10px 20px rgba(0,0,0,0.3);
    }

    .wrapper {
      position: relative;
      width: 100%;
      padding-top: 56.25%; /* 16:9 Aspect Ratio */
    }

    .card img {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .badge {
      position: absolute;
      background: #ef4444;
      color: white;
      padding: 4px 10px;
      font-size: 11px;
      font-weight: bold;
      border-radius: 6px;
      top: 12px;
      left: 12px;
      z-index: 2;
    }

    .card-body {
      padding: 16px;
    }

    .title {
      font-size: 15px;
      font-weight: bold;
      line-height: 1.4;
      margin-bottom: 12px;
      height: 42px;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .card-footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .price-tag {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .price {
      color: #22c55e;
      font-weight: bold;
      font-size: 16px;
    }

    .mrp {
      text-decoration: line-through;
      color: var(--text-muted);
      font-size: 13px;
    }

    /* Lectures Modal / Popup */
    .modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.8);
      z-index: 100;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    .modal-content {
      background: var(--bg-card);
      width: 100%;
      max-width: 600px;
      border-radius: 16px;
      padding: 20px;
      border: 1px solid #334155;
      max-height: 80vh;
      overflow-y: auto;
    }

    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid #334155;
      padding-bottom: 10px;
      margin-bottom: 15px;
    }

    .close-btn {
      cursor: pointer;
      font-size: 24px;
      color: var(--text-muted);
    }

    .lecture-item {
      background: var(--bg-dark);
      padding: 12px;
      border-radius: 8px;
      margin-bottom: 10px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border: 1px solid #334155;
    }

    .play-btn {
      background: var(--primary);
      border: none;
      color: white;
      padding: 6px 12px;
      border-radius: 6px;
      cursor: pointer;
    }

    /* Footer Credits */
    footer {
      background-color: var(--bg-card);
      text-align: center;
      padding: 15px;
      position: fixed;
      bottom: 0;
      width: 100%;
      border-top: 2px solid #334155;
    }

    footer p {
      font-size: 14px;
      color: var(--text-muted);
    }

    footer .highlight {
      color: var(--primary);
      font-weight: bold;
    }
  </style>
</head>
<body>

  <!-- Branding Header -->
  <header>
    <h1>The DevCoderZ Portal</h1>
    <p>Access Your Learning Batches Dynamically</p>
  </header>

  <!-- Category Tabs -->
  <div class="tabs">
    <div class="tab active" onclick="filterCards('all', this)">All</div>
    <div class="tab" onclick="filterCards('9th', this)">9th Class</div>
    <div class="tab" onclick="filterCards('10th', this)">10th Class</div>
    <div class="tab" onclick="filterCards('11th', this)">11th Class</div>
    <div class="tab" onclick="filterCards('12th', this)">12th Class</div>
  </div>

  <!-- Batches Dynamic Grid -->
  <div class="container" id="batches-grid">
    <!-- JavaScript will inject cards here -->
  </div>

  <!-- Lectures List Modal (Hidden by default) -->
  <div class="modal" id="lectures-modal">
    <div class="modal-content">
      <div class="modal-header">
        <h3 id="modal-batch-title">Batch Lectures</h3>
        <span class="close-btn" onclick="closeModal()">&times;</span>
      </div>
      <div id="lectures-list">
        <!-- Lectures data will show up here -->
      </div>
    </div>
  </div>

  <!-- Footer Credits -->
  <footer>
    <p>© 2026 <span class="highlight">The DevCoderZ</span> | Developed by <span class="highlight">Devansh Sharma</span></p>
  </footer>

  <script>
    // Pure Batches Ka Data Array Jo Tumne Nikaala Hai
    const batchData = [
      { id: "62", name: "AARAMBH 2.O 10th BATCH 2025-26", img: "https://dxixtlyravvxx.cloudfront.net/540/admin_v1/bundle_management/course/285939929246_10th%20aarambh%202.0%20banner%20app.jpg", tag: "10th" },
      { id: "64", name: "AARAMBH 2.O 9th BATCH 2025-26", img: "https://dxixtlyravvxx.cloudfront.net/540/admin_v1/bundle_management/course/152792333113_9th%20aarambh%202.0%20banner%20app.jpg", tag: "9th" },
      { id: "78", name: "Abhay 10th Batch 2025-26", img: "https://dxixtlyravvxx.cloudfront.net/540/admin_v1/bundle_management/course/626308539904_abhay%2010th%20banner%20app%202026.png", tag: "10th" },
      { id: "81", name: "Abhay 9th Batch 2025-26", img: "https://dxixtlyravvxx.cloudfront.net/540/admin_v1/bundle_management/course/151836440589_abhay%209th%20banner%20app%202026.png", tag: "9th" },
      { id: "83", name: "UP Board ABHAY 10th (हिंदी माध्यम) 2025-26", img: "https://dxixtlyravvxx.cloudfront.net/540/admin_v1/bundle_management/course/641788840605_Abhay%20UP%20Board%20%281%29.png", tag: "10th" },
      { id: "84", name: "Bihar Board ABHAY 10th(हिंदी माध्यम) 2025-26", img: "https://dxixtlyravvxx.cloudfront.net/540/admin_v1/bundle_management/course/777873140606_Abhay%20Bihar%20Board%20%281%29.png", tag: "10th" },
      { id: "85", name: "Science 11th (PCMB) - NIRBHAY 2025-26", img: "https://dxixtlyravvxx.cloudfront.net/540/admin_v1/bundle_management/course/443372940688_Nirbhay%20Class%2011th%20Science.jpg", tag: "11th" },
      { id: "86", name: "Science 12th (PCMB) - NIRBHAY 2025-26", img: "https://dxixtlyravvxx.cloudfront.net/540/admin_v1/bundle_management/course/194079640690_Nirbhay%20Class%2012th%20Science.jpg", tag: "12th" },
      { id: "55", name: "Prarambh Science 11th (PCMB) 25-26", img: "https://dxixtlyravvxx.cloudfront.net/540/admin_v1/bundle_management/course/183130728609_Prarambh%20BATCh%20Science%20Class%2011.png", tag: "11th" },
      { id: "58", name: "Prarambh Science 12th (PCMB) 25-26", img: "https://dxixtlyravvxx.cloudfront.net/540/admin_v1/bundle_management/course/337551428612_Prarambh%20BATCh%20Science%2012.jpg", tag: "12th" }
    ];

    const grid = document.getElementById('batches-grid');

    // Function to Render Batch Cards Dynamic Tarike se
    function renderBatches(data) {
      grid.innerHTML = "";
      data.forEach(batch => {
        const cardHtml = `
          <div class="card" data-tag="${batch.tag}" onclick="openBatch('${batch.id}', '${batch.name}')">
            <div class="wrapper">
              <div class="badge">Trending</div>
              <img src="${batch.img}" alt="${batch.name}">
            </div>
            <div class="card-body">
              <div class="title">${batch.name}</div>
              <div class="card-footer">
                <div class="price-tag">
                  <span class="price">₹Free</span>
                  <span class="mrp">₹1199</span>
                </div>
              </div>
            </div>
          </div>
        `;
        grid.innerHTML += cardHtml;
      });
    }

    // Tab Filtering Logic
    function filterCards(type, element) {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      element.classList.add('active');

      if (type === 'all') {
        renderBatches(batchData);
      } else {
        const filtered = batchData.filter(b => b.tag === type);
        renderBatches(filtered);
      }
    }

    // Card Click Hone Par Modal Open Hoga Aur API Hit Hogi
    function openBatch(courseId, courseName) {
      document.getElementById('modal-batch-title').innerText = courseName;
      document.getElementById('lectures-modal').style.display = 'flex';
      
      // Loader Text
      document.getElementById('lectures-list').innerHTML = `<p style="color: var(--text-muted)">Lectures fetch ho rahe hain... Course ID: ${courseId}</p>`;
      
      // Trigger API to get Content IDs
      fetchLectures(courseId);
    }

    // YAHA APNI LECTURES LIST WALI API CONNECT KARNA HAI
    async function fetchLectures(courseId) {
      try {
        /*
        // JAB TUMHEIN LECTURE WALI API MIL JAYE, TOH IS CODE KO UNCOMMENT KAR LENA:
        
        let response = await fetch(`https://eduvibe-nt-api.wasmer.app/GET-LECTURES-ENDPOINT?course_id=${courseId}`);
        let data = await response.json();
        
        // Loop chalakar data modal me render kar dena.
        */

        // Abhi ke liye testing dummy output:
        setTimeout(() => {
          document.getElementById('lectures-list').innerHTML = `
            <div class="lecture-item">
              <span>Ch-01 : Basic Mathematics - Lecture 01</span>
              <button class="play-btn" onclick="playVideo('10610', '${courseId}')">Play</button>
            </div>
            <div class="lecture-item">
              <span>Ch-01 : Basic Mathematics - Lecture 02</span>
              <button class="play-btn" onclick="playVideo('10611', '${courseId}')">Play</button>
            </div>
          `;
        }, 1000);

      } catch (error) {
        document.getElementById('lectures-list').innerHTML = `<p style="color: red">Lectures load karne me dikkat aai!</p>`;
      }
    }

    // Final Player Redirection Function (Dono IDs ko mix karke jo tumne dhundha tha)
    function playVideo(contentId, courseId) {
      const targetStreamApi = `https://eduvibe-nt-api.wasmer.app/content-details?content_id=${contentId}&course_id=${courseId}`;
      
      alert(`Asli API content hit ho raha hai!\nURL: ${targetStreamApi}\n\nYahan tum apna Shaka Player open karwa sakte ho.`);
      
      // Agar direct player portal par redirect karna hai:
      // window.location.href = `/player.html?content=${contentId}&course=${courseId}`;
    }

    function closeModal() {
      document.getElementById('lectures-modal').style.display = 'none';
    }

    // Initial Load
    renderBatches(batchData);
  </script>
</body>
</html>
