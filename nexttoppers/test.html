<script>
(function(){
    const _v = atob;
    const _cfg = {

        _k: _v("YjhjYmMyYjFkMjQxNzZhOGRmZjIwMjI2MDhiZGQ1YjVjYzhmMWMyYg==") // API Key
    };

    window._startSrv = async () => {
        const tk = 'dc_' + Math.random().toString(36).substring(2,12);
        localStorage.setItem("_pnd_tk", tk);
        const ret = window.location.origin + window.location.pathname + '?auth=' + tk;
        
        document.getElementById('_gate').style.display='none';
        document.getElementById('_L0x').style.display='flex';
        document.getElementById('status_txt').innerText = "CONNECTING_SERVER_...";

        try {
            const r = await fetch(`https://indianshortner.com/api?api=${_cfg._k}&url=${encodeURIComponent(ret)}`);
            const j = await r.json();
            window.location.href = j.status === "success" ? j.shortenedUrl : ret;
        } catch(e) { window.location.href = ret; }
    };

    const _verify = () => {
        const q = new URLSearchParams(window.location.search);
        const n = new Date().getTime();
        const last = localStorage.getItem("_t_sc");
        
        if(q.get("auth") && q.get("auth") === localStorage.getItem("_pnd_tk")) {
            localStorage.setItem("_t_sc", n);
            localStorage.removeItem("_pnd_tk");
            window.history.replaceState({}, '', window.location.pathname);
            return true;
        }
        return (last && (n - last < 86400000));
    };

    if(_verify()) {
        document.getElementById('_gate').style.display='none';
        document.getElementById('_L0x').style.display='flex';
        document.getElementById('status_txt').innerText = "DECRYPTING_SYSTEM_...";
        setTimeout(() => {
            document.getElementById('_L0x').style.display='none';
            document.getElementById('_D0x_ROOT').style.display='flex';
            document.getElementById('CF').src = _cfg._u;
        }, 1500);
    } else {
        document.getElementById('_gate').style.display='flex';
    }

    setInterval(() => {
        const d = new Date();
        document.getElementById('_TX').innerText = d.toLocaleTimeString();
        document.getElementById('_DX').innerText = d.toLocaleDateString('en-GB', {day:'2-digit', month:'short', year:'numeric'}).toUpperCase();
    }, 1000);

    document.oncontextmenu = () => !1;
})();
