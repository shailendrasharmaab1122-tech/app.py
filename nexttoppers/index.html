<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
    <title>DevCoderZ | DevCoderZ X Next Toppers</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body,html{margin:0;padding:0;width:100%;height:100%;background:#010409;font-family:sans-serif;color:#fff;overflow:hidden}
        #_D0x_ROOT{display:flex;width:100%;height:100vh;flex-direction:column;overflow:hidden;}
        .H0x{height:60px;background:#0d1117;display:flex;align-items:center;justify-content:space-between;padding:0 20px;border-bottom:1px solid #30363d;box-sizing:border-box;z-index:1000;position:relative;}
        .M0x{width:100%;height:calc(100vh - 60px);overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;}
        .I0x{width:100%;height:100%;border:none;}
        #menuPanel{position:fixed;top:0;left:-300px;width:280px;height:100%;background:#0d1117;border-right:1px solid #30363d;z-index:100001;transition:0.3s;padding:20px;box-sizing:border-box}
        #menuPanel.active{left:0}
        .menu-overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.7);display:none;z-index:100000}
        .cred-item{margin-bottom:20px;padding:10px;border-bottom:1px solid #161b22}
        .cred-title{color:#38bdf8;font-size:11px;text-transform:uppercase;margin-bottom:5px;font-weight:bold}
        .cred-name{font-size:16px;font-weight:bold}
        .btn{display:block;width:100%;padding:14px;margin:10px 0;border:none;border-radius:8px;cursor:pointer;font-weight:700;background:#38bdf8;color:#000;text-transform:uppercase}
    </style>
</head>
<body>

<div class="menu-overlay" id="overlay" onclick="window['_tM']()"></div>
<div id="menuPanel">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:30px">
        <span style="color:#38bdf8;font-weight:bold">SYSTEM CREDITS</span>
        <i class="fas fa-times" onclick="window['_tM']()" style="cursor:pointer"></i>
    </div>
    <div class="cred-item">
        <div class="cred-title">Lead Founder & Architect</div>
        <div class="cred-name">Jay Sharma</div>
    </div>
    <div class="cred-item">
        <div class="cred-title">Co-Founder</div>
        <div class="cred-name">Assault Decoder</div>
    </div>
    <button class="btn" onclick="location.reload()" style="font-size:12px;margin-top:20px">Refresh System</button>
</div>

<div id="_D0x_ROOT">
    <header class="H0x">
        <i class="fas fa-bars" onclick="window['_tM']()" style="cursor:pointer;color:#38bdf8;font-size:20px"></i>
        <div style="color:#38bdf8;font-weight:900;letter-spacing:1px">DevCoderZ</div>
        <div style="width:20px"></div>
    </header>
    <main class="M0x">
        <iframe id="CF" class="I0x" src="https://sigma-main-lilac.vercel.app/nexttoppers" sandbox="allow-forms allow-scripts allow-same-origin allow-top-navigation"></iframe>
    </main>
</div>

<script>
(function(){
    window['_tM'] = function() {
        const menu = document.getElementById('menuPanel');
        const overlay = document.getElementById('overlay');
        if(menu.classList.contains('active')){
            menu.classList.remove('active');
            overlay.style.display = 'none';
        }else{
            menu.classList.add('active');
            overlay.style.display = 'block';
        }
    };
})();
</script>
</body>
</html>
