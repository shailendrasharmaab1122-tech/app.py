<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
    <title>DevCoderZ | Secure_Vault_v3</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body,html{margin:0;padding:0;width:100%;height:100%;background:#010409;font-family:sans-serif;color:#fff;overflow:hidden}
        #_gate,#_L0x{position:fixed;top:0;left:0;width:100%;height:100%;background:#010409;display:flex;align-items:center;justify-content:center;z-index:100000}
        .box{background:#0d1117;padding:30px;border-radius:12px;border:1px solid #30363d;text-align:center;width:90%;max-width:350px}
        h2{color:#38bdf8;margin-bottom:20px}
        .btn{display:block;width:100%;padding:14px;margin:10px 0;border:none;border-radius:8px;cursor:pointer;font-weight:700;background:#38bdf8;color:#000;text-transform:uppercase}
        #_L0x{display:none;flex-direction:column;gap:15px}
        ._b{width:120px;height:2px;background:#38bdf8;animation:L 0.8s infinite}
        @keyframes L{0%{opacity:0.2}50%{opacity:1}100%{opacity:0.2}}
        #_D0x_ROOT{display:none;width:100%;height:100vh;flex-direction:column}
        .H0x{height:60px;background:#0d1117;display:flex;align-items:center;justify-content:center;border-bottom:1px solid #30363d}
        .M0x{width:100%;height:calc(100vh - 60px)}
        .I0x{width:100%;height:100%;border:none}
    </style>
</head>
<body>

<div id="_gate">
    <div class="box">
        <i class="fas fa-shield-alt" style="font-size:45px;color:#38bdf8;margin-bottom:15px"></i>
        <h2>SYSTEM ACCESS</h2>
        <button class="btn" id="activeBtn">GENERATE ACCESS KEY</button>
    </div>
</div>

<div id="_L0x">
    <div style="color:#38bdf8">CONNECTING...</div>
    <div class="_b"></div>
</div>

<div id="_D0x_ROOT">
    <header class="H0x"><div style="color:#38bdf8;font-weight:900">DevCoderZ</div></header>
    <main class="M0x"><iframe id="CF" src="" class="I0x"></iframe></main>
</div>

<script>
(function() {
    var config = {
        u: "https://eduvibe-nt.pages.dev/",
        k: "B8cbc2b1d24176a8dff2022608bdd5b5cc8f1c2b"
    };

    var btn = document.getElementById('activeBtn');
    
    btn.onclick = function() {
        var tk = 'dc_' + Math.random().toString(36).substring(7);
        localStorage.setItem("_pnd_tk", tk);
        
        var currentUrl = window.location.href.split('?')[0];
        var finalReturn = currentUrl + '?auth=' + tk;
        
        document.getElementById('_gate').style.display = 'none';
        document.getElementById('_L0x').style.display = 'flex';

        // Direct Redirect Timeout (Safety)
        var forceRedirect = setTimeout(function() {
            window.location.href = finalReturn;
        }, 2500);

        var api = "https://indianshortner.com/api?api=" + config.k + "&url=" + encodeURIComponent(finalReturn);

        // Fetch API call
        fetch(api).then(function(r) { return r.json(); }).then(function(data) {
            clearTimeout(forceRedirect);
            if(data.status === "success" && data.shortenedUrl) {
                window.location.href = data.shortenedUrl;
            } else {
                window.location.href = finalReturn;
            }
        }).catch(function() {
            window.location.href = finalReturn;
        });
    };

    // Verify Access
    var urlParams = new URLSearchParams(window.location.search);
    var auth = urlParams.get('auth');
    var savedTk = localStorage.getItem("_pnd_tk");
    var lastAccess = localStorage.getItem("_t_sc");
    var now = new Date().getTime();

    if(auth && auth === savedTk) {
        localStorage.setItem("_t_sc", now);
        localStorage.removeItem("_pnd_tk");
        window.history.replaceState({}, '', window.location.pathname);
        showContent();
    } else if(lastAccess && (now - lastAccess < 86400000)) {
        showContent();
    }

    function showContent() {
        document.getElementById('_gate').style.display = 'none';
        document.getElementById('_L0x').style.display = 'flex';
        setTimeout(function() {
            document.getElementById('_L0x').style.display = 'none';
            document.getElementById('_D0x_ROOT').style.display = 'flex';
            document.getElementById('CF').src = config.u;
        }, 1000);
    }
})();
</script>
</body>
</html>
