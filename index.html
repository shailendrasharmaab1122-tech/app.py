<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
    <title>DevCoderZ | Central_Hub_v2</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root{--0x1:#0f172a;--0x2:#020617;--0x3:#38bdf8;--0x4:#f1f5f9;--0x5:#1e293b}
        body,html{margin:0;padding:0;width:100%;height:100%;background:var(--0x2);color:var(--0x4);font-family:'Segoe UI',Roboto,sans-serif;overflow:hidden}
        
        #_O0x{position:fixed;top:0;left:0;width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:100;background:radial-gradient(circle at center, #0f172a 0%, #020617 100%)}
        
        .G0x{display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:30px;width:90%;max-width:900px;z-index:101}
        
        .C0x{background:rgba(15,23,42,0.6);border:1px solid #30363d;padding:30px 20px;border-radius:20px;text-align:center;transition:0.4s cubic-bezier(0.4,0,0.2,1);cursor:pointer;text-decoration:none;position:relative;overflow:hidden;backdrop-filter:blur(10px);display: flex;flex-direction: column;align-items: center;}
        
        .C0x:hover{border-color:var(--0x3);transform:translateY(-10px);box-shadow:0 0 30px rgba(56,189,248,0.15)}
        
        /* Image Styling */
        .C0x img {
            width: 80px;
            height: 80px;
            object-fit: contain;
            margin-bottom: 20px;
            filter: drop-shadow(0 0 10px rgba(56,189,248,0.3));
        }

        .C0x h2{font-family:'monospace';letter-spacing:2px;margin-bottom:10px;font-size:1.4rem;color: #fff;}
        .C0x p{color:#8b949e;font-size:13px;line-height:1.6}
        
        .L0x{font-family:'monospace';font-weight:900;font-size:2.5rem;color:var(--0x3);margin-bottom:50px;text-shadow:0 0 15px rgba(56,189,248,0.5)}
        
        .B0x{position:absolute;bottom:0;right:0;font-size:80px;color:rgba(56,189,248,0.03);z-index:-1;transform:translate(20%, 20%)}
        
        footer{position:fixed;bottom:20px;width:100%;text-align:center;font-family:monospace;font-size:10px;color:#484f58;letter-spacing:1px}
    </style>
</head>
<body>

<div id="_O0x">
    <div class="L0x" id="_L0x">&lt;DevCoderZ/&gt;</div>

    <div class="G0x">
        <a href="https://devcoderzxnt.vercel.app" class="C0x" id="_C1">
            <img src="nt.png" alt="Next Toppers Logo">
            <h2>NEXT TOPPERS</h2>
            <p>Advanced Educational Interface for NT Portal Access. Fast & Secure.</p>
            <div class="B0x">NT</div>
        </a>

        <a href="https://devcoderzxvt.vercel.app" class="C0x" id="_C2">
            <img src="vt.png" alt="Vibrant Academy Logo">
            <h2>VIBRANT ACADEMY</h2>
            <p>Premium Kota Curriculum Streaming Engine. Optimized for VT Portal.</p>
            <div class="B0x">VT</div>
        </a>
    </div>

    <footer>[ SYSTEM_v2.0.26_STABLE // ARCHITECT: DEVANSH SHARMA ]</footer>
</div>

<script>
    document.addEventListener('DOMContentLoaded', () => {
        const _c1 = document.getElementById('_C1');
        const _c2 = document.getElementById('_C2');
        const _lx = document.getElementById('_L0x');

        // Smooth Entrance Animation
        [_lx, _c1, _c2].forEach((el, idx) => {
            el.style.opacity = '0';
            el.style.transform = 'translateY(30px)';
            el.style.transition = '0.8s cubic-bezier(0.2, 0.8, 0.2, 1)';
            setTimeout(() => {
                el.style.opacity = '1';
                el.style.transform = 'translateY(0)';
            }, 200 * idx);
        });
        
        console.log("DevCoderZ System Initialized with Assets.");
    });
</script>
</body>
</html>
