<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Science and Fun - Free Batches</title>
    <!-- Tailwind CSS CDN for modern UI -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- FontAwesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-gray-50 font-sans text-gray-900">

    <!-- Header Section -->
    <header class="bg-gradient-to-r from-blue-600 to-purple-600 text-white shadow-lg sticky top-0 z-50">
        <div class="container mx-auto px-4 py-4 flex flex-col sm:flex-row justify-between items-center gap-4">
            <div class="flex items-center space-x-3">
                <div class="bg-white p-2 rounded-full text-blue-600 font-bold text-xl w-10 h-10 flex items-center justify-center shadow-md">
                    SF
                </div>
                <h1 class="text-2xl font-extrabold tracking-wide">Science & Fun <span class="text-yellow-300 text-sm font-semibold block sm:inline sm:ml-2">(Free Batches)</span></h1>
            </div>
            <!-- Search Bar -->
            <div class="relative w-full sm:w-64">
                <input type="text" id="searchBar" placeholder="Search batch..." class="w-full pl-10 pr-4 py-2 rounded-full text-gray-800 bg-white/90 focus:bg-white focus:outline-none focus:ring-2 focus:ring-yellow-400 transition-all text-sm">
                <i class="fa-solid fa-magnifying-glass absolute left-3.5 top-3 text-gray-500 text-sm"></i>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main class="container mx-auto px-4 py-8 max-w-7xl">
        
        <!-- Loading State -->
        <div id="loader" class="flex flex-col items-center justify-center py-20">
            <div class="animate-spin rounded-full h-12 w-12 border-t-4 border-b-4 border-blue-600 mb-4"></div>
            <p class="text-gray-600 font-medium">Fetching awesome batches for you...</p>
        </div>

        <!-- Error State -->
        <div id="errorState" class="hidden text-center py-20">
            <i class="fa-solid fa-circle-exclamation text-red-500 text-5xl mb-4"></i>
            <p class="text-xl font-semibold text-gray-800">Oops! Something went wrong.</p>
            <p class="text-gray-500 mt-2">Failed to load batches. Please try again later.</p>
            <button onclick="fetchBatches()" class="mt-4 px-6 py-2 bg-blue-600 text-white font-medium rounded-lg hover:bg-blue-700 transition">Retry</button>
        </div>

        <!-- Batches Grid Container -->
        <div id="batchesContainer" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6 hidden">
            <!-- Dynamic Cards will be injected here -->
        </div>

        <!-- No Results Found -->
        <div id="noResults" class="hidden text-center py-20 text-gray-500">
            <i class="fa-solid fa-folder-open text-4xl mb-3"></i>
            <p class="text-lg">No batches match your search.</p>
        </div>
    </main>

    <!-- Footer -->
    <footer class="bg-gray-900 text-gray-400 text-center py-6 mt-12 border-t border-gray-800">
        <p class="text-sm">Made with ❤️ for Science and Fun Students</p>
    </footer>

    <!-- JavaScript logic to fetch and display API data -->
    <script>
        const apiUrl = 'https://apiserver.deltastudy.site/api/scienceandfun/batches';
        let allBatches = [];

        // Elements
        const loader = document.getElementById('loader');
        const errorState = document.getElementById('errorState');
        const batchesContainer = document.getElementById('batchesContainer');
        const searchBar = document.getElementById('searchBar');
        const noResults = document.getElementById('noResults');

        // Fetch Data from API
        async function fetchBatches() {
            showState('loading');
            try {
                const response = await fetch(apiUrl);
                if (!response.ok) throw new Error('Network response was not ok');
                
                const data = await response.json();
                
                // API structure ke hisab se data nikalna (Agar data array hai ya object ke andar array hai)
                allBatches = Array.isArray(data) ? data : (data.batches || data.data || []);
                
                if(allBatches.length === 0) {
                    showState('no-results');
                } else {
                    displayBatches(allBatches);
                    showState('data');
                }
            } catch (error) {
                console.error("Error fetching batches:", error);
                showState('error');
            }
        }

        // Display Batches dynamically
        function displayBatches(batches) {
            batchesContainer.innerHTML = '';
            
            batches.forEach(batch => {
                // Handle missing image placeholder
                const fallbackImg = 'https://images.unsplash.com/photo-1516321318423-f06f85e504b3?w=500&auto=format&fit=crop&q=60';
                const batchImage = batch.image || batch.thumbnail || fallbackImg;
                const batchTitle = batch.title || batch.name || 'Untitled Batch';
                const batchPrice = batch.price == 0 || !batch.price ? 'FREE' : `₹${batch.price}`;
                const batchDesc = batch.description || 'Learn from top educators and master your concepts.';

                const cardHtml = `
                    <div class="bg-white rounded-xl shadow-md overflow-hidden hover:shadow-xl transition-all duration-300 transform hover:-translate-y-1 flex flex-col group border border-gray-100">
                        <!-- Batch Image -->
                        <div class="relative overflow-hidden aspect-video bg-gray-200">
                            <img src="${batchImage}" alt="${batchTitle}" class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-300" onerror="this.src='${fallbackImg}'">
                            <span class="absolute top-3 left-3 bg-green-500 text-white text-xs font-bold px-2.5 py-1 rounded-full shadow-sm tracking-wider uppercase">
                                ${batchPrice}
                            </span>
                        </div>
                        
                        <!-- Batch Details -->
                        <div class="p-5 flex-1 flex flex-col justify-between">
                            <div>
                                <h3 class="font-bold text-lg text-gray-800 line-clamp-2 leading-tight group-hover:text-blue-600 transition-colors" title="${batchTitle}">
                                    ${batchTitle}
                                </h3>
                                <p class="text-gray-500 text-xs mt-2 line-clamp-2">
                                    ${batchDesc}
                                </p>
                            </div>
                            
                            <!-- Action Button -->
                            <div class="mt-5 pt-3 border-t border-gray-100 flex items-center justify-between">
                                <span class="text-xs text-blue-600 font-semibold bg-blue-50 px-2 py-1 rounded">
                                    <i class="fa-solid fa-graduation-cap mr-1"></i> Live Batch
                                </span>
                                <button class="bg-blue-600 hover:bg-blue-700 text-white font-medium text-sm px-4 py-2 rounded-lg transition shadow-sm hover:shadow-md flex items-center gap-1">
                                    View Details <i class="fa-solid fa-arrow-right text-xs"></i>
                                </button>
                            </div>
                        </div>
                    </div>
                `;
                batchesContainer.insertAdjacentHTML('beforeend', cardHtml);
            });
        }

        // Handle UI states (Loading, Error, Data, Empty)
        function showState(state) {
            loader.classList.add('hidden');
            errorState.classList.add('hidden');
            batchesContainer.classList.add('hidden');
            noResults.classList.add('hidden');

            if (state === 'loading') loader.classList.remove('hidden');
            else if (state === 'error') errorState.classList.remove('hidden');
            else if (state === 'data') batchesContainer.classList.remove('hidden');
            else if (state === 'no-results') noResults.classList.remove('hidden');
        }

        // Search Filter Feature
        searchBar.addEventListener('input', (e) => {
            const searchTerm = e.target.value.toLowerCase().trim();
            const filteredBatches = allBatches.filter(batch => {
                const title = (batch.title || batch.name || '').toLowerCase();
                return title.includes(searchTerm);
            });

            if (filteredBatches.length === 0) {
                showState('no-results');
            } else {
                showState('data');
                displayBatches(filteredBatches);
            }
        });

        // Initialize Fetching on Load
        fetchBatches();
    </script>
</body>
</html>
