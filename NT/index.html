<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Next Toppers - Rolex Bypass Terminal</title>
    <style>
        /* --- Premium Blue & White Theme Panel --- */
        :root {
            --bg-main: #f4f7fc;
            --bg-white: #ffffff;
            --primary: #0056b3;
            --primary-dark: #003d80;
            --primary-light: #e6f0fa;
            --text-main: #212529;
            --text-muted: #6c757d;
            --border-color: #e2e8f0;
            --radius: 16px;
            --shadow: 0 10px 30px rgba(0, 86, 179, 0.05);
            --transition: all 0.2s ease-in-out;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        body {
            background-color: var(--bg-main);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .navbar {
            background-color: var(--bg-white);
            border-bottom: 1px solid var(--border-color);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .nav-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
            height: 70px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .logo {
            font-size: 22px;
            font-weight: 700;
            color: var(--primary);
            text-decoration: none;
        }

        .logo span { color: var(--text-main); }

        /* --- Hero Core Layout --- */
        .hero-container {
            flex-grow: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
        }

        .terminal-card {
            background-color: var(--bg-white);
            max-width: 550px;
            width: 100%;
            padding: 45px 35px;
            border-radius: var(--radius);
            border: 1px solid var(--border-color);
            box-shadow: var(--shadow);
            text-align: center;
        }

        .status-badge {
            display: inline-block;
            padding: 6px 16px;
            font-size: 12px;
            font-weight: 700;
            background-color: var(--primary-light);
            color: var(--primary);
            border-radius: 50px;
            margin-bottom: 20px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .terminal-card h1 {
            font-size: 30px;
            color: var(--primary-dark);
            margin-bottom: 12px;
            font-weight: 700;
        }

        .terminal-card p {
            color: var(--text-muted);
            font-size: 15px;
            margin-bottom: 30px;
            line-height: 1.6;
        }

        /* --- Dynamic Fetch Action Trigger --- */
        .action-btn {
            display: block;
            background-color: var(--primary);
            color: var(--bg-white);
            text-decoration: none;
            font-size: 15px;
            font-weight: 600;
            padding: 15px 30px;
            border-radius: 10px;
            border: none;
            width: 100%;
            cursor: pointer;
            box-shadow: 0 4px 12px rgba(0, 86, 179, 0.15);
            transition: var(--transition);
        }

        .action-btn:hover {
            background-color: var(--primary-dark);
            transform: translateY(-1px);
            box-shadow: 0 6px 18px rgba(0, 61, 128, 0.25);
        }

        /* --- Network Log Panel --- */
        .network-log {
            margin-top: 20px;
            background-color: #f8fafc;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 12px;
            font-family: "Courier New", Courier, monospace;
            font-size: 12px;
            color: #475569;
            text-align: left;
            display: none;
            max-height: 100px;
            overflow-y: auto;
        }
    </style>
</head>
<body>

    <!-- Main Navigation Bar -->
    <nav class="navbar">
        <div class="nav-container">
            <a href="index.html" class="logo">Next<span>Toppers</span></a>
        </div>
    </nav>

    <!-- Core Authorization & Sync Window -->
    <main class="hero-container">
        <div class="terminal-card">
            <span class="status-badge" id="engine-status">System Ready</span>
            <h1>Next Toppers Dynamic Core</h1>
            <p>Automated database mapping layer. Click below to initialize authorization headers, process tokens, and fetch live batches immediately.</p>
            
            <!-- Direct Core Trigger Link -->
            <button class="action-btn" id="init-sync-trigger" onclick="initializeRolexPipeline()">
                Launch Database Control →
            </button>

            <!-- Live Status Debug Console -->
            <div class="network-log" id="log-console"></div>
        </div>
    </main>

    <script>
        // --- Rolex Base Dynamic Server Config Elements ---
        const CONFIG = {
            pingUrl: "https://api.devcoderz.vercel.app/nt-v1/health", // Server up h ya down check krne ke liye
            redirectTarget: "batches.html"
        };

        async function initializeRolexPipeline() {
            const btn = document.getElementById('init-sync-trigger');
            const status = document.getElementById('engine-status');
            const consoleBox = document.getElementById('log-console');

            // UI Alteration state
            btn.disabled = true;
            btn.innerText = "Syncing Network Nodes...";
            status.innerText = "Processing";
            status.style.backgroundColor = "#fff3cd";
            status.style.color = "#856404";
            consoleBox.style.display = "block";
            consoleBox.innerHTML = "> Injecting secure runtime wrappers...<br>";

            try {
                consoleBox.innerHTML += "> Pinging server backend endpoints...<br>";
                
                // Server tracking framework request execution
                const response = await fetch(CONFIG.pingUrl, { method: 'GET' }).catch(e => {
                    // Failover logger simulation logic if endpoint is completely offline during production setup
                    return { ok: true, simulated: true };
                });

                if(response.ok) {
                    consoleBox.innerHTML += "> Handshake verified! Session active.<br>";
                    consoleBox.innerHTML += "> Forwarding context payloads into data matrix...<br>";
                    
                    status.innerText = "Connected";
                    status.style.backgroundColor = "#d4edda";
                    status.style.color = "#155724";

                    // Dynamic redirect passing execution control to batches.html pipeline
                    setTimeout(() => {
                        window.location.href = CONFIG.redirectTarget;
                    }, 800);
                } else {
                    throw new Error("Invalid response node.");
                }

            } catch (error) {
                consoleBox.innerHTML += `<span style="color:#721c24;">> Sync Error: Remote API target unreachable.</span><br>`;
                consoleBox.innerHTML += `> Deploying sandbox fallback environment routing...<br>`;
                
                // Even if network blocks, loop automatically moves user to batch execution space
                setTimeout(() => {
                    window.location.href = CONFIG.redirectTarget;
                }, 1500);
            }
        }
    </script>
</body>
</html>
