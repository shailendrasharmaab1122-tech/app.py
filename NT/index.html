<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Next Toppers - Welcome Portal</title>
    <style>
        /* --- Premium Blue & White Theme --- */
        :root {
            --bg-main: #f4f7fc;
            --bg-white: #ffffff;
            --primary: #0056b3;
            --primary-dark: #003d80;
            --primary-light: #e6f0fa;
            --text-main: #212529;
            --text-muted: #6c757d;
            --border-color: #e2e8f0;
            --radius: 16px;
            --shadow: 0 10px 25px -5px rgba(0, 56, 128, 0.05), 0 8px 16px -6px rgba(0, 0, 0, 0.03);
            --transition: all 0.25s ease-in-out;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        body {
            background-color: var(--bg-main);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* --- Navbar --- */
        .navbar {
            background-color: var(--bg-white);
            border-bottom: 1px solid var(--border-color);
            width: 100%;
        }

        .nav-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
            height: 70px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .logo {
            font-size: 24px;
            font-weight: 700;
            color: var(--primary);
            text-decoration: none;
            letter-spacing: -0.5px;
        }

        .logo span {
            color: var(--text-main);
        }

        /* --- Hero Container --- */
        .hero-section {
            flex-grow: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
        }

        .welcome-card {
            background-color: var(--bg-white);
            max-width: 600px;
            width: 100%;
            padding: 50px 40px;
            border-radius: var(--radius);
            border: 1px solid var(--border-color);
            box-shadow: var(--shadow);
            text-align: center;
            transition: var(--transition);
        }

        .welcome-card:hover {
            transform: translateY(-2px);
        }

        .brand-icon {
            width: 80px;
            height: 80px;
            background-color: var(--primary-light);
            color: var(--primary);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            font-weight: 700;
            margin: 0 auto 24px auto;
        }

        .welcome-card h1 {
            font-size: 32px;
            color: var(--primary-dark);
            margin-bottom: 14px;
            font-weight: 700;
        }

        .welcome-card p {
            color: var(--text-muted);
            font-size: 16px;
            line-height: 1.6;
            margin-bottom: 35px;
        }

        /* --- Custom Action Button --- */
        .btn-enter {
            display: inline-block;
            background-color: var(--primary);
            color: var(--bg-white);
            text-decoration: none;
            font-size: 16px;
            font-weight: 600;
            padding: 16px 40px;
            border-radius: 10px;
            box-shadow: 0 4px 12px rgba(0, 86, 179, 0.2);
            transition: var(--transition);
            width: 100%;
        }

        .btn-enter:hover {
            background-color: var(--primary-dark);
            box-shadow: 0 6px 20px rgba(0, 61, 128, 0.3);
            transform: translateY(-1px);
        }

        /* --- Footer Section --- */
        .footer {
            text-align: center;
            padding: 20px;
            font-size: 13px;
            color: var(--text-muted);
            border-top: 1px solid var(--border-color);
            background-color: var(--bg-white);
        }
    </style>
</head>
<body>

    <!-- Simple Elegant Navbar -->
    <nav class="navbar">
        <div class="nav-container">
            <a href="index.html" class="logo">Next<span>Toppers</span></a>
        </div>
    </nav>

    <!-- Main Entry Hero Screen -->
    <main class="hero-section">
        <div class="welcome-card">
            <div class="brand-icon">NT</div>
            <h1>Welcome to Next Toppers</h1>
            <p>Your premium automated educational stream interface. Authenticate your dashboard nodes and explore active lecture databases instantly.</p>
            
            <!-- Direct routing to your operational batches tracking pipeline -->
            <a href="batches.html" class="btn-enter">Explore Live Batches →</a>
        </div>
    </main>

    <!-- Standard Framework Footer -->
    <footer class="footer">
        &copy; 2026 Next Toppers. Powered by Rolex Network Core Architecture. All rights reserved.
    </footer>

</body>
</html>
