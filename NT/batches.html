<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The DevCoderZ</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cabinet+Grotesk:wght@400;500;700;800;900&family=Manrope:wght@300;400;500;600;700;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.css">

  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --bg: #03040a;
      --s1: #080b14;
      --s2: #0d1120;
      --s3: #111628;
      --b1: rgba(255,255,255,0.05);
      --b2: rgba(255,255,255,0.09);
      --b3: rgba(255,255,255,0.15);
      --tx: #f4f1ff;
      --tx2: rgba(244,241,255,0.6);
      --tx3: rgba(244,241,255,0.3);
      --a1: #5b4bdb;
      --a2: #8b5cf6;
      --a3: #c4b5fd;
      --go: #f59e0b;
      --gn: #10b981;
      --rd: #f43f5e;
      --glow-a: rgba(91,75,219,.2);
      --live: #ef4444;
    }
    html { scroll-behavior: smooth; }
    body {
      background: var(--bg); color: var(--tx);
      font-family: 'Manrope', sans-serif;
      min-height: 100vh; overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
    }

    /* Atmospheres Background Elements */
    .atm { position: fixed; inset: 0; z-index: 0; pointer-events: none; overflow: hidden; }
    .sp { position: absolute; border-radius: 50%; filter: blur(90px); }
    .sp1 { width: 640px; height: 640px; background: radial-gradient(circle, rgba(91,75,219,.14), transparent 65%); top: -180px; left: -180px; }
    .sp2 { width: 500px; height: 500px; background: radial-gradient(circle, rgba(16,185,129,.09), transparent 65%); bottom: -120px; right: -100px; }
    
    .atm-grid {
      position: fixed; inset: 0; z-index: 0; pointer-events: none;
      background-image:
        linear-gradient(rgba(255,255,255,.018) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,.018) 1px, transparent 1px);
      background-size: 52px 52px;
      mask-image: radial-gradient(ellipse 88% 88% at 50% 50%, black 20%, transparent 100%);
    }

    /* Navigation Bar */
    nav {
      position: sticky; top: 0; z-index: 200;
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 28px; height: 58px;
      background: rgba(3,4,10,.75); backdrop-filter: blur(28px) saturate(160%);
      border-bottom: 1px solid var(--b1);
    }
    .nav-l { display: flex; align-items: center; gap: 12px; }
    .back-btn {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 7px 14px; background: rgba(255,255,255,.04);
      border: 1px solid var(--b2); border-radius: 9px;
      color: var(--tx3); font-size: .68rem; font-weight: 700;
      letter-spacing: .06em; text-transform: uppercase; text-decoration: none; transition: .22s;
    }
    .back-btn:hover { background: rgba(255,255,255,.07); color: var(--tx2); transform: translateX(-2px); }
    .back-btn svg { width: 13px; height: 13px; }
    .nav-brand {
      font-family: 'Cabinet Grotesk', sans-serif; font-size: 1rem; font-weight: 800;
      color: var(--tx); text-decoration: none; display: flex; align-items: center; gap: 8px;
    }
    .nb-mark {
      width: 28px; height: 28px; border-radius: 7px;
      background: linear-gradient(135deg, var(--a1), var(--a2));
      display: flex; align-items: center; justify-content: center;
      font-size: .62rem; font-weight: 800; color: #fff;
    }
    .nb-name span { background: linear-gradient(120deg, var(--a2), var(--a3)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .nav-chip { font-family: 'Space Mono', monospace; font-size: .6rem; color: var(--tx3); border: 1px solid var(--b1); padding: 4px 11px; border-radius: 100px; }

    /* Core Layout Wrapper */
    .wrap { position: relative; z-index: 5; max-width: 1100px; margin: 0 auto; padding: 28px 22px 80px; }

    /* Hero Section */
    .hero {
      position: relative; overflow: hidden; background: var(--s1); border: 1px solid var(--b1); border-radius: 20px; padding: 26px;
      display: grid; grid-template-columns: 1fr auto; gap: 24px; align-items: start;
    }
    .hero-glow { position: absolute; inset: 0; pointer-events: none; background: radial-gradient(circle at 0% 0%, rgba(91,75,219,.08), transparent 60%); }
    .hero-kicker { font-size: .58rem; font-weight: 700; letter-spacing: .2em; text-transform: uppercase; color: var(--a3); margin-bottom: 10px; display: inline-flex; align-items: center; gap: 6px;}
    .hk-dot { width: 5px; height: 5px; border-radius: 50%; background: var(--a3); }
    .hero-title {
      font-family: 'Cabinet Grotesk', sans-serif; font-size: clamp(1.3rem, 3.5vw, 2rem); font-weight: 800; line-height: 1.12;
      background: linear-gradient(140deg, var(--tx) 55%, rgba(196,181,253,.55)); -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }
    .hero-pills { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 10px; }
    .pill { font-size: .58rem; font-weight: 700; padding: 4px 11px; border-radius: 100px; text-transform: uppercase; }
    .pill-new { background: rgba(16,185,129,.1); color: var(--gn); border: 1px solid rgba(16,185,129,.2); }
    .pill-trend { background: rgba(245,158,11,.1); color: var(--go); border: 1px solid rgba(245,158,11,.2); }
    .hero-thumb { width: 176px; height: 108px; border-radius: 12px; object-fit: cover; border: 1px solid var(--b2); }

    /* Live Badge Indicators */
    .live-section { margin-top: 22px; }
    .live-hdr { display: flex; align-items: center; gap: 10px; margin-bottom: 14px; }
    .live-hdr-label { font-size: .58rem; font-weight: 700; letter-spacing: .22em; text-transform: uppercase; color: var(--tx3); flex: 1; display: flex; align-items: center; gap: 8px; }
    .live-hdr-label::after { content: ''; flex: 1; height: 1px; background: var(--b1); }
    .live-pulse { display: inline-flex; align-items: center; gap: 6px; background: rgba(239,68,68,.1); border: 1px solid rgba(239,68,68,.22); color: var(--live); font-size: .58rem; font-weight: 800; padding: 4px 11px; border-radius: 100px; }
    .live-pulse-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--live); box-shadow: 0 0 6px var(--live); }

    .live-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(290px, 1fr)); gap: 10px; }
    .live-card { position: relative; overflow: hidden; background: var(--s1); border: 1px solid rgba(239,68,68,.22); border-radius: 16px; padding: 15px 17px; cursor: pointer; display: flex; align-items: center; gap: 14px; transition: .3s; }
    .live-card:hover { transform: translateY(-2px); border-color: rgba(239,68,68,.38); }
    .lc-thumb { width: 80px; height: 50px; border-radius: 9px; object-fit: cover; border: 1px solid var(--b2); }
    .lc-body { flex: 1; min-width: 0; }
    .lc-name { font-family: 'Cabinet Grotesk', sans-serif; font-weight: 700; font-size: .84rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-bottom: 6px; }
    .lc-meta { display: flex; align-items: center; gap: 8px; }
    .lc-status-live { font-size: .54rem; font-weight: 800; color: var(--live); background: rgba(239,68,68,.12); padding: 2px 8px; border-radius: 100px; border: 1px solid rgba(239,68,68,.2); }
    .lc-act { width: 34px; height: 34px; border-radius: 50%; background: rgba(239,68,68,.08); border: 1px solid rgba(239,68,68,.2); display: flex; align-items: center; justify-content: center; color: var(--live); }

    /* Tabs Engine */
    .tabs-wrap { position: sticky; top: 58px; z-index: 150; background: rgba(3,4,10,.82); backdrop-filter: blur(22px); border-bottom: 1px solid var(--b1); margin: 0 -22px; padding: 0 22px; }
    .tabs-bar { display: flex; gap: 4px; }
    .tab-btn { padding: 15px 22px; font-family: 'Cabinet Grotesk', sans-serif; font-size: .72rem; font-weight: 800; color: var(--tx3); background: transparent; border: none; cursor: pointer; border-bottom: 2px solid transparent; transition: .22s; text-transform: uppercase;}
    .tab-btn.active { color: var(--a3); border-bottom-color: var(--a2); }
    .tab-pane { display: none; }
    .tab-pane.active { display: block; }

    /* Course Components Styling */
    .sec-label { font-size: .58rem; font-weight: 700; letter-spacing: .22em; text-transform: uppercase; color: var(--tx3); display: flex; align-items: center; gap: 10px; margin: 26px 0 14px; }
    .sec-label::after { content: ''; flex: 1; height: 1px; background: var(--b1); }
    
    .ov-grid { display: grid; grid-template-columns: 1fr 280px; gap: 18px; padding-top: 24px; }
    .ov-card { background: var(--s1); border: 1px solid var(--b1); border-radius: 16px; padding: 22px; }
    .ov-desc { font-size: .86rem; line-height: 1.78; color: var(--tx2); }
    .info-card { background: var(--s1); border: 1px solid var(--b1); border-radius: 16px; padding: 16px 18px; margin-bottom: 14px; }
    .ic-row { display: flex; justify-content: space-between; align-items: center; padding: 9px 0; border-bottom: 1px solid var(--b1); font-size: .82rem; }
    .ic-row:last-child { border-bottom: none; }
    .ic-lbl { color: var(--tx3); }
    .ic-val { color: var(--tx); font-weight: 700; }
    .cta-btn { width: 100%; padding: 14px; border-radius: 12px; border: none; cursor: pointer; font-family: 'Cabinet Grotesk', sans-serif; font-weight: 800; background: linear-gradient(135deg, var(--a1), var(--a2)); color: #fff; box-shadow: 0 4px 20px rgba(91,75,219,.28); text-transform: uppercase; }

    /* Breadcrumbs */
    .bc { display: flex; align-items: center; gap: 8px; margin-bottom: 20px; font-size: .62rem; font-weight: 700; text-transform: uppercase; color: var(--tx3); }
    .bc a { color: var(--tx3); text-decoration: none; }
    .bc-sep { opacity: .3; }
    .bc-cur { color: var(--tx2); }

    /* Folders Matrix Grid */
    .folder-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(275px, 1fr)); gap: 10px; }
    .folder-item { background: var(--s1); border: 1px solid var(--b1); border-radius: 14px; padding: 15px 17px; display: flex; align-items: center; gap: 13px; text-decoration: none; color: var(--tx); transition: .3s; }
    .folder-item:hover { transform: translateY(-2px); border-color: rgba(245,158,11,.2); }
    .fi-ico { width: 38px; height: 38px; border-radius: 9px; background: rgba(245,158,11,.08); border: 1px solid rgba(245,158,11,.14); display: flex; align-items: center; justify-content: center; }
    .fi-txt { flex: 1; min-width: 0; }
    .fi-name { font-family: 'Cabinet Grotesk', sans-serif; font-weight: 700; font-size: .84rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .fi-arr { color: var(--tx3); transition: .22s; }

    /* Item Vectors (List Items) */
    .video-list { display: flex; flex-direction: column; gap: 7px; }
    .video-item { background: var(--s1); border: 1px solid var(--b1); border-radius: 13px; padding: 11px 15px; cursor: pointer; display: flex; align-items: center; gap: 14px; transition: .28s; }
    .video-item:hover { border-color: rgba(16,185,129,.18); transform: translateX(3px); }
    .vi-thumb { width: 72px; height: 44px; border-radius: 8px; object-fit: cover; border: 1px solid var(--b1); }
    .vi-body { flex: 1; min-width: 0; }
    .vi-name { font-family: 'Cabinet Grotesk', sans-serif; font-weight: 700; font-size: .83rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .vi-meta { display: flex; align-items: center; gap: 7px; margin-top: 5px; }
    .vbadge { font-size: .54rem; font-weight: 700; padding: 2px 8px; border-radius: 100px; text-transform: uppercase; }
    .vb-video { background: rgba(16,185,129,.1); color: var(--gn); border: 1px solid rgba(16,185,129,.18); }
    .vb-pdf { background: rgba(245,158,11,.1); color: var(--go); border: 1px solid rgba(245,158,11,.18); }
    .vi-act { width: 32px; height: 32px; border-radius: 50%; background: rgba(16,185,129,.07); border: 1px solid rgba(16,185,129,.18); display: flex; align-items: center; justify-content: center; }

    /* Real-time Indicator Bar */
    #bar { position: fixed; top: 0; left: 0; height: 2px; width: 0%; background: linear-gradient(90deg, var(--a1), var(--a2), #22d3ee); z-index: 9999; transition: width .3s ease; }
    #bar.fin { opacity: 0; }
    
    .toast { position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%) translateY(16px); z-index: 600; padding: 10px 20px; border-radius: 11px; font-size: .76rem; font-weight: 600; opacity: 0; background: rgba(244,63,94,.1); border: 1px solid rgba(244,63,94,.22); color: var(--rd); pointer-events: none; transition: .3s; }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
    .toast.ok { background: rgba(16,185,129,.1); border-color: rgba(16,185,129,.22); color: var(--gn); }

    .state-box { text-align: center; padding: 56px 24px; background: var(--s1); border: 1px solid var(--b1); border-radius: 16px; }
    .state-ico { font-size: 2.8rem; opacity: .12; margin-bottom: 12px; }
    .state-title { font-size: .88rem; color: var(--tx3); font-weight: 700; }

    @media(max-width: 720px) {
      nav { padding: 0 14px; }
      .wrap { padding: 18px 14px; }
      .hero { grid-template-columns: 1fr; }
      .hero-thumb { width: 100%; height: 170px; }
      .ov-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

  <div class="atm">
    <div class="sp sp1"></div>
    <div class="sp sp2"></div>
  </div>
  <div class="atm-grid"></div>

  <!-- Loading Bar -->
  <div id="bar"></div>
  <!-- Toast Notifier -->
  <div class="toast" id="toast"></div>

  <nav>
    <div class="nav-l">
      <a class="back-btn" id="backBtn" href="?course_id=176&tab=content">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"></polyline></svg>
        <span id="backLabel">Back</span>
      </a>
      <a class="nav-brand" href="./">
        <div class="nb-mark">DC</div>
        <span class="nav-brand-text">Dev<span>CoderZ</span></span>
      </a>
    </div>
    <span class="nav-chip" id="navChip">#176</span>
  </nav>

  <div class="wrap">
    <!-- Hero Placement Slot -->
    <div id="heroSlot"></div>

    <!-- Live Streams Placement Slot -->
    <div id="liveSlot"></div>

    <div class="tabs-wrap">
      <div class="tabs-bar">
        <button class="tab-btn" id="tabBtnOverview" onclick="switchTab('overview')">Overview</button>
        <button class="tab-btn active" id="tabBtnContent" onclick="switchTab('content')">Content</button>
      </div>
    </div>

    <!-- Overview Engine Display Grid -->
    <div class="tab-pane" id="tab-overview">
      <div id="overviewSlot" style="padding-top:24px"></div>
    </div>

    <!-- Folder-Content Module -->
    <div class="tab-pane active" id="tab-content">
      <div id="contentSlot" style="padding-top:24px"></div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/contrib/auto-render.min.js"></script>

  <script>
    // Search Parameter Constants Configuration
    const _qs = new URLSearchParams(location.search);
    const COURSE_ID = _qs.get('course_id') || '176';
    const FOLDER_ID = _qs.get('folder_id') || '7100'; // Target Base Science Root directory
    const FOLDER_TITLE = _qs.get('folder_title') || 'Science';
    const INIT_TAB = FOLDER_ID ? 'content' : (_qs.get('tab') || 'overview');
    
    // Core Endpoints Configurations
    const API_BASE = 'https://ntxapi.wasmer.app/';

    // UI Feedback Helpers
    const bar = document.getElementById('bar');
    function pStart() { bar.style.opacity = '1'; bar.style.width = '30%'; }
    function pDone() { bar.style.width = '100%'; setTimeout(() => { bar.style.opacity = '0'; bar.style.width = '0%'; }, 400); }
    
    function showToast(msg, isOk = false) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.className = 'toast show' + (isOk ? ' ok' : '');
      setTimeout(() => t.className = 'toast', 2800);
    }

    function esc(s) { const d = document.createElement('div'); d.textContent = s || ''; return d.innerHTML; }
    function fmtDur(s) { const h = Math.floor(s/3600), m = Math.floor((s%3600)/60), sc = s%60; return h > 0 ? `${h}:${String(m).padStart(2,'0')}:${String(sc).padStart(2,'0')}` : `${m}:${String(sc).padStart(2,'0')}`; }
    function fmtDate(ts) { return ts ? new Date(ts * 1000).toLocaleDateString('en-IN', {day:'2-digit', month:'short', year:'numeric'}) : ''; }

    function switchTab(name) {
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      document.querySelectorAll('.tab-pane').forEach(p => p.classList.remove('active'));
      document.getElementById('tabBtn' + name.charAt(0).toUpperCase() + name.slice(1)).classList.add('active');
      document.getElementById('tab-' + name).classList.add('active');
    }

    // Dynamic Client-side Presentation Interface Engines
    function renderHero(d) {
      if(!d) return;
      document.getElementById('heroSlot').innerHTML = `
        <div class="hero">
          <div class="hero-glow"></div>
          <div class="hero-body">
            <div class="hero-kicker"><span class="hk-dot"></span>Batch Portal</div>
            <div class="hero-title">${esc(d.title)}</div>
            <div class="hero-pills">
              <span class="pill pill-new">Class 10 CBSE</span>
              <span class="pill pill-trend">Active</span>
            </div>
          </div>
          ${d.thumbnail ? `<img class="hero-thumb" src="${esc(d.thumbnail)}" alt="Thumbnail">` : ''}
        </div>`;
    }

    function renderOverview(d) {
      const slot = document.getElementById('overviewSlot');
      if(!d) { slot.innerHTML = '<div class="state-box"><div class="state-title">Description metrics unavailable</div></div>'; return; }
      slot.innerHTML = `
        <div class="ov-grid">
          <div class="ov-card">
            <div class="sec-label" style="margin-top:0">About Chapter Module</div>
            <div class="ov-desc">${d.description || 'Syllabus processing notes configured inside structural indexes.'}</div>
          </div>
          <div>
            <div class="info-card">
              <div class="sec-label" style="margin-top:0">Details</div>
              <div class="ic-row"><span class="ic-lbl">Valid Matrix</span><span class="ic-val">${fmtDate(d.end_date) || '2027 Session'}</span></div>
            </div>
          </div>
        </div>`;
    }

    function renderContent(folders, videos, tests) {
      const slot = document.getElementById('contentSlot');
      let html = `<div class="bc"><a href="?course_id=${COURSE_ID}">Course Root</a><span class="bc-sep">/</span><span class="bc-cur">${esc(FOLDER_TITLE)}</span></div>`;

      if(!folders.length && !videos.length && !tests.length) {
        slot.innerHTML = html + `<div class="state-box"><div class="state-ico">🔭</div><div class="state-title">No resources available inside this structure directory</div></div>`;
        return;
      }

      if(folders.length) {
        html += `<div class="sec-label" style="margin-top:0">Sub-Folders / Chapters</div><div class="folder-grid">`;
        folders.forEach(f => {
          html += `
            <a class="folder-item" href="?course_id=${encodeURIComponent(COURSE_ID)}&folder_id=${encodeURIComponent(f.entity_id)}&folder_title=${encodeURIComponent(f.title)}">
              <div class="fi-ico">📁</div>
              <div class="fi-txt"><div class="fi-name">${esc(f.title)}</div></div>
              <div class="fi-arr">→</div>
            </a>`;
        });
        html += `</div>`;
      }

      if(videos.length) {
        html += `<div class="sec-label">Study Materials & Streams</div><div class="video-list">`;
        videos.forEach(v => {
          const d = v.data || {};
          const isPdf = parseInt(d.file_type || 2) === 1;
          html += `
            <div class="video-item" data-id="${esc(v.entity_id)}" data-pdf="${isPdf ? 1 : 0}" onclick="resourceRouter(this)">
              <div class="vi-thumb">${isPdf ? '📄' : '🎬'}</div>
              <div class="vi-body">
                <div class="vi-name">${esc(v.title)}</div>
                <div class="vi-meta">
                  <span class="vbadge ${isPdf ? 'vb-pdf' : 'vb-video'}">${isPdf ? 'Document' : 'Stream Node'}</span>
                  ${d.duration ? `<span class="vi-dur">${fmtDur(d.duration)}</span>` : ''}
                </div>
              </div>
              <div class="vi-act">${isPdf ? '↓' : '▶'}</div>
            </div>`;
        });
        html += `</div>`;
      }
      slot.innerHTML = html;
    }

    // Modern Fetch Handler Infrastructure Routing Architecture
    async function executeDataStream() {
      pStart();
      document.getElementById('navChip').textContent = '#' + COURSE_ID;
      switchTab(INIT_TAB);

      const detailsEndpoint = `${API_BASE}?course_id=${encodeURIComponent(COURSE_ID)}&action=details&rc=nt`;
      const contentEndpoint = `${API_BASE}?course_id=${encodeURIComponent(COURSE_ID)}&action=content&rc=nt${FOLDER_ID ? `&folder_id=${encodeURIComponent(FOLDER_ID)}` : ''}`;

      try {
        const [resDetails, resContent] = await Promise.all([
          fetch(detailsEndpoint).then(r => r.json()).catch(() => null),
          fetch(contentEndpoint).then(r => r.json()).catch(() => null)
        ]);

        // Process Module Details
        let courseMetrics = null;
        if(resDetails && resDetails.success && Array.isArray(resDetails.data)) {
          for(const node of resDetails.data) {
            if(node.type === 'overview' && node.data) {
              const matchedBlock = node.data.find(b => b.layout_type === 'details');
              if(matchedBlock && matchedBlock.layout_data?.[0]) {
                courseMetrics = matchedBlock.layout_data[0];
                break;
              }
            }
          }
        }
        renderHero(courseMetrics);
        renderOverview(courseMetrics);

        // Map Content Elements Arrays
        const structures = [], streams = [], quizzes = [];
        if(resContent && resContent.success && Array.isArray(resContent.data)) {
          resContent.data.forEach(node => {
            if(node.type === 'folder') structures.push(node);
            else if(node.type === 'test') quizzes.push(node);
            else if(node.type === 'file') streams.push(node);
          });
        }
        renderContent(structures, streams, quizzes);

        // Apply LaTeX typesets gracefully
        if(window.renderMathInElement) {
          renderMathInElement(document.body, {
            delimiters: [
              {left: '$$', right: '$$', display: true},
              {left: '$', right: '$', display: false}
            ],
            throwOnError: false
          });
        }
      } catch (err) {
        showToast("Error processing sync array nodes from API cluster.");
      } finally {
        pDone();
      }
    }

    // Direct stream router intercept handling actions
    async function resourceRouter(element) {
      const targetId = element.dataset.id;
      const requiresPdf = parseInt(element.dataset.pdf) === 1;
      pStart();

      try {
        const payload = await fetch(`${API_BASE}?action=content_details&content_id=${targetId}&course_id=${COURSE_ID}&rc=nt`).then(r => r.json());
        pDone();
        
        if(payload.error) { showToast(payload.error); return; }

        if(requiresPdf || payload.type === 'pdf') {
          if(payload.url) window.open(payload.url, '_blank');
        } else {
          // Token dynamic resolution for playback engines
          if(payload.token) {
            const heading = encodeURIComponent(element.querySelector('.vi-name')?.textContent || 'Stream Object');
            // Custom player entry point direction setup
            window.location.href = `../player.php?token=${encodeURIComponent(payload.token)}&title=${heading}`;
          } else {
            showToast("Streaming reference node payload could not locate secure signatures.");
          }
        }
      } catch (ex) {
        pDone();
        showToast("Network execution fault resolving element signatures.");
      }
    }

    document.addEventListener('DOMContentLoaded', executeDataStream);
  </script>
</body>
</html>
