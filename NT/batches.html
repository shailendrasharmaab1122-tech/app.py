<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Next Toppers - Batches Portal</title>
    <style>
        :root {
            --bg-main: #f4f7fc;
            --bg-white: #ffffff;
            --primary: #0056b3;
            --primary-dark: #003d80;
            --primary-light: #e6f0fa;
            --text-main: #212529;
            --text-muted: #6c757d;
            --border-color: #e2e8f0;
            --radius: 12px;
            --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
            --transition: all 0.2s ease-in-out;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, sans-serif; }
        body { background-color: var(--bg-main); color: var(--text-main); line-height: 1.6; }
        
        .navbar { background-color: var(--bg-white); border-bottom: 1px solid var(--border-color); sticky; top: 0; z-index: 100; }
        .nav-container { max-width: 1200px; margin: 0 auto; padding: 0 20px; height: 70px; display: flex; align-items: center; justify-content: space-between; }
        .logo { font-size: 22px; font-weight: 700; color: var(--primary); text-decoration: none; cursor: pointer; }
        .logo span { color: var(--text-main); }

        .container { max-width: 1200px; margin: 40px auto; padding: 0 20px; }
        .page-header { margin-bottom: 40px; text-align: center; }
        .page-header h1 { font-size: 30px; color: var(--primary-dark); margin-bottom: 10px; }
        .page-header p { color: var(--text-muted); }

        .grid-layout { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 30px; }
        
        .card { background: var(--bg-white); border-radius: var(--radius); border: 1px solid var(--border-color); box-shadow: var(--shadow); overflow: hidden; display: flex; flex-direction: column; transition: var(--transition); }
        .card:hover { transform: translateY(-4px); }
        .card-body { padding: 24px; display: flex; flex-direction: column; flex-grow: 1; }
        .card-body h3 { font-size: 19px; margin-bottom: 12px; }

        .btn { display: inline-block; text-align: center; padding: 12px 24px; font-size: 14px; font-weight: 600; border-radius: 8px; text-decoration: none; transition: var(--transition); border: none; width: 100%; cursor: pointer; }
        .btn-primary { background-color: var(--primary); color: var(--bg-white); }
        .btn-primary:hover { background-color: var(--primary-dark); }
        
        .loader-box { text-align: center; padding: 50px 20px; font-size: 18px; color: var(--primary); font-weight: 600; }
        .back-btn { display: inline-block; margin-bottom: 20px; color: var(--primary); font-weight: 600; text-decoration: none; cursor: pointer; }
    </style>
</head>
<body>

    <nav class="navbar">
        <div class="nav-container">
            <a href="batches.html" class="logo">Next<span>Toppers</span></a>
        </div>
    </nav>

    <main class="container" id="batches-workspace">
        <!-- Content Dynamically Loads Here -->
    </main>

    <script>
        const API_URL = "https://api.devcoderz.vercel.app/nt-v1"; // Apni exact dynamic API laga dena

        // URL parameters ko check karne ka logic (?batchId=... check karne ke liye)
        const urlParams = new URLSearchParams(window.location.search);
        const batchIdParam = urlParams.get('batchId');

        window.onload = function() {
            if (batchIdParam) {
                // Agar URL me batchId hai, toh usi page par subjects load karo
                loadBatchSubjects(batchIdParam);
            } else {
                // Agar URL normal h, toh saare batches load karo
                loadAllBatches();
            }
        };

        // --- STAGE 1: API Se Saare Batches Load Krna ---
        async function loadAllBatches() {
            const ws = document.getElementById('batches-workspace');
            ws.innerHTML = `<div class="loader-box">Loading All Live Batches...</div>`;

            try {
                const response = await fetch(`${API_URL}/batches`);
                const batches = await response.json();
                
                let html = '';
                batches.forEach(batch => {
                    html += `
                        <div class="card">
                            <div class="card-body">
                                <h3>${batch.name}</h3>
                                <p style="color:var(--text-muted); font-size:14px; margin-bottom:20px;">${batch.description || 'Premium Learning Batch'}</p>
                                <!-- href usi page par parameter bhejega -->
                                <a href="batches.html?batchId=${batch.id}" class="btn btn-primary">Explore Subjects</a>
                            </div>
                        </div>`;
                });

                ws.innerHTML = `
                    <header class="page-header">
                        <h1>Your Next Toppers Batches</h1>
                        <p>Select any active streaming room dashboard to view content.</p>
                    </header>
                    <div class="grid-layout">${html}</div>`;

            } catch (error) {
                ws.innerHTML = `<div class="loader-box" style="color:red;">Failed to load batches from API. Check connection.</div>`;
            }
        }

        // --- STAGE 2: Usi Page Par Clicked Batch Ke Subjects Kholna ---
        async function loadBatchSubjects(batchId) {
            const ws = document.getElementById('batches-workspace');
            ws.innerHTML = `<div class="loader-box">Fetching Batch Subjects...</div>`;

            try {
                // API endpoint se single batch details jisme subjects ki list ho
                const response = await fetch(`${API_URL}/batch/${batchId}`);
                const batchData = await response.json(); // Expected format: { batchName: "...", subjects: ["physics", "chemistry"] }

                let html = '';
                batchData.subjects.forEach(subject => {
                    html += `
                        <div class="card">
                            <div class="card-body">
                                <h3 style="text-transform: capitalize;">${subject}</h3>
                                <p style="color:var(--text-muted); font-size:14px; margin-bottom:20px;">Recorded video modules & tracking sheets.</p>
                                <!-- Click hone par lectures.html par route karega parameters ke sath -->
                                <a href="lectures.html?batchId=${batchId}&subject=${subject}" class="btn btn-primary">View Lectures</a>
                            </div>
                        </div>`;
                });

                ws.innerHTML = `
                    <a href="batches.html" class="back-btn">← Back to All Batches</a>
                    <header class="page-header">
                        <h1>${batchData.batchName}</h1>
                        <p>Select your stream target subject segment.</p>
                    </header>
                    <div class="grid-layout">${html}</div>`;

            } catch (error) {
                ws.innerHTML = `<div class="loader-box" style="color:red;">Error fetching batch details from dynamic server.</div>`;
            }
        }
    </script>
</body>
</html>
