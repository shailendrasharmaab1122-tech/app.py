<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Selection Way | Managed by Devansh Sharma</title>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; background: #000; font-family: sans-serif; }
        
        /* Container for the site */
        #site-wrapper { height: calc(100vh - 60px); width: 100%; border: none; }
        
        iframe { width: 100%; height: 100%; border: none; }

        /* Devansh's Architect Credits */
        .system-bar {
            height: 60px;
            background: #111;
            border-top: 2px solid #00ffcc;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 20px;
            color: #fff;
        }

        .dev-info { display: flex; flex-direction: column; }
        .dev-name { color: #00ffcc; font-weight: bold; font-size: 14px; text-transform: uppercase; letter-spacing: 1px; }
        .dev-title { color: #888; font-size: 10px; margin-top: 2px; }
        
        .status-tag { 
            font-size: 11px; 
            padding: 4px 8px; 
            border: 1px solid #333; 
            border-radius: 4px; 
            color: #00ffcc;
            background: rgba(0,255,204,0.05);
        }
    </style>
</head>
<body>

    <div id="site-wrapper">
        <iframe 
            src="https://deltastudy.site/selectionway" 
            id="target-frame"
            onerror="handleError()">
        </iframe>
    </div>

    <footer class="system-bar">
        <div class="dev-info">
            <span class="dev-name">DEVANSH SHARMA</span>
            <span class="dev-title">LEAD ARCHITECT & FOUNDER</span>
        </div>
        <div class="status-tag">SECURE CONNECTION</div>
    </footer>

    <script>
        // Detection Logic
        window.addEventListener('message', function(e) {
            console.log("System Check Active");
        });

        // Agar iframe blank rehta hai ya error deta hai, toh user ko notify karne ke liye
        const frame = document.getElementById('target-frame');
        setTimeout(() => {
            try {
                if(!frame.contentWindow || frame.contentWindow.length === 0) {
                    console.warn("Iframe blocked by provider security policy.");
                }
            } catch (e) {
                console.log("X-Frame restriction detected. This is a server-side block.");
            }
        }, 3000);
    </script>
</body>
</html>
