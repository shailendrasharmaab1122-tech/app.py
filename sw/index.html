<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Selection Way - Dynamic Portal</title>
    <!-- Crypto-JS Library for automated AES Decryption -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    <style>
        :root {
            --bg-color: #0a0f1c;
            --card-bg: #111827;
            --text-main: #f3f4f6;
            --text-muted: #9ca3af;
            --primary: #6366f1;
            --primary-hover: #4f46e5;
            --border: #1f2937;
            --success: #10b981;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: ui-sans-serif, system-ui, sans-serif;
            margin: 0; padding: 0;
        }

        /* Navbar */
        nav {
            background: rgba(10, 15, 28, 0.8);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border);
            position: fixed;
            top: 0; left: 0; right: 0; height: 64px;
            display: flex; align-items: center; z-index: 100;
        }

        .nav-container {
            width: 100%; max-width: 1200px; margin: 0 auto; padding: 0 20px;
            display: flex; justify-content: space-between; align-items: center;
        }

        .logo {
            font-size: 20px; font-weight: 700; color: #fff; text-decoration: none;
            display: flex; align-items: center; gap: 8px; cursor: pointer;
        }
        .logo img { height: 36px; }

        .btn-back {
            background: var(--card-bg); border: 1px solid var(--border); color: var(--text-main);
            padding: 8px 16px; border-radius: 6px; cursor: pointer; display: none;
        }

        /* Main Screen */
        main { max-width: 1200px; margin: 90px auto 0 auto; padding: 20px; }
        .header-section { margin-bottom: 30px; }
        .header-title { font-size: 28px; font-weight: 700; margin: 0 0 5px 0; }
        .header-subtitle { color: var(--text-muted); font-size: 14px; margin: 0; }

        .search-box { margin-top: 15px; max-width: 400px; }
        .search-box input {
            width: 100%; background-color: var(--card-bg); border: 1px solid var(--border);
            border-radius: 8px; padding: 10px 15px; color: #fff; font-size: 14px; outline: none;
        }
        .search-box input:focus { border-color: var(--primary); }

        /* Grid & Cards */
        .grid {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px; margin-top: 25px;
        }
        .card {
            background-color: var(--card-bg); border: 1px solid var(--border);
            border-radius: 12px; overflow: hidden; display: flex; flex-direction: column;
            transition: transform 0.2s, border-color 0.2s; cursor: pointer;
        }
        .card:hover { transform: translateY(-4px); border-color: var(--primary); }
        .card-banner { width: 100%; height: 150px; background-color: #1f2937; object-fit: cover; }
        .card-content { padding: 15px; flex-grow: 1; display: flex; flex-direction: column; justify-content: space-between; }
        .card-title { font-size: 16px; font-weight: 600; margin: 0 0 8px 0; }
        .card-meta { font-size: 13px; color: var(--text-muted); margin-bottom: 15px; }
        .btn-open { background-color: var(--primary); color: #fff; text-align: center; padding: 8px; border-radius: 6px; font-size: 13px; font-weight: 500; }

        /* Content Rows (Inside Batch) */
        .content-section { display: none; }
        .content-row {
            background: var(--card-bg); border: 1px solid var(--border);
            padding: 15px; border-radius: 8px; margin-bottom: 12px;
            display: flex; justify-content: space-between; align-items: center; gap: 10px; flex-wrap: wrap;
        }
        .content-info { flex: 1; min-width: 250px; }
        .content-title { font-weight: 600; margin: 0 0 5px 0; font-size: 15px; }
        .content-type { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: bold; text-transform: uppercase; background: #2563eb; color: white; }
        .btn-watch { background-color: var(--success); color: #fff; text-decoration: none; padding: 8px 16px; border-radius: 6px; font-weight: 500; font-size: 13px; }

        /* Status alerts */
        .status { text-align: center; padding: 50px; color: var(--text-muted); font-size: 16px; }
        .spinner { border: 3px solid rgba(255,255,255,0.1); width: 30px; height: 30px; border-radius: 50%; border-left-color: var(--primary); animation: spin 1s linear infinite; margin: 0 auto 15px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <!-- Navbar -->
    <nav>
        <div class="nav-container">
            <div class="logo" onclick="showBatchesPage()">
                <img src="https://www.selectionway.com/next_images/logo.png" alt="Logo">
                <span>Selection Way</span>
            </div>
            <button id="backBtn" class="btn-back" onclick="showBatchesPage()">← Back to Batches</button>
        </div>
    </nav>

    <main>
        <!-- SCREEN 1: BATCHES VIEW -->
        <div id="batchesPage">
            <div class="header-section">
                <h1 class="header-title">All Available Batches</h1>
                <p class="header-subtitle" id="batchCount">Fetching secure payload...</p>
                <div class="search-box">
                    <input type="text" id="searchField" placeholder="Search your batch here...">
                </div>
            </div>
            <div id="batchesGrid" class="grid"></div>
        </div>

        <!-- SCREEN 2: BATCH CONTENTS VIEW -->
        <div id="contentsPage" class="content-section">
            <div class="header-section">
                <h1 class="header-title" id="currentBatchTitle">Batch Content</h1>
                <p class="header-subtitle">Unlocked dynamic video streaming lectures</p>
            </div>
            <div id="contentsList"></div>
        </div>

        <!-- Status Overlays -->
        <div id="loader" class="status"><div class="spinner"></div>Decrypting Server Data Safe-Mode...</div>
        <div id="errorBox" class="status" style="display: none; color: #ef4444;"></div>
    </main>

    <script>
        // Extraction configuration parameters
        const ENCRYPTION_KEY = "34567823456782345678234567823456"; // Extracted secret
        const AGGREGATE_API = 'https://sw.nextmate.site/api/aggregate';
        const CONTENTS_API = 'https://sw.nextmate.site/api/batch-contents?id=';
        
        let localBatchesStore = [];

        window.addEventListener('DOMContentLoaded', initSecureFetch);

        // AES Decryption Handler
        function decryptPayload(encryptedObj) {
            try {
                const keyBytes = CryptoJS.enc.Utf8.parse(ENCRYPTION_KEY);
                const ivBytes = CryptoJS.enc.Base64.parse(encryptedObj.iv);
                
                const decrypted = CryptoJS.AES.decrypt(
                    encryptedObj.cipherText,
                    keyBytes,
                    { iv: ivBytes, mode: CryptoJS.mode.GCM }
                );
                
                const jsonText = decrypted.toString(CryptoJS.enc.Utf8);
                return JSON.parse(jsonText);
            } catch(e) {
                console.error("Decryption pipeline error:", e);
                return null;
            }
        }

        // STEP 1: Fetch and Render Batches
        async function initSecureFetch() {
            try {
                toggleLoader(true);
                const response = await fetch(AGGREGATE_API);
                const encryptedJson = await response.json();
                
                // Decrypting the response automatically
                const cleanData = decryptPayload(encryptedJson);
                
                toggleLoader(false);
                if (!cleanData) {
                    showErrorMessage("Decryption logic failed. Security key might have cycled.");
                    return;
                }

                localBatchesStore = cleanData.batches || cleanData.data || cleanData;
                document.getElementById('batchCount').innerText = `${localBatchesStore.length} secure batches unlocked`;
                renderBatches(localBatchesStore);

            } catch (err) {
                toggleLoader(false);
                showErrorMessage("Network or runtime crash: " + err.message);
            }
        }

        function renderBatches(batches) {
            const grid = document.getElementById('batchesGrid');
            grid.innerHTML = '';
            
            batches.forEach(batch => {
                const id = batch.id || batch._id;
                const title = batch.title || batch.name || "Secure Stream";
                const desc = batch.description || "Premium educational dashboard entry.";
                const img = batch.image || batch.thumbnail || "https://via.placeholder.com/400x200/111827/ffffff?text=Selection+Way";

                const card = document.createElement('div');
                card.className = 'card';
                card.onclick = () => fetchBatchLectures(id, title);
                card.innerHTML = `
                    <img class="card-banner" src="${img}" onerror="this.src='https://via.placeholder.com/400x200/111827/ffffff?text=Selection+Way'">
                    <div class="card-content">
                        <div>
                            <h3 class="card-title">${title}</h3>
                            <p class="card-meta">${desc}</p>
                        </div>
                        <div class="btn-open">Open Lectures</div>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        // STEP 2: Fetch and Decrypt Inside Content
        async function fetchBatchLectures(batchId, title) {
            if(!batchId) return;
            try {
                document.getElementById('batchesPage').style.display = 'none';
                document.getElementById('contentsPage').style.display = 'block';
                document.getElementById('backBtn').style.display = 'block';
                document.getElementById('currentBatchTitle').innerText = title;

                const listContainer = document.getElementById('contentsList');
                listContainer.innerHTML = '';
                toggleLoader(true);

                const res = await fetch(`${CONTENTS_API}${batchId}`);
                const encryptedData = await res.json();
                
                // Decrypt current internal batch payload
                const decryptedContent = decryptPayload(encryptedData);
                toggleLoader(false);

                const finalItems = decryptedContent.contents || decryptedContent.data || decryptedContent;

                if(!finalItems || finalItems.length === 0) {
                    listContainer.innerHTML = `<div class="status">No lectures available inside this encrypted terminal.</div>`;
                    return;
                }

                finalItems.forEach(item => {
                    const lectureTitle = item.title || item.name || "Standard Lecture Video";
                    const type = item.type || "video";
                    const directUrl = item.url || item.videoUrl || item.link || "#";

                    const row = document.createElement('div');
                    row.className = 'content-row';
                    row.innerHTML = `
                        <div class="content-info">
                            <h4 class="content-title">${lectureTitle}</h4>
                            <span class="content-type">${type}</span>
                        </div>
                        <a href="${directUrl}" target="_blank" class="btn-watch">Play/Stream</a>
                    `;
                    listContainer.appendChild(row);
                });

            } catch (err) {
                toggleLoader(false);
                showErrorMessage("Failed extracting inside resource links: " + err.message);
            }
        }

        // Screen View Controller
        function showBatchesPage() {
            document.getElementById('contentsPage').style.display = 'none';
            document.getElementById('backBtn').style.display = 'none';
            document.getElementById('errorBox').style.display = 'none';
            document.getElementById('batchesPage').style.display = 'block';
        }

        function toggleLoader(show) { document.getElementById('loader').style.display = show ? 'block' : 'none'; }
        function showErrorMessage(msg) { const b = document.getElementById('errorBox'); b.style.display = 'block'; b.innerText = msg; }

        // Live Dynamic Filtering
        document.getElementById('searchField').addEventListener('input', (e) => {
            const query = e.target.value.toLowerCase();
            const filtered = localBatchesStore.filter(b => (b.title || b.name || '').toLowerCase().includes(query));
            renderBatches(filtered);
        });
    </script>
</body>
</html>
