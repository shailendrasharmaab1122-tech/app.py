<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connecting... | DevCoderz Central</title>
    <style>
        body {
            background-color: #0a0a0a;
            color: #ffffff;
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        .loader-container {
            text-align: center;
        }

        /* Neon Circle Animation */
        .loader {
            border: 4px solid #1a1a1a;
            border-top: 4px solid #00ffcc;
            border-radius: 50%;
            width: 60px;
            height: 60px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
            box-shadow: 0 0 15px #00ffcc;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .status-text {
            font-size: 18px;
            letter-spacing: 2px;
            margin-bottom: 10px;
            color: #00ffcc;
            text-transform: uppercase;
        }

        .credits {
            border-top: 1px solid #333;
            padding-top: 15px;
            margin-top: 20px;
        }

        .dev-name {
            font-size: 14px;
            font-weight: bold;
            display: block;
        }

        .dev-role {
            font-size: 11px;
            color: #888;
            text-transform: uppercase;
        }
    </style>
</head>
<body>

    <div class="loader-container">
        <div class="loader"></div>
        <div class="status-text">Establishing Connection...</div>
        
        <div class="credits">
            <span class="dev-name">DEVANSH SHARMA</span>
            <span class="dev-role">Lead Architect & Founder</span>
        </div>
    </div>

    <script>
        // Automatic redirection after 3 seconds
        setTimeout(function() {
            window.location.href = "https://deltastudy.site/selectionway";
        }, 3000);
    </script>

</body>
</html>
