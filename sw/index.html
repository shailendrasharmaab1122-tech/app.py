<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video Player Integration</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f9;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        h2 {
            color: #333;
        }
        .video-container {
            margin-bottom: 40px;
            background: #fff;
            padding: 15px;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            text-align: center;
        }
        iframe, video {
            border: 2px solid #ddd;
            border-radius: 4px;
            max-width: 100%;
        }
    </style>
</head>
<body>

    <!-- METHOD 1: IFRAME METHOD -->
    <div class="video-container">
        <h2>Method 1: Using iFrame</h2>
        <iframe 
            src="https://selectionwayrecorded.hranker.com/692f350fdd258fd3232d8b0b/output_360p.mp4" 
            width="640" 
            height="360" 
            frameborder="0" 
            allowfullscreen>
        </iframe>
    </div>

    <hr style="width: 80%; border: 1px solid #ccc; margin: 20px 0;">

    <!-- METHOD 2: DIRECT VIDEO TAG METHOD (RECOMMENDED) -->
    <div class="video-container">
        <h2>Method 2: Using HTML5 Video Tag (Recommended)</h2>
        <video width="640" height="360" controls poster="">
            <source src="https://selectionwayrecorded.hranker.com/692f350fdd258fd3232d8b0b/output_360p.mp4" type="video/mp4">
            Aapka browser video tag support nahi karta hai.
        </video>
    </div>

</body>
</html>
