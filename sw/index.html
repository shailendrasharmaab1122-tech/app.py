<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eduvibe PW - the DevCoderZ</title>
    <style>
        /* Reset default margins and paddings */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: 'Arial', sans-serif;
        }

        /* Header Style */
        .credit-header {
            width: 100%;
            height: 50px;
            background-color: #1a1a1a;
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 18px;
            font-weight: bold;
            box-shadow: 0px 2px 5px rgba(0,0,0,0.3);
            z-index: 1000;
            position: relative;
        }

        .credit-header span {
            color: #00ffcc; /* text ka color badalne ke liye */
            margin-left: 5px;
        }

        /* Iframe Container */
        .iframe-container {
            width: 100%;
            height: calc(100% - 50px); /* Total height me se header ki height minus ki hai */
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
    </style>
</head>
<body>

    <div class="credit-header">
        Developed & Managed by: <span>the DevCoderZ</span>
    </div>

    <div class="iframe-container">
        <iframe src="https://eduvibe-pw.page.gd/?i=1" allowfullscreen></iframe>
    </div>

</body>
</html>
