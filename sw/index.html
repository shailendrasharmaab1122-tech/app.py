<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Selection Way - Batches</title>
    <style>
        /* CSS Variables for Selection Way Dark Theme */
        :root {
            --bg-color: #0a0f1c;
            --card-bg: #111827;
            --text-main: #f3f4f6;
            --text-muted: #9ca3af;
            --primary: #6366f1;
            --primary-hover: #4f46e5;
            --border: #1f2937;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            margin: 0;
            padding: 0;
        }

        /* Navbar Layout */
        nav {
            background: rgba(10, 15, 28, 0.8);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border);
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 64px;
            display: flex;
            align-items: center;
            z-index: 50;
        }

        .nav-container {
            width: 100%;
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-size: 20px;
            font-weight: 700;
            color: #fff;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .logo img {
            height: 36px;
        }

        /* Main Content Wrapper */
        main {
            margin-top: 100px;
            padding: 20px;
            max-width: 1200px;
            margin-left: auto;
            margin-right: auto;
        }

        .header-section {
            margin-bottom: 30px;
        }

        .header-title {
            font-size: 28px;
            font-weight: 700;
            margin: 0 0 5px 0;
        }

        .header-subtitle {
            color: var(--text-muted);
            font-size: 14px;
            margin: 0;
        }

        /* Controls: Search and Filters */
        .controls {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-top: 20px;
        }

        @media(min-width: 768px) {
            .controls {
                flex-direction: row;
                align-items: center;
            }
        }

        .search-box {
            position: relative;
            flex-grow: 1;
            max-width: 400px;
        }

        .search-box input {
            width: 100%;
            background-color: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 10px 15px;
            color: #fff;
            font-size: 14px;
            outline: none;
            box-sizing: border-box;
        }

        .search-box input:focus {
            border-color: var(--primary);
        }

        /* Batches Dynamic Grid */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
            margin-top: 30px;
        }

        /* Batch Card Design */
        .card {
            background-color: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 12px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            transition: transform 0.2s, border-color 0.2s;
        }

        .card:hover {
            transform: translateY(-4px);
            border-color: var(--primary);
        }

        .card-banner {
            width: 100%;
            height: 160px;
            background-color: #1f2937;
            object-fit: cover;
        }

        .card-content {
            padding: 20px;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .card-title {
            font-size: 18px;
            font-weight: 600;
            margin: 0 0 10px 0;
            line-height: 1.4;
        }

        .card-meta {
            font-size: 13px;
            color: var(--text-muted);
            margin-bottom: 20px;
        }

        .btn-view {
            background-color: var(--primary);
            color: #fff;
            text-align: center;
            padding: 10px;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 500;
            font-size: 14px;
            transition: background 0.2s;
        }

        .btn-view:hover {
            background-color: var(--primary-hover);
        }

        /* Status Styling */
        .status {
            text-align: center;
            padding: 40px;
            color: var(--text-muted);
            font-size: 16px;
        }

        .spinner {
            border: 3px solid rgba(255,255,255,0.1);
            width: 30px;
            height: 30px;
            border-radius: 50%;
            border-left-color: var(--primary);
            animation: spin 1s linear infinite;
            margin: 0 auto 15px auto;
        }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <!-- Navbar Section -->
    <nav>
        <div class="nav-container">
            <a href="#" class="logo">
                <img src="https://www.selectionway.com/next_images/logo.png" alt="Logo">
                <span>Selection Way</span>
            </a>
        </div>
    </nav>

    <!-- Main Wrapper -->
    <main>
        <div class="header-section">
            <h1 class="header-title">Browse Batches</h1>
            <p class="header-subtitle" id="batchCount">Loading available batches...</p>
            
            <div class="controls">
                <div class="search-box">
                    <input type="text" id="searchField" placeholder="Search batches...">
                </div>
            </div>
        </div>

        <!-- Status Updates -->
        <div id="loadingStatus" class="status">
            <div class="spinner"></div>
            Connecting to NextMate API...
        </div>
        <div id="errorStatus" class="status" style="display: none; color: #ef4444;"></div>

        <!-- Target Grid Area -->
        <div id="batchesGrid" class="grid"></div>
    </main>

    <script>
        const TARGET_API = 'https://sw.nextmate.site/api/aggregate';
        let storeData = [];

        window.addEventListener('DOMContentLoaded', loadApiData);

        async function loadApiData() {
            try {
                const res = await fetch(TARGET_API);
                if (!res.ok) throw new Error(`Server responded with code ${res.status}`);
                
                const parsedData = await res.json();
                console.log("Raw API Output:", parsedData); // Debugging tools me dekhne ke liye

                // NextMate aggregate API nesting keys wrapper parsing
                if (Array.isArray(parsedData)) {
                    storeData = parsedData;
                } else if (parsedData.data && Array.isArray(parsedData.data)) {
                    storeData = parsedData.data;
                } else if (parsedData.batches && Array.isArray(parsedData.batches)) {
                    storeData = parsedData.batches;
                } else {
                    // Agar object wrapped object ho toh uske properties nikalna
                    storeData = Object.values(parsedData).filter(item => typeof item === 'object');
                }

                document.getElementById('loadingStatus').style.display = 'none';

                if (!storeData || storeData.length === 0) {
                    showError("API se response toh aaya par uske andar data items khali hain.");
                    return;
                }

                document.getElementById('batchCount').innerText = `${storeData.length} batches available`;
                displayCards(storeData);

            } catch (err) {
                document.getElementById('loadingStatus').style.display = 'none';
                showError(`Data read nahi ho pa rha. Wajah: ${err.message}`);
            }
        }

        function displayCards(items) {
            const container = document.getElementById('batchesGrid');
            container.innerHTML = '';

            items.forEach(item => {
                // NextMate system variables extraction handles safely
                const title = item.title || item.name || item.batchName || "New Batch";
                const desc = item.description || item.shortDesc || "No subtitle details available.";
                const image = item.image || item.thumbnail || item.banner || "https://www.selectionway.com/next_images/logo.png";
                const targetUrl = item.url || item.link || "#";

                const element = document.createElement('div');
                element.className = 'card';
                element.innerHTML = `
                    <img class="card-banner" src="${image}" onerror="this.src='https://via.placeholder.com/400x200/111827/ffffff?text=Selection+Way'" alt="Batch Thumbnail">
                    <div class="card-content">
                        <div>
                            <h3 class="card-title">${title}</h3>
                            <p class="card-meta">${desc}</p>
                        </div>
                        <a href="${targetUrl}" target="_blank" class="btn-view">View Details</a>
                    </div>
                `;
                container.appendChild(element);
            });
        }

        function showError(message) {
            const errDiv = document.getElementById('errorStatus');
            errDiv.style.display = 'block';
            errDiv.innerHTML = `<strong>Error:</strong> ${message}<br><small style="color: #9ca3af; margin-top:5px; display:block;">Agar console me CORS blocked error dikhe, toh server backend panel se cross-origin request whitelist honi zaroori hai.</small>`;
        }

        // Live filtering logic
        document.getElementById('searchField').addEventListener('input', (e) => {
            const query = e.target.value.toLowerCase();
            const filtered = storeData.filter(item => {
                const t = (item.title || item.name || '').toLowerCase();
                const d = (item.description || item.shortDesc || '').toLowerCase();
                return t.includes(query) || d.includes(query);
            });
            displayCards(filtered);
            document.getElementById('batchCount').innerText = `${filtered.length} batches found`;
        });
    </script>
</body>
</html>
