<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Dashboard - All Batches</title>
    <!-- Tailwind CSS (for modern UI) -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        body { background-color: #0b0f19; color: #f3f4f6; }
    </style>
</head>
<body class="p-6 md:p-12">

    <div class="max-w-6xl mx-auto">
        <h1 class="text-3xl font-bold mb-2 bg-gradient-to-r from-blue-400 to-emerald-400 bg-clip-text text-transparent">
            My Enrolled Batches
        </h1>
        <p class="text-gray-400 mb-8">Select a batch to view classes and schedule.</p>

        <!-- Batches Grid Grid -->
        <div id="batches-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            <!-- Batches Dynamically JS se inject honge -->
        </div>
    </div>

    <script>
        // Batches ka data (Ise tum baad me kisi API ya JSON file se bhi replace kar sakte ho)
        const batchesData = [
            {
                id: "selection-batch-vod-2",
                title: "Selection Batch VOD 2.0",
                description: "Complete Recorded Batch for Target Exams.",
                totalClasses: "1185 Classes",
                image: "https://images.unsplash.com/photo-1516321318423-f06f85e504b3?w=500"
            },
            {
                id: "jee-lakshya-2026",
                title: "JEE Lakshya Batch 2026",
                description: "Physics, Chemistry & Mathematics Intensive Preparation.",
                totalClasses: "450 Classes",
                image: "https://images.unsplash.com/photo-1635070041078-e363dbe005cb?w=500"
            }
        ];

        const grid = document.getElementById('batches-grid');

        // Loop chalakar saare batches show karna
        batchesData.forEach(batch => {
            const card = document.createElement('div');
            card.className = "border border-slate-800 bg-slate-900/50 rounded-2xl overflow-hidden hover:border-blue-500/50 transition-all duration-300 flex flex-col justify-between";
            
            card.innerHTML = `
                <div>
                    <img src="${batch.image}" alt="${batch.title}" class="w-full h-40 object-cover opacity-80">
                    <div class="p-5">
                        <span class="text-xs font-semibold bg-blue-500/10 text-blue-400 px-2.5 py-1 rounded-full">${batch.totalClasses}</span>
                        <h3 class="text-xl font-bold mt-3 text-white">${batch.title}</h3>
                        <p class="text-sm text-gray-400 mt-2">${batch.description}</p>
                    </div>
                </div>
                <div class="p-5 pt-0">
                    <a href="batches.html?batch=${batch.id}" class="block text-center bg-blue-600 hover:bg-blue-500 text-white font-medium text-sm py-2.5 rounded-xl transition-all">
                        Open Batch →
                    </a>
                </div>
            `;
            grid.appendChild(card);
        });
    </script>
</body>
</html>
