<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Selection Way - Portal</title>
    <style>
        :root {
            --bg-color: #0a0f1c;
            --card-bg: #111827;
            --text-main: #f3f4f6;
            --text-muted: #9ca3af;
            --primary: #6366f1;
            --primary-hover: #4f46e5;
            --border: #1f2937;
            --success: #10b981;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
            margin: 0;
            padding: 0;
        }

        /* Navbar */
        nav {
            background: rgba(10, 15, 28, 0.8);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border);
            position: fixed;
            top: 0; left: 0; right: 0; height: 64px;
            display: flex; align-items: center; z-index: 100;
        }

        .nav-container {
            width: 100%; max-width: 1200px; margin: 0 auto; padding: 0 20px;
            display: flex; justify-content: space-between; align-items: center;
        }

        .logo {
            font-size: 20px; font-weight: 700; color: #fff; text-decoration: none;
            display: flex; align-items: center; gap: 8px; cursor: pointer;
        }

        .logo img { height: 36px; }

        .btn-back {
            background: var(--card-bg);
            border: 1px solid var(--border);
            color: var(--text-main);
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            display: none; /* Shuru me hidden rahega */
        }

        /* Main Wrapper */
        main {
            margin-top: 90px; padding: 20px; max-width: 1200px;
            margin-left: auto; margin-right: auto;
        }

        .header-section { margin-bottom: 30px; }
        .header-title { font-size: 28px; font-weight: 700; margin: 0 0 5px 0; }
        .header-subtitle { color: var(--text-muted); font-size: 14px; margin: 0; }

        /* Search Box */
        .search-box { margin-top: 15px; max-width: 400px; }
        .search-box input {
            width: 100%; background-color: var(--card-bg); border: 1px solid var(--border);
            border-radius: 8px; padding: 10px 15px; color: #fff; font-size: 14px; outline: none;
        }
        .search-box input:focus { border-color: var(--primary); }

        /* Grid Layouts */
        .grid {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px; margin-top: 25px;
        }

        /* Batch Card */
        .card {
            background-color: var(--card-bg); border: 1px solid var(--border);
            border-radius: 12px; overflow: hidden; display: flex; flex-direction: column;
            transition: transform 0.2s, border-color 0.2s; cursor: pointer;
        }
        .card:hover { transform: translateY(-4px); border-color: var(--primary); }
        .card-banner { width: 100%; height: 150px; background-color: #1f2937; object-fit: cover; }
        .card-content { padding: 15px; flex-grow: 1; display: flex; flex-direction: column; justify-content: space-between; }
        .card-title { font-size: 16px; font-weight: 600; margin: 0 0 8px 0; line-height: 1.4; }
        .card-meta { font-size: 13px; color: var(--text-muted); margin-bottom: 15px; }
        .btn-open {
            background-color: var(--primary); color: #fff; text-align: center;
            padding: 8px; border-radius: 6px; font-weight: 500; font-size: 13px;
        }

        /* Content List View (Lectures Screen) */
        .content-section { display: none; }
        .content-row {
            background: var(--card-bg); border: 1px solid var(--border);
            padding: 15px; border-radius: 8px; margin-bottom: 12px;
            display: flex; justify-content: space-between; align-items: center;
            flex-wrap: wrap; gap: 10px;
        }
        .content-info { flex: 1; min-width: 250px; }
        .content-title { font-weight: 600; margin: 0 0 5px 0; font-size: 15px; }
        .content-type {
            display: inline-block; padding: 2px 8px; border-radius: 4px;
            font-size: 11px; font-weight: bold; text-transform: uppercase;
            background: #2563eb; color: white;
        }
        .btn-watch {
            background-color: var(--success); color: #fff; border: none;
            padding: 8px 16px; border-radius: 6px; cursor: pointer;
            font-weight: 500; font-size: 13px; text-decoration: none;
        }

        /* Statuses */
        .status { text-align: center; padding: 50px; color: var(--text-muted); }
        .spinner {
            border: 3px solid rgba(255,255,255,0.1); width: 30px; height: 30px;
            border-radius: 50%; border-left-color: var(--primary);
            animation: spin 1s linear infinite; margin: 0 auto 15px auto;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <!-- Navbar -->
    <nav>
        <div class="nav-container">
            <div class="logo" onclick="showBatchesPage()">
                <img src="https://www.selectionway.com/next_images/logo.png" alt="Logo">
                <span>Selection Way</span>
            </div>
            <button id="backBtn" class="btn-back" onclick="showBatchesPage()">← Back to Batches</button>
        </div>
    </nav>

    <main>
        <!-- SCREEN 1: BATCHES VIEW -->
        <div id="batchesPage">
            <div class="header-section">
                <h1 class="header-title">Browse Batches</h1>
                <p class="header-subtitle" id="batchCount">Fetching lists...</p>
                <div class="search-box">
                    <input type="text" id="searchField" placeholder="Search your batch...">
                </div>
            </div>
            <div id="batchesGrid" class="grid"></div>
        </div>

        <!-- SCREEN 2: BATCH CONTENTS VIEW -->
        <div id="contentsPage" class="content-section">
            <div class="header-section">
                <h1 class="header-title" id="currentBatchTitle">Batch Content</h1>
                <p class="header-subtitle">Available videos and study materials</p>
            </div>
            <div id="contentsList"></div>
        </div>

        <!-- Global Loader & Error Box -->
        <div id="loader" class="status"><div class="spinner"></div>Loading...</div>
        <div id="errorBox" class="status" style="display: none; color: #ef4444;"></div>
    </main>

    <script>
        const AGGREGATE_API = 'https://sw.nextmate.site/api/aggregate';
        const CONTENTS_API = 'https://sw.nextmate.site/api/batch-contents?id=';
        
        let allBatches = [];

        window.addEventListener('DOMContentLoaded', loadAllBatches);

        // 1. Saare Batches Load Karna
        async function loadAllBatches() {
            try {
                showLoader(true);
                const res = await fetch(AGGREGATE_API);
                const data = await res.json();
                
                // NextMate ke structured format standard routing fallback
                allBatches = data.batches || data.data || (Array.isArray(data) ? data : []);
                
                showLoader(false);
                if (allBatches.length === 0) {
                    showError("No batches found or structure changed.");
                    return;
                }

                document.getElementById('batchCount').innerText = `${allBatches.length} batches available`;
                renderBatches(allBatches);
            } catch (err) {
                showLoader(false);
                showError("Failed to load batches: " + err.message);
            }
        }

        function renderBatches(batches) {
            const grid = document.getElementById('batchesGrid');
            grid.innerHTML = '';
            
            batches.forEach(batch => {
                // NextMate structure ke hisaab se id extract karna (kabhi _id hota hai toh kabhi id)
                const batchId = batch.id || batch._id || '';
                const title = batch.title || batch.name || "Untitled Batch";
                const desc = batch.description || "No description available.";
                const image = batch.image || batch.thumbnail || "https://via.placeholder.com/400x200/111827/ffffff?text=Selection+Way";

                const card = document.createElement('div');
                card.className = 'card';
                card.onclick = () => loadBatchContents(batchId, title);
                card.innerHTML = `
                    <img class="card-banner" src="${image}" onerror="this.src='https://via.placeholder.com/400x200/111827/ffffff?text=Selection+Way'">
                    <div class="card-content">
                        <div>
                            <h3 class="card-title">${title}</h3>
                            <p class="card-meta">${desc}</p>
                        </div>
                        <div class="btn-open">Open Batch</div>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        // 2. Batch par click karne par uske andar ka content load karna
        async function loadBatchContents(id, batchTitle) {
            if(!id) { alert("Batch ID missing!"); return; }
            
            try {
                // Screen switch karein aur loading dikhayein
                document.getElementById('batchesPage').style.display = 'none';
                document.getElementById('contentsPage').style.display = 'block';
                document.getElementById('backBtn').style.display = 'block';
                document.getElementById('currentBatchTitle').innerText = batchTitle;
                
                const listContainer = document.getElementById('contentsList');
                listContainer.innerHTML = '';
                showLoader(true);

                const res = await fetch(`${CONTENTS_API}${id}`);
                const data = await res.json();
                showLoader(false);

                // NextMate ke array ya wrapped target array ko check karna
                const contents = data.contents || data.data || (Array.isArray(data) ? data : []);

                if(contents.length === 0) {
                    listContainer.innerHTML = `<div class="status">Is batch me abhi koi content ya videos nahi hain.</div>`;
                    return;
                }

                contents.forEach(item => {
                    const contentTitle = item.title || item.name || "Untitled Video";
                    const type = item.type || "video"; // video, pdf, etc.
                    
                    // Agar koi stream link ya output_360p.mp4 jaisa link ho
                    const videoLink = item.url || item.videoUrl || item.link || "#"; 

                    const row = document.createElement('div');
                    row.className = 'content-row';
                    row.innerHTML = `
                        <div class="content-info">
                            <h4 class="content-title">${contentTitle}</h4>
                            <span class="content-type">${type}</span>
                        </div>
                        <a href="${videoLink}" target="_blank" class="btn-watch">Play / View</a>
                    `;
                    listContainer.appendChild(row);
                });

            } catch (err) {
                showLoader(false);
                showError("Content load karne me dikkat aayi: " + err.message);
            }
        }

        // Screen toggles
        function showBatchesPage() {
            document.getElementById('contentsPage').style.display = 'none';
            document.getElementById('backBtn').style.display = 'none';
            document.getElementById('errorBox').style.display = 'none';
            document.getElementById('batchesPage').style.display = 'block';
        }

        function showLoader(status) {
            document.getElementById('loader').style.display = status ? 'block' : 'none';
        }

        function showError(msg) {
            const box = document.getElementById('errorBox');
            box.style.display = 'block';
            box.innerText = msg;
        }

        // Live Search Filter for Batches
        document.getElementById('searchField').addEventListener('input', (e) => {
            const query = e.target.value.toLowerCase();
            const filtered = allBatches.filter(b => {
                const name = (b.title || b.name || '').toLowerCase();
                return name.includes(query);
            });
            renderBatches(filtered);
        });
    </script>
</body>
</html>
